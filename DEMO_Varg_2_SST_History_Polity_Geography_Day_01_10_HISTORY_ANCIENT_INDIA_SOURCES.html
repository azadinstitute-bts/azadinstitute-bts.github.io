</style></head><body><div class="wrap"><div class="top"><div class="brandbar"><div class="brand-logo" id="brandLogo">AZAD</div><div><h1 style="margin:0;color:#0f172a;font-size:38px;letter-spacing:.8px;font-weight:900;line-height:1.05">BILASPUR TEST SERIES</h1><h2 style="margin:8px 0 0;font-size:16px;font-weight:800;color:#1d4ed8">By Azad Institute</h2><div style="margin-top:8px;font-size:14px;color:#334155;font-weight:600">🎓 DEMO_Varg_2_SST_History_Polity_Geography_Day_01_10_HISTORY_ANCIENT_INDIA_SOURCES</div></div></div></div><div id="app"></div></div><script>const Q=[{"id": 1, "section": "History", "question": "प्राचीन भारतीय इतिहास के साहित्यिक स्रोतों (literary sources) के संदर्भ में, 'पुराणों' की मुख्य विशेषता क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["ये मुख्य रूप से धार्मिक अनुष्ठानों और यज्ञों का विस्तृत वर्णन करते हैं।", "इनमें प्राचीन राजवंशों की वंशावलियाँ (genealogies) और पौराणिक कथाएँ (mythological tales) शामिल हैं।", "ये केवल बौद्ध धर्म के सिद्धांतों और शिक्षाओं पर केंद्रित हैं।", "ये तत्कालीन आर्थिक नीतियों और व्यापारिक मार्गों का विस्तृत विश्लेषण प्रस्तुत करते हैं।"], "answer": "इनमें प्राचीन राजवंशों की वंशावलियाँ (genealogies) और पौराणिक कथाएँ (mythological tales) शामिल हैं।", "explanation": "पुराण प्राचीन भारतीय इतिहास के महत्वपूर्ण साहित्यिक स्रोत हैं। इनकी मुख्य विशेषता यह है कि इनमें प्राचीन राजवंशों की वंशावलियाँ, सृष्टि की उत्पत्ति, प्रलय, और विभिन्न देवी-देवताओं से संबंधित पौराणिक कथाएँ मिलती हैं। ये धार्मिक अनुष्ठानों या आर्थिक नीतियों पर केंद्रित नहीं हैं, न ही केवल बौद्ध धर्म से संबंधित हैं।"}, {"id": 2, "section": "History", "question": "सिंधु घाटी सभ्यता (Indus Valley Civilization) के नगर नियोजन (town planning) की सबसे विशिष्ट विशेषता क्या थी, जो इसे समकालीन सभ्यताओं से अलग करती है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल धार्मिक संरचनाओं पर ध्यान केंद्रित करना और आवासीय क्षेत्रों की उपेक्षा।", "जल निकासी प्रणाली (drainage system) का अभाव और कच्ची ईंटों का उपयोग।", "ग्रिड पैटर्न (grid pattern) पर आधारित सुनियोजित सड़कें और उन्नत जल निकासी प्रणाली।", "सड़कों का अनियमित जाल और घरों का बेतरतीब निर्माण।"], "answer": "ग्रिड पैटर्न (grid pattern) पर आधारित सुनियोजित सड़कें और उन्नत जल निकासी प्रणाली।", "explanation": "सिंधु घाटी सभ्यता अपने उत्कृष्ट नगर नियोजन के लिए जानी जाती है, जिसमें सड़कें एक ग्रिड पैटर्न पर समकोण पर काटती थीं। इसके साथ ही, एक उन्नत और व्यवस्थित जल निकासी प्रणाली भी इस सभ्यता की एक विशिष्ट पहचान थी। अन्य विकल्प जैसे अनियमित सड़कें, जल निकासी का अभाव, या केवल धार्मिक संरचनाओं पर ध्यान केंद्रित करना, सिंधु घाटी सभ्यता की विशेषताओं के विपरीत हैं।"}, {"id": 3, "section": "History", "question": "ऋग्वैदिक काल (Rig Vedic period) के समाज और अर्थव्यवस्था के संबंध में निम्नलिखित कथनों पर विचार करें:\n1. समाज पितृसत्तात्मक (patriarchal) था और परिवार मूल इकाई थी।\n2. गाय (cow) को संपत्ति का एक महत्वपूर्ण रूप माना जाता था।\n3. वर्ण व्यवस्था (Varna system) जन्म पर आधारित थी और कठोर थी।\nउपरोक्त कथनों में से कौन सा/से सही है/हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल 1 और 2", "केवल 1 और 3", "केवल 2 और 3", "1, 2 और 3"], "answer": "केवल 1 और 2", "explanation": "ऋग्वैदिक समाज पितृसत्तात्मक था और परिवार उसकी मूल इकाई थी। गाय को संपत्ति का महत्वपूर्ण रूप माना जाता था और अक्सर युद्ध गायों के लिए ही लड़े जाते थे। हालांकि, ऋग्वैदिक काल में वर्ण व्यवस्था कर्म पर आधारित थी और उतनी कठोर नहीं थी जितनी उत्तर वैदिक काल में हुई, इसलिए कथन 3 गलत है।"}, {"id": 4, "section": "History", "question": "मगध (Magadha) के उत्कर्ष (rise) के लिए निम्नलिखित में से कौन सा कारक मुख्य रूप से जिम्मेदार नहीं था?", "brand": "bilaspurtestseries.com 9669946966", "options": ["लौह अयस्क (iron ore) के समृद्ध भंडार, जिससे बेहतर हथियार और कृषि उपकरण बनते थे।", "उपजाऊ गंगा के मैदानों में स्थित होना, जिससे कृषि अधिशेष (agricultural surplus) प्राप्त होता था।", "समुद्र के माध्यम से व्यापक विदेशी व्यापार और नौसैनिक शक्ति का विकास।", "राजगृह और पाटलिपुत्र जैसी रणनीतिक रूप से महत्वपूर्ण राजधानियाँ।"], "answer": "समुद्र के माध्यम से व्यापक विदेशी व्यापार और नौसैनिक शक्ति का विकास।", "explanation": "मगध का उत्कर्ष मुख्य रूप से उसकी भौगोलिक स्थिति (उपजाऊ भूमि, लौह अयस्क के भंडार) और रणनीतिक राजधानियों (राजगृह, पाटलिपुत्र) के कारण हुआ था। इन कारकों ने उसे आर्थिक और सैन्य शक्ति प्रदान की। हालांकि, मगध एक भू-आबद्ध (landlocked) क्षेत्र था और उसका उत्कर्ष समुद्र के माध्यम से व्यापक विदेशी व्यापार या नौसैनिक शक्ति के विकास पर आधारित नहीं था, बल्कि आंतरिक संसाधनों और सैन्य विजय पर अधिक था।"}, {"id": 5, "section": "History", "question": "सिंधु घाटी सभ्यता (Indus Valley Civilization) और वैदिक काल (Vedic Age) के बीच मुख्य अंतरों के संबंध में निम्नलिखित कथनों पर विचार करें:\n1. सिंधु घाटी सभ्यता एक नगरीय सभ्यता थी, जबकि वैदिक काल मुख्य रूप से ग्रामीण था।\n2. सिंधु घाटी सभ्यता के लोग लोहे के उपयोग से परिचित थे, जबकि वैदिक आर्य नहीं थे।\n3. सिंधु घाटी सभ्यता में मातृदेवी (Mother Goddess) की पूजा प्रमुख थी, जबकि वैदिक काल में इंद्र और अग्नि जैसे पुरुष देवताओं की।\nउपरोक्त कथनों में से कौन सा/से सही है/हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल 2 और 3", "1, 2 और 3", "केवल 1 और 2", "केवल 1 और 3"], "answer": "केवल 1 और 3", "explanation": "सिंधु घाटी सभ्यता एक नगरीय (urban) सभ्यता थी जिसमें सुनियोजित शहर थे, जबकि वैदिक काल मुख्य रूप से ग्रामीण (rural) और पशुपालक (pastoral) था। सिंधु घाटी सभ्यता में मातृदेवी की पूजा प्रमुख थी, जबकि वैदिक काल में इंद्र, अग्नि, वरुण जैसे पुरुष देवताओं की प्रधानता थी। कथन 2 गलत है क्योंकि सिंधु घाटी सभ्यता के लोग लोहे से परिचित नहीं थे; लोहे का ज्ञान वैदिक काल के उत्तरार्ध में आया।"}, {"id": 6, "section": "History", "question": "प्राचीन भारतीय इतिहास के पुरातात्विक स्रोतों (archaeological sources) के संदर्भ में, अभिलेखों (inscriptions) को साहित्यिक स्रोतों (literary sources) की तुलना में अधिक विश्वसनीय क्यों माना जाता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["अभिलेखों की भाषा हमेशा सरल और समझने योग्य होती है।", "अभिलेखों में आमतौर पर समकालीन घटनाओं और शासकों का सीधा और तथ्यात्मक विवरण होता है, जिनमें परिवर्तन की संभावना कम होती है।", "अभिलेखों को केवल राजाओं द्वारा ही लिखवाया जाता था, जिससे उनकी प्रामाणिकता सुनिश्चित होती थी।", "साहित्यिक स्रोतों की तुलना में अभिलेखों की संख्या बहुत अधिक है।"], "answer": "अभिलेखों में आमतौर पर समकालीन घटनाओं और शासकों का सीधा और तथ्यात्मक विवरण होता है, जिनमें परिवर्तन की संभावना कम होती है।", "explanation": "अभिलेखों को साहित्यिक स्रोतों की तुलना में अधिक विश्वसनीय माना जाता है क्योंकि वे आमतौर पर समकालीन घटनाओं और शासकों का सीधा और तथ्यात्मक विवरण प्रस्तुत करते हैं। पत्थर या धातु पर उत्कीर्ण होने के कारण, उनमें बाद में परिवर्तन या मिलावट की संभावना कम होती है, जबकि साहित्यिक ग्रंथों में समय के साथ परिवर्तन या अतिशयोक्ति हो सकती है। अभिलेखों की भाषा हमेशा सरल नहीं होती और उनकी संख्या साहित्यिक स्रोतों से अधिक नहीं है।"}, {"id": 7, "section": "History", "question": "अभिकथन (A): उत्तर वैदिक काल (Later Vedic Period) में राजा की शक्ति में वृद्धि हुई और वह अधिक शक्तिशाली बन गया।\nकारण (R): इस काल में 'राष्ट्र' (territory) की अवधारणा विकसित हुई और बड़े-बड़े यज्ञों (sacrifices) के माध्यम से राजा की स्थिति को दैवीय (divine) और सर्वोच्च घोषित किया गया।", "brand": "bilaspurtestseries.com 9669946966", "options": ["और (R) दोनों सही हैं, और (R), (A) की सही व्याख्या है।", "और (R) दोनों सही हैं, लेकिन (R), (A) की सही व्याख्या नहीं है।", "गलत है, लेकिन (R) सही है।", "सही है, लेकिन (R) गलत है।"], "answer": "और (R) दोनों सही हैं, और (R), (A) की सही व्याख्या है।", "explanation": "उत्तर वैदिक काल में राजा की शक्ति में उल्लेखनीय वृद्धि हुई। इस काल में क्षेत्रीय राज्यों (territorial states) का उदय हुआ और 'राष्ट्र' की अवधारणा विकसित हुई, जिससे राजा का नियंत्रण एक निश्चित भूभाग पर स्थापित हुआ। अश्वमेध और राजसूय जैसे बड़े-बड़े यज्ञों का आयोजन राजा की शक्ति और प्रतिष्ठा को बढ़ाने तथा उसे दैवीय वैधता प्रदान करने के लिए किया जाता था, जो उसकी बढ़ी हुई शक्ति का प्रतीक था। अतः, कारण अभिकथन की सही व्याख्या करता है।"}, {"id": 8, "section": "History", "question": "महाजनपद काल (Mahajanapada Period) के संदर्भ में निम्नलिखित कथनों पर विचार करें:\nJ: अधिकांश महाजनपदों की अपनी राजधानी थी, जो अक्सर किलेबंद (fortified) होती थी।\nK: वज्जि (Vajji) एक गणतांत्रिक (republican) महाजनपद था, जहाँ कई कुलों (clans) का संघ शासन करता था।\nM: बिम्बिसार (Bimbisara) मगध का एक महत्वपूर्ण शासक था जिसने अंग (Anga) को मगध में मिलाया।\nL: सभी महाजनपदों में राजतंत्र (monarchy) प्रचलित था और कोई भी गणतांत्रिक व्यवस्था नहीं थी।\nउपरोक्त कथनों में से कौन सा/से सही है/हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल K, L और M", "केवल J, K और M", "केवल J, L और M", "केवल J और K"], "answer": "केवल J, K और M", "explanation": "अधिकांश महाजनपदों की अपनी किलेबंद राजधानियाँ थीं (कथन J सही)। वज्जि एक प्रसिद्ध गणतांत्रिक महाजनपद था, जो आठ कुलों का संघ था (कथन K सही)। बिम्बिसार मगध का एक शक्तिशाली शासक था जिसने अंग को जीतकर मगध साम्राज्य का विस्तार किया (कथन M सही)। कथन L गलत है क्योंकि वज्जि और मल्ल जैसे कुछ महाजनपद गणतांत्रिक थे, जहाँ राजतंत्र नहीं था।"}, {"id": 9, "section": "History", "question": "निम्नलिखित सिंधु घाटी सभ्यता (Indus Valley Civilization) के स्थलों को उनकी प्रमुख विशेषताओं/खोजों से सुमेलित (match) करें:\nसूची-I (स्थल) सूची-II (विशेषता/खोज)\nJ: हड़प्पा (Harappa)\n1. विशाल स्नानागार (Great Bath)\nK: मोहनजोदड़ो (Mohenjo-Daro)\n2. जुते हुए खेत (ploughed field) के साक्ष्य\nL: लोथल (Lothal)\n3. अन्नागार (granaries) और श्रमिक आवास (workmen's quarters)\nM: कालीबंगा (Kalibangan)\n4. गोदीवाड़ा (dockyard)\nसही सुमेलित विकल्प चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-3, K-4, L-1, M-2", "J-2, K-1, L-4, M-3", "J-1, K-3, L-2, M-4", "J-3, K-1, L-4, M-2"], "answer": "J-3, K-1, L-4, M-2", "explanation": "हड़प्पा से अन्नागार और श्रमिक आवास के साक्ष्य मिले हैं (J-3)। मोहनजोदड़ो अपने विशाल स्नानागार के लिए प्रसिद्ध है (K-1)। लोथल एक महत्वपूर्ण बंदरगाह शहर था जहाँ गोदीवाड़ा पाया गया है (L-4)। कालीबंगा से जुते हुए खेत के सबसे पुराने साक्ष्य मिले हैं (M-2)। यह मिलान सिंधु घाटी सभ्यता के स्थलों की विशिष्ट खोजों को दर्शाता है।"}, {"id": 10, "section": "History", "question": "निम्नलिखित घटनाओं को उनके कालानुक्रमिक (chronological) क्रम में व्यवस्थित करें:\nJ: सिंधु घाटी सभ्यता का पतन (Decline of Indus Valley Civilization)\nK: ऋग्वैदिक काल का आरंभ (Beginning of Rig Vedic Period)\nL: महाजनपदों का उदय (Rise of Mahajanapadas)\nM: बिम्बिसार द्वारा मगध साम्राज्य की स्थापना (Establishment of Magadha Empire by Bimbisara)\nसही क्रम चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, L, M", "K, J, M, L", "J, K, M, L", "K, J, L, M"], "answer": "J, K, L, M", "explanation": "सिंधु घाटी सभ्यता का पतन लगभग 1900-1750 ईसा पूर्व के आसपास हुआ। इसके बाद ऋग्वैदिक काल का आरंभ लगभग 1500 ईसा पूर्व से होता है। महाजनपदों का उदय लगभग 600 ईसा पूर्व के आसपास हुआ। बिम्बिसार ने मगध साम्राज्य की स्थापना लगभग 544 ईसा पूर्व में की थी, जो महाजनपद काल के भीतर ही एक महत्वपूर्ण घटना थी। अतः, सही कालानुक्रम J, K, L, M है।"}, {"id": 11, "section": "History", "question": "दिल्ली सल्तनत (Delhi Sultanate) की इक्ता प्रणाली (Iqta system) का प्राथमिक उद्देश्य (primary objective) क्या था?", "brand": "bilaspurtestseries.com 9669946966", "options": ["किसानों से सीधे भू-राजस्व (land revenue) एकत्र करना।", "व्यापार और वाणिज्य (trade and commerce) को बढ़ावा देना।", "सैन्य सेवा (military service) प्रदान करना और आवंटित क्षेत्रों (assigned territories) का प्रशासन (administer) करना।", "एक केंद्रीकृत न्यायिक प्रणाली (centralized judicial system) स्थापित करना।"], "answer": "सैन्य सेवा (military service) प्रदान करना और आवंटित क्षेत्रों (assigned territories) का प्रशासन (administer) करना।", "explanation": "इक्ता प्रणाली (Iqta system) दिल्ली सल्तनत (Delhi Sultanate) की एक महत्वपूर्ण प्रशासनिक व्यवस्था (administrative arrangement) थी। इसका प्राथमिक उद्देश्य (primary objective) सैन्य अधिकारियों (military officers) और प्रशासकों (administrators) को उनकी सेवाओं के बदले में भूमि राजस्व (land revenue) के अधिकार प्रदान करना था। इक्तादार (Iqtadar) अपने आवंटित क्षेत्र (assigned territory) से राजस्व एकत्र करते थे, जिससे वे अपनी सेना का रखरखाव (maintenance) करते थे और शेष राशि (surplus) केंद्रीय खजाने (central treasury) में भेजते थे। अन्य विकल्प इक्ता प्रणाली के मुख्य उद्देश्य को सही ढंग से नहीं दर्शाते हैं।"}, {"id": 12, "section": "History", "question": "यदि किसी मनसबदार (Mansabdar) के पास 5000 का 'जात' (Zat) पद और 3000 का 'सवार' (Sawar) पद था, तो मुगल प्रशासन (Mughal administration) में इस भेद का प्राथमिक निहितार्थ (primary implication) क्या होगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["वह 5000 सैनिकों का व्यक्तिगत कमांडर (personal commander) था और 3000 घुड़सवारों (cavalrymen) का रखरखाव (maintenance) करता था।", "उसे 5000 बीघा भूमि का अनुदान (land grant) मिलता था और 3000 बीघा भूमि पर कर छूट (tax exemption)।", "वह 5000 घुड़सवारों का रखरखाव करता था और 3000 सैनिकों का व्यक्तिगत कमांडर था।", "उसे 5000 रुपये का मासिक वेतन (monthly salary) मिलता था और 3000 रुपये का अतिरिक्त भत्ता (additional allowance)।"], "answer": "वह 5000 सैनिकों का व्यक्तिगत कमांडर (personal commander) था और 3000 घुड़सवारों (cavalrymen) का रखरखाव (maintenance) करता था।", "explanation": "मुगल प्रशासन (Mughal administration) की मनसबदारी प्रणाली (Mansabdari system) में, 'जात' (Zat) मनसबदार (Mansabdar) के व्यक्तिगत पद (personal rank) और वेतन (salary) को दर्शाता था, जबकि 'सवार' (Sawar) उसे बनाए रखने वाले घुड़सवारों (cavalrymen) की संख्या को इंगित करता था। इसलिए, 5000 जात का अर्थ था कि उसका व्यक्तिगत पद 5000 था और 3000 सवार का अर्थ था कि उसे 3000 घुड़सवारों का रखरखाव करना था। अन्य विकल्प मनसबदारी प्रणाली के इन दो महत्वपूर्ण पहलुओं की गलत व्याख्या करते हैं।"}, {"id": 13, "section": "History", "question": "निम्नलिखित में से कौन-से भक्ति संत ने 'अद्वैत वेदांत' (Advaita Vedanta) के दर्शन को लोकप्रिय बनाया और 'माया' (Maya) की अवधारणा पर जोर दिया, जिससे बाद के भक्ति आंदोलनों पर भी गहरा प्रभाव पड़ा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["रामानुजाचार्य (Ramanujacharya)", "माधवाचार्य (Madhvacharya)", "शंकराचार्य (Shankaracharya)", "वल्लभाचार्य (Vallabhacharya)"], "answer": "शंकराचार्य (Shankaracharya)", "explanation": "शंकराचार्य (8वीं शताब्दी) ने अद्वैत वेदांत के दर्शन को लोकप्रिय बनाया, जिसमें ब्रह्म (Brahman) को एकमात्र सत्य माना गया और संसार को 'माया' (भ्रम) बता के मामलों में अवसर की समानता भारतीय संविधान के अनुच्छेद 16 (Article 16) के तहत समानता के अधिकार का एक महत्वपूर्ण पहलू है। यदि किसी व्यक्ति को इस अधिकार से वंचित किया जाता है, तो वह समानता के अधिकार के उल्लंघन का दावा कर सकता है। स्वतंत्रता का अधिकार, शोषण के विरुद्ध अधिकार और संवैधानिक उपचारों का अधिकार अन्य मौलिक अधिकार हैं, लेकिन इस विशिष्ट स्थिति में समानता का अधिकार सबसे उपयुक्त है।"}, {"id": 20, "section": "Polity", "question": "राज्य के नीति निदेशक तत्वों (Directive Principles of State Policy − DPSP) के संदर्भ में, निम्नलिखित में से कौन सा अनुच्छेद 'ग्राम पंचायतों के संगठन' (organisation of village panchayats) से संबंधित है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["अनुच्छेद 48 (Article 48)", "अनुच्छेद 40 (Article 40)", "अनुच्छेद 44 (Article 44)", "अनुच्छेद 39 (Article 39)"], "answer": "अनुच्छेद 40 (Article 40)", "explanation": "भारतीय संविधान का अनुच्छेद 40 राज्य को ग्राम पंचायतों को संगठित करने और उन्हें स्वशासन (self-government) की इकाइयों के रूप में कार्य करने में सक्षम बनाने के लिए कदम उठाने का निर्देश देता है। यह गांधीवादी सिद्धांतों (Gandhian principles) पर आधारित एक महत्वपूर्ण DPSP है। अनुच्छेद 39 कुछ नीति सिद्धांतों से संबंधित है, अनुच्छेद 44 समान नागरिक संहिता (Uniform Civil Code) से संबंधित है, और अनुच्छेद 48 कृषि और पशुपालन (agriculture and animal husbandry) के संगठन से संबंधित है।"}, {"id": 21, "section": "Polity", "question": "भारत में संघीय व्यवस्था (Federalism) के संदर्भ में, आपातकालीन प्रावधानों (emergency provisions) का केंद्र-राज्य संबंधों (Centre-State relations) पर क्या प्रभाव पड़ता है? निम्नलिखित में से कौन सा कथन सबसे सटीक है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["वित्तीय आपातकाल (Financial Emergency) के दौरान, केंद्र राज्यों को वित्तीय मामलों में निर्देश दे सकता है, लेकिन राज्य विधानसभाएं (state legislatures) अपनी विधायी शक्ति (legislative power) बरकरार रखती हैं।", "आपातकाल के दौरान केंद्र और राज्यों के बीच शक्तियों का विभाजन (division of powers) अपरिवर्तित रहता है।", "राष्ट्रीय आपातकाल (National Emergency) के दौरान, राज्य सरकारें निलंबित (suspended) हो जाती हैं और सभी शक्तियाँ केंद्र के पास चली जाती हैं।", "राज्य आपातकाल (State Emergency) के दौरान, राज्य विधानसभा भंग (dissolved) हो जाती है और राज्य सूची (State List) के विषयों पर कानून बनाने की शक्ति संसद (Parliament) को मिल जाती है।"], "answer": "राज्य आपातकाल (State Emergency) के दौरान, राज्य विधानसभा भंग (dissolved) हो जाती है और राज्य सूची (State List) के विषयों पर कानून बनाने की शक्ति संसद (Parliament) को मिल जाती है।", "explanation": "राज्य आपातकाल (राष्ट्रपति शासन - President's Rule) के दौरान, राज्य विधानसभा या तो निलंबित या भंग हो सकती है, और राज्य सूची के विषयों पर कानून बनाने की शक्ति संसद को हस्तांतरित हो जाती है, जिससे संघीय ढांचा एकात्मक (unitary) हो जाता है। राष्ट्रीय आपातकाल में राज्य सरकारें निलंबित नहीं होतीं, बल्कि केंद्र के नियंत्रण में आ जाती हैं, और उनकी विधायी शक्तियां संसद के अधीन हो जाती हैं। वित्तीय आपातकाल में केंद्र राज्यों को वित्तीय निर्देश दे सकता है और उनके धन विधेयकों (money bills) को राष्ट्रपति के विचार के लिए आरक्षित करवा सकता है, लेकिन राज्य विधानसभाएं अपनी विधायी शक्ति बरकरार रखती हैं।"}, {"id": 22, "section": "Polity", "question": "मौलिक अधिकार (Fundamental Rights) और राज्य के नीति निदेशक तत्वों (Directive Principles of State Policy − DPSP) के बीच मुख्य अंतरों में से एक क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["मौलिक अधिकार न्यायोचित (justiciable) हैं, जबकि DPSP गैर-न्यायोचित (non-justiciable) हैं।", "मौलिक अधिकार केवल नागरिकों के लिए उपलब्ध हैं, जबकि DPSP सभी व्यक्तियों के लिए उपलब्ध हैं।", "मौलिक अधिकार राज्य पर सकारात्मक दायित्व (positive obligations) डालते हैं, जबकि DPSP नकारात्मक दायित्व (negative obligations) डालते हैं।", "DPSP का उद्देश्य राजनीतिक लोकतंत्र (political democracy) स्थापित करना है, जबकि मौलिक अधिकारों का उद्देश्य सामाजिक और आर्थिक लोकतंत्र (social and economic democracy) स्थापित करना है।"], "answer": "मौलिक अधिकार न्यायोचित (justiciable) हैं, जबकि DPSP गैर-न्यायोचित (non-justiciable) हैं।", "explanation": "मौलिक अधिकार न्यायोचित होते हैं, जिसका अर्थ है कि उनके उल्लंघन के मामले में व्यक्ति अदालत का दरवाजा खटखटा सकता है। इसके विपरीत, DPSP गैर-न्यायोचित होते हैं और उन्हें अदालतों द्वारा लागू नहीं किया जा सकता है। मौलिक अधिकार राजनीतिक लोकतंत्र स्थापित करते हैं और राज्य पर नकारात्मक दायित्व डालते हैं (राज्य को कुछ करने से रोकते हैं), जबकि DPSP सामाजिक और आर्थिक लोकतंत्र स्थापित करते हैं और राज्य पर सकारात्मक दायित्व डालते हैं (राज्य को कुछ करने का निर्देश देते हैं)। मौलिक अधिकार नागरिकों के साथ-साथ कुछ मामलों में गैर-नागरिकों के लिए भी उपलब्ध हैं, जबकि DPSP राज्य के लिए दिशानिर्देश हैं।"}, {"id": 23, "section": "Polity", "question": "भारतीय संविधान की प्रस्तावना (Preamble) में 'समाजवादी' (Socialist) और 'धर्मनिरपेक्ष' (Secular) शब्दों को 42वें संशोधन (42nd Amendment) द्वारा जोड़ा गया था। इन शब्दों को जोड़ने के पीछे का मुख्य संवैधानिक तर्क (constitutional reasoning) क्या था?", "brand": "bilaspurtestseries.com 9669946966", "options": ["राज्य को किसी भी धर्म का पालन करने से रोकना।", "मौलिक अधिकारों को DPSP पर वरीयता (precedence) देना।", "भारत के बहुलवादी (pluralistic) समाज की प्रकृति को मजबूत करना और सामाजिक-आर्थिक न्याय (socio-economic justice) के लक्ष्यों को स्पष्ट करना।", "भारत को एक पूर्णतः साम्यवादी (communist) राज्य घोषित करना।"], "answer": "भारत के बहुलवादी (pluralistic) समाज की प्रकृति को मजबूत करना और सामाजिक-आर्थिक न्याय (socio-economic justice) के लक्ष्यों को स्पष्ट करना।", "explanation": "42वें संशोधन द्वारा 'समाजवादी' और 'धर्मनिरपेक्ष' शब्दों को जोड़ने का मुख्य संवैधानिक तर्क भारत के बहुलवादी समाज की प्रकृति को मजबूत करना और सामाजिक-आर्थिक न्याय के लक्ष्यों को और अधिक स्पष्ट रूप से परिभाषित करना था। 'समाजवादी' शब्द का उद्देश्य आय, स्थिति और अवसरों की असमानताओं को कम करना था, जबकि 'धर्मनिरपेक्ष' शब्द का उद्देश्य यह सुनिश्चित करना था कि राज्य सभी धर्मों के प्रति तटस्थ रहे और सभी नागरिकों को धार्मिक स्वतंत्रता (religious freedom) प्रदान करे। यह भारत को साम्यवादी राज्य घोषित करने या मौलिक अधिकारों को DPSP पर वरीयता देने के लिए नहीं था, बल्कि भारतीय राज्य की प्रकृति और उसके उद्देश्यों को और अधिक स्पष्ट करने के लिए था।"}, {"id": 24, "section": "Polity", "question": "अभिकथन (A): भारतीय संविधान प्रकृति में संघीय (federal) है, लेकिन इसमें एकात्मक (unitary) विशेषताएं भी हैं।\nकारण (R): आपातकाल के दौरान, केंद्र सरकार राज्यों पर पूर्ण नियंत्रण कर लेती है, जिससे संघीय ढांचा एकात्मक हो जाता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["A सत्य है, लेकिन R असत्य है।", "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं है।", "A असत्य है, लेकिन R सत्य है।"], "answer": "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "explanation": "अभिकथन (A) सही है क्योंकि भारतीय संविधान में संघीय और एकात्मक दोनों विशेषताएं हैं, जिसे 'अर्ध-संघीय' (quasi-federal) या 'सहकारी संघवाद' (cooperative federalism) कहा जाता है। कारण (R) भी सही है और यह A की सही व्याख्या करता है। आपातकालीन प्रावधान (emergency provisions) भारतीय संविधान की एक महत्वपूर्ण एकात्मक विशेषता है, जिसके तहत केंद्र सरकार राज्यों पर पूर्ण नियंत्रण कर लेती है, जिससे देश का संघीय ढांचा एकांतक रूप में परिवर्तित हो जाता है। यह भारतीय संघवाद की एक अनूठी विशेषता है।"}, {"id": 25, "section": "Polity", "question": "निम्नलिखित में से कौन से मौलिक कर्तव्य (Fundamental Duties) भारतीय नागरिकों पर लागू होते हैं?\nJ: सार्वजनिक संपत्ति (public property) की रक्षा करना और हिंसा से दूर रहना।\nK: वैज्ञानिक दृष्टिकोण (scientific temper), मानववाद (humanism) और ज्ञानार्जन तथा सुधार की भावना (spirit of inquiry and reform) विकसित करना।\nL: अल्पसंख्यकों (minorities) के हितों की रक्षा करना।\nM: पर्यावरण (environment) की रक्षा और सुधार करना।\nसही विकल्प चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और K", "केवल J, K और M", "J, K, L और M सभी", "केवल K, L और M"], "answer": "केवल J, K और M", "explanation": "मौलिक कर्तव्य (अनुच्छेद 51A − Article 51A) में सार्वजनिक संपत्ति की रक्षा करना और हिंसा से दूर रहना (J), वैज्ञानिक दृष्टिकोण, मानववाद और ज्ञानार्जन तथा सुधार की भावना विकसित करना (K), और पर्यावरण की रक्षा और सुधार करना (M) शामिल हैं। हालांकि, अल्पसंख्यकों के हितों की रक्षा करना (L) मौलिक अधिकारों (अनुच्छेद 29 और 30 − Articles 29 and 30) के तहत आता है, न कि मौलिक कर्तव्यों के तहत। इसलिए, विकल्प J, K और M सही मौलिक कर्तव्य हैं।"}, {"id": 26, "section": "Polity", "question": "निम्नलिखित संवैधानिक संशोधनों (constitutional amendments) को उनके संबंधित प्रभावों (effects) से सुमेलित (match) कीजिए:\n*<u>संशोधन</u>*\nI. 42वां संशोधन अधिनियम (42nd Amendment Act)\nII. 44वां संशोधन अधिनियम (44th Amendment Act)\nIII. 86वां संशोधन अधिनियम (86th Amendment Act)\nIV. 103वां संशोधन अधिनियम (103rd Amendment Act)\n*<u>प्रभाव</u>*\nP. शिक्षा के अधिकार (Right to Education) को मौलिक अधिकार बनाया गया।\nQ. संपत्ति के अधिकार (Right to Property) को मौलिक अधिकार की सूची से हटाया गया।\nR. प्रस्तावना में 'समाजवादी' और 'धर्मनिरपेक्ष' शब्द जोड़े गए।\nS. आर्थिक रूप से कमजोर वर्गों (Economically Weaker Sections − EWS) के लिए आरक्षण (reservation) का प्रावधान किया गया।\nसही मिलान वाला विकल्प चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["I-R, II-P, III-Q, IV-S", "I-S, II-Q, III-P, IV-R", "I-Q, II-R, III-P, IV-S", "I-R, II-Q, III-P, IV-S"], "answer": "I-R, II-Q, III-P, IV-S", "explanation": "42वां संशोधन अधिनियम (1976) ने प्रस्तावना में 'समाजवादी' और 'धर्मनिरपेक्ष' शब्द जोड़े (I-R)। 44वां संशोधन अधिनियम (1978) ने संपत्ति के अधिकार को मौलिक अधिकार की सूची से हटाकर एक कानूनी अधिकार (legal right) बना दिया (II-Q)। 86वां संशोधन अधिनियम (2002) ने शिक्षा के अधिकार को अनुच्छेद 21A (Article 21A) के तहत एक मौलिक अधिकार बनाया (III-P)। 103वां संशोधन अधिनियम (2019) ने आर्थिक रूप से कमजोर वर्गों (EWS) के लिए 10% आरक्षण का प्रावधान किया (IV-S)। यह मिलान भारतीय संविधान के महत्वपूर्ण संशोधनों और उनके प्रभावों को दर्शाता है।"}, {"id": 27, "section": "Polity", "question": "भारतीय संविधान के विकास से संबंधित निम्नलिखित प्रमुख न्यायिक निर्णयों (major judicial pronouncements) को उनके कालानुक्रमिक क्रम (chronological order) में व्यवस्थित करें:\nJ: मिनर्वा मिल्स बनाम भारत संघ (Minerva Mills v. Union of India) वाद\nK: केशवानंद भारती बनाम केरल राज्य (Kesavananda Bharati v. State of Kerala) वाद\nL: गोलकनाथ बनाम पंजाब राज्य (Golaknath v. State of Punjab) वाद\nM: मेनका गांधी बनाम भारत संघ (Maneka Gandhi v. Union of India) वाद\nसही कालानुक्रमिक क्रम चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["L, K, M, J", "K, L, M, J", "L, M, K, J", "J, K, L, M"], "answer": "L, K, M, J", "explanation": "इन न्यायिक निर्णयों का सही कालानुक्रमिक क्रम इस प्रकार है: गोलकनाथ बनाम पंजाब राज्य वाद (1967) ने संसद की मौलिक अधिकारों में संशोधन करने की शक्ति को सीमित किया। केशवानंद भारती बनाम केरल राज्य वाद (1973) ने 'संविधान के मूल ढांचे' (Basic Structure Doctrine) का सिद्धांत प्रतिपादित किया। मेनका गांधी बनाम भारत संघ वाद (1978) ने अनुच्छेद 21 (जीवन और व्यक्तिगत स्वतंत्रता का अधिकार - Right to Life and Personal Liberty) के दायरे का विस्तार किया। मिनर्वा मिल्स बनाम भारत संघ वाद (1980) ने मूल ढांचे के सिद्धांत को और मजबूत किया और DPSP पर मौलिक अधिकारों की प्रधानता को स्पष्ट किया। इस प्रकार, सही क्रम L, K, M, J है।"}, {"id": 28, "section": "Geography", "question": "हिमालय के किस भाग को 'शिवालिक' (Shiwalik) के नाम से जाना जाता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["महान हिमालय (Great Himalayas) के उत्तर में स्थित पर्वत श्रृंखला", "ट्रांस हिमालय (Trans Himalayas) का पूर्वी विस्तार", "लघु हिमालय (Lesser Himalayas) और महान हिमालय के बीच की घाटी", "हिमालय की सबसे बाहरी और दक्षिणी पर्वत श्रृंखला"], "answer": "हिमालय की सबसे बाहरी और दक्षिणी पर्वत श्रृंखला", "explanation": "शिवालिक हिमालय की सबसे दक्षिणी और बाहरी पर्वत श्रृंखला है, जिसे उप-हिमालय (Sub-Himalayas) भी कहा जाता है। यह लघु हिमालय के दक्षिण में स्थित है और इसकी औसत ऊँचाई 900 से 1200 मीटर के बीच है। विकल्प A, B और D हिमालय के अन्य भागों या उनकी स्थिति का गलत वर्णन करते हैं, क्योंकि वे महान हिमालय, लघु हिमालय या ट्रांस हिमालय से संबंधित हैं।"}, {"id": 29, "section": "Geography", "question": "भारतीय उपमहाद्वीप (Indian subcontinent) में ग्रीष्मकालीन मानसून (summer monsoon) के आगमन का मुख्य कारण क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["हिंद महासागर (Indian Ocean) में उच्च दबाव (high pressure) का विकास", "पश्चिमी विक्षोभों (Western Disturbances) का प्रभाव", "भूमध्यरेखीय पछुआ हवाओं (equatorial westerlies) का कमजोर पड़ना", "तिब्बती पठार (Tibetan Plateau) पर तीव्र तापन (intense heating) के कारण निम्न दबाव (low pressure) का निर्माण"], "answer": "तिब्बती पठार (Tibetan Plateau) पर तीव्र तापन (intense heating) के कारण निम्न दबाव (low pressure) का निर्माण", "explanation": "ग्रीष्मकाल में, तिब्बती पठार पर सूर्य की सीधी किरणें पड़ने से तीव्र तापन होता है, जिससे वहाँ एक मजबूत निम्न दबाव क्षेत्र (low pressure zone) विकसित होता है। यह निम्न दबाव हिंद महासागर से नमी से भरी हवाओं को अपनी ओर आकर्षित करता है, जिससे दक्षिण-पश्चिम मानसून (south-west monsoon) का आगमन होता है। पश्चिमी विक्षोभ सर्दियों में वर्षा लाते हैं, हिंद महासागर में उच्च दबाव मानसून को कमजोर करता है, और भूमध्यरेखीय पछुआ हवाओं का कमजोर पड़ना मानसून के आगमन का सीधा कारण नहीं है।"}, {"id": 30, "section": "Geography", "question": "निम्नलिखित में से कौन सी नदी गंगा नदी प्रणाली (Ganga River System) की सहायक नदी (tributary) नहीं है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["कोसी (Kosi)", "सोन (Son)", "चंबल (Chambal)", "गंडक (Gandak)"], "answer": "चंबल (Chambal)", "explanation": "चंबल नदी यमुना नदी की एक प्रमुख सहायक नदी है, और यमुना स्वयं गंगा की सहायक नदी है। इसलिए, चंबल सीधे तौर पर गंगा की सहायक नदी नहीं है, बल्कि यमुना के माध्यम से अप्रत्यक्ष रूप से जुड़ी है। सोन, गंडक और कोसी सीधे गंगा में मिलती हैं और उसकी प्रमुख सहायक नदियाँ हैं।"}, {"id": 31, "section": "Geography", "question": "निम्नलिखित में से कौन सा कथन काली मिट्टी (Black Soil) के संबंध में असत्य (false) है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह फॉस्फोरस (phosphorus) और नाइट्रोजन (nitrogen) से भरपूर होती है।", "यह कपास (cotton) की खेती के लिए अत्यधिक उपयुक्त है।", "इसे 'रेगुर मिट्टी' (Regur Soil) के नाम से भी जाना जाता है।", "इसमें नमी धारण करने की क्षमता (moisture retention capacity) बहुत अधिक होती है।"], "answer": "यह फॉस्फोरस (phosphorus) और नाइट्रोजन (nitrogen) से भरपूर होती है।", "explanation": "काली मिट्टी कपास की खेती के लिए बहुत उपयुक्त होती है और इसमें नमी धारण करने की उच्च क्षमता होती है, जिसके कारण इसे 'स्वतः जुताई वाली मिट्टी' (self-ploughing soil) भी कहा जाता है। इसे 'रेगुर मिट्टी' के नाम से भी जाना जाता है। हालांकि, काली मिट्टी आमतौर पर फॉस्फोरस, नाइट्रोजन और कार्बनिक पदार्थों (organic matter) में गरीब होती है, न कि भरपूर। यह कथन काली मिट्टी की वास्तविक रासायनिक संरचना के विपरीत है।"}, {"id": 32, "section": "Geography", "question": "भारत में लौह अयस्क (Iron Ore) के वितरण के संबंध में निम्नलिखित कथनों पर विचार करें:\n1. भारत में हेमेटाइट (hematite) और मैग्नेटाइट (magnetite) दोनों प्रकार के लौह अयस्क पाए जाते हैं।\n2. ओडिशा (Odisha) भारत का सबसे बड़ा लौह अयस्क उत्पादक राज्य है।\n3. कर्नाटक (Karnataka) में लौह अयस्क के भंडार मुख्य रूप से बाबाबुदन पहाड़ियों (Bababudan Hills) में केंद्रित हैं।\nउपरोक्त कथनों में से कौन सा/से सही है/हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल 2 और 3", "1, 2 और 3", "केवल 1 और 2", "केवल 1 और 3"], "answer": "1, 2 और 3", "explanation": "भारत में हेमेटाइट और मैग्नेटाइट दोनों प्रकार के लौह अयस्क प्रचुर मात्रा में पाए जाते हैं। ओडिशा भारत का सबसे बड़ा लौह अयस्क उत्पादक राज्य है, जिसके बाद छत्तीसगढ़ और कर्नाटक का स्थान आता है। कर्नाटक में लौह अयस्क के महत्वपूर्ण भंडार बाबाबुदन पहाड़ियों, कुद्रेमुख (Kudremukh) और बेल्लारी-हॉस्पेट (Bellary-Hospet) क्षेत्र में केंद्रित हैं। इसलिए, दिए गए सभी कथन सही हैं।"}, {"id": 33, "section": "Geography", "question": "प्रायद्वीपीय पठार (Peninsular Plateau) की निम्नलिखित विशेषताओं पर विचार करें और उनके भूगर्भीय कारणों से संबंधित सही कथन का चयन करें:\n1. प्रायद्वीपीय पठार की चट्टानें अत्यधिक प्राचीन (ancient) और कठोर (hard) हैं, क्योंकि यह गोंडवानालैंड (Gondwanaland) का एक हिस्सा था और लाखों वर्षों से अपरदन (erosion) और निक्षेपण (deposition) प्रक्रियाओं से गुजरा है।\n2. पठार के पश्चिमी किनारे पर पश्चिमी घाट (Western Ghats) की ऊँचाई अधिक है और यह एक सतत श्रृंखला (continuous range) ी नहीं है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह केवल व्यक्तिगत कार्य को बढ़ावा देता है और समूह कार्य को हतोत्साहित करता है।", "यह छात्रों में गहन सोच (critical thinking) और समस्या-समाधान (problem-solving) कौशल विकसित करता है।", "यह छात्रों को वास्तविक दुनिया की समस्याओं से जुड़ने का अवसर प्रदान करता है।", "यह छात्रों को जानकारी एकत्र करने, विश्लेषण करने और प्रस्तुत करने में सक्षम बनाता है।"], "answer": "यह केवल व्यक्तिगत कार्य को बढ़ावा देता है और समूह कार्य को हतोत्साहित करता है।", "explanation": "परियोजना कार्य (Project Work) छात्रों में गहन सोच और समस्या-समाधान कौशल विकसित करता है, उन्हें वास्तविक दुनिया की समस्याओं से जोड़ता है, और जानकारी एकत्र करने, विश्लेषण करने और प्रस्तुत करने में सक्षम बनाता है। यह व्यक्तिगत कार्य के साथ-साथ समूह कार्य (group work) को भी बढ़ावा देता है, जिससे सहयोग (collaboration) और संचार (communication) कौशल विकसित होते हैं। इसलिए, यह कहना कि यह 'केवल व्यक्तिगत कार्य को बढ़ावा देता है और समूह कार्य को हतोत्साहित करता है' गलत है।"}, {"id": 44, "section": "SST Pedagogy", "question": "सामाजिक विज्ञान में मूल्यांकन (Assessment) के सिद्धांतों के संबंध में निम्नलिखित में से कौन सा कथन सबसे कम उपयुक्त (least appropriate) है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["मूल्यांकन को वैध (valid) और विश्वसनीय (reliable) होना चाहिए।", "मूल्यांकन को केवल छात्रों के ज्ञान के स्मरण (recall of knowledge) पर केंद्रित होना चाहिए।", "मूल्यांकन को शिक्षण-अधिगम प्रक्रिया (teaching-learning process) का अभिन्न अंग होना चाहिए।", "मूल्यांकन को छात्रों की प्रगति (progress) और सीखने की जरूरतों (learning needs) के बारे में प्रतिक्रिया (feedback) प्रदान करनी चाहिए।"], "answer": "मूल्यांकन को केवल छात्रों के ज्ञान के स्मरण (recall of knowledge) पर केंद्रित होना चाहिए।", "explanation": "सामाजिक विज्ञान में मूल्यांकन के सिद्धांतों के अनुसार, मूल्यांकन को शिक्षण-अधिगम प्रक्रिया का अभिन्न अंग होना चाहिए, वैध और विश्वसनीय होना चाहिए, और छात्रों की प्रगति और सीखने की जरूरतों के बारे में प्रतिक्रिया प्रदान करनी चाहिए। हालांकि, मूल्यांकन को केवल ज्ञान के स्मरण पर केंद्रित नहीं होना चाहिए, बल्कि इसमें समझ (understanding), अनुप्रयोग (application), विश्लेषण (analysis), संश्लेषण (synthesis) और मूल्यांकन (evaluation) जैसे उच्च-स्तरीय सोच कौशल (higher-order thinking skills) का भी आकलन करना चाहिए। इसलिए, 'केवल छात्रों के ज्ञान के स्मरण पर केंद्रित होना चाहिए' कथन सबसे कम उपयुक्त है।"}, {"id": 45, "section": "SST Pedagogy", "question": "अभिकथन (A): रचनात्मक मूल्यांकन (Formative Assessment) का मुख्य उद्देश्य छात्रों के सीखने की प्रक्रिया में सुधार करना है।\nकारण (R): योगात्मक मूल्यांकन (Summative Assessment) का उपयोग आमतौर पर शिक्षण के अंत में छात्रों के समग्र प्रदर्शन (overall performance) का आकलन करने के लिए किया जाता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं है।", "A सत्य है, लेकिन R असत्य है।", "A असत्य है, लेकिन R सत्य है।"], "answer": "A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं है।", "explanation": "अभिकथन (A) सत्य है क्योंकि रचनात्मक मूल्यांकन का उद्देश्य सीखने की प्रक्रिया के दौरान छात्रों की प्रगति की निगरानी करना और सुधार के लिए प्रतिक्रिया प्रदान करना है। कारण (R) भी सत्य है क्योंकि योगात्मक मूल्यांकन का उद्देश्य एक निश्चित अवधि के अंत में छात्रों के सीखने के स्तर का आकलन करना है। हालांकि, R, A की सही व्याख्या नहीं है क्योंकि दोनों कथन मूल्यांकन के विभिन्न प्रकारों और उनके उद्देश्यों का वर्णन करते हैं, लेकिन R सीधे तौर पर A के उद्देश्य की व्याख्या नहीं करता है। वे दोनों स्वतंत्र रूप से सत्य हैं।"}, {"id": 46, "section": "SST Pedagogy", "question": "सामाजिक विज्ञान में स्रोतों (Sources) के विश्लेषण के संबंध में निम्नलिखित कथनों पर विचार करें:\nJ: प्राथमिक स्रोतों में घटना के प्रत्यक्षदर्शी खाते (eyewitness accounts) शामिल होते हैं।\nK: द्वितीयक स्रोत हमेशा प्राथमिक स्रोतों की तुलना में अधिक विश्वसनीय होते हैं।\nL: स्रोतों का विश्लेषण करते समय उनकी विश्वसनीयता (credibility) और पूर्वाग्रह (bias) का मूल्यांकन करना महत्वपूर्ण है।\nM: एक ही घटना के लिए कई
