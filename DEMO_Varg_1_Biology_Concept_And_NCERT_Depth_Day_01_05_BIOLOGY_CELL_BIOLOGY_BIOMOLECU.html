</style></head><body><div class="wrap"><div class="top"><div class="brandbar"><div class="brand-logo" id="brandLogo">AZAD</div><div><h1 style="margin:0;color:#0f172a;font-size:38px;letter-spacing:.8px;font-weight:900;line-height:1.05">BILASPUR TEST SERIES</h1><h2 style="margin:8px 0 0;font-size:16px;font-weight:800;color:#1d4ed8">By Azad Institute</h2><div style="margin-top:8px;font-size:14px;color:#334155;font-weight:600">🎓 DEMO_Varg_1_Biology_Concept_And_NCERT_Depth_Day_01_05_BIOLOGY_CELL_BIOLOGY_BIOMOLECU</div></div></div></div><div id="app"></div></div><script>const Q=[{"id": 1, "section": "Biology", "question": "तरल मोज़ेक मॉडल (fluid mosaic model) के संबंध में निम्नलिखित में से कौन सा कथन सही है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह मॉडल कोशिका झिल्ली को एक अर्ध-तरल (semi-fluid) संरचना के रूप में वर्णित करता है जहाँ प्रोटीन लिपिड द्विपरत में गति कर सकते हैं।", "यह बताता है कि कोशिका झिल्ली (cell membrane) मुख्य रूप से लिपिड (lipid) की एक एकल परत से बनी होती है।", "इस मॉडल के अनुसार, प्रोटीन (proteins) लिपिड द्विपरत (lipid bilayer) में स्थिर रूप से एम्बेडेड (embedded) होते हैं।", "कोशिका झिल्ली में कार्बोहाइड्रेट (carbohydrates) अनुपस्थित होते हैं।"], "answer": "यह मॉडल कोशिका झिल्ली को एक अर्ध-तरल (semi-fluid) संरचना के रूप में वर्णित करता है जहाँ प्रोटीन लिपिड द्विपरत में गति कर सकते हैं।", "explanation": "तरल मोज़ेक मॉडल (fluid mosaic model) के अनुसार, कोशिका झिल्ली (cell membrane) एक अर्ध-तरल (semi-fluid) संरचना है जिसमें लिपिड (lipids) की द्विपरत (bilayer) में प्रोटीन (proteins) मोज़ेक (mosaic) पैटर्न में व्यवस्थित होते हैं और गति करने में सक्षम होते हैं। यह मॉडल झिल्ली की गतिशीलता (fluidity) और चयनात्मक पारगम्यता (selective permeability) की व्याख्या करता है, जबकि अन्य विकल्प इस मॉडल की विशेषताओं के विपरीत हैं।"}, {"id": 2, "section": "Biology", "question": "निम्नलिखित में से कौन सा जैव-अणु (biomolecule) और उसके कार्य का सही युग्म (pair) है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["लिपिड (Lipids) - एंजाइमी उत्प्रेरण (enzymatic catalysis)", "प्रोटीन (Proteins) - संरचनात्मक समर्थन (structural support) और परिवहन (transport)", "न्यूक्लिक अम्ल (Nucleic acids) - ऊर्जा का प्राथमिक स्रोत (primary source of energy)", "कार्बोहाइड्रेट (Carbohydrates) - आनुवंशिक जानकारी (genetic information) का भंडारण (storage)"], "answer": "प्रोटीन (Proteins) - संरचनात्मक समर्थन (structural support) और परिवहन (transport)", "explanation": "प्रोटीन (proteins) कोशिकाओं में विभिन्न प्रकार के कार्य करते हैं, जिनमें संरचनात्मक समर्थन (structural support) प्रदान करना (जैसे कोलेजन (collagen)), पदार्थों का परिवहन (transport) करना (जैसे हीमोग्लोबिन (hemoglobin)), और एंजाइम (enzymes) के रूप में कार्य करना शामिल है। कार्बोहाइड्रेट (carbohydrates) ऊर्जा के प्राथमिक स्रोत होते हैं, लिपिड (lipids) ऊर्जा भंडारण और झिल्ली संरचना में शामिल होते हैं, जबकि न्यूक्लिक अम्ल (nucleic acids) आनुवंशिक जानकारी (genetic information) का भंडारण और स्थानांतरण करते हैं।"}, {"id": 3, "section": "Biology", "question": "यदि कोशिका चक्र (cell cycle) के G1 चेकपॉइंट (checkpoint) पर DNA क्षति (damage) का पता चलता है और मरम्मत तंत्र (repair mechanism) विफल हो जाता है, तो कोशिका का सबसे संभावित भाग्य (fate) क्या होगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["कोशिका बिना किसी बाधा के माइटोसिस (mitosis) को पूरा करेगी।", "कोशिका एपोप्टोसिस (apoptosis) से गुजरेगी या G0 चरण (phase) में प्रवेश करेगी।", "कोशिका तुरंत S चरण (phase) में प्रवेश करेगी और क्षतिग्रस्त DNA की प्रतिकृति (replicate) करेगी।", "कोशिका अनियंत्रित रूप से विभाजित होना शुरू कर देगी, जिससे ट्यूमर (tumor) का निर्माण होगा।"], "answer": "कोशिका एपोप्टोसिस (apoptosis) से गुजरेगी या G0 चरण (phase) में प्रवेश करेगी।", "explanation": "G1 चेकपॉइंट (checkpoint) कोशिका चक्र (cell cycle) में एक महत्वपूर्ण नियामक बिंदु है जो यह सुनिश्चित करता है कि DNA क्षति (damage) के बिना कोशिका विभाजन के लिए तैयार है। यदि DNA क्षति का पता चलता है और उसकी मरम्मत नहीं की जा सकती है, तो कोशिका को एपोप्टोसिस (apoptosis) (प्रोग्राम्ड सेल डेथ (programmed cell death)) के लिए प्रेरित किया जाता है ताकि क्षतिग्रस्त DNA वाली कोशिकाओं के प्रसार को रोका जा सके, या यह G0 चरण (phase) में प्रवेश कर सकती है, जो एक निष्क्रिय अवस्था है। विकल्प D, अनियंत्रित विभाजन, तब होता है जब चेकपॉइंट स्वयं विफल हो जाते हैं और कोशिका एपोप्टोसिस से नहीं गुजरती, लेकिन यहाँ मरम्मत तंत्र की विफलता के बावजूद चेकपॉइंट अभी भी कार्य कर रहा है।"}, {"id": 4, "section": "Biology", "question": "अभिकथन (A): प्रोटीन (proteins) का विकृतीकरण (denaturation) उनकी प्राथमिक संरचना (primary structure) को प्रभावित नहीं करता है।\nकारण (R): विकृतीकरण केवल प्रोटीन की द्वितीयक (secondary), तृतीयक (tertiary) और चतुर्धातुक (quaternary) संरचनाओं में हाइड्रोजन बंध (hydrogen bonds) और अन्य कमजोर अंतःक्रियाओं (weak interactions) को बाधित करता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A) और (R) दोनों सत्य हैं, लेकिन (R), (A) की सही व्याख्या नहीं है।", "(A) असत्य है, लेकिन (R) सत्य है।", "(A) सत्य है, लेकिन (R) असत्य है।", "(A) और (R) दोनों सत्य हैं, और (R), (A) की सही व्याख्या है।"], "answer": "(A) और (R) दोनों सत्य हैं, और (R), (A) की सही व्याख्या है।", "explanation": "प्रोटीन (proteins) की प्राथमिक संरचना (primary structure) अमीनो अम्ल (amino acid) अनुक्रम को संदर्भित करती है, जो पेप्टाइड बंधों (peptide bonds) द्वारा एक साथ जुड़े होते हैं। विकृतीकरण (denaturation) प्रक्रिया में, उच्च तापमान, अत्यधिक pH या कुछ रसायनों के कारण प्रोटीन की द्वितीयक (secondary), तृतीयक (tertiary) और चतुर्धातुक (quaternary) संरचनाएं टूट जाती हैं, क्योंकि ये संरचनाएं हाइड्रोजन बंध (hydrogen bonds), आयनिक बंध (ionic bonds) और वैन डेर वाल्स बल (van der Waals forces) जैसी कमजोर अंतःक्रियाओं (weak interactions) द्वारा स्थिर होती हैं। पेप्टाइड बंध आमतौर पर विकृतीकरण से प्रभावित नहीं होते हैं, इसलिए प्राथमिक संरचना बरकरार रहती है। इस प्रकार, कारण (R) अभिकथन (A) की सही व्याख्या करता है।"}, {"id": 5, "section": "Biology", "question": "निम्नलिखित में से कौन से कथन कोशिकांगों (cell organelles) के कार्यों का सही वर्णन करते हैं?\nJ: माइटोकॉन्ड्रिया (Mitochondria) - कोशिकीय श्वसन (cellular respiration) द्वारा ATP का उत्पादन।\nK: एंडोप्लाज्मिक रेटिकुलम (Endoplasmic Reticulum) - लिपिड (lipid) और प्रोटीन (protein) का संश्लेषण (synthesis)।\nM: गॉल्जी उपकरण (Golgi apparatus) - प्रोटीन और लिपिड का संशोधन (modification), छँटाई (sorting) और पैकेजिंग (packaging)।\nL: लाइसोसोम (Lysosomes) - प्रकाश संश्लेषण (photosynthesis) का स्थल।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, L और M", "केवल J और K", "केवल J, K और M", "केवल K, L और M"], "answer": "केवल J, K और M", "explanation": "माइटोकॉन्ड्रिया (Mitochondria) कोशिकीय श्वसन (cellular respiration) के माध्यम से ATP (एडेनोसिन ट्राइफॉस्फेट) का उत्पादन करता है। एंडोप्लाज्मिक रेटिकुलम (Endoplasmic Reticulum) लिपिड (lipid) और प्रोटीन (protein) के संश्लेषण (synthesis) में महत्वपूर्ण भूमिका निभाता है। गॉल्जी उपकरण (Golgi apparatus) एंडोप्लाज्मिक रेटिकुलम से प्राप्त प्रोटीन और लिपिड को संशोधित (modify), छाँटता (sort) और पैक (pack) करता है। लाइसोसोम (Lysosomes) कोशिका के अपशिष्ट निपटान (waste disposal) और पाचन (digestion) में शामिल होते हैं, जबकि प्रकाश संश्लेषण (photosynthesis) क्लोरोप्लास्ट (chloroplasts) में होता है, लाइसोसोम में नहीं। इसलिए, कथन J, K और M सही हैं।"}, {"id": 6, "section": "Biology", "question": "सूची-I में दिए गए कोशिका विभाजन (cell division) के चरणों को सूची-II में दी गई प्रमुख घटनाओं से सुमेलित (match) कीजिए और नीचे दिए गए कोड का उपयोग करके सही उत्तर चुनिए:\nसूची-I (चरण):\nJ: प्रोफेज I (Prophase I)\nK: मेटाफेज (Metaphase)\nL: एनाफेज (Anaphase)\nM: टेलोफेज (Telophase)\nसूची-II (प्रमुख घटनाएँ):\n1. सिस्टर क्रोमेटिड्स (sister chromatids) का पृथक्करण (separation)\n2. गुणसूत्र (chromosomes) का विषुवतीय प्लेट (equatorial plate) पर संरेखण (alignment)\n3. केंद्रक झिल्ली (nuclear membrane) का पुनः निर्माण (reformation)\n4. समरूप गुणसूत्रों (homologous chromosomes) के बीच क्रॉसिंग ओवर (crossing over)", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-3, K-2, L-4, M-1", "J-4, K-1, L-2, M-3", "J-4, K-2, L-1, M-3", "J-2, K-4, L-1, M-3"], "answer": "J-4, K-2, L-1, M-3", "explanation": "प्रोफेज I (Prophase I) अर्धसूत्रीविभाजन (meiosis) का एक महत्वपूर्ण चरण है जहाँ समरूप गुणसूत्रों (homologous chromosomes) के बीच क्रॉसिंग ओवर (crossing over) होता है, जिससे आनुवंशिक पुनर्संयोजन (genetic recombination) होता है। मेटाफेज (Metaphase) में, गुणसूत्र (chromosomes) कोशिका के केंद्र में विषुवतीय प्लेट (equatorial plate) पर संरेखित (align) होते हैं। एनाफेज (Anaphase) के दौरान, सिस्टर क्रोमेटिड्स (sister chromatids) अलग हो जाते हैं और विपरीत ध्रुवों (opposite poles) की ओर बढ़ते हैं। टेलोफेज (Telophase) में, गुणसूत्र विपरीत ध्रुवों पर पहुँच जाते हैं, और केंद्रक झिल्ली (nuclear membrane) प्रत्येक सेट के चारों ओर पुनः निर्मित (reforms) होती है।"}, {"id": 7, "section": "Biology", "question": "माइटोसिस (mitosis) के प्रोमेटाफेज (prometaphase) चरण में होने वाली घटनाओं का सही कालानुक्रमिक क्रम (chronological order) क्या है?\nJ: गुणसूत्र (chromosomes) का अधिकतम संघनन (maximum condensation)।\nK: काइनेटोकोर (kinetochore) माइक्रोटीब्यूल्स (microtubules) का गुणसूत्रों से जुड़ना।\nL: केंद्रक झिल्ली (nuclear membrane) का विघटन (disintegration)।\nM: गुणसूत्रों का कोशिका के केंद्र की ओर बढ़ना।", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, L, K, M", "L, K, M, J", "J, K, L, M", "L, J, K, M"], "answer": "L, J, K, M", "explanation": "प्रोमेटाफेज (prometaphase) माइटोसिस (mitosis) का एक संक्रमणकालीन चरण है जो प्रोफेज (prophase) और मेटाफेज (metaphase) के बीच होता है। इस चरण की शुरुआत केंद्रक झिल्ली (nuclear membrane) के विघटन (disintegration) से होती है (L)। इसके बाद, गुणसूत्र (chromosomes) अधिकतम संघनन (maximum condensation) प्राप्त करते हैं (J)। फिर, स्पिंडल फाइबर (spindle fibers) के काइनेटोकोर माइक्रोटीब्यूल्स (kinetochore microtubules) गुणसूत्रों के काइनेटोकोर (kinetochores) से जुड़ते हैं (K)। अंत में, ये माइक्रोटीब्यूल्स गुणसूत्रों को कोशिका के केंद्र (विषुवतीय प्लेट) की ओर खींचना शुरू करते हैं (M), जो मेटाफेज (metaphase) की विशेषता है।"}, {"id": 8, "section": "Biology", "question": "मेंडल के आनुवंशिकता के नियमों के संदर्भ में, 'प्रभावी लक्षण' (dominant trait) को सबसे सटीक रूप से कैसे परिभाषित किया जा सकता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["वह लक्षण जो F₁ पीढ़ी में हमेशा प्रकट होता है।", "वह लक्षण जो विषमयुग्मजी (heterozygous) अवस्था में भी प्रकट होता है और दूसरे लक्षण को छुपाता है।", "वह लक्षण जो केवल समयुग्मजी (homozygous) अवस्था में प्रकट होता है।", "वह लक्षण जो केवल अप्रभावी (recessive) लक्षण की अनुपस्थिति में प्रकट होता है।"], "answer": "वह लक्षण जो विषमयुग्मजी (heterozygous) अवस्था में भी प्रकट होता है और दूसरे लक्षण को छुपाता है।", "explanation": "प्रभावी लक्षण वह होता है जो विषमयुग्मजी (heterozygous) अवस्था में भी स्वयं को व्यक्त करता है, जबकि अप्रभावी लक्षण की अभिव्यक्ति को दबा देता है। F₁ पीढ़ी में हमेशा प्रकट होना इसकी एक विशेषता है, लेकिन विषमयुग्मजी अवस्था में दूसरे लक्षण को छुपाना इसकी सटीक और व्यापक परिभाषा है। अन्य विकल्प प्रभावी लक्षण की पूर्ण परिभाषा को कवर नहीं करते हैं।"}, {"id": 9, "section": "Biology", "question": "एक पौधे में, लाल फूल (RR) और सफेद फूल (WW) के बीच क्रॉस कराने पर, F₁ पीढ़ी में सभी गुलाबी फूल (RW) प्राप्त होते हैं। यह किस प्रकार की आनुवंशिकता (inheritance) का उदाहरण है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["अपूर्ण प्रभाविता (Incomplete Dominance)", "सहप्रभाविता (Codominance)", "बहु-एलीलवाद (Multiple Allelism)", "पूर्ण प्रभाविता (Complete Dominance)"], "answer": "अपूर्ण प्रभाविता (Incomplete Dominance)", "explanation": "अपूर्ण प्रभाविता (Incomplete Dominance) में, विषमयुग्मजी (heterozygous) अवस्था में दोनों एलील (alleles) में से कोई भी पूरी तरह से प्रभावी नहीं होता है, जिसके परिणामस्वरूप एक मध्यवर्ती (intermediate) फेनोटाइप (phenotype) उत्पन्न होता है। यहाँ लाल और सफेद फूल के बीच गुलाबी फूल का बनना इसका एक स्पष्ट उदाहरण है। सहप्रभाविता में दोनों लक्षण एक साथ पूर्ण रूप से व्यक्त होते हैं, जैसे AB रक्त समूह में A और B दोनों एंटीजन (antigens) की अभिव्यक्ति।"}, {"id": 10, "section": "Biology", "question": "डीएनए (DNA) अणु की द्विकुंडलिनी संरचना (double helix structure) में, दो पॉली न्यूक्लियोटाइड (polynucleotide) श्रृंखलाएँ किस प्रकार एक साथ जुड़ी होती हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["फॉस्फोडिएस्टर बंध (phosphodiester bonds) द्वारा", "पेप्टाइड बंध (peptide bonds) द्वारा", "हाइड्रोजन बंध (hydrogen bonds) द्वारा", "ग्लाइकोसिडिक बंध (glycosidic bonds) द्वारा"], "answer": "हाइड्रोजन बंध (hydrogen bonds) द्वारा", "explanation": "डीएनए की द्विकुंडलिनी संरचना में, दो पॉली न्यूक्लियोटाइड श्रृंखलाएँ नाइट्रोजनस क्षारों (nitrogenous bases) के बीच बनने वाले हाइड्रोजन बंधों द्वारा एक साथ जुड़ी होती हैं। एडेनिन (Adenine) थाइमिन (Thymine) के साथ दो हाइड्रोजन बंधों द्वारा और गुआनिन (Guanine) साइटोसिन (Cytosine) के साथ तीन हाइड्रोजन बंधों द्वारा जुड़ता है। फॉस्फोडिएस्टर बंध एक ही पॉली न्यूक्लियोटाइड श्रृंखला के भीतर न्यूक्लियोटाइडों को जोड़ते हैं।"}, {"id": 11, "section": "Biology", "question": "यदि दो जीन (genes) A और B के बीच पुनर्संयोजन आवृत्ति (recombination frequency) 20% है, तो इसका क्या अर्थ है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["जीन A और B एक ही गुणसूत्र पर स्थित हैं और उनके बीच की दूरी 20 सेंटीमॉर्गन (centimorgans) है।", "जीन A और B एक ही गुणसूत्र (chromosome) पर बहुत करीब स्थित हैं।", "जीन A और B अलग-अलग गुणसूत्रों पर स्थित हैं।", "जीन A और B एक ही गुणसूत्र पर स्थित हैं और उनके बीच क्रॉसिंग ओवर (crossing over) की संभावना 20% है।"], "answer": "जीन A और B एक ही गुणसूत्र पर स्थित हैं और उनके बीच की दूरी 20 सेंटीमॉर्गन (centimorgans) है।", "explanation": "पुनर्संयोजन आवृत्ति (recombination frequency) दो लिंक्ड (linked) जीनों के बीच की आनुवंशिक दूरी (genetic distance) का माप है। 1% पुनर्संयोजन आवृत्ति 1 सेंटीमॉर्गन (cM) या 1 मैप यूनिट (map unit) के बराबर होती है। इसलिए, 20% पुनर्संयोजन आवृत्ति का अर्थ है कि जीन A और B एक ही गुणसूत्र पर 20 सेंटीमॉर्गन की दूरी पर स्थित हैं। यह भी इंगित करता है कि उनके बीच क्रॉसिंग ओवर की संभावना 20% है, लेकिन आनुवंशिक दूरी का माप अधिक सटीक और मानक व्याख्या है।"}, {"id": 12, "section": "Biology", "question": "निम्नलिखित में से कौन सा कथन मेंडेलियन विकार (Mendelian disorder) और क्रोमोसोमल विकार (chromosomal disorder) के बीच मुख्य अंतर को सबसे अच्छी तरह दर्शाता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["मेंडेलियन विकार वंशानुगत (hereditary) नहीं होते हैं, जबकि क्रोमोसोमल विकार हमेशा वंशानुगत होते हैं।", "मेंडेलियन विकार केवल लैंगिक गुणसूत्रों (sex chromosomes) को प्रभावित करते हैं, जबकि क्रोमोसोमल विकार केवल अलिंगसूत्री गुणसूत्रों (autosomes) को प्रभावित करते हैं।", "मेंडेलियन विकार हमेशा अप्रभावी होते हैं, जबकि क्रोमोसोमल विकार हमेशा प्रभावी होते हैं।", "मेंडेलियन विकार एकल जीन (single gene) में उत्परिवर्तन (mutation) के कारण होते हैं, जबकि क्रोमोसोमल विकार गुणसूत्रों की संख्या या संरचना में परिवर्तन के कारण होते हैं।"], "answer": "मेंडेलियन विकार एकल जीन (single gene) में उत्परिवर्तन (mutation) के कारण होते हैं, जबकि क्रोमोसोमल विकार गुणसूत्रों की संख्या या संरचना में परिवर्तन के कारण होते हैं।", "explanation": "मेंडेलियन विकार एक विशिष्ट जीन में उत्परिवर्तन (mutation) के कारण होते हैं, जैसे सिकल सेल एनीमिया (sickle cell anemia) या सिस्टिक फाइब्रोसिस (cystic fibrosis)। इसके विपरीत, क्रोमोसोमल विकार गुणसूत्रों की संख्या (जैसे डाउन सिंड्रोम - Down syndrome) या उनकी संरचना (जैसे टर्नर सिंड्रोम - Turner syndrome) में बड़े पैमाने पर बदलाव के कारण होते हैं। अन्य विकल्प गलत हैं क्योंकि मेंडेलियन विकार प्रभावी या अप्रभावी हो सकते हैं, दोनों प्रकार के गुणसूत्रों को प्रभावित कर सकते हैं, और दोनों प्रकार के विकार वंशानुगत हो सकते हैं।"}, {"id": 13, "section": "Biology", "question": "अभिकथन (A): आनुवंशिक कोड (genetic code) सार्वभौमिक (universal) होता है।\nकारण (R): एक विशिष्ट अमीनो अम्ल (amino acid) को केवल एक ही कोडॉन (codon) द्वारा कोडित किया जाता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "(A) असत्य है, लेकिन (R) सत्य है।", "(A) और (R) दोनों सत्य हैं, लेकिन (R), (A) की सही व्याख्या नहीं है।", "(A) सत्य है, लेकिन (R) असत्य है।"], "answer": "(A) सत्य है, लेकिन (R) असत्य है।", "explanation": "अभिकथन (A) सत्य है क्योंकि आनुवंशिक कोड लगभग सभी जीवों में सार्वभौमिक होता है, जिसका अर्थ है कि एक विशिष्ट कोडॉन लगभग सभी प्रजातियों में एक ही अमीनो अम्ल को कोडित करता है। हालांकि, कारण (R) असत्य है। आनुवंशिक कोड अपह्रासित (degenerate) होता है, जिसका अर्थ है कि एक ही अमीनो अम्ल को अक्सर एक से अधिक कोडॉन द्वारा कोडित किया जा सकता है (उदाहरण के लिए, ल्यूसीन (leucine) को छह अलग-अलग कोडॉन द्वारा कोडित किया जा सकता है)। इसलिए, (R) (A) की सही व्याख्या नहीं है और स्वयं भी गलत है।"}, {"id": 14, "section": "Biology", "question": "डीएनए प्रतिकृति (DNA replication) के संबंध में निम्नलिखित कथनों पर विचार करें:\nJ: डीएनए प्रतिकृति अर्ध-संरक्षी (semiconservative) होती है।\nK: डीएनए पॉलीमरेज़ (DNA polymerase) केवल 5' से 3' दिशा में न्यूक्लियोटाइड (nucleotides) जोड़ सकता है।\nL: लैगिंग स्ट्रैंड (lagging strand) पर ओकाजाकी खंड (Okazaki fragments) बनते हैं।\nM: डीएनए लाइगेज (DNA ligase) डीएनए प्रतिकृति को शुरू करता है।\nउपरोक्त कथनों में से कौन से सत्य हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल K और L", "J, K, L और M सभी", "केवल J, K और L", "केवल J और K"], "answer": "केवल J, K और L", "explanation": "डीएनए प्रतिकृति अर्ध-संरक्षी होती है (J), जिसका अर्थ है कि प्रत्येक नए डीएनए अणु में एक मूल स्ट्रैंड और एक नया संश्लेषित स्ट्रैंड होता है। डीएनए पॉलीमरेज़ केवल 5' से 3' दिशा में न्यूक्लियोटाइड जोड़ सकता है (K)। लैगिंग स्ट्रैंड पर, डीएनए पॉलीमरेज़ छोटे खंडों में संश्लेषण करता है जिन्हें ओकाजाकी खंड (Okazaki fragments) कहते हैं (L)। डीएनए लाइगेज ओकाजाकी खंडों को जोड़ने का कार्य करता है, जबकि डीएनए प्रतिकृति की शुरुआत प्राइमेज (primase) द्वारा आरएनए प्राइमर (RNA primer) के संश्लेषण से होती है (M गलत है)।"}, {"id": 15, "section": "Biology", "question": "सूची-I में दिए गए वैज्ञानिकों को सूची-II में दिए गए उनके योगदानों से सुमेलित करें:\nसूची-I (वैज्ञानिक)\nA. फ्रेडरिक ग्रिफिथ (Frederick Griffith)\nB. हर्षे और चेज़ (Hershey & Chase)\nC. वाटसन और क्रिक (Watson & Crick)\nD. मेसेल्सन और स्टाहल (Meselson & Stahl)\nसूची-II (योगदान):\n1. डीएनए की द्विकुंडलिनी संरचना\n2. आनुवंशिक सामग्री के रूप में डीएनए का प्रमाण\n3. ट्रांसफॉर्मेशन सिद्धांत (Transformation Principle)\n4. डीएनए प्रतिकृति का अर्ध-संरक्षी मॉडल\nसही विकल्प चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["A-3, B-1, C-2, D-4", "A-3, B-2, C-1, D-4", "A-2, B-3, C-1, D-4", "A-4, B-2, C-1, D-3"], "answer": "A-3, B-2, C-1, D-4", "explanation": "फ्रेडरिक ग्रिफिथ ने 1928 में ट्रांसफॉर्मेशन सिद्धांत (Transformation Principle) दिया (A-3)। हर्षे और चेज़ ने 1952 में अपने प्रयोगों से निर्णायक रूप से साबित किया कि डीएनए ही आनुवंशिक सामग्री है (B-2)। वाटसन और क्रिक ने 1953 में डीएनए की द्विकुंडलिनी संरचना (double helix structure) का प्रस्ताव रखा (C-1)। मेसेल्सन और स्टाहल ने 1958 में अपने प्रयोगों से डीएनए प्रतिकृति के अर्ध-संरक्षी मॉडल (semiconservative model) की पुष्टि की (D-4)। यह मिलान आनुवंशिकी के इतिहास में इन प्रमुख खोजों को सही ढंग से दर्शाता है।"}, {"id": 16, "section": "Biology", "question": "प्रोटीन संश्लेषण (protein synthesis) की प्रक्रिया के निम्नलिखित चरणों को सही कालानुक्रमिक क्रम (chronological order) में व्यवस्थित करें:\nJ: राइबोसोम (ribosome) का mRNA (मैसेंजर आरएनए) से जुड़ना।\nK: tRNA (स्थानांतरण आरएनए) द्वारा अमीनो अम्ल (amino acid) का राइबोसोम तक परिवहन।\nL: पेप्टाइड बंध (peptide bond) का निर्माण।\nM: स्टॉप कोडॉन (stop codon) पर प्रोटीन संश्लेषण का समापन।", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, L, M", "J, L, K, M", "K, L, J, M", "K, J, L, M"], "answer": "J, K, L, M", "explanation": "प्रोटीन संश्लेषण की प्रक्रिया में, सबसे पहले राइबोसोम mRNA से जुड़ता है और अनुवाद (translation) की शुरुआत होती है (J)। इसके बाद, tRNA विशिष्ट अमीनो अम्ल को राइबोसोम तक लाता है, जहां वे mRNA कोडॉन के साथ युग्मित होते हैं (K)। फिर, राइबोसोम में अमीनो अम्लों के बीच पेप्टाइड बंध का निर्माण होता है, जिससे पॉलीपेप्टाइड श्रृंखला लंबी होती है (L)। अंत में, जब राइबोसोम एक स्टॉप कोडॉन पर पहुंचता है, तो प्रोटीन संश्लेषण समाप्त हो जाता है और पॉलीपेप्टाइड श्रृंखला मुक्त हो जाती है (M)। यह क्रम प्रोटीन संश्लेषण के चरणों का सही कालानुक्रमिक प्रतिनिधित्व करता है।"}, {"id": 17, "section": "Biology", "question": "प्रकाश संश्लेषण (Photosynthesis) की प्रकाश अभिक्रिया (Light Reaction) के मुख्य उत्पादों (main products) के संबंध में निम्नलिखित में से कौन सा कथन सही है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["प्रकाश अभिक्रिया के मुख्य उत्पाद ATP और NADPH हैं, जबकि ऑक्सीजन एक उप-उत्पाद (by-product) है।", "प्रकाश अभिक्रिया के मुख्य उत्पाद केवल ATP हैं, NADPH डार्क अभिक्रिया (dark reaction) में बनता है।", "प्रकाश अभिक्रिया के मुख्य उत्पाद ग्लूकोज (glucose) और ऑक्सीजन (oxygen) हैं।", "प्रकाश अभिक्रिया के मुख्य उत्पाद कार्बन डाइऑक्साइड (carbon dioxide) और जल (water) हैं।"], "answer": "प्रकाश अभिक्रिया के मुख्य उत्पाद ATP और NADPH हैं, जबकि ऑक्सीजन एक उप-उत्पाद (by-product) है।", "explanation": "प्रकाश अभिक्रिया (Light Reaction) में, सौर ऊर्जा (solar energy) को रासायनिक ऊर्जा (chemical energy) में परिवर्तित किया जाता है। इस प्रक्रिया के दौरान, जल के अणुओं (water molecules) का प्रकाश-अपघटन (photolysis) होता है, जिससे ऑक्सीजन एक उप-उत्पाद के रूप में मुक्त होती है। इस ऊर्जा का उपयोग ATP (एडेनोसिन ट्राइफॉस्फेट) और NADPH (निकोटिनामाइड एडेनिन डाइन्यूक्लियोटाइड फॉस्फेट) के संश्लेषण (synthesis) के लिए किया जाता है, जो डार्क अभिक्रिया (Dark Reaction) के लिए ऊर्जा और अपचायक शक्ति (reducing power) प्रदान करते हैं। ग्लूकोज डार्क अभिक्रिया का उत्पाद है, न कि प्रकाश अभिक्रिया का।"}, {"id": 18, "section": "Biology", "question": "एक पादप कोशिका (plant cell) में, क्रेब्स चक्र (Krebs Cycle) का प्राथमिक कार्य क्या है, विशेष रूप से ऊर्जा उत्पादन (energy production) के संदर्भ में?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह सीधे ATP के बड़े अणुओं का उत्पादन करता है।", "यह NADH और FADH₂ जैसे अपचायक समतुल्य (reducing equivalents) उत्पन्न करता है, जो इलेक्ट्रॉन परिवहन श्रृंखला (electron transport chain) में ATP उत्पादन के लिए उपयोग होते हैं।", "यह प्रकाश संश्लेषण (photosynthesis) के लिए कार्बन डाइऑक्साइड (carbon dioxide) को स्थिर करता है।", "यह ग्लूकोज को पाइरुवेट (pyruvate) में तोड़ता है।"], "answer": "यह NADH और FADH₂ जैसे अपचायक समतुल्य (reducing equivalents) उत्पन्न करता है, जो इलेक्ट्रॉन परिवहन श्रृंखला (electron transport chain) में ATP उत्पादन के लिए उपयोग होते हैं।", "explanation": "क्रेब्स चक्र (Krebs Cycle), जिसे सिट्रिक एसिड चक्र (Citric Acid Cycle) भी कहा जाता है, पादप श्वसन (plant respiration) का एक महत्वपूर्ण चरण है। इसका प्राथमिक कार्य सीधे बड़ी मात्रा में ATP का उत्पादन करना नहीं है, बल्कि NADH और FADH₂ जैसे अपचायक समतुल्य (reducing equivalents) उत्पन्न करना है। ये अणु बाद में इलेक्ट्रॉन परिवहन श्रृंखला (electron transport chain) में प्रवेश करते हैं, जहाँ ऑक्सीडेटिव फॉस्फोराइलेशन (oxidative phosphorylation) के माध्यम से अधिकांश ATP का उत्पादन होता है। ग्लूकोज को पाइरुवेट में तोड़ना ग्लाइकोलिसिस (glycolysis) का कार्य है, न कि क्रेब्स चक्र का।"}, {"id": 19, "section": "Biology", "question": "पादपों में जल परिवहन (Water Transport) और पोषक तत्व परिवहन (Nutrient Transport) के संबंध में निम्नलिखित कथनों का मूल्यांकन करें और सही कथन चुनें।", "brand": "bilaspurtestseries.com 9669946966", "options": ["फ्लोएम (Phloem) जल और खनिज लवणों का परिवहन करता है, जबकि जाइलम (Xylem) पत्तियों द्वारा संश्लेषित (synthesized) भोजन का परिवहन करता है।", "जाइलम (Xylem) एकदिशीय (unidirectional) रूप से जल का परिवहन करता है, जबकि फ्लोएम (Phloem) बहुदिशीय (multidirectional) रूप से कार्बनिक पोषक तत्वों (organic nutrients) का परिवहन करता है।", "जाइलम (Xylem) मुख्य रूप से जल और खनिज लवणों (mineral salts) का परिवहन करता है, जबकि फ्लोएम (Phloem) केवल शर्करा (sugars) का परिवहन करता है।", "जाइलम (Xylem) और फ्लोएम (Phloem) दोनों ही केवल जड़ों से पत्तियों तक जल और पोषक तत्वों का परिवहन करते हैं।"], "answer": "जाइलम (Xylem) एकदिशीय (unidirectional) रूप से जल का परिवहन करता है, जबकि फ्लोएम (Phloem) बहुदिशीय (multidirectional) रूप से कार्बनिक पोषक तत्वों (organic nutrients) का परिवहन करता है।", "explanation": "जाइलम (Xylem) पादपों में जल और घुले हुए खनिज लवणों (dissolved mineral salts) का परिवहन जड़ों से पत्तियों तक एकदिशीय (unidirectional) रूप से करता है। इसके विपरीत, फ्लोएम (Phloem) पत्तियों में संश्लेषित (synthesized) कार्बनिक पोषक तत्वों (जैसे शर्करा) का परिवहन पादप के विभिन्न भागों में बहुदिशीय (multidirectional) रूप से करता है, जिसमें जड़ें, फल और भंडारण अंग (storage organs) शामिल हैं। इसलिए, विकल्प C सही है क्योंकि यह दोनों ऊतकों (tissues) के परिवहन की दिशा और सामग्री को सटीक रूप से बताता है।"}, {"id": 20, "section": "Biology", "question": "एक C₃ पादप (C₃ plant) को उच्च तापमान (high temperature) और शुष्क परिस्थितियों (dry conditions) में रखा जाता है। इन परिस्थितियों में प्रकाश श्वसन (Photorespiration) की दर पर क्या प्रभाव पड़ेगा और क्यों?", "brand": "bilaspurtestseries.com 9669946966", "options": ["प्रकाश श्वसन की दर कम हो जाएगी क्योंकि उच्च तापमान पर एंजाइम निष्क्रिय (inactive) हो जाएंगे।", "प्रकाश श्वसन की दर कम हो जाएगी क्योंकि स्टोमेटा (stomata) बंद हो जाएंगे, जिससे CO₂ की सांद्रता (concentration) बढ़ जाएगी।", "प्रकाश श्वसन की दर बढ़ जाएगी क्योंकि RuBisCO एंजाइम (enzyme) की ऑक्सीजन (oxygen) के प्रति आत्मीयता (affinity) CO₂ की तुलना में बढ़ जाएगी।", "प्रकाश श्वसन की दर अपरिवर्तित रहेगी क्योंकि यह तापमान और जल की उपलब्धता (water availability) से प्रभावित नहीं होता है।"], "answer": "प्रकाश श्वसन की दर बढ़ जाएगी क्योंकि RuBisCO एंजाइम (enzyme) की ऑक्सीजन (oxygen) के प्रति आत्मीयता (affinity) CO₂ की तुलना में बढ़ जाएगी।", "explanation": "उच्च तापमान और शुष्क परिस्थितियों में, C₃ पादप अपने स्टोमेटा (stomata) को बंद कर देते हैं ताकि जल की हानि (water loss) को कम किया जा सके। इससे पत्ती के अंदर CO₂ की सांद्रता (concentration) कम हो जाती है और ऑक्सीजन (oxygen) की सांद्रता बढ़ जाती है। RuBisCO एंजाइम (enzyme) में कार्बोक्सिलेज (carboxylase) और ऑक्सीजिनेज (oxygenase) दोनों गतिविधियाँ होती हैं। उच्च तापमान पर, RuBisCO की ऑक्सीजन के प्रति आत्मीयता CO₂ की तुलना में बढ़ जाती है, जिससे यह CO₂ के बजाय ऑक्सीजन के साथ प्रतिक्रिया करता है। इसके परिणामस्वरूप प्रकाश श्वसन (Photorespiration) की दर बढ़ जाती है, जो एक ऊर्जा-व्यर्थ (energy-wasting) प्रक्रिया है।"}, {"id": 21, "section": "Biology", "question": "वाष्पोत्सर्जन (Transpiration) और बिंदुस्राव (Guttation) के बीच मुख्य अंतरों में से एक क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["वाष्पोत्सर्जन में जल वाष्प (water vapor) के रूप में निकलता है, जबकि बिंदुस्राव में जल तरल बूंदों (liquid droplets) के रूप में निकलता है।", "वाष्पोत्सर्जन जाइलम (xylem) के माध्यम से होता है, जबकि बिंदुस्राव फ्लोएम (phloem) के माध्यम से होता है।", "वाष्पोत्सर्जन एक निष्क्रिय प्रक्रिया (passive process) है, जबकि बिंदुस्राव एक सक्रिय प्रक्रिया (active process) है।", "वाष्पोत्सर्जन रात में होता है, जबकि बिंदुस्राव दिन में होता है।"], "answer": "वाष्पोत्सर्जन में जल वाष्प (water vapor) के रूप में निकलता है, जबकि बिंदुस्राव में जल तरल बूंदों (liquid droplets) के रूप में निकलता है।", "explanation": "वाष्पोत्सर्जन (Transpiration) वह प्रक्रिया है जिसमें पादप के वायवीय भागों (aerial parts), मुख्य रूप से पत्तियों के स्टोमेटा (stomata) से जल वाष्प (water vapor) के रूप में निकलता है। इसके विपरीत, बिंदुस्राव (Guttation) वह प्रक्रिया है जिसमें जल तरल बूंदों (liquid droplets) के रूप में पत्तियों के किनारों पर स्थित विशेष छिद्रों, जिन्हें हाइडैथोड्स (hydathodes) कहते हैं, से निकलता है। यह आमतौर पर रात में या सुबह जल्दी होता है जब वाष्पोत्सर्जन कम होता है और मूल दाब (root pressure) अधिक होता है।"}, {"id": 22, "section": "Biology", "question": "पादपों में खनिज पोषण (Mineral Nutrition) के अवशोषण (absorption) और परिवहन (transport) के तंत्र (mechanism) के संबंध में निम्नलिखित में से कौन सा कथन तार्किक रूप से सबसे सटीक है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["अधिकांश खनिज आयन सक्रिय परिवहन (active transport) द्वारा जड़ों में अवशोषित होते हैं, और एक बार जाइलम में पहुंचने के बाद, वे वाष्पोत्सर्जन खिंचाव (transpirational pull) के साथ निष्क्रिय रूप से ऊपर की ओर बढ़ते हैं।", "खनिज आयन (mineral ions) केवल निष्क्रिय परिवहन (passive transport) द्वारा जड़ों में अवशोषित होते हैं और फिर जाइलम (xylem) के माध्यम से ऊपर की ओर बढ़ते हैं।", "खनिज आयन फ्लोएम (phloem) के माध्यम से अवशोषित होते हैं और फिर जाइलम में स्थानांतरित (transferred) होकर पादप के शीर्ष (apex) तक पहुँचते हैं।", "खनिज आयनों का अवशोषण पत्तियों में होता है और फिर उन्हें जाइलम के माध्यम से जड़ों तक पहुँचाया जाता है।"], "answer": "अधिकांश खनिज आयन सक्रिय परिवहन (active transport) द्वारा जड़ों में अवशोषित होते हैं, और एक बार जाइलम में पहुंचने के बाद, वे वाष्पोत्सर्जन खिंचाव (transpirational pull) के साथ निष्क्रिय रूप से ऊपर की ओर बढ़ते हैं।", "explanation": "पादपों में खनिज आयनों (mineral ions) का अवशोषण मुख्य रूप से जड़ों द्वारा होता है। मिट्टी में खनिजों की सांद्रता (concentration) अक्सर जड़ों की कोशिकाओं की तुलना में कम होती है, इसलिए अधिकांश आयनों को सांद्रता प्रवणता (concentration gradient) के विरुद्ध सक्रिय परिवहन (active transport) द्वारा अवशोषित किया जाता है, जिसके लिए ऊर्जा (ATP) की आवश्यकता होती है। एक बार जब ये आयन जाइलम (xylem) में पहुँच जाते हैं, तो वे जल के साथ वाष्पोत्सर्जन खिंचाव (transpirational pull) के कारण निष्क्रिय रूप से पादप के ऊपरी भागों तक पहुँचते हैं। यह तंत्र जल और खनिज परिवहन के बीच एक तार्किक संबंध स्थापित करता है।"}, {"id": 23, "section": "Biology", "question": "अभिकथन (A): क्लोरोफिल (Chlorophyll) प्रकाश संश्लेषण (Photosynthesis) के लिए आवश्यक है क्योंकि यह प्रकाश ऊर्जा (light energy) को अवशोषित करता है।\nकारण (R): क्लोरोफिल केवल नीले और लाल प्रकाश (blue and red light) को अवशोषित करता है और हरे प्रकाश (green light) को परावर्तित (reflect) करता है, जिससे पादप हरे दिखाई देते हैं।", "brand": "bilaspurtestseries.com 9669946966", "options": ["अभिकथन (A) असत्य है, लेकिन कारण (R) सत्य है।", "अभिकथन (A) और कारण (R) दोनों सत्य हैं, लेकिन कारण (R) अभिकथन (A) की सही व्याख्या नहीं है।", "अभिकथन (A) और कारण (R) दोनों सत्य हैं, और कारण (R) अभिकथन (A) की सही व्याख्या है।", "अभिकथन (A) सत्य है, लेकिन कारण (R) असत्य है।"], "answer": "अभिकथन (A) और कारण (R) दोनों सत्य हैं, और कारण (R) अभिकथन (A) की सही व्याख्या है।", "explanation": "अभिकथन (A) सत्य है क्योंकि क्लोरोफिल (Chlorophyll) प्रकाश संश्लेषण के लिए प्राथमिक वर्णक (primary pigment) है, जो प्रकाश ऊर्जा को अवशोषित करके रासायनिक ऊर्जा में परिवर्तित करने की प्रक्रिया शुरू करता है। कारण (R) भी सत्य है क्योंकि क्लोरोफिल मुख्य रूप से नीले और लाल स्पेक्ट्रम (spectrum) में प्रकाश को अवशोषित करता है और हरे प्रकाश को परावर्तित करता है, यही कारण है कि पादप हरे दिखाई देते हैं। कारण (R) अभिकथन (A) की सही व्याख्या है क्योंकि क्लोरोफिल की विशिष्ट प्रकाश अवशोषण क्षमता (light absorption capacity) ही उसे प्रकाश संश्लेषण के लिए आवश्यक बनाती है।"}, {"id": 24, "section": "Biology", "question": "श्वसन गुणांक (Respiratory Quotient − RQ) के संबंध में निम्नलिखित कथनों पर विचार करें:\nJ: कार्बोहाइड्रेट (Carbohydrates) के लिए RQ का मान 1 होता है।\nK: वसा (Fats) के लिए RQ का मान 1 से अधिक होता है।\nL: अवायवीय श्वसन (Anaerobic respiration) के लिए RQ का मान अनंत (infinity) होता है।\nM: प्रोटीन (Proteins) के लिए RQ का मान 0.7 से कम होता है।\nउपरोक्त कथनों में से कौन सा/से कथन सही है/हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और K", "केवल K और M", "केवल J, L और M", "केवल J और L"], "answer": "केवल J और L", "explanation": "श्वसन गुणांक (RQ) मुक्त हुई CO₂ की मात्रा और उपयोग की गई O₂ की मात्रा का अनुपात है।\nJ. कार्बोहाइड्रेट के पूर्ण ऑक्सीकरण (complete oxidation) में, मुक्त CO₂ और उपयोग की गई O₂ की मात्रा बराबर होती है, इसलिए RQ = 1। यह कथन सही है।\nK. वसा के लिए RQ का मान 1 से कम (लगभग 0.7) होता है क्योंकि उनके ऑक्सीकरण के लिए अधिक O₂ की आवश्यकता होती है। यह कथन गलत है।\nL. अवायवीय श्वसन में O₂ का उपयोग नहीं होता है, इसलिए RQ का मान अनंत (infinity) होता है (CO₂/0)। यह कथन सही है।\nM. प्रोटीन के लिए RQ का मान लगभग 0.8-0.9 होता है, जो 0.7 से कम नहीं होता। यह कथन गलत है।\nअतः, केवल J और L सही हैं।"}, {"id": 25, "section": "Biology", "question": "निम्नलिखित पादप हार्मोन (Plant Hormones) और उनके कार्यों (functions) की सही जोड़ी (matching pair) का चयन करें:\n**हार्मोन (Hormone)**\nI. ऑक्सिन (Auxin)\nII. जिबरेलिन (Gibberellin)\nIII. साइटोकाइनिन (Cytokinin)\nIV. एब्सिसिक एसिड (Abscisic Acid − ABA)\n**कार्य (Function)**\nP. कोशिका विभाजन (Cell division) को बढ़ावा देना और बुढ़ापे (senescence) में देरी करना।\nQ. तने का बढ़ाव (Stem elongation) और बीज अंकुरण (seed germination) को प्रेरित करना।\nR. शीर्ष प्रभाविता (Apical dominance) को बढ़ावा देना और जड़ों के निर्माण को प्रेरित करना।\nS. स्टोमेटा (stomata) के बंद होने को प्रेरित करना और बीज निष्क्रियता (seed dormancy) बनाए रखना।", "brand": "bilaspurtestseries.com 9669946966", "options": ["I-P, II-S, III-Q, IV-R", "I-S, II-P, III-R, IV-Q", "I-Q, II-R, III-S, IV-P", "I-R, II-Q, III-P, IV-S"], "answer": "I-R, II-Q, III-P, IV-S", "explanation": "सही मिलान इस प्रकार है:\nI. ऑक्सिन (Auxin): यह शीर्ष प्रभाविता (Apical dominance) को बढ़ावा देता है और जड़ों के निर्माण (root initiation) को प्रेरित करता है। (R)\nII. जिबरेलिन (Gibberellin): यह तने के बढ़ाव (Stem elongation) को बढ़ावा देता है, बीज अंकुरण (seed germination) को प्रेरित करता है और बोल्टिंग (bolting) में मदद करता है। (Q)\nIII. साइटोकाइनिन (Cytokinin): यह कोशिका विभाजन (Cell division) को बढ़ावा देता है, पार्श्व कलिकाओं (lateral buds) के विकास को उत्तेजित करता है और बुढ़ापे (senescence) में देरी करता है। (P)\nIV. एब्सिसिक एसिड (Abscisic Acid − ABA): यह तनाव हार्मोन (stress hormone) के रूप में कार्य करता है, स्टोमेटा के बंद होने (stomata closure) को प्रेरित करता है और बीज निष्क्रियता (seed dormancy) को बनाए रखता है। (S)\nइसलिए, सही संयोजन I-R, II-Q, III-P, IV-S है।"}, {"id": 26, "section": "Biology", "question": "पित्त (Bile) का मुख्य कार्य क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["प्रोटीन (protein) का पाचन (digestion) करना।", "कार्बोहाइड्रेट (carbohydrate) का अवशोषण (absorption) करना।", "वसा (fat) का पायसीकरण (emulsification) करना।", "अम्लीय काइम (acidic chyme) को निष्क्रिय (neutralize) करना।"], "answer": "वसा (fat) का पायसीकरण (emulsification) करना।", "explanation": "पित्त (Bile) का मुख्य कार्य छोटी आंत (small intestine) में वसा (fat) का पायसीकरण (emulsification) करना है। यह वसा के बड़े कणों को छोटे कणों में तोड़ता है, जिससे लाइपेज (lipase) एंजाइम (enzyme) की क्रिया के लिए सतह क्षेत्र (surface area) बढ़ जाता है। विकल्प A गलत है क्योंकि प्रोटीन का पाचन मुख्य रूप से पेप्सिन (pepsin) और ट्रिप्सिन (trypsin) जैसे एंजाइमों द्वारा होता है। विकल्प C गलत है क्योंकि कार्बोहाइड्रेट का अवशोषण मुख्य रूप से ग्लूकोज (glucose) के रूप में होता है, जिसमें पित्त की सीधी भूमिका नहीं होती। विकल्प D आंशिक रूप से सही है कि पित्त क्षारीय होता है और अम्लीय काइम को निष्क्रिय करने में मदद करता है, लेकिन इसका प्राथमिक और सबसे विशिष्ट कार्य वसा का पायसीकरण है।"}, {"id": 27, "section": "Biology", "question": "एक पर्वतारोही (mountaineer) जो 5000 मीटर की ऊंचाई पर चढ़ रहा है, उसे श्वसन संबंधी कठिनाइयों (respiratory difficulties) का अनुभव हो सकता है। इसका मुख्य कारण क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["उच्च ऊंचाई पर ऑक्सीजन (oxygen) का आंशिक दबाव (partial pressure) कम होता है।", "मांसपेशियों (muscles) में लैक्टिक एसिड (lactic acid) का संचय (accumulation) बढ़ जाता है।", "उच्च ऊंचाई पर कार्बन डाइऑक्साइड (carbon dioxide) का आंशिक दबाव बढ़ जाता है।", "ठंडे तापमान के कारण फेफड़ों (lungs) की कार्यक्षमता (efficiency) कम हो जाती है।"], "answer": "उच्च ऊंचाई पर ऑक्सीजन (oxygen) का आंशिक दबाव (partial pressure) कम होता है।", "explanation": "उच्च ऊंचाई पर वायुमंडलीय दबाव (atmospheric pressure) कम होता है, जिसके परिणामस्वरूप ऑक्सीजन का आंशिक दबाव (partial pressure of oxygen) भी कम हो जाता है। इससे रक्त में ऑक्सीजन के विसरण (diffusion) की दर कम हो जाती है, जिससे शरीर को पर्याप्त ऑक्सीजन नहीं मिल पाती और श्वसन संबंधी कठिनाइयाँ होती हैं। कार्बन डाइऑक्साइड का आंशिक दबाव भी कम होता है, और ठंडे तापमान या लैक्टिक एसिड का संचय प्राथमिक कारण नहीं हैं।"}, {"id": 28, "section": "Biology", "question": "मानव रक्त (human blood) में प्लेटलेट्स (platelets) का प्राथमिक कार्य क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["हार्मोन (hormones) और पोषक तत्वों (nutrients) का परिवहन करना।", "ऑक्सीजन का परिवहन (transport of oxygen) करना।", "रक्त का थक्का जमना (blood clotting) और रक्तस्राव (bleeding) को रोकना।", "शरीर को संक्रमण (infection) से बचाना।"], "answer": "रक्त का थक्का जमना (blood clotting) और रक्तस्राव (bleeding) को रोकना।", "explanation": "प्लेटलेट्स (Platelets), जिन्हें थ्रोम्बोसाइट्स (thrombocytes) भी कहा जाता है, रक्तस्राव को रोकने के लिए रक्त का थक्का जमने (blood clotting) की प्रक्रिया में महत्वपूर्ण भूमिका निभाते हैं। ऑक्सीजन का परिवहन लाल रक्त कोशिकाओं (red blood cells) द्वारा किया जाता है, शरीर को संक्रमण से सफेद रक्त कोशिकाएं (white blood cells) बचाती हैं, और हार्मोन व पोषक तत्वों का परिवहन मुख्य रूप से प्लाज्मा (plasma) द्वारा होता है।"}, {"id": 29, "section": "Biology", "question": "एक व्यक्ति को 'डायबिटीज इन्सिपिडस' (Diabetes Insipidus) का निदान (diagnosed) किया गया है। इस स्थिति में वृक्क (kidney) की कार्यप्रणाली पर क्या प्रभाव पड़ेगा और इसका कारण क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["वृक्क अत्यधिक पतला मूत्र (dilute urine) उत्पन्न करेगा क्योंकि ADH के स्राव में कमी (decrease in ADH secretion) या वृक्क की ADH के प्रति प्रतिक्रिया (kidney's response to ADH) में कमी होती है।", "वृक्क अधिक मात्रा में गाढ़ा मूत्र (concentrated urine) उत्पन्न करेगा क्योंकि ADH (एंटीडाययूरेटिक हार्मोन) का स्राव (secretion) बढ़ जाता है।", "वृक्क में ग्लोमेरुलर फिल्ट्रेशन दर (glomerular filtration rate − GFR) में वृद्धि होगी, जिससे रक्त में ग्लूकोज (glucose) का स्तर कम हो जाएगा।", "वृक्क में सोडियम (sodium) का अवशोषण (absorption) बढ़ जाएगा, जिससे रक्तचाप (blood pressure) में वृद्धि होगी।"], "answer": "वृक्क अत्यधिक पतला मूत्र (dilute urine) उत्पन्न करेगा क्योंकि ADH के स्राव में कमी (decrease in ADH secretion) या वृक्क की ADH के प्रति प्रतिक्रिया (kidney's response to ADH) में कमी होती है।", "explanation": "डायबिटीज इन्सिपिडस (Diabetes Insipidus) एक ऐसी स्थिति है जिसमें शरीर पर्याप्त ADH (एंटीडाययूरेटिक हार्मोन) का उत्पादन नहीं कर पाता या वृक्क ADH के प्रति ठीक से प्रतिक्रिया नहीं कर पाते। ADH वृक्क को पानी को पुनः अवशोषित (reabsorb) करने में मदद करता है, जिससे मूत्र केंद्रित होता है। इसकी कमी या अप्रभावीता के कारण वृक्क अत्यधिक पतला मूत्र उत्पन्न करते हैं, जिससे शरीर में पानी की कमी (dehydration) हो सकती है। अन्य विकल्प इस स्थिति से संबंधित नहीं हैं या गलत प्रभाव बताते हैं।"}, {"id": 30, "section": "Biology", "question": "तरल मोज़ेक मॉडल (fluid mosaic model) के अनुसार, कोशिका झिल्ली (cell membrane) की चयनात्मक पारगम्यता (selective permeability) का मुख्य कारण क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["फॉस्फोलिपिड द्विपरत (phospholipid bilayer) की प्रकृति जो केवल कुछ अणुओं को गुजरने देती है।", "झिल्ली में केवल प्रोटीन चैनलों (protein channels) की उपस्थिति।", "झिल्ली के भीतर न्यूक्लिक अम्ल (nucleic acids) का होना।", "झिल्ली के बाहरी सतह पर कार्बोहाइड्रेट (carbohydrates) की परत।"], "answer": "फॉस्फोलिपिड द्विपरत (phospholipid bilayer) की प्रकृति जो केवल कुछ अणुओं को गुजरने देती है।", "explanation": "कोशिका झिल्ली की चयनात्मक पारगम्यता मुख्य रूप से फॉस्फोलिपिड द्विपरत (phospholipid bilayer) के कारण होती है। इस द्विपरत का हाइड्रोफोबिक (hydrophobic) आंतरिक भाग ध्रुवीय (polar) और बड़े अणुओं के मार्ग को प्रतिबंधित करता है, जिससे केवल कुछ ही अणु स्वतंत्र रूप से गुजर पाते हैं। प्रोटीन चैनल (protein channels) भी पारगम्यता में सहायता करते हैं, लेकिन प्राथमिक चयनात्मक अवरोध फॉस्फोलिपिड द्विपरत ही है, और 'केवल' प्रोटीन चैनलों की उपस्थिति कहना गलत है। कार्बोहाइड्रेट कोशिका पहचान (cell recognition) में शामिल होते हैं, जबकि न्यूक्लिक अम्ल झिल्ली का हिस्सा नहीं होते हैं।"}, {"id": 31, "section": "Biology", "question": "तरल मोज़ेक मॉडल (fluid mosaic model) के अनुसार, कोशिका झिल्ली (cell membrane) की चयनात्मक पारगम्यता (selective permeability) का मुख्य कारण क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["फॉस्फोलिपिड द्विपरत (phospholipid bilayer) की प्रकृति जो केवल कुछ अणुओं को गुजरने देती है।", "झिल्ली में केवल प्रोटीन चैनलों (protein channels) की उपस्थिति।", "झिल्ली के भीतर न्यूक्लिक अम्ल (nucleic acids) का होना।", "झिल्ली के बाहरी सतह पर कार्बोहाइड्रेट (carbohydrates) की परत।"], "answer": "फॉस्फोलिपिड द्विपरत (phospholipid bilayer) की प्रकृति जो केवल कुछ अणुओं को गुजरने देती है।", "explanation": "कोशिका झिल्ली की चयनात्मक पारगम्यता मुख्य रूप से फॉस्फोलिपिड द्विपरत (phospholipid bilayer) के कारण होती है। इस द्विपरत का हाइड्रोफोबिक (hydrophobic) आंतरिक भाग ध्रुवीय (polar) और बड़े अणुओं के मार्ग को प्रतिबंधित करता है, जिससे केवल कुछ ही अणु स्वतंत्र रूप से गुजर पाते हैं। प्रोटीन चैनल (protein channels) भी टाने की आवश्यकता होती है।"], "answer": "मांसपेशियों (muscles) की बढ़ी हुई ऊर्जा मांग (energy demand) को पूरा करने के लिए अधिक ऑक्सीजन (oxygen) और पोषक तत्वों (nutrients) की आवश्यकता होती है, और अपशिष्ट उत्पादों (waste products) को हटाने की आवश्यकता होती है।", "explanation": "तीव्र शारीरिक व्यायाम के दौरान, मांसपेशियों को अधिक ऊर्जा की आवश्यकता होती है, जिसके लिए अधिक ऑक्सीजन और पोषक तत्वों की आपूर्ति आवश्यक है। बढ़ी हुई हृदय गति रक्त परिसंचरण (blood circulation) को बढ़ाती है, जिससे ऑक्सीजन और पोषक तत्व तेजी से मांसपेशियों तक पहुँचते हैं। बढ़ी हुई श्वसन दर अधिक ऑक्सीजन ग्रहण करने और कार्बन डाइऑक्साइड जैसे अपशिष्ट उत्पादों को बाहर निकालने में मदद करती है। यह समन्वय शरीर की चयापचय (metabolic) मांगों को पूरा करने के लिए आवश्यक है, न कि केवल तापमान नियंत्रण या तनाव प्रतिक्रिया के लिए।"}, {"id": 37, "section": "Biology", "question": "अभिकथन (A): एंजाइम (enzymes) विशिष्ट (specific) होते हैं, जिसका अर्थ है कि वे केवल एक विशिष्ट प्रकार के सबस्ट्रेट (substrate) पर कार्य करते हैं।\nकारण (R): एंजाइमों में एक सक्रिय स्थल (active site) होता है जो सबस्ट्रेट के आकार (shape) के पूरक (complementary) होता है, जिससे 'लॉक एंड की' (lock and key) तंत्र बनता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A) सत्य है लेकिन (R) असत्य है।", "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "(A) और (R) दोनों सत्य हैं लेकिन (R), (A) की सही व्याख्या नहीं है।", "(A) असत्य है लेकिन (R) सत्य है।"], "answer": "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "explanation": "एंजाइम अपनी क्रिया में अत्यधिक विशिष्ट (highly specific) होते हैं, जिसका अर्थ है कि प्रत्येक एंजाइम आमतौर पर केवल एक या कुछ संबंधित सबस्ट्रेट्स पर कार्य करता है। इसका कारण उनकी त्रि-आयामी संरचना (three-dimensional structure) में एक विशिष्ट सक्रिय स्थल (active site) का होना है, जो केवल एक विशिष्ट सबस्ट्रेट के आकार के पूरक (complementary) होता है। यह 'लॉक एंड की' (lock and key) मॉडल के रूप में जाना जाता है, जो एंजाइम की विशिष्टता की व्याख्या करता है। इसलिए, अभिकथन और कारण दोनों सत्य हैं और कारण अभिकथन की सही व्याख्या करता है।"}, {"id": 38, "section": "Biology", "question": "निम्नलिखित में से कौन सा संयोजन (combination) 'पीलिया' (Jaundice) के लक्षणों (symptoms) और कारणों (causes) को सही ढंग से दर्शाता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["लक्षण: सांस लेने में कठिनाई (difficulty in breathing) और खांसी (cough); कारण: फेफड़ों (lungs) में तरल पदार्थ (fluid) का जमाव।", "लक्षण: अत्यधिक प्यास (excessive thirst) और बार-बार पेशाब (frequent urination); कारण: अग्न्याशय (pancreas) द्वारा इंसुलिन (insulin) का अपर्याप्त उत्पादन (insufficient production)।", "लक्षण: जोड़ों (joints) में दर्द और सूजन (swelling); कारण: यूरिक एसिड (uric acid) का जमाव (accumulation)।", "लक्षण: त्वचा (skin) और आँखों (eyes) का पीला पड़ना; कारण: रक्त में बिलीरुबिन (bilirubin) का उच्च स्तर।"], "answer": "लक्षण: त्वचा (skin) और आँखों (eyes) का पीला पड़ना; कारण: रक्त में बिलीरुबिन (bilirubin) का उच्च स्तर।", "explanation": "पीलिया (Jaundice) एक ऐसी स्थिति है जिसमें त्वचा, श्लेष्म झिल्ली (mucous membranes) और आँखों का सफेद भाग (sclera) पीला पड़ जाता है। यह रक्त में बिलीरुबिन (bilirubin) नामक पीले रंग के पित्त वर्णक (bile pigment) के उच्च स्तर के कारण होता है। विकल्प B मधुमेह (diabetes) के लक्षण और कारण हैं, विकल्प C गाउट (gout) के लक्षण और कारण हैं, और विकल्प D फुफ्फुसीय एडिमा (pulmonary edema) या कुछ श्वसन रोगों के लक्षण और कारण हैं।"}, {"id": 39, "section": "Biology", "question": "सूची-I (List-I) में दिए गए अंगों (organs) का सूची-II (List-II) में दिए गए उनके संबंधित कार्यों (associated functions) या स्रावों (secretions) से मिलान करें और सही विकल्प चुनें:\nसूची-I (Organ)\n(J) आमाशय (Stomach)\n(K) अग्न्याशय (Pancreas)\n(L) यकृत (Liver)\n(M) वृक्क (Kidney)\nसूची-II (Function/Secretion)\n(1) पित्त (Bile) का उत्पादन\n(2) इंसुलिन (Insulin) और ग्लूकागन (Glucagon) का स्राव\n(3) रेनिन (Renin) और गैस्ट्रिक लाइपेज (Gastric Lipase) का स्राव\n(4) मूत्र (Urine) का निर्माण", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-1, K-4, L-2, M-3", "J-3, K-2, L-1, M-4", "J-2, K-3, L-4, M-1", "J-4, K-1, L-3, M-2"], "answer": "J-3, K-2, L-1, M-4", "explanation": "सही मिलान इस प्रकार है:\n(J) आमाशय (Stomach) - रेनिन (Renin) और गैस्ट्रिक लाइपेज (Gastric Lipase) का स्राव करता है (3)।\n(K) अग्न्याशय (Pancreas) - इंसुलिन (Insulin) और ग्लूकागन (Glucagon) जैसे हार्मोन का स्राव करता है (2)।\n(L) यकृत (Liver) - पित्त (Bile) का उत्पादन करता है (1)।\n(M) वृक्क (Kidney) - मूत्र (Urine) का निर्माण करता है (4)।\nइसलिए, सही संयोजन J-3, K-2, L-1, M-4 है।"}, {"id": 40, "section": "Biology", "question": "मानव में मूत्र निर्माण (urine formation) की प्रक्रिया के सही कालानुक्रमिक चरणों (chronological steps) को व्यवस्थित करें:\n(J) ग्लोमेरुलर फिल्ट्रेशन (Glomerular Filtration)\n(K) ट्यूबलर पुनःअवशोषण (Tubular Reabsorption)\n(L) ट्यूबलर स्राव (Tubular Secretion)\n(M) संग्रह नलिका (Collecting Duct) में जल का पुनःअवशोषण", "brand": "bilaspurtestseries.com 9669946966", "options": ["J → M → K → L", "K → J → L → M", "J → K → L → M", "J → L → K → M"], "answer": "J → K → L → M", "explanation": "मूत्र निर्माण की प्रक्रिया वृक्क (kidney) की नेफ्रॉन (nephron) इकाइयों में होती है और इसमें निम्नलिखित चरण शामिल हैं:\n1. ग्लोमेरुलर फिल्ट्रेशन (Glomerular Filtration) (J): रक्त ग्लोमेरुलस (glomerulus) से बोमन कैप्सूल (Bowman's capsule) में फिल्टर होता है।\n2. ट्यूबलर पुनःअवशोषण (Tubular Reabsorption) (K): फिल्ट्रेट से आवश्यक पदार्थ (जैसे ग्लूकोज, अमीनो एसिड, पानी, लवण) वृक्क नलिकाओं (renal tubules) से रक्त में वापस अवशोषित होते हैं।\n3. ट्यूबलर स्राव (Tubular Secretion) (L): रक्त से कुछ अपशिष्ट उत्पाद और अतिरिक्त आयन वृक्क नलिकाओं में स्रावित होते हैं।\n4. संग्रह नलिका (Collecting Duct) में जल का पुनःअवशोषण (M): ADH (एंटीडाययूरेटिक हार्मोन) की उपस्थिति में संग्रह नलिकाओं में पानी का अंतिम पुनःअवशोषण होता है, जिससे मूत्र केंद्रित होता है।\nइसलिए, सही कालानुक्रमिक क्रम J → K → L → M है।"}, {"id": 41, "section": "Biology", "question": "एक पारिस्थितिकी तंत्र (ecosystem) के संबंध में, निम्नलिखित में से कौन सा कथन उसकी मूलभूत अवधारणा (fundamental concept) और घटकों (components) को सबसे अच्छी तरह परिभाषित करता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह केवल उन पौधों और जानवरों का अध्ययन है जो एक दूसरे पर निर्भर करते हैं।", "यह केवल एक भौगोलिक क्षेत्र में रहने वाले सभी जीवित जीवों का संग्रह है।", "यह एक विशेष क्षेत्र में जैविक (biotic) और अजैविक (abiotic) घटकों की परस्पर क्रिया (interaction) है।", "यह केवल एक ही प्रजाति (species) के जीवों का समूह है जो एक साथ रहते हैं।"], "answer": "यह एक विशेष क्षेत्र में जैविक (biotic) और अजैविक (abiotic) घटकों की परस्पर क्रिया (interaction) है।", "explanation": "एक पारिस्थितिकी तंत्र (ecosystem) में एक विशेष भौगोलिक क्षेत्र के भीतर सभी जीवित जीव (जैविक घटक) और उनके भौतिक वातावरण (अजैविक घटक) शामिल होते हैं। ये घटक ऊर्जा और पोषक तत्वों के प्रवाह के माध्यम से एक दूसरे के साथ लगातार बातचीत करते हैं। अन्य विकल्प या तो केवल जैविक घटकों पर ध्यान केंद्रित करते हैं या पारिस्थितिकी तंत्र की व्यापक परिभाषा को पूरी तरह से शामिल नहीं करते हैं।"}, {"id": 42, "section": "Biology", "question": "एक घास के मैदान के पारिस्थितिकी तंत्र (grassland ecosystem) में, यदि प्राथमिक उपभोक्ता (primary consumers) की आबादी में अचानक वृद्धि होती है, तो ऊर्जा प्रवाह (energy flow) पर इसका क्या तात्कालिक प्रभाव पड़ेगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["प्राथमिक उपभोक्ताओं से द्वितीयक उपभोक्ताओं (secondary consumers) तक ऊर्जा का प्रवाह बढ़ जाएगा।", "द्वितीयक उपभोक्ताओं से तृतीयक उपभोक्ताओं (tertiary consumers) तक ऊर्जा का प्रवाह कम हो जाएगा।", "उत्पादकों (producers) से प्राथमिक उपभोक्ताओं तक ऊर्जा का प्रवाह कम हो जाएगा।", "पारिस्थितिकी तंत्र में कुल ऊर्जा (total energy) की मात्रा बढ़ जाएगी।"], "answer": "प्राथमिक उपभोक्ताओं से द्वितीयक उपभोक्ताओं (secondary consumers) तक ऊर्जा का प्रवाह बढ़ जाएगा।", "explanation": "खाद्य श्रृंखला (food chain) में ऊर्जा का प्रवाह एक पोषी स्तर (trophic level) से दूसरे पोषी स्तर तक होता है। यदि प्राथमिक उपभोक्ताओं (जैसे शाकाहारी) की आबादी बढ़ती है, तो वे अधिक उत्पादकों (जैसे घास) का उपभोग करेंगे, जिससे उनके शरीर में अधिक ऊर्जा जमा होगी। यह बढ़ी हुई ऊर्जा फिर द्वितीयक उपभोक्ताओं (जैसे मांसाहारी) को उपलब्ध होगी जो प्राथमिक उपभोक्ताओं का शिकार करते हैं, जिससे प्राथमिक उपभोक्ताओं से द्वितीयक उपभोक्ताओं तक ऊर्जा का प्रवाह बढ़ जाएगा। उत्पादकों से प्राथमिक उपभोक्ताओं तक ऊर्जा का प्रवाह बढ़ेगा, कम नहीं होगा, और कुल ऊर्जा की मात्रा नहीं बढ़ेगी, बल्कि उसका पुनर्वितरण होगा।"}, {"id": 43, "section": "Biology", "question": "जैव विविधता (Biodiversity) के महत्व के संबंध में निम्नलिखित में से कौन सा कथन सही नहीं है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["जैव विविधता पारिस्थितिकी तंत्र सेवाओं (ecosystem services) जैसे परागण (pollination) और जल शुद्धिकरण (water purification) के लिए महत्वपूर्ण है।", "जैव विविधता नए औषधीय यौगिकों (medicinal compounds) और कृषि फसलों (agricultural crops) के विकास के लिए एक महत्वपूर्ण संसाधन है।", "उच्च जैव विविधता वाले क्षेत्र आमतौर पर कम जैव विविधता वाले क्षेत्रों की तुलना में अधिक पारिस्थितिकी तंत्र स्थिरता (ecosystem stability) प्रदर्शित करते हैं।", "जैव विविधता केवल पौधों और जानवरों की प्रजातियों की संख्या को संदर्भित करती है, न कि उनके आनुवंशिक (genetic) या पारिस्थितिकी तंत्र (ecosystem) स्तरों को।"], "answer": "जैव विविधता केवल पौधों और जानवरों की प्रजातियों की संख्या को संदर्भित करती है, न कि उनके आनुवंशिक (genetic) या पारिस्थितिकी तंत्र (ecosystem) स्तरों को।", "explanation": "जैव विविधता (Biodiversity) केवल पौधों और जानवरों की प्रजातियों की संख्या तक सीमित नहीं है। इसमें आनुवंशिक विविधता (genetic diversity), प्रजाति विविधता (species diversity) और पारिस्थितिकी तंत्र विविधता (ecosystem diversity) सहित जीवन के सभी स्तरों पर भिन्नता शामिल है। इसलिए, यह कथन कि यह केवल प्रजातियों की संख्या को संदर्भित करता है, गलत है। अन्य सभी कथन जैव विविधता के महत्व और व्यापक दायरे को सही ढंग से दर्शाते हैं।"}, {"id": 44, "section": "Biology", "question": "एक जलीय पारिस्थितिकी तंत्र (aquatic ecosystem) में, बायोमास (biomass) का पिरामिड (pyramid) अक्सर उल्टा (inverted) होता है। इसका मुख्य कारण क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["प्राथमिक उपभोक्ता (primary consumers) उत्पादकों की तुलना में बहुत छोटे होते हैं।", "जलीय उत्पादकों का जीवनकाल (lifespan) छोटा होता है और वे तेजी से प्रजनन करते हैं, जिससे उनका बायोमास कम होता है।", "द्वितीयक उपभोक्ता (secondary consumers) प्राथमिक उपभोक्ताओं की तुलना में बहुत कम ऊर्जा का उपभोग करते हैं।", "जलीय उत्पादकों (aquatic producers) की प्रजनन दर (reproductive rate) बहुत कम होती है।"], "answer": "जलीय उत्पादकों का जीवनकाल (lifespan) छोटा होता है और वे तेजी से प्रजनन करते हैं, जिससे उनका बायोमास कम होता है।", "explanation": "जलीय पारिस्थितिकी तंत्र में बायोमास का पिरामिड अक्सर उल्टा होता है क्योंकि फाइटोप्लांकटन (phytoplankton) जैसे प्राथमिक उत्पादकों का जीवनकाल बहुत छोटा होता है और वे तेजी से प्रजनन करते हैं। किसी भी समय, उनका कुल बायोमास (standing crop) ज़ोप्लांकटन (zooplankton) जैसे प्राथमिक उपभोक्ताओं की तुलना में कम हो सकता है, जो उनसे बड़े और लंबे समय तक जीवित रहते हैं। हालांकि, फाइटोप्लांकटन की उच्च प्रजनन दर और तेजी से टर्नओवर दर (turnover rate) यह सुनिश्चित करती है कि वे बड़ी संख्या में प्राथमिक उपभोक्ताओं का समर्थन कर सकें, भले ही उनका तात्कालिक बायोमास कम हो। यह ऊर्जा के पिरामिड से भिन्न है, जो हमेशा सीधा होता है।"}, {"id": 45, "section": "Biology", "question": "जैव विविधता (Biodiversity) संरक्षण (conservation) की इन-सीटू (In-situ) और एक्स-सीटू (Ex-situ) विधियों के संबंध में निम्नलिखित में से कौन सा कथन सही है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["वन्यजीव अभयारण्य (wildlife sanctuaries) और राष्ट्रीय उद्यान (national parks) एक्स-सीटू संरक्षण के उदाहरण हैं, जबकि बीज बैंक (seed banks) और चिड़ियाघर (zoos) इन-सीटू संरक्षण के उदाहरण हैं।", "इन-सीटू संरक्षण में प्रजातियों को उनके प्राकृतिक आवास में ही संरक्षित किया जाता है, जबकि एक्स-सीटू संरक्षण में उन्हें मानव निर्मित (man-made) या नियंत्रित वातावरण (controlled environment) में संरक्षित किया जाता है।", "एक्स-सीटू संरक्षण हमेशा इन-सीटू संरक्षण से अधिक प्रभावी होता है क्योंकि यह अधिक प्रजातियों को कवर कर सकता है।", "इन-सीटू संरक्षण में प्रजातियों को उनके प्राकृतिक आवास (natural habitat) से हटाकर संरक्षित किया जाता है, जबकि एक्स
