</style></head><body><div class="wrap"><div class="top"><div class="brandbar"><div class="brand-logo" id="brandLogo">AZAD</div><div><h1 style="margin:0;color:#0f172a;font-size:38px;letter-spacing:.8px;font-weight:900;line-height:1.05">BILASPUR TEST SERIES</h1><h2 style="margin:8px 0 0;font-size:16px;font-weight:800;color:#1d4ed8">By Azad Institute</h2><div style="margin-top:8px;font-size:14px;color:#334155;font-weight:600">🎓 CG Teacher CDP Pedagogy Demo Test</div></div></div></div><div id="app"></div></div><script>const Q=[{"id": 1, "section": "CDP", "question": "वृद्धि (Growth) और विकास (Development) के बीच मुख्य वैचारिक अंतर (conceptual difference) क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["वृद्धि आंतरिक (internal) होती है, जबकि विकास बाहरी (external) होता है।", "वृद्धि जीवनपर्यंत (lifelong) प्रक्रिया है, जबकि विकास एक निश्चित आयु तक होता है।", "वृद्धि मात्रात्मक (quantitative) परिवर्तन है, जबकि विकास गुणात्मक (qualitative) परिवर्तन है।", "वृद्धि को सीधे मापा जा सकता है, जबकि विकास को मापा नहीं जा सकता।"], "answer": "वृद्धि मात्रात्मक (quantitative) परिवर्तन है, जबकि विकास गुणात्मक (qualitative) परिवर्तन है।", "explanation": "वृद्धि (Growth) मुख्य रूप से शारीरिक आकार, वजन और ऊँचाई जैसे मात्रात्मक (quantitative) परिवर्तनों को संदर्भित करती है, जिन्हें मापा जा सकता है। इसके विपरीत, विकास (Development) में गुणात्मक (qualitative) परिवर्तन शामिल होते हैं, जैसे कि कार्यप्रणाली में सुधार, कौशल का अधिग्रहण और परिपक्वता, जो समग्र प्रगति को दर्शाते हैं। विकास एक व्यापक और जीवनपर्यंत प्रक्रिया है, जबकि वृद्धि एक निश्चित आयु तक रुक जाती है।"}, {"id": 2, "section": "CDP", "question": "एक शिक्षक को यह समझना चाहिए कि विकास एक सतत (continuous) प्रक्रिया है। इस सिद्धांत का शैक्षिक निहितार्थ (educational implication) क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["मूल्यांकन (assessment) केवल शैक्षणिक उपलब्धियों (academic achievements) पर आधारित होना चाहिए।", "शिक्षण-अधिगम (teaching-learning) प्रक्रिया को केवल प्रारंभिक बाल्यावस्था (early childhood) पर केंद्रित करना चाहिए।", "पाठ्यक्रम (curriculum) को विभिन्न विकासात्मक चरणों (developmental stages) के अनुरूप लचीला (flexible) और अनुकूलनीय (adaptable) होना चाहिए।", "छात्रों को एक ही गति (pace) से सीखने के लिए प्रोत्साहित करना चाहिए।"], "answer": "पाठ्यक्रम (curriculum) को विभिन्न विकासात्मक चरणों (developmental stages) के अनुरूप लचीला (flexible) और अनुकूलनीय (adaptable) होना चाहिए।", "explanation": "विकास के सतत प्रक्रिया होने का अर्थ है कि बच्चे लगातार सीखते और विकसित होते रहते हैं, और यह प्रक्रिया जीवन भर चलती है। इसलिए, पाठ्यक्रम को बच्चों की बदलती आवश्यकताओं और क्षमताओं के अनुसार लचीला और अनुकूलनीय होना चाहिए, ताकि वे अपनी गति से सीख सकें। केवल प्रारंभिक बाल्यावस्था पर ध्यान केंद्रित करना या सभी छात्रों से एक ही गति की अपेक्षा करना इस सिद्धांत के विपरीत है, क्योंकि विकास की गति व्यक्तिगत भिन्नताओं (individual differences) के कारण अलग-अलग होती है।"}, {"id": 3, "section": "CDP", "question": "परिपक्वता (Maturation) और अधिगम (Learning) के संबंध में निम्नलिखित कथनों का मूल्यांकन करें और सही विकल्प चुनें:\nI. परिपक्वता एक जैविक (biological) प्रक्रिया है जो आनुवंशिक (genetic) कारकों से प्रभावित होती है।\nII. अधिगम अनुभव (experience) और अभ्यास (practice) के माध्यम से व्यवहार में अपेक्षाकृत स्थायी परिवर्तन है।\nIII. परिपक्वता के बिना अधिगम संभव नहीं है।\nIV. अधिगम हमेशा परिपक्वता से पहले होता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल II और IV सही हैं।", "केवल I और II सही हैं।", "सभी कथन सही हैं।", "केवल I, II और III सही हैं।"], "answer": "केवल I, II और III सही हैं।", "explanation": "कथन I और II सही हैं क्योंकि परिपक्वता आनुवंशिक रूप से निर्धारित जैविक विकास है, जबकि अधिगम अनुभव से व्यवहार में परिवर्तन है। कथन III भी सही है क्योंकि किसी भी कौशल को सीखने के लिए एक निश्चित स्तर की शारीरिक और संज्ञानात्मक परिपक्वता आवश्यक है (उदाहरण के लिए, चलने के लिए मांसपेशियों की परिपक्वता)। हालांकि, कथन IV गलत है क्योंकि अधिगम परिपक्वता के बाद ही प्रभावी ढंग से हो सकता है, न कि हमेशा उससे पहले।"}, {"id": 4, "section": "CDP", "question": "पूर्व-बाल्यावस्था (Pre-childhood) की एक विशिष्ट विशेषता (characteristic) के संदर्भ में, निम्नलिखित में से कौन सा कथन एक अपवाद (exception) या गलतफहमी (misconception) को दर्शाता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["इस अवस्था में बच्चे अमूर्त सोच (abstract thinking) और तार्किक तर्क (logical reasoning) में महारत हासिल कर लेते हैं।", "सामाजिक संपर्क (social interaction) बढ़ता है, लेकिन समानांतर खेल (parallel play) अभी भी आम है।", "इस अवस्था में बच्चे 'क्यों' और 'कैसे' जैसे प्रश्न पूछकर अपनी जिज्ञासा (curiosity) प्रदर्शित करते हैं।", "बच्चे अक्सर प्रतीकात्मक खेल (symbolic play) में संलग्न होते हैं, जैसे कि एक छड़ी को घोड़े के रूप में उपयोग करना।"], "answer": "इस अवस्था में बच्चे अमूर्त सोच (abstract thinking) और तार्किक तर्क (logical reasoning) में महारत हासिल कर लेते हैं।", "explanation": "पूर्व-बाल्यावस्था (लगभग 2-6 वर्ष) में बच्चे अपनी जिज्ञासा, प्रतीकात्मक खेल और बढ़ते सामाजिक संपर्क के लिए जाने जाते हैं। हालांकि, अमूर्त सोच (abstract thinking) और तार्किक तर्क (logical reasoning) में महारत हासिल करना इस अवस्था की विशेषता नहीं है; यह आमतौर पर पियाजे (Piaget) के ठोस संक्रियात्मक (concrete operational) और औपचारिक संक्रियात्मक (formal operational) चरणों में विकसित होता है, जो बाद की अवस्थाएँ हैं। पूर्व-बाल्यावस्था में बच्चे अभी भी पूर्व-संक्रियात्मक (pre-operational) चरण में होते हैं, जहाँ उनकी सोच अधिक अहं-केंद्रित (egocentric) और ठोस होती है।"}, {"id": 5, "section": "CDP", "question": "अभिकथन (A): शारीरिक विकास (physical development) और संज्ञानात्मक विकास (cognitive development) एक दूसरे से स्वतंत्र (independent) होते हैं और एक दूसरे को प्रभावित नहीं करते।\nकारण (R): एक बच्चे का शारीरिक स्वास्थ्य (physical health) और पोषण (nutrition) उसकी सीखने की क्षमता (learning ability) और ध्यान केंद्रित करने की शक्ति (concentration power) को सीधे प्रभावित कर सकता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["A और R दोनों सही हैं, लेकिन R, A की सही व्याख्या नहीं है।", "A गलत है, लेकिन R सही है।", "A सही है, लेकिन R गलत है।", "A और R दोनों सही हैं, और R, A की सही व्याख्या है।"], "answer": "A गलत है, लेकिन R सही है।", "explanation": "अभिकथन (A) गलत है क्योंकि शारीरिक विकास और संज्ञानात्मक विकास एक दूसरे से स्वतंत्र नहीं होते, बल्कि वे आपस में जुड़े (interconnected) और एक दूसरे को प्रभावित करते हैं। उदाहरण के लिए, अच्छा शारीरिक स्वास्थ्य और पोषण (जैसा कि कारण R में बताया गया है) बच्चे की संज्ञानात्मक क्षमताओं, जैसे सीखने और ध्यान केंद्रित करने की शक्ति के लिए महत्वपूर्ण है। इसलिए, कारण (R) सही है और यह दर्शाता है कि शारीरिक और संज्ञानात्मक विकास परस्पर संबंधित हैं।"}, {"id": 6, "section": "CDP", "question": "निम्नलिखित विकासात्मक अवस्थाओं (Developmental Stages) को उनकी प्रमुख विशेषताओं (Key Characteristics) के साथ सुमेलित (match) करें:\nसूची-I\nA: शैशवावस्था (Infancy)\nB: प्रारंभिक बाल्यावस्था (Early Childhood)\nC: मध्य बाल्यावस्था (Middle Childhood)\nD: किशोरावस्था (Adolescence)\nसूची-II\n1. अमूर्त सोच (Abstract thinking) और पहचान निर्माण (identity formation)\n2. आत्म-केंद्रित (Egocentric) विचार और प्रतीकात्मक खेल (symbolic play)\n3. संवेदी-गामक (Sensorimotor) अन्वेषण और वस्तु स्थायित्व (object permanence)\n4. तार्किक सोच (Logical thinking) और सहकर्मी समूह (peer group) का महत्व\nसही मिलान वाला विकल्प चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["A-3, B-2, C-4, D-1", "A-4, B-2, C-3, D-1", "A-2, B-3, C-1, D-4", "A-3, B-1, C-4, D-2"], "answer": "A-3, B-2, C-4, D-1", "explanation": "सही मिलान इस प्रकार है: शैशवावस्था (Infancy) संवेदी-गामक अन्वेषण (sensorimotor exploration) और वस्तु स्थायित्व (object permanence) के विकास से जुड़ी है (A-3)। प्रारंभिक बाल्यावस्था (Early Childhood) में बच्चे आत्म-केंद्रित विचार (egocentric thought) और प्रतीकात्मक खेल (symbolic play) प्रदर्शित करते हैं (B-2)। मध्य बाल्यावस्था (Middle Childhood) तार्किक सोच (logical thinking) के विकास और सहकर्मी समूह (peer group) के बढ़ते महत्व की विशेषता है (C-4)। किशोरावस्था (Adolescence) अमूर्त सोच (abstract thinking) और पहचान निर्माण (identity formation) की अवधि है (D-1)।"}, {"id": 7, "section": "CDP", "question": "बाल विकास के 'व्यक्तिगत भिन्नताओं का सिद्धांत' (Principle of Individual Differences) का शिक्षण में सबसे उपयुक्त उपयोग (most appropriate application) क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल प्रतिभाशाली छात्रों (gifted students) पर ध्यान केंद्रित करना।", "प्रत्येक छात्र की सीखने की गति (learning pace) और शैली (style) के अनुसार शिक्षण रणनीतियों (teaching strategies) को अनुकूलित (adapt) करना।", "सभी छात्रों के लिए एक समान शिक्षण पद्धति (uniform teaching method) का पालन करना।", "छात्रों के बीच प्रतिस्पर्धा (competition) को बढ़ावा देना।"], "answer": "प्रत्येक छात्र की सीखने की गति (learning pace) और शैली (style) के अनुसार शिक्षण रणनीतियों (teaching strategies) को अनुकूलित (adapt) करना।", "explanation": "व्यक्तिगत भिन्नताओं का सिद्धांत बताता है कि प्रत्येक बच्चा अद्वितीय होता है और उसकी सीखने की गति, क्षमताएं और रुचियां अलग-अलग होती हैं। इसलिए, एक प्रभावी शिक्षक को सभी छात्रों के लिए एक समान पद्धति का पालन करने के बजाय, प्रत्येक छात्र की व्यक्तिगत आवश्यकताओं के अनुसार अपनी शिक्षण रणनीतियों को अनुकूलित करना चाहिए। यह समावेशी शिक्षा (inclusive education) को बढ़ावा देता है और सभी छात्रों को उनकी पूरी क्षमता तक पहुंचने में मदद करता है।"}, {"id": 8, "section": "CDP", "question": "एक प्राथमिक विद्यालय (primary school) के शिक्षक को 7-8 वर्ष के बच्चों को पढ़ाते समय निम्नलिखित में से किस शिक्षण रणनीति (teaching strategy) से बचना चाहिए, क्योंकि यह उनकी विकासात्मक अवस्था (developmental stage) के लिए अनुपयुक्त (inappropriate) हो सकती है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["कहानियों और खेल-आधारित गतिविधियों (story and play-based activities) का उपयोग करना।", "सहकर्मी समूह (peer group) में सीखने और सहयोग (collaboration) को प्रोत्साहित करना।", "मूर्त सामग्री (concrete materials) और दृश्य सहायता (visual aids) का भरपूर उपयोग करना।", "जटिल अमूर्त अवधारणाओं (complex abstract concepts) को बिना किसी ठोस संदर्भ (concrete reference) के पढ़ाना।"], "answer": "जटिल अमूर्त अवधारणाओं (complex abstract concepts) को बिना किसी ठोस संदर्भ (concrete reference) के पढ़ाना।", "explanation": "7-8 वर्ष के बच्चे आमतौर पर पियाजे (Piaget) के ठोस संक्रियात्मक (concrete operational) चरण में होते हैं। इस अवस्था में वे मूर्त (concrete) अनुभवों और वस्तुओं के माध्यम से सबसे अच्छा सीखते हैं। जटिल अमूर्त अवधारणाओं को बिना किसी ठोस संदर्भ या उदाहरण के पढ़ाना उनकी संज्ञानात्मक क्षमताओं से परे हो सकता है और उन्हें सीखने में कठिनाई हो सकती है। कहानियाँ, खेल, मूर्त सामग्री और सहकर्मी सहयोग इस अवस्था के बच्चों के लिए अत्यधिक प्रभावी शिक्षण रणनीतियाँ हैं।"}, {"id": 9, "section": "CDP", "question": "व्यवहारवाद (Behaviourism) के अनुसार, अधिगम (learning) मुख्य रूप से किस प्रक्रिया का परिणाम है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["आंतरिक मानसिक प्रक्रियाओं का अन्वेषण (exploration of internal mental processes)", "उद्दीपन-अनुक्रिया संबंध (stimulus-response association) का निर्माण", "ज्ञान का सक्रिय निर्माण (active construction of knowledge) और समझ", "सामाजिक अंतःक्रिया (social interaction) और सांस्कृतिक संदर्भ (cultural context)"], "answer": "उद्दीपन-अनुक्रिया संबंध (stimulus-response association) का निर्माण", "explanation": "व्यवहारवाद (Behaviourism) इस बात पर जोर देता है कि अधिगम मुख्य रूप से उद्दीपन (stimulus) और अनुक्रिया (response) के बीच संबंध स्थापित करने से होता है। इसमें बाहरी, अवलोकन योग्य व्यवहार पर ध्यान केंद्रित किया जाता है, न कि आंतरिक मानसिक प्रक्रियाओं पर। अन्य विकल्प संज्ञानात्मकता (cognitivism) और रचनावाद (constructivism) से संबंधित हैं।"}, {"id": 10, "section": "CDP", "question": "एक शिक्षक कक्षा में छात्रों को समस्या-समाधान (problem-solving) के लिए विभिन्न रणनीतियों (strategies) का उपयोग करने के लिए प्रोत्साहित करता है और उन्हें अपनी सोच प्रक्रियाओं (thinking processes) पर विचार करने का अवसर देता है। यह दृष्टिकोण संज्ञानात्मक विकास (cognitive development) के किस सिद्धांत के अनुरूप है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["छात्रों को निष्क्रिय रूप से जानकारी प्राप्त करने के लिए प्रोत्साहित करना", "सामाजिक अवलोकन (social observation) और अनुकरण (imitation) पर जोर देना", "छात्रों को अपनी समझ का सक्रिय रूप से निर्माण (actively construct their understanding) करने में मदद करना", "पुरस्कार और दंड (rewards and punishments) के माध्यम से व्यवहार को आकार देना"], "answer": "छात्रों को अपनी समझ का सक्रिय रूप से निर्माण (actively construct their understanding) करने में मदद करना", "explanation": "संज्ञानात्मक विकास (cognitive development) के सिद्धांत इस बात पर जोर देते हैं कि छात्र अपनी समझ का सक्रिय रूप से निर्माण करते हैं। समस्या-समाधान रणनीतियों का उपयोग करने और अपनी सोच प्रक्रियाओं पर विचार करने का अवसर देना छात्रों को अपनी संज्ञानात्मक संरचनाओं (cognitive structures) को विकसित करने में मदद करता है। यह दृष्टिकोण छात्रों को ज्ञान का निष्क्रिय प्राप्तकर्ता मानने के बजाय सक्रिय शिक्षार्थी मानता है।"}, {"id": 11, "section": "CDP", "question": "रचनात्मकता (Constructivism) के सिद्धांत के बारे में निम्नलिखित में से कौन सा कथन सत्य है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["शिक्षार्थी अपने अनुभवों (experiences) और पूर्व ज्ञान (prior knowledge) के आधार पर सक्रिय रूप से ज्ञान का निर्माण करते हैं।", "अधिगम केवल बाहरी पुरस्कारों (external rewards) और दंड (punishments) के माध्यम से होता है।", "ज्ञान को शिक्षक द्वारा सीधे छात्रों में स्थानांतरित (transferred) किया जाता है।", "शिक्षार्थी का मन एक खाली स्लेट (blank slate) के समान होता है जिसे भरा जाना है।"], "answer": "शिक्षार्थी अपने अनुभवों (experiences) और पूर्व ज्ञान (prior knowledge) के आधार पर सक्रिय रूप से ज्ञान का निर्माण करते हैं।", "explanation": "रचनात्मकता (Constructivism) का सिद्धांत यह मानता है कि शिक्षार्थी निष्क्रिय रूप से जानकारी प्राप्त नहीं करते, बल्कि अपने अनुभवों और पूर्व ज्ञान के आधार पर सक्रिय रूप से ज्ञान का निर्माण करते हैं। यह सिद्धांत सीखने की प्रक्रिया में शिक्षार्थी की सक्रिय भूमिका पर जोर देता है। अन्य विकल्प क्रमशः पारंपरिक शिक्षण, व्यवहारवाद और खाली स्लेट अवधारणा (tabula rasa) से संबंधित हैं।"}, {"id": 12, "section": "CDP", "question": "एक छात्र ने गणित में बीजगणित (algebra) के नियमों को अच्छी तरह से सीख लिया है। हालांकि, जब उसे भौतिकी (physics) में उन्हीं बीजगणितीय अवधारणाओं (algebraic concepts) का उपयोग करके समस्याओं को हल करने के लिए कहा जाता है, तो उसे कठिनाई होती है। अधिगम अंतरण (Learning Transfer) के संदर्भ में, यह किस प्रकार के अंतरण की कमी का उदाहरण है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["निकट अंतरण (near transfer) से दूर अंतरण (far transfer) में विफलता", "नकारात्मक अंतरण (negative transfer)", "सकारात्मक अंतरण (positive transfer)", "शून्य अंतरण (zero transfer)"], "answer": "निकट अंतरण (near transfer) से दूर अंतरण (far transfer) में विफलता", "explanation": "यह स्थिति निकट अंतरण (गणित में बीजगणित का उपयोग) से दूर अंतरण (भौतिकी में बीजगणित का उपयोग) में विफलता का उदाहरण है। छात्र ने एक संदर्भ में कौशल सीख लिया है, लेकिन उसे दूसरे, अधिक भिन्न संदर्भ में लागू करने में कठिनाई हो रही है। सकारात्मक अंतरण तब होता है जब एक कौशल दूसरे में मदद करता है, नकारात्मक अंतरण तब होता है जब यह बाधा डालता है, और शून्य अंतरण तब होता है जब कोई प्रभाव नहीं पड़ता।"}, {"id": 13, "section": "CDP", "question": "अभिकथन (A): व्यवहारवाद (Behaviourism) अधिगम को बाहरी, अवलोकन योग्य व्यवहार (observable behavior) में परिवर्तन के रूप में देखता है।\nकारण (R): संज्ञानवाद (Cognitivism) अधिगम को आंतरिक मानसिक प्रक्रियाओं (internal mental processes) जैसे स्मृति (memory), धारणा (perception) और समस्या-समाधान (problem-solving) में परिवर्तन के रूप में देखता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं है।", "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "A सत्य है, लेकिन R असत्य है।", "A असत्य है, लेकिन R सत्य है।"], "answer": "A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं है।", "explanation": "अभिकथन (A) और कारण (R) दोनों व्यक्तिगत रूप से सत्य कथन हैं। व्यवहारवाद वास्तव में अधिगम को बाहरी व्यवहार में परिवर्तन के रूप में परिभाषित करता है, जबकि संज्ञानवाद आंतरिक मानसिक प्रक्रियाओं पर केंद्रित है। हालांकि, कारण (R) अभिकथन (A) की व्याख्या नहीं करता है; बल्कि, यह एक अलग अधिगम सिद्धांत (संज्ञानवाद) का वर्णन करके व्यवहारवाद के विपरीत एक तुलना प्रस्तुत करता है।"}, {"id": 14, "section": "CDP", "question": "निम्नलिखित में से कौन से कथन अधिगम सिद्धांतों (Learning Theories) के पीछे के तर्क को सही ढंग से दर्शाते हैं?\nJ: व्यवहारवाद (Behaviourism) मानता है कि अधिगम पर्यावरण (environment) के साथ अंतःक्रिया (interaction) के माध्यम से होता है, जिसमें उद्दीपन-अनुक्रिया संबंध बनते हैं।\nK: रचनात्मकता (Constructivism) इस विचार पर आधारित है कि शिक्षार्थी अपने अनुभवों और पूर्व ज्ञान के आधार पर सक्रिय रूप से ज्ञान का निर्माण करते हैं।\nL: संज्ञानवाद (Cognitivism) अधिगम को सूचना प्रसंस्करण (information processing) और मानसिक संरचनाओं (mental structures) के विकास के रूप में देखता है।\nM: अधिगम अंतरण (Learning Transfer) केवल तभी होता है जब दो अधिगम कार्य (learning tasks) बिल्कुल समान हों।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और K", "J, K, L और M", "J, K और L", "केवल K और L"], "answer": "J, K और L", "explanation": "कथन J, K और L तीनों अधिगम सिद्धांतों (व्यवहारवाद, रचनात्मकता और संज्ञानवाद) के मूल तर्कों को सही ढंग से दर्शाते हैं। व्यवहारवाद उद्दीपन-अनुक्रिया पर, रचनात्मकता ज्ञान के सक्रिय निर्माण पर, और संज्ञानवाद सूचना प्रसंस्करण पर केंद्रित है। कथन M गलत है क्योंकि अधिगम अंतरण समान और भिन्न दोनों प्रकार के कार्यों में हो सकता है, और यह केवल 'बिल्कुल समान' होने पर ही नहीं होता।"}, {"id": 15, "section": "CDP", "question": "सूची-I में दिए गए अधिगम सिद्धांत के प्रतिपादकों (proponents) को सूची-II में दिए गए उनके संबंधित मुख्य अवधारणाओं (key concepts) से सुमेलित (match) कीजिए:\nसूची-I\nJ: बी.एफ. स्किनर (B.F. Skinner)\nK: जीन पियाजे (Jean Piaget)\nL: लेव वायगोत्स्की (Lev Vygotsky)\nM: अल्बर्ट बंडूरा (Albert Bandura)\nसूची-II\n1. सामाजिक अधिगम सिद्धांत (Social Learning Theory)\n2. क्रिया प्रसूत अनुबंधन (Operant Conditioning)\n3. संज्ञानात्मक विकास के चरण (Stages of Cognitive Development)\n4. समीपस्थ विकास का क्षेत्र (Zone of Proximal Development − ZPD)", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-3, K-1, L-2, M-4", "J-2, K-4, L-3, M-1", "J-1, K-2, L-3, M-4", "J-2, K-3, L-4, M-1"], "answer": "J-2, K-3, L-4, M-1", "explanation": "सही सुमेलन इस प्रकार है: बी.एफ. स्किनर क्रिया प्रसूत अनुबंधन (Operant Conditioning) से संबंधित हैं, जो व्यवहारवाद का एक प्रमुख हिस्सा है। जीन पियाजे संज्ञानात्मक विकास के चरणों (Stages of Cognitive Development) के लिए जाने जाते हैं। लेव वायगोत्स्की ने समीपस्थ विकास का क्षेत्र (ZPD) की अवधारणा दी, जो सामाजिक-सांस्कृतिक सिद्धांत का हिस्सा है। अल्बर्ट बंडूरा सामाजिक अधिगम सिद्धांत (Social Learning Theory) के प्रतिपादक हैं।"}, {"id": 16, "section": "CDP", "question": "शिक्षण में रचनात्मकता (Constructivism in Teaching) के प्रभावी उपयोग के लिए एक शिक्षक को क्या करना चाहिए?", "brand": "bilaspurtestseries.com 9669946966", "options": ["छात्रों को केवल तथ्यों को याद करने (memorize facts) के लिए प्रोत्साहित करना।", "छात्रों को सक्रिय रूप से अन्वेषण (explore), प्रयोग (experiment) और समस्याओं को हल करने (solve problems) के अवसर प्रदान करना।", "कक्षा में सख्त अनुशासन (strict discipline) बनाए रखना और सभी गतिविधियों को नियंत्रित करना।", "शिक्षण सामग्री (teaching material) को सीधे व्याख्यान (lectures) के माध्यम से प्रस्तुत करना।"], "answer": "छात्रों को सक्रिय रूप से अन्वेषण (explore), प्रयोग (experiment) और समस्याओं को हल करने (solve problems) के अवसर प्रदान करना।", "explanation": "रचनात्मकता (Constructivism) के सिद्धांत के अनुसार, छात्र अपने ज्ञान का निर्माण सक्रिय रूप से करते हैं। इसलिए, एक शिक्षक को छात्रों को अन्वेषण, प्रयोग और समस्या-समाधान के अवसर प्रदान करने चाहिए ताकि वे अपने अनुभवों के माध्यम से सीख सकें। अन्य विकल्प रचनात्मकता के सिद्धांतों के विपरीत हैं, जो निष्क्रिय अधिगम या शिक्षक-केंद्रित दृष्टिकोण पर जोर देते हैं।"}, {"id": 17, "section": "CDP", "question": "शिक्षण-अधिगम प्रक्रिया (Teaching-Learning Process) में व्यवहारवाद (Behaviourism) के उपयोग की एक प्रमुख सीमा (limitation) क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह छात्रों को आंतरिक प्रेरणा (intrinsic motivation) विकसित करने में मदद करता है।", "यह अधिगम को बाहरी व्यवहार परिवर्तनों (external behavioral changes) से परे देखता है।", "यह व्यक्तिगत सीखने की शैलियों (individual learning styles) और जरूरतों को समायोजित करता है।", "यह जटिल संज्ञानात्मक प्रक्रियाओं (complex cognitive processes) जैसे रचनात्मक सोच (creative thinking) और समस्या-समाधान की उपेक्षा करता है।"], "answer": "यह जटिल संज्ञानात्मक प्रक्रियाओं (complex cognitive processes) जैसे रचनात्मक सोच (creative thinking) और समस्या-समाधान की उपेक्षा करता है।", "explanation": "व्यवहारवाद मुख्य रूप से अवलोकन योग्य व्यवहार और उद्दीपन-अनुक्रिया संबंधों पर केंद्रित है। इसकी एक प्रमुख सीमा यह है कि यह आंतरिक मानसिक प्रक्रियाओं, जैसे रचनात्मक सोच, आलोचनात्मक सोच (critical thinking) और समस्या-समाधान की उपेक्षा करता है, जो आधुनिक शिक्षा में महत्वपूर्ण हैं। यह आंतरिक प्रेरणा के बजाय बाहरी पुरस्कारों पर अधिक निर्भर करता है और व्यक्तिगत सीखने की शैलियों को कम महत्व देता है।"}, {"id": 18, "section": "CDP", "question": "समावेशी शिक्षा (Inclusive Education) का मूल उद्देश्य क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["विशेष आवश्यकता वाले बच्चों (Children With Special Needs − CWSN) को अलग विशेष विद्यालयों में पढ़ाना।", "केवल प्रतिभाशाली बच्चों को मुख्यधारा की शिक्षा में शामिल करना।", "सभी बच्चों को, उनकी क्षमताओं या अक्षमताओं की परवाह किए बिना, एक ही सामान्य कक्षा में शिक्षा प्रदान करना।", "विकलांग बच्चों को केवल व्यावसायिक प्रशिक्षण (vocational training) देना।"], "answer": "सभी बच्चों को, उनकी क्षमताओं या अक्षमताओं की परवाह किए बिना, एक ही सामान्य कक्षा में शिक्षा प्रदान करना।", "explanation": "समावेशी शिक्षा का मूल उद्देश्य यह सुनिश्चित करना है कि सभी बच्चे, चाहे उनकी शारीरिक, बौद्धिक, सामाजिक, भावनात्मक, भाषाई या अन्य स्थितियाँ कुछ भी हों, एक साथ सीखें। यह विशेष विद्यालयों के बजाय सामान्य शिक्षा प्रणाली में सभी को शामिल करने पर जोर देती है। अन्य विकल्प समावेशी शिक्षा के सिद्धांतों के विपरीत हैं, क्योंकि वे अलगाव या केवल विशिष्ट समूहों पर ध्यान केंद्रित करते हैं।"}, {"id": 19, "section": "CDP", "question": "एक समावेशी कक्षा में, श्रवण बाधित (hearing impaired) छात्र के लिए कौन सा अनुकूलन (adaptation) सबसे प्रभावी होगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["शिक्षक द्वारा दृश्य सामग्री (visual aids) का अधिक उपयोग करना और छात्र के पास बैठकर पढ़ाना।", "छात्र को एक विशेष विद्यालय में स्थानांतरित करने की सलाह देना।", "छात्र को कक्षा के सबसे पीछे बैठाना ताकि वह सभी को देख सके।", "शिक्षक द्वारा केवल मौखिक निर्देशों का उपयोग करना।"], "answer": "शिक्षक द्वारा दृश्य सामग्री (visual aids) का अधिक उपयोग करना और छात्र के पास बैठकर पढ़ाना।", "explanation": "श्रवण बाधित छात्रों के लिए, दृश्य सामग्री (visual aids) और शिक्षक का उनके करीब होना बहुत महत्वपूर्ण है ताकि वे होंठ पढ़ सकें (lip-read) और संकेतों को समझ सकें। कक्षा के पीछे बैठाने से उन्हें देखने और सुनने में और भी कठिनाई होगी। केवल मौखिक निर्देश उनके लिए अनुपयोगी होंगे, और विशेष विद्यालय में स्थानांतरण समावेशी शिक्षा के सिद्धांत के खिलाफ है।"}, {"id": 20, "section": "CDP", "question": "समावेशी कक्षा में प्रभावी समर्थन रणनीतियों (support strategies) के संबंध में निम्नलिखित कथनों पर विचार करें:\nI. व्यक्तिगत शैक्षिक योजनाएँ (Individualized Education Plans − IEPs) केवल गंभीर विकलांगता वाले छात्रों के लिए आवश्यक हैं।\nII. सहकर्मी शिक्षण (Peer tutoring) और सहयोगी अधिगम (collaborative learning) सभी छात्रों के लिए फायदेमंद हो सकते हैं।\nIII. लचीला पाठ्यक्रम (flexible curriculum) और मूल्यांकन (assessment) पद्धतियाँ समावेशी शिक्षा का एक अभिन्न अंग हैं", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल I और II", "केवल II और III", "I, II और III सभी", "केवल I"], "answer": "केवल II और III", "explanation": "कथन I गलत है क्योंकि व्यक्तिगत शैक्षिक योजनाएँ (IEPs) विभिन्न प्रकार की विशेष आवश्यकताओं वाले छात्रों के लिए डिज़ाइन की जाती हैं, न कि केवल गंभीर विकलांगता वाले छात्रों के लिए। कथन II और III दोनों सही हैं। सहकर्मी शिक्षण और सहयोगी अधिगम सभी छात्रों को लाभ पहुँचाते हैं, और लचीला पाठ्यक्रम व मूल्यांकन समावेशी शिक्षा के मूल सिद्धांत हैं जो विभिन्न सीखने की शैलियों और क्षमताओं को समायोजित करते हैं।"}, {"id": 21, "section": "CDP", "question": "समावेशी शिक्षा (Inclusive Education) और विशेष आवश्यकता वाले बच्चों (Children With Special Needs − CWSN) के संदर्भ में निम्नलिखित कथनों पर विचार करें:\nJ: समावेशी शिक्षा का मुख्य उद्देश्य सभी छात्रों को, उनकी क्षमताओं और पृष्ठभूमि की परवाह किए बिना, एक समान पाठ्यक्रम (uniform curriculum) और शिक्षण विधियों (teaching methods) के माध्यम से शिक्षा प्रदान करना है।\nK: डिस्ग्राफिया (Dysgraphia) से पीड़ित छात्रों के लिए, कीबोर्ड (keyboard) या स्पीच-टू-टेक्स्ट (speech-to-text) सॉफ्टवेयर का उपयोग लेखन कार्य में एक प्रभावी अनुकूलन (adaptation) हो सकता है।\nL: एक शिक्षक को कक्षा में केवल उन छात्रों पर ध्यान केंद्रित करना चाहिए जिनकी विकलांगता स्पष्ट रूप से दिखाई देती है, क्योंकि अदृश्य विकलांगता (invisible disabilities) वाले छात्रों को विशेष समर्थन की आवश्यकता नहीं होती।\nM: सहकर्मी शिक्षण (Peer tutoring) और सहयोगी अधिगम (collaborative learning) रणनीतियाँ समावेशी कक्षाओं में सामाजिक कौशल (social skills) और अकादमिक प्रदर्शन (academic performance) दोनों को बढ़ावा देने में सहायक होती हैं", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल K और M", "केवल J और L", "केवल J, K और M", "केवल L और M"], "answer": "केवल K और M", "explanation": "कथन J गलत है क्योंकि समावेशी शिक्षा का उद्देश्य सभी छात्रों को एक समान पाठ्यक्रम और शिक्षण विधियों के माध्यम से शिक्षा प्रदान करना नहीं है, बल्कि उनकी विविध आवश्यकताओं के अनुसार लचीलापन (flexibility) और अनुकूलन (adaptation) प्रदान करना है। कथन L गलत है क्योंकि अदृश्य विकलांगता (जैसे ADHD, डिस्लेक्सिया) वाले छात्रों को भी विशेष समर्थन और अनुकूलन की आवश्यकता होती है। कथन K सही है क्योंकि डिस्ग्राफिया लेखन संबंधी कठिनाई है, और कीबोर्ड या स्पीच-टू-टेक्स्ट जैसे उपकरण लेखन प्रक्रिया को सुगम बना सकते हैं। कथन M भी सही है क्योंकि सहकर्मी शिक्षण और सहयोगी अधिगम समावेशी कक्षाओं में छात्रों के बीच सामाजिक संपर्क और सीखने को बढ़ावा देते हैं।"}, {"id": 22, "section": "CDP", "question": "अभिकथन (A): समावेशी शिक्षा सभी छात्रों के लिए समान अवसर (equal opportunities) सुनिश्चित करती है।\nकारण (R): समावेशी शिक्षा का सिद्धांत विविधता का सम्मान (respect for diversity) करता है और व्यक्तिगत आवश्यकताओं के अनुसार अनुकूलन (adaptations) को बढ़ावा देता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["A सत्य है, लेकिन R असत्य है।", "A असत्य है, लेकिन R सत्य है।", "A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं है।", "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।"], "answer": "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "explanation": "अभिकथन (A) सत्य है क्योंकि समावेशी शिक्षा का लक्ष्य सभी छात्रों को उनकी पृष्ठभूमि या क्षमताओं की परवाह किए बिना समान शैक्षिक अवसर प्रदान करना है। कारण (R) भी सत्य है क्योंकि समावेशी शिक्षा विविधता का सम्मान करती है और प्रत्येक छात्र की अनूठी आवश्यकताओं को पूरा करने के लिए अनुकूलन को प्रोत्साहित करती है। वास्तव में, R, A की सही व्याख्या है क्योंकि विविधता का सम्मान और व्यक्तिगत अनुकूलन ही वह तरीका है जिससे समावेशी शिक्षा समान अवसर सुनिश्चित करती है।"}, {"id": 23, "section": "CDP", "question": "निम्नलिखित विकलांगताओं (disabilities) को उनकी विशिष्ट विशेषताओं (specific characteristics) के साथ सुमेलित (match) करें: विकलांगता\nसूची-I\nJ: डिस्केल्कुलिया (Dyscalculia)\nK: डिस्ग्राफिया (Dysgraphia)\nL: अटेंशन डेफिसिट हाइपरएक्टिविटी डिसऑर्डर (ADHD)\nM: एस्पर्जर सिंड्रोम (Asperger's Syndrome) विशेषताएँ\nसूची-II\n1. गणितीय अवधारणाओं (mathematical concepts) को समझने में कठिनाई।\n2. सामाजिक संपर्क और गैर-मौखिक संचार (non-verbal communication) में महत्वपूर्ण चुनौतियाँ, लेकिन भाषा विकास सामान्य।\n3. लिखने और ठीक मोटर कौशल (fine motor skills) में कठिनाई।\n4. ध्यान केंद्रित करने (focusing), आवेग नियंत्रण (impulse control) और अतिसक्रियता (hyperactivity) में समस्याएँ।", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-1, K-4, L-2, M-3", "J-2, K-1, L-3, M-4", "J-3, K-2, L-1, M-4", "J-1, K-3, L-4, M-2"], "answer": "J-1, K-3, L-4, M-2", "explanation": "सही मिलान इस प्रकार है: डिस्केल्कुलिया (Dyscalculia) गणितीय अवधारणाओं को समझने में कठिनाई से संबंधित है (J-1)। डिस्ग्राफिया (Dysgraphia) लिखने और ठीक मोटर कौशल में कठिनाई से जुड़ा है (K-3)। ADHD ध्यान केंद्रित करने, आवेग नियंत्रण और अतिसक्रियता में समस्याओं की विशेषता है (L-4)। एस्पर्जर सिंड्रोम (जो अब ऑटिज्म स्पेक्ट्रम डिसऑर्डर का हिस्सा है) सामाजिक संपर्क और गैर-मौखिक संचार में चुनौतियों की विशेषता है, जबकि भाषा विकास अक्सर सामान्य होता है (M-2)।"}, {"id": 24, "section": "CDP", "question": "समावेशी शिक्षा के विकास में निम्नलिखित घटनाओं को उनके कालानुक्रमिक (chronological) क्रम में व्यवस्थित करें:\nJ: Salamanca Statement and Framework for Action on Special Needs Education (स्पेन, 1994)\nK: Persons with Disabilities (Equal Opportunities, Protection of Rights and Full Participation) Act (भारत, 1995)\nL: Education for All (EFA) World Conference (थाईलैंड, 1990)\nM: Rights of Persons with Disabilities Act (भारत, 2016)", "brand": "bilaspurtestseries.com 9669946966", "options": ["L, J, K, M", "J, L, K, M", "K, J, L, M", "L, K, J, M"], "answer": "L, J, K, M", "explanation": "इन घटनाओं का सही कालानुक्रमिक क्रम इस प्रकार है: सबसे पहले, 1990 में Education for All (EFA) World Conference (L) हुई। इसके बाद, 1994 में Salamanca Statement and Framework for Action on Special Needs Education (J) आया। फिर, भारत में 1995 में Persons with Disabilities Act (K) लागू हुआ। अंत में, 2016 में Rights of Persons with Disabilities Act (M) आया, जिसने 1995 के अधिनियम को प्रतिस्थापित किया। इसलिए, सही क्रम L, J, K, M है।"}, {"id": 25, "section": "CDP", "question": "एक समावेशी कक्षा में एक प्रभावी शिक्षक की भूमिका में क्या शामिल नहीं है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["सभी छात्रों के लिए एक समान शिक्षण पद्धति (uniform teaching method) का सख्ती से पालन करना।", "माता-पिता और अन्य पेशेवरों (professionals) के साथ सक्रिय रूप से सहयोग करना।", "छात्रों की व्यक्तिगत सीखने की शैलियों (learning styles) और आवश्यकताओं को समझना।", "सहकर्मी सहयोग (peer collaboration) और समूह गतिविधियों (group activities) को बढ़ावा देना।"], "answer": "सभी छात्रों के लिए एक समान शिक्षण पद्धति (uniform teaching method) का सख्ती से पालन करना।", "explanation": "एक समावेशी कक्षा में, छात्रों की विविधता को देखते हुए, एक समान शिक्षण पद्धति का सख्ती से पालन करना प्रभावी नहीं होता है। इसके बजाय, शिक्षक को लचीला होना चाहिए और वि ीखने की अपेक्षा की जाती है, और यही अधिगम प्रतिफल परिभाषित करते हैं। कारण (R) भी सही है क्योंकि स्पष्ट अधिगम प्रतिफल शिक्षकों को छात्रों की प्रगति को मापने और उनकी सीखने की कमियों की पहचान करने के लिए एक बेंचमार्क (benchmark) प्रदान करते हैं। इस प्रकार, कारण (R) सीधे तौर पर बताता है कि क्यों स्पष्ट अधिगम प्रतिफल आकलन को प्रभावी बनाने के लिए महत्वपूर्ण हैं, इसलिए R, A की सही व्याख्या है।"}, {"id": 32, "section": "CDP", "question": "निम्नलिखित आकलन उपकरणों (Assessment Tools) को उनकी विशेषताओं के साथ सुमेलित (match) कीजिए:\nसूची-I\nA: पोर्टफोलियो (Portfolio)\nB: रुब्रिक्स (Rubrics)\nC: चेकलिस्ट (Checklist)\nD: उपाख्यानात्मक रिकॉर्ड (Anecdotal Record)\nसूची-II\n1. छात्रों के प्रदर्शन के विभिन्न स्तरों का विस्तृत वर्णन प्रदान करता है।\n2. किसी विशेष कौशल या व्यवहार की उपस्थिति या अनुपस्थिति को इंगित करता है।\n3. समय के साथ छात्र के काम का व्यवस्थित संग्रह।\n4. छात्र के व्यवहार या घटना का संक्षिप्त, तथ्यात्मक विवरण।\nसही विकल्प का चयन कीजिए:", "brand": "bilaspurtestseries.com 9669946966", "options": ["A-3, B-2, C-1, D-4", "A-4, B-1, C-2, D-3", "A-1, B-3, C-4, D-2", "A-3, B-1, C-2, D-4"], "answer": "A-3, B-1, C-2, D-4", "explanation": "सही मिलान इस प्रकार है: (A) पोर्टफोलियो (Portfolio) छात्रों के काम का एक व्यवस्थित संग्रह होता है जो समय के साथ उनकी प्रगति और उपलब्धियों को दर्शाता है, इसलिए A-3। (B) रुब्रिक्स (Rubrics) मूल्यांकन मानदंड का एक सेट है जो छात्रों के प्रदर्शन के विभिन्न स्तरों (जैसे उत्कृष्ट, अच्छा, औसत) का विस्तृत वर्णन प्रदान करता है, इसलिए B-1। (C) चेकलिस्ट (Checklist) एक उपकरण है जिसका उपयोग किसी विशेष कौशल या व्यवहार की उपस्थिति या अनुपस्थिति को रिकॉर्ड करने के लिए किया जाता है, इसलिए C-2। (D) उपाख्यानात्मक रिकॉर्ड (Anecdotal Record) छात्र के व्यवहार या किसी घटना का एक संक्षिप्त, तथ्यात्मक और वस्तुनिष्ठ विवरण होता है, इसलिए D-4।"}, {"id": 33, "section": "CDP", "question": "अधिगम प्रतिफल (Learning Outcomes) को प्रभावी ढंग से प्राप्त करने की प्रक्रिया का सही कालानुक्रमिक क्रम क्या है?\nJ: अधिगम प्रतिफलों को स्पष्ट रूप से परिभाषित करना।\nK: शिक्षण-अधिगम गतिविधियों को अधिगम प्रतिफलों के साथ संरेखित (align) करना।\nL: छात्रों के अधिगम का आकलन (assess) करना कि क्या प्रतिफल प्राप्त हुए हैं।\nM: आकलन परिणामों के आधार पर शिक्षण रणनीतियों में सुधार करना।", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, L, M", "L, J, K, M", "K, J, L, M", "J, L, K, M"], "answer": "J, K, L, M", "explanation": "अधिगम प्रतिफल प्राप्त करने की प्रक्रिया एक चक्रीय और तार्किक क्रम का पालन करती है। सबसे पहले, यह आवश्यक है कि अधिगम प्रतिफलों को स्पष्ट रूप से परिभाषित (J) किया जाए ताकि सभी को पता हो कि क्या हासिल करना है। इसके बाद, शिक्षण-अधिगम गतिविधियों को इन परिभाषित प्रतिफलों के साथ संरेखित (K) किया जाता है ताकि वे सीधे लक्ष्यों की ओर ले जाएं। फिर, छात्रों के अधिगम का आकलन (L) किया जाता है यह निर्धारित करने के लिए कि क्या प्रतिफल प्राप्त हुए हैं। अंत में, आकलन परिणामों से प्राप्त प्रतिक्रिया (feedback) के आधार पर, शिक्षण रणनीतियों में सुधार (M) किया जाता है ताकि भविष्य में अधिगम प्रतिफलों को और बेहतर ढंग से प्राप्त किया जा सके। यह क्रम एक प्रभावी शैक्षिक प्रक्रिया के लिए महत्वपूर्ण है।"}, {"id": 34, "section": "CDP", "question": "प्रभावी उपचारात्मक शिक्षण (Remedial Teaching) के लिए निम्नलिखित में से कौन सी शिक्षण रणनीति सबसे उपयुक्त है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["कक्षा में केवल व्याख्यान विधि (lecture method) का उपयोग करना।", "सभी छात्रों के लिए एक समान गति और सामग्री का उपयोग करना।", "छात्रों की व्यक्तिगत सीखने की शैलियों और आवश्यकताओं के अनुसार शिक्षण को अनुकूलित (adapt) करना।", "केवल कमजोर छात्रों को अतिरिक्त गृहकार्य (homework) देना।"], "answer": "छात्रों की व्यक्तिगत सीखने की शैलियों और आवश्यकताओं के अनुसार शिक्षण को अनुकूलित (adapt) करना।", "explanation": "प्रभावी उपचारात्मक शिक्षण का मूल सिद्धांत व्यक्तिगत आवश्यकताओं पर ध्यान केंद्रित करना है। प्रत्येक छात्र की सीखने की कठिनाइयाँ और सीखने की शैली अलग-अलग हो सकती है, इसलिए शिक्षण को उनकी विशिष्ट आवश्यकताओं के अनुसार अनुकूलित (adapt) करना सबसे प्रभावी रणनीति है। एक समान गति और सामग्री का उपयोग करना, केवल गृहकार्य देना, या केवल व्याख्यान विधि का उपयोग करना उपचारात्मक शिक्षण के उद्देश्यों को पूरा नहीं करेगा क्योंकि ये व्यक्तिगत भिन्नताओं को संबोधित नहीं करते हैं।"}, {"id": 35, "section": "CDP", "question": "मूल्यांकन (Evaluation) के संदर्भ में शिक्षक की भूमिका के बारे में निम्नलिखित में से कौन सी धारणा गलत है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["शिक्षक को मूल्यांकन को केवल छात्रों को ग्रेड देने के साधन के रूप में देखना चाहिए।", "शिक्षक को मूल्यांकन परिणामों का उपयोग अपनी शिक्षण विधियों में सुधार के लिए करना चाहिए।", "शिक्षक को मूल्यांकन को एक सतत प्रक्रिया के रूप में देखना चाहिए जो सीखने के साथ चलती है।", "शिक्षक को छात्रों को मूल्यांकन प्रक्रिया में सक्रिय रूप से शामिल करना चाहिए।"], "answer": "शिक्षक को मूल्यांकन को केवल छात्रों को ग्रेड देने के साधन के रूप में देखना चाहिए।", "explanation": "यह धारणा गलत है। मूल्यांकन का उद्देश्य केवल छात्रों को ग्रेड देना नहीं है, बल्कि यह सीखने की प्रक्रिया को बेहतर बनाने, छात्रों की प्रगति को समझने और शिक्षण रणनीतियों को समायोजित करने का एक व्यापक उपकरण है। एक प्रभावी शिक्षक मूल्यांकन को एक समग्र प्रक्रिया के रूप में देखता है जो सीखने के साथ चलती है, अपनी शिक्षण विधियों में सुधार के लिए परिणामों का उपयोग करता है, और छात्रों को प्रक्रिया में सक्रिय रूप से शामिल करता है। केवल ग्रेडिंग पर ध्यान केंद्रित करना मूल्यांकन के वास्तविक शैक्षिक मूल्य को कम करता है।"}, {"id": 36, "section": "CDP", "question": "अभिप्रेरणा (Motivation) के संदर्भ में, 'आंतरिक अभिप्रेरणा' (Intrinsic Motivation) का सबसे सटीक वर्णन क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["पुरस्कार या दंड से बचने के लिए किसी कार्य को करना।", "किसी बाहरी प्रोत्साहन (external incentive) जैसे पैसे या प्रशंसा के लिए कार्य करना।", "किसी कार्य को उसकी आंतरिक संतुष्टि (internal satisfaction) और रुचि के लिए करना।", "दूसरों की अपेक्षाओं (expectations) को पूरा करने के लिए कार्य करना।"], "answer": "किसी कार्य को उसकी आंतरिक संतुष्टि (internal satisfaction) और रुचि के लिए करना।", "explanation": "आंतरिक अभिप्रेरणा वह होती है जब व्यक्ति किसी कार्य को अपनी व्यक्तिगत संतुष्टि, रुचि या आनंद के लिए करता है, न कि किसी बाहरी पुरस्कार या दबाव के कारण। यह व्यवहार का एक स्व-प्रेरित (self-motivated) रूप है। अन्य विकल्प बाहरी कारकों जैसे पुरस्कार, दंड या सामाजिक अपेक्षाओं से संबंधित हैं, जो बाह्य अभिप्रेरणा (extrinsic motivation) के उदाहरण हैं।"}, {"id": 37, "section": "CDP", "question": "एक शिक्षिका अपनी कक्षा में छात्रों को विभिन्न प्रकार के संगीत वाद्ययंत्रों (musical instruments) को बजाने और संगीत रचना (composing music) करने के अवसर प्रदान करती है। हॉवर्ड गार्डनर (Howard Gardner) के बहुबुद्धि सिद्धांत (Theory of Multiple Intelligences) के अनुसार, शिक्षिका किस प्रकार की बुद्धि को बढ़ावा दे रही है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["शारीरिक-गतिक बुद्धि (Bodily-Kinesthetic Intelligence)", "सांगीतिक बुद्धि (Musical Intelligence)", "तार्किक-गणितीय बुद्धि (Logical-Mathematical Intelligence)", "स्थानिक बुद्धि (Spatial Intelligence)"], "answer": "सांगीतिक बुद्धि (Musical Intelligence)", "explanation": "हॉवर्ड गार्डनर के बहुबुद्धि सिद्धांत के अनुसार, सांगीतिक बुद्धि में संगीत के पैटर्न (patterns), लय (rhythm) और पिच (pitch) को समझने, बनाने और सराहना करने की क्षमता शामिल होती है। संगीत वाद्ययंत्र बजाने और संगीत रचना करने के अवसर प्रदान करके, शिक्षिका सीधे तौर पर छात्रों की सांगीतिक बुद्धि को विकसित कर रही है। अन्य विकल्प जैसे तार्किक-गणितीय, शारीरिक-गतिक और स्थानिक बुद्धि अन्य क्षमताओं से संबंधित हैं।"}, {"id": 38, "section": "CDP", "question": "व्यक्तित्व (Personality) के आयामों (dimensions) के संदर्भ में, बहिर्मुखता (Extraversion) और अंतर्मुखता (Introversion) के बारे में निम्नलिखित कथनों में से कौन सा सही है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["अंतर्मुखी व्यक्ति हमेशा शर्मीले और चिंतित (anxious) होते हैं।", "बहिर्मुखी व्यक्ति (extraverts) आमतौर पर शांत और एकांत पसंद करते हैं।", "बहिर्मुखी व्यक्ति सामाजिक, मुखर (assertive) और ऊर्जावान होते हैं।", "अंतर्मुखी व्यक्ति (introverts) सामाजिक मेलजोल (social interaction) से ऊर्जा प्राप्त करते हैं।"], "answer": "बहिर्मुखी व्यक्ति सामाजिक, मुखर (assertive) और ऊर्जावान होते हैं।", "explanation": "बहिर्मुखता व्यक्तित्व का एक आयाम है जिसमें व्यक्ति सामाजिक, मुखर और ऊर्जावान होते हैं, और वे सामाजिक मेलजोल से ऊर्जा प्राप्त करते हैं। इसके विपरीत, अंतर्मुखी व्यक्ति शांत, चिंतनशील (reflective) होते हैं और एकांत में ऊर्जा प्राप्त करते हैं। अंतर्मुखी होना हमेशा शर्मीला या चिंतित होना नहीं है, बल्कि यह ऊर्जा प्राप्त करने का एक अलग तरीका है। पहला और दूसरा विकल्प गलत हैं क्योंकि वे बहिर्मुखी और अंतर्मुखी की विशेषताओं को उलट देते हैं, जबकि चौथा विकल्प अंतर्मुखता को गलत तरीके से सामान्यीकृत करता है।"}, {"id": 39, "section": "CDP", "question": "निम्नलिखित में से कौन सी सृजनात्मकता (Creativity) की एक आवश्यक विशेषता (essential characteristic) नहीं है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["अभिसारी चिंतन (Convergent Thinking) - एक समस्या के लिए एकल, सही समाधान खोजना।", "मौलिकता (Originality) - नए और अद्वितीय विचार उत्पन्न करना।", "लचीलापन (Flexibility) - विभिन्न दृष्टिकोणों (perspectives) से समस्याओं को देखने की क्षमता।", "प्रवाह (Fluency) - बड़ी संख्या में विचार उत्पन्न करने की क्षमता।"], "answer": "अभिसारी चिंतन (Convergent Thinking) - एक समस्या के लिए एकल, सही समाधान खोजना।", "explanation": "सृजनात्मकता मुख्य रूप से अपसारी चिंतन (divergent thinking) से जुड़ी है, जिसमें एक समस्या के लिए कई संभावित और मौलिक समाधान उत्पन्न किए जाते हैं। अभिसारी चिंतन, इसके विपरीत, एक समस्या के लिए एकल, सर्वोत्तम या सही समाधान खोजने पर केंद्रित होता है, जो अक्सर तर्क और मौजूदा ज्ञान पर आधारित होता है। मौलिकता, प्रवाह और लचीलापन सृजनात्मकता की प्रमुख विशेषताएँ हैं, जबकि अभिसारी चिंतन सृजनात्मक प्रक्रिया का हिस्सा हो सकता है, लेकिन यह इसकी आवश्यक विशेषता नहीं है, बल्कि अपसारी चिंतन इसका मूल है।"}, {"id": 40, "section": "CDP", "question": "अभिकथन (A): व्यक्तिगत भिन्नताएँ (Individual Differences) आनुवंशिकता (heredity) और पर्यावरण (environment) दोनों के जटिल अंतःक्रिया (complex interaction) का परिणाम हैं।\nकारण (R): आनुवंशिकता व्यक्ति की क्षमता की सीमा निर्धारित करती है, जबकि पर्यावरण इन क्षमताओं को विकसित करने के अवसर प्रदान करता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["A गलत है, लेकिन R सही है।", "A सही है, लेकिन R गलत है।", "A और R दोनों सही हैं, लेकिन R, A की सही व्याख्या नहीं करता है।", "A और R दोनों सही हैं, और R, A की सही व्याख्या करता है।"], "answer": "A और R दोनों सही हैं, और R, A की सही व्याख्या करता है।", "explanation": "अभिकथन (A) सही है क्योंकि व्यक्तिगत भिन्नताएँ 'प्रकृति बनाम पोषण' (nature vs. nurture) बहस का परिणाम हैं, जहाँ आनुवंशिकता और पर्यावरण दोनों ही व्यक्ति के विकास में महत्वपूर्ण भूमिका निभाते हैं। कारण (R) भी सही है और अभिकथन की सही व्याख्या करता है। आनुवंशिकता एक व्यक्ति की संभावित क्षमताओं की ऊपरी और निचली सीमा निर्धारित करती है (जैसे बुद्धि का स्तर), जबकि पर्यावरण (जैसे शिक्षा, पोषण, सामाजिक अनुभव) इन आनुवंशिक प्रवृत्तियों को कैसे और किस हद तक विकसित किया जाएगा, इसे प्रभावित करता है। इस प्रकार, दोनों कारक मिलकर व्यक्तिगत भिन्नताओं को आकार देते हैं।"}, {"id": 41, "section": "CDP", "question": "निम्नलिखित बुद्धि सिद्धांतों को उनके प्रतिपादकों (proponents) के साथ सुमेलित कीजिए:\nसूची-I\nA: त्रि-आयामी बुद्धि सिद्धांत (Triarchic Theory of Intelligence)\nB: बहुबुद्धि सिद्धांत (Theory of Multiple Intelligences)\nC: द्विकारक सिद्धांत (Two-Factor Theory of Intelligence)\nD: तरल और क्रिस्टलीकृत बुद्धि (Fluid and Crystallized Intelligence)\nसूची-II\n1. चार्ल्स स्पीयरमैन (Charles Spearman)\n2. हॉवर्ड गार्डनर (Howard Gardner)\n3. रेमंड कैटेल (Raymond Cattell)\n4. रॉबर्ट स्टर्नबर्ग (Robert Sternberg)", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A)-4, (B)-1, (C)-2, (D)-3", "(A)-4, (B)-2, (C)-1, (D)-3", "(A)-2, (B)-4, (C)-1, (D)-3", "(A)-3, (B)-2, (C)-1, (D)-4"], "answer": "(A)-4, (B)-2, (C)-1, (D)-3", "explanation": "सही सुमेलन इस प्रकार है:\n(A) त्रि-आयामी बुद्धि सिद्धांत रॉबर्ट स्टर्नबर्ग द्वारा प्रतिपादित किया गया था, जिसमें विश्लेषणात्मक, रचनात्मक और व्यावहारिक बुद्धि शामिल है।\n(B) बहुबुद्धि सिद्धांत हॉवर्ड गार्डनर द्वारा दिया गया था, जिसमें बुद्धि के कई अलग-अलग प्रकारों का वर्णन किया गया है।\n(C) द्विकारक सिद्धांत चार्ल्स स्पीयरमैन द्वारा प्रस्तुत किया गया था, जिसमें 'g' (सामान्य कारक) और 's' (विशिष्ट कारक) बुद्धि के दो कारक बताए गए हैं।\n(D) तरल और क्रिस्टलीकृत बुद्धि का सिद्धांत रेमंड कैटेल द्वारा विकसित किया गया था, जो बुद्धि को दो अलग-अलग घटकों में विभाजित करता है। इस प्रकार, विकल्प (A)-4, (B)-2, (C)-1, (D)-3 सही है।"}, {"id": 42, "section": "CDP", "question": "एक छात्र अपनी आंतरिक संतुष्टि (inner satisfaction) के लिए एक नई भाषा सीखता है, न कि किसी पुरस्कार या बाहरी दबाव के लिए। यह किस प्रकार की प्रेरणा (motivation) का उदाहरण है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["संबद्धता प्रेरणा (Affiliation motivation)", "आंतरिक प्रेरणा (Intrinsic motivation)", "उपलब्धि प्रेरणा (Achievement motivation)", "बाह्य प्रेरणा (Extrinsic motivation)"], "answer": "आंतरिक प्रेरणा (Intrinsic motivation)", "explanation": "आंतरिक प्रेरणा (intrinsic motivation) तब होती है जब कोई व्यक्ति किसी गतिविधि में इसलिए संलग्न होता है क्योंकि वह उसे स्वाभाविक रूप से संतोषजनक या आनंददायक पाता है, न कि किसी बाहरी पुरस्कार या दंड से बचने के लिए। इस मामले में, छात्र भाषा सीखने में आंतरिक संतुष्टि पाता है। बाह्य प्रेरणा (extrinsic motivation) बाहरी पुरस्कारों या परिणामों से प्रेरित होती है, जो यहां लागू नहीं होती।"}, {"id": 43, "section": "CDP", "question": "हावर्ड गार्डनर (Howard Gardner) के बहु-बुद्धि सिद्धांत (Theory of Multiple Intelligences) के अनुसार, एक मूर्तिकार (sculptor) या नाविक (navigator) में किस प्रकार की बुद्धि (intelligence) प्रमुख होती है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["तार्किक-गणितीय बुद्धि (Logical-mathematical intelligence)", "शारीरिक-गतिसंवेदी बुद्धि (Bodily-kinesthetic intelligence)", "भाषाई बुद्धि (Linguistic intelligence)", "स्थानिक बुद्धि (Spatial intelligence)"], "answer": "स्थानिक बुद्धि (Spatial intelligence)", "explanation": "हावर्ड गार्डनर के बहु-बुद्धि सिद्धांत के अनुसार, स्थानिक बुद्धि (spatial intelligence) उन व्यक्तियों में प्रमुख होती है जो स्थानिक संबंधों (spatial relationships), पैटर्न और छवियों को प्रभावी ढंग से समझने, हेरफेर करने और बनाने में सक्षम होते हैं। एक मूर्तिकार को त्रि-आयामी (three-dimensional) आकृतियों की कल्पना करने की आवश्यकता होती है, और एक नाविक को मानचित्रों और दिशाओं को समझने की आवश्यकता होती है, जो दोनों स्थानिक बुद्धि के उदाहरण हैं। शारीरिक-गतिसंवेदी बुद्धि शारीरिक गतिविधियों के समन्वय से संबंधित है, जो मूर्तिकार के लिए सहायक हो सकती है लेकिन प्राथमिक नहीं।"}, {"id": 44, "section": "CDP", "question": "'बिग फाइव' व्यक्तित्व लक्षणों (Big Five Personality Traits) में से कौन सा लक्षण एक व्यक्ति की कल्पनाशीलता (imagination), अंतर्दृष्टि (insight) और नए अनुभवों के प्रति खुलेपन (openness to new experiences) को दर्शाता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["बहिर्मुखता (Extraversion)", "कर्तव्यनिष्ठा (Conscientiousness)", "अनुभवों के प्रति खुलापन (Openness to experience)", "सहमतता (Agreeableness)"], "answer": "अनुभवों के प्रति खुलापन (Openness to experience)", "explanation": "'बिग फाइव' व्यक्तित्व लक्षणों में, अनुभवों के प्रति खुलापन (openness to experience) एक व्यक्ति की कल्पनाशीलता, अंतर्दृष्टि, जिज्ञासा (curiosity) और नए विचारों व अनुभवों को स्वीकार करने की प्रवृत्ति को दर्शाता है। सहमतता (agreeableness) दूसरों के प्रति दयालु और सहयोगी होने से संबंधित है, बहिर्मुखता (extraversion) सामाजिकता और ऊर्जा के स्तर से संबंधित है, और कर्तव्यनिष्ठा (conscientiousness) संगठित और जिम्मेदार होने से संबंधित है।"}, {"id": 45, "section": "CDP", "question": "रचनात्मकता (Creativity) के संदर्भ में, निम्नलिखित में से कौन सी विशेषता एक रचनात्मक व्यक्ति (creative individual) की पहचान नहीं है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["अभिसारी सोच (Convergent thinking)", "मौलिकता (Originality)", "लचीलापन (Flexibility)", "विस्तार (Elaboration)"], "answer": "अभिसारी सोच (Convergent thinking)", "explanation": "रचनात्मकता (creativity) मुख्य रूप से अपसारी सोच (divergent thinking) से जुड़ी है, जिसमें कई संभावित समाधानों या विचारों को उत्पन्न करना शामिल है। अभिसारी सोच (convergent thinking) इसके विपरीत है, जहाँ व्यक्ति एक समस्या के लिए सर्वोत्तम या एकमात्र सही समाधान खोजने पर ध्यान केंद्रित क आत्म-सिद्धि की ओर ध्यान केंद्रित नहीं कर सकता। सुरक्षा की आवश्यकता दूसरे स्तर पर आती है, उसके बाद सामाजिक आवश्यकताएँ और फिर आत्म-सम्मान और आत्म-सिद्धि की आवश्यकताएँ आती हैं।"}, {"id": 48, "section": "CDP", "question": "रॉबर्ट स्टर्नबर्ग (Robert Sternberg) के बुद्धि के त्रि-तत्व सिद्धांत (Triarchic Theory of Intelligence) के अनुसार, 'व्यवहारिक बुद्धि' (Practical Intelligence) का मुख्य रूप से किससे संबंध है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["समस्याओं को हल करने के लिए रचनात्मक और नवीन तरीकों का उपयोग करना।", "वास्तविक दुनिया की स्थितियों में अनुकूलन (adaptation) और समस्याओं का समाधान करना।", "अमूर्त अवधारणाओं (abstract concepts) को समझना और उनका विश्लेषण करना।", "अकादमिक कार्यों और विश्लेषणात्मक सोच में उत्कृष्टता।"], "answer": "वास्तविक दुनिया की स्थितियों में अनुकूलन (adaptation) और समस्याओं का समाधान करना।", "explanation": "स्टर्नबर्ग के त्रि-तत्व सिद्धांत (Triarchic Theory) में तीन प्रकार की बुद्धि शामिल हैं: विश्लेषणात्मक (analytical), रचनात्मक (creative) और व्यावहारिक (practical)। व्यावहारिक बुद्धि (Practical Intelligence) को 'स्ट्रीट स्मार्टनेस' (street smartness) के रूप में भी जाना जाता है, जो वास्तविक दुनिया की समस्याओं को हल करने और पर्यावरण के अनुकूल होने की क्षमता से संबंधित है। विकल्प A रचनात्मक बुद्धि से संबंधित है, जबकि विकल्प B और D विश्लेषणात्मक बुद्धि से संबंधित हैं, जो अकादमिक और अमूर्त सोच पर केंद्रित होती है।"}, {"id": 49, "section": "CDP", "question": "एक समावेशी कक्षा (inclusive classroom) में व्यक्तिगत भिन्नताओं (individual differences) को प्रभावी ढंग से प्रबंधित करने के लिए एक शिक्षक को क्या करना चाहिए?", "brand": "bilaspurtestseries.com 9669946966", "options": ["विभिन्न शिक्षण शैलियों (learning styles) और क्षमताओं को समायोजित करने के लिए विविध शिक्षण रणनीतियों (diverse teaching strategies) का उपयोग करना चाहिए।", "कमजोर छात्रों को अलग से पढ़ाना चाहिए ताकि वे दूसरों को धीमा न करें।", "सभी छात्रों को एक ही गति (pace) और विधि (method) से पढ़ाना चाहिए।", "केवल प्रतिभाशाली छात्रों पर ध्यान केंद्रित करना चाहिए।"], "answer": "विभिन्न शिक्षण शैलियों (learning styles) और क्षमताओं को समायोजित करने के लिए विविध शिक्षण रणनीतियों (diverse teaching strategies) का उपयोग करना चाहिए।", "explanation": "एक समावेशी कक्षा में, छात्रों की व्यक्तिगत भिन्नताओं को संबोधित करने के लिए विविध शिक्षण रणनीतियों का उपयोग करना महत्वपूर्ण है। इसमें विभिन्न शिक्षण शैलियों (जैसे दृश्य, श्रवण, गतिज) और क्षमताओं (जैसे धीमी गति से सीखने वाले, प्रतिभाशाली) वाले छात्रों को समायोजित करने के लिए विभिन्न प्रकार की गतिविधियाँ, सामग्री और मूल्यांकन के तरीके शामिल होते हैं। एक ही गति और विधि से पढ़ाना, केवल प्रतिभाशाली छात्रों पर ध्यान केंद्रित करना, या कमजोर छात्रों को अलग करना समावेशी शिक्षा के सिद्धांतों के खिलाफ है और व्यक्तिगत भिन्नताओं को प्रभावी ढंग से प्रबंधित नहीं करता है।"}, {"id": 50, "section": "CDP", "question": "छात्रों में सृजनात्मकता (Creativity) को बढ़ावा देने के लिए एक शिक्षक को निम्नलिखित में से कौन सी रणनीति अपनाने से बचना चाहिए?", "brand": "bilaspurtestseries.com 9669946966", "options": ["जोखिम लेने और गलतियाँ करने के लिए एक सुरक्षित और सहायक वातावरण प्रदान करना।", "छात्रों को उनके विचारों के लिए तुरंत और लगातार मूल्यांकन (evaluation) करना।", "मुक्त-अंत वाले प्रश्न (open-ended questions) पूछना जो विभिन्न विचारों को बढ़ावा दें।", "छात्रों को समस्याओं के कई संभावित समाधान खोजने के लिए प्रोत्साहित करना।"], "answer": "छात्रों को उनके विचारों के लिए तुरंत और लगातार मूल्यांकन (evaluation) करना।", "explanation": "सृजनात्मकता को बढ़ावा देने के लिए, छात्रों को विचारों को स्वतंत्र रूप से व्यक्त करने और प्रयोग करने की स्वतंत्रता महसूस करनी चाहिए। विचारों का तुरंत और लगातार मूल्यांकन करने से छात्र आलोचना के डर से नए या अपरंपरागत (unconventional) विचार प्रस्तुत करने से कतरा सकते हैं, जिससे उनकी सृजनात्मकता बाधित होती है। इसके बजाय, एक शिक्षक को विचारों के प्रवाह को प्रोत्साहित करना चाहिए और बाद में मूल्यांकन करना चाहिए। अन्य विकल्प जैसे कई समाधान खोजना, मुक्त-अंत वाले प्रश्न पूछना और सुरक्षित वातावरण प्रदान करना सृजनात्मकता को बढ़ावा देने वाली प्रभावी रणनीतियाँ हैं।"}];const SUBMIT_URL="https://mqorslvouzmrvciubpoq
