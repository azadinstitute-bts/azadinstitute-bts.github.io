</style></head><body><div class="wrap"><div class="top"><div class="brandbar"><div class="brand-logo" id="brandLogo">AZAD</div><div><h1 style="margin:0;color:#0f172a;font-size:38px;letter-spacing:.8px;font-weight:900;line-height:1.05">BILASPUR TEST SERIES</h1><h2 style="margin:8px 0 0;font-size:16px;font-weight:800;color:#1d4ed8">By Azad Institute</h2><div style="margin-top:8px;font-size:14px;color:#334155;font-weight:600">🎓 CG Teacher Varg 1 Chemistry Demo Test</div></div></div></div><div id="app"></div></div><script>const Q=[{"id": 1, "section": "Chemistry", "question": "हैबर प्रक्रिया (Haber process) में, यदि 28 g नाइट्रोजन (N₂) और 12 g हाइड्रोजन (H₂) को अभिक्रिया करने दिया जाता है, तो बनने वाले अमोनिया (NH₃) का अधिकतम द्रव्यमान (mass) क्या होगा? (परमाणु द्रव्यमान: N = 14 g/mol, H = 1 g/mol)", "brand": "bilaspurtestseries.com 9669946966", "options": ["34 g", "68 g", "17 g", "40 g"], "answer": "34 g", "explanation": "अभिक्रिया का संतुलित समीकरण (balanced equation) है:\nN₂ + 3H₂ → 2NH₃\n\nदिए गए द्रव्यमानों को मोल (moles) में परिवर्तित करें:\nN₂ के मोल = 28 g / (28 g/mol) = 1 mol\nH₂ के मोल = 12 g / (2 g/mol) = 6 mol\n\nसीमान्त अभिकर्मक (limiting reagent) की पहचान करें:\nसमीकरण के अनुसार, 1 मोल N₂ को 3 मोल H₂ की आवश्यकता होती है। हमारे पास 1 मोल N₂ है, जिसके लिए 3 मोल H₂ की आवश्यकता होगी। चूंकि हमारे पास 6 मोल H₂ उपलब्ध है, इसका अर्थ है कि H₂ आधिक्य (excess) में है और N₂ सीमान्त अभिकर्मक है।\n\nसीमान्त अभिकर्मक (N₂) के आधार पर NH₃ के मोल की गणना करें:\nसंतुलित समीकरण के अनुसार, 1 मोल N₂ से 2 मोल NH₃ बनता है।\nइसलिए, 1 मोल N₂ से 2 मोल NH₃ बनेगा।\n\nNH₃ का द्रव्यमान ज्ञात करें:\nNH₃ का मोलर द्रव्यमान (molar mass) = 14 + (3 × 1) = 17 g/mol\nNH₃ का द्रव्यमान = मोलमोलर द्रव्यमान = 2 mol × 17 g/mol = 34 g\n\nविकल्प (B) 68 g तब प्राप्त होता जब H₂ को सीमान्त अभिकर्मक मान लिया जाता (6 मोल H₂ से 4 मोल NH₃ बनता)। विकल्प (C) 40 g केवल अभिकारकों के द्रव्यमान का योग है, जो गलत है क्योंकि द्रव्यमान संरक्षण (conservation of mass) केवल बंद प्रणाली (closed system) में कुल द्रव्यमान पर लागू होता है, न कि उत्पाद के द्रव्यमान पर जब एक अभिकर्मक आधिक्य में हो। विकल्प (D) 17 g तब प्राप्त होता जब N₂ से NH₃ का अनुपात 1:1 मान लिया जाता।"}, {"id": 2, "section": "Chemistry", "question": "200 mL 0.5 M H₂SO₄ विलयन (solution) को 300 mL 0.2 M NaOH विलयन के साथ मिलाया जाता है। अंतिम विलयन में निर्मित Na₂SO₄ की मोलरता (molarity) क्या होगी?", "brand": "bilaspurtestseries.com 9669946966", "options": ["0.06 M", "0.03 M", "0.1 M", "0.12 M"], "answer": "0.06 M", "explanation": "सबसे पहले, अभिक्रिया के लिए संतुलित रासायनिक समीकरण (balanced chemical equation) लिखें:\n\nH₂SO₄ + 2NaOH → Na₂SO₄ + 2H₂O\n\nअब, प्रत्येक अभिकारक (reactant) के मोल्स (moles) की गणना करें:\n\nH₂SO₄ के मोल्स = मोलरता (Molarity)आयतन (Volume) (लीटर में) = 0.5 M × (200/1000) L = 0.5 M × 0.2 L = 0.1 mol\n\nNaOH के मोल्स = मोलरता (Molarity)आयतन (Volume) (लीटर में) = 0.2 M × (300/1000) L = 0.2 M × 0.3 L = 0.06 mol\n\nसीमित अभिकारक (limiting reagent) का निर्धारण करें:\nसमीकरण के अनुसार, 1 mol H₂SO₄ को 2 mol NaOH की आवश्यकता होती है।\nयदि 0.1 mol H₂SO₄ पूरी तरह से अभिक्रिया करता है, तो उसे 0.1 × 2 = 0.2 mol NaOH की आवश्यकता होगी।\nहमारे पास केवल 0.06 mol NaOH है, जो आवश्यक मात्रा से कम है। इसलिए, NaOH सीमित अभिकारक (limiting reagent) है।\n\nनिर्मित Na₂SO₄ के मोल्स की गणना करें:\nचूंकि NaOH सीमित अभिकारक है, उत्पाद (product) की मात्रा NaOH पर निर्भर करेगी।\nसमीकरण के अनुसार, 2 mol NaOH से 1 mol Na₂SO₄ बनता है।\nइसलिए, 0.06 mol NaOH से (0.06 / 2) = 0.03 mol Na₂SO₄ बनेगा।\n\nअंतिम विलयन का कुल आयतन (total volume) ज्ञात करें:\nकुल आयतन = 200 mL + 300 mL = 500 mL = 0.5 L\n\nअंतिम विलयन में Na₂SO₄ की मोलरता (molarity) की गणना करें:\nमोलरता = निर्मित Na₂SO₄ के मोल्स / कुल आयतन (लीटर में) = 0.03 mol / 0.5 L = 0.06 M\n\nविकल्प (A) 0.03 M गलत है क्योंकि यह निर्मित Na₂SO₄ के मोल्स की संख्या है, न कि मोलरता। मोलरता के लिए इसे कुल आयतन से विभाजित करना होगा।\nविकल्प (D) 0.12 M गलत है क्योंकि यह तब प्राप्त होगा जब NaOH के मोल्स को सीधे कुल आयतन से विभाजित किया जाए (0.06 mol / 0.5 L = 0.12 M), जो Na₂SO₄ के लिए 2:1 स्टोइकियोमेट्री (stoichiometry) को अनदेखा करता है।"}, {"id": 3, "section": "Chemistry", "question": "निम्नलिखित कथनों में से कौन सांद्रता पद (Concentration Term) मोललता (Molality) के संबंध में सही है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["इसकी इकाई (unit) mol/L है।", "यह विलयन (solution) के आयतन (volume) पर निर्भर करती है।", "यह तापमान (temperature) से स्वतंत्र होती है।", "इसे विलेय (solute) के मोलों की संख्या प्रति लीटर विलयन के रूप में परिभाषित किया जाता है।"], "answer": "यह तापमान (temperature) से स्वतंत्र होती है।", "explanation": "मोललता (m) को विलेय के मोलों की संख्या प्रति किलोग्राम विलायक (solvent) के रूप में परिभाषित किया जाता है। चूंकि यह द्रव्यमान (mass) पर आधारित है, जो तापमान के साथ नहीं बदलता, इसलिए मोललता तापमान से स्वतंत्र होती है। विकल्प A और B मोलरता (Molarity) से संबंधित हैं, जो आयतन पर निर्भर करती है और तापमान के साथ बदलती है। विकल्प D मोलरता की इकाई है, मोललता की इकाई mol/kg होती है।"}, {"id": 4, "section": "Chemistry", "question": "अभिक्रिया 2Al (s) + 3Cl₂ (g) → 2AlCl₃ (s) के लिए, यदि 54 ग्राम एल्युमिनियम (Al) और 71 ग्राम क्लोरीन (Cl₂) को मिलाया जाता है, तो निम्नलिखित कथनों पर विचार करें:\n(Al का मोलर द्रव्यमान = 27 g/mol, Cl₂ का मोलर द्रव्यमान = 71 g/mol, AlCl₃ का मोलर द्रव्यमान = 133.5 g/mol)\nJ: लिमिटिंग रिएजेंट (limiting reagent) क्लोरीन (Cl₂) है।\nK: निर्मित एल्युमिनियम क्लोराइड (AlCl₃) का सैद्धांतिक उत्पादन (theoretical yield) 89 ग्राम होगा।\nL: अभिक्रिया के बाद 36 ग्राम एल्युमिनियम (Al) शेष रहेगा।\nM: यदि निर्मित AlCl₃ को 250 mL जल में घोला जाए, तो विलयन की मोलरता (molarity) 3.56 M होगी", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल K और L", "केवल J और K", "केवल J, L और M", "केवल J, K और L"], "answer": "केवल J, K और L", "explanation": "दी गई अभिक्रिया है: 2Al (s) + 3Cl₂ (g) → 2AlCl₃ (s)\n\nप्रारंभिक मोलों की गणना:\nAl के मोल = 54 g / 27 g/mol = 2 mol\nCl₂ के मोल = 71 g / 71 g/mol = 1 mol\n\nस्टोइकियोमेट्रिक अनुपात (stoichiometric ratio) के अनुसार, 2 मोल Al को 3 मोल Cl₂ की आवश्यकता होती है।\nउपलब्ध अनुपात: Al के लिए 2/2 = 1, Cl₂ के लिए 1/3 = 0.333।\nचूंकि Cl₂ का अनुपात कम है, Cl₂ लिमिटिंग रिएजेंट (limiting reagent) है।\n\nJ. लिमिटिंग रिएजेंट (limiting reagent) क्लोरीन (Cl₂) है। (यह कथन सही है।)\n\nउत्पाद AlCl₃ की गणना लिमिटिंग रिएजेंट (Cl₂) के आधार पर की जाएगी:\n3 मोल Cl₂ से 2 मोल AlCl₃ बनता है।\n1 मोल Cl₂ से (2/3) मोल AlCl₃ बनेगा।\nनिर्मित AlCl₃ का द्रव्यमान = (2/3) mol × 133.5 g/mol = 89 g।\n\nK. निर्मित एल्युमिनियम क्लोराइड (AlCl₃) का सैद्धांतिक उत्पादन (theoretical yield) 89 ग्राम होगा। (यह कथन सही है।)\n\nशेष Al की गणना:\n1 मोल Cl₂ के साथ (2/3) मोल Al अभिक्रिया करेगा।\nअभिक्रिया करने वाले Al का द्रव्यमान = (2/3) mol × 27 g/mol = 18 g।\nशेष Al का द्रव्यमान = प्रारंभिक Al - अभिक्रिया किया गया Al = 54 g − 18 g = 36 g।\n\nL. अभिक्रिया के बाद 36 ग्राम एल्युमिनियम (Al) शेष रहेगा। (यह कथन सही है।)\n\nविलयन की मोलरता (molarity) की गणना:\nनिर्मित AlCl₃ के मोल = 2/3 mol\nविलयन का आयतन = 250 mL = 0.25 L\nमोलरता = मोल / आयतन (L) = (2/3) mol / 0.25 L = (2/3) × 4 = 8/3 M ≈ 2.67 M।\n\nM. यदि निर्मित AlCl₃ को 250 mL जल में घोला जाए, तो विलयन की मोलरता (molarity) 3.56 M होगी। (यह कथन गलत है, सही मोलरता 2.67 M है।)\n\nअतः, कथन J, K और L सही हैं।"}, {"id": 5, "section": "Chemistry", "question": "अभिकथन (A): मोलरता (Molarity) तापमान (temperature) पर निर्भर करती है, जबकि मोललता (Molality) तापमान से स्वतंत्र होती है।\nकारण (R): मोलरता विलयन के आयतन (volume) पर आधारित होती है, जो तापमान के साथ बदलता है, जबकि मोललता विलायक के द्रव्यमान (mass) पर आधारित होती है, जो तापमान से अप्रभावित रहता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "(A) सत्य है लेकिन (R) असत्य है।", "(A) और (R) दोनों सत्य हैं लेकिन (R), (A) की सही व्याख्या नहीं है।", "(A) असत्य है लेकिन (R) सत्य है।"], "answer": "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "explanation": "अभिकथन (A) सही है क्योंकि मोलरता (moles/volume) आयतन पर निर्भर करती है, जो तापमान के साथ फैलता या सिकुड़ता है, जबकि मोललता (moles/mass) द्रव्यमान पर निर्भर करती है, जो तापमान से अप्रभावित रहता है। कारण (R) भी सही है और यह अभिकथन (A) की सटीक व्याख्या करता है कि क्यों मोलरता तापमान पर निर्भर करती है और मोललता नहीं। इसलिए, दोनों कथन सत्य हैं और कारण अभिकथन की सही व्याख्या है।"}, {"id": 6, "section": "Chemistry", "question": "मोल संकल्पना (Mole Concept) और स्टोइकियोमेट्री (Stoichiometry) के बीच सही तार्किक संबंध को दर्शाने वाले कथनों का चयन करें:\nJ: मोल संकल्पना रासायनिक पदार्थों की मात्रा को मापने का एक तरीका प्रदान करती है।\nK: स्टोइकियोमेट्री रासायनिक अभिक्रियाओं में अभिकारकों और उत्पादों के बीच मात्रात्मक संबंधों का अध्ययन है।\nL: मोल संकल्पना स्टोइकियोमेट्री गणनाओं के लिए आधार प्रदान करती है।\nM: स्टोइकियोमेट्री केवल गैसीय अभिक्रियाओं (gaseous reactions) पर लागू होती है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, K और L", "केवल J और K", "केवल J, L और M", "केवल K, L और M"], "answer": "केवल J, K और L", "explanation": "कथन J सही है क्योंकि मोल संकल्पना हमें परमाणुओं (atoms), अणुओं (molecules) या आयनों (ions) की बड़ी संख्या को एक सुविधाजनक इकाई (मोल) में मापने में मदद करती है। कथन K भी सही है क्योंकि स्टोइकियोमेट्री रासायनिक अभिक्रियाओं में पदार्थों की मात्रा के बीच संबंधों का अध्ययन है। कथन L सही है क्योंकि स्टोइकियोमेट्रिक गणनाओं के लिए मोलों की संख्या जानना आवश्यक है, इसलिए मोल संकल्पना इसका आधार है। कथन M गलत है क्योंकि स्टोइकियोमेट्री सभी प्रकार की रासायनिक अभिक्रियाओं (ठोस, तरल, गैसीय) पर लागू होती है, न कि केवल गैसीय अभिक्रियाओं पर।"}, {"id": 7, "section": "Chemistry", "question": "2H₂ (g) + O₂ (g) → 2H₂O (l) अभिक्रिया में, यदि 10 ग्राम हाइड्रोजन (H₂) और 64 ग्राम ऑक्सीजन (O₂) को मिलाया जाता है, तो लिमिटिंग रिएजेंट (Limiting Reagent) क्या होगा और कितना पानी (H₂O) बनेगा? (H का मोलर द्रव्यमान = 1 g/mol, O का मोलर द्रव्यमान = 16 g/mol)", "brand": "bilaspurtestseries.com 9669946966", "options": ["लिमिटिंग रिएजेंट: H₂, पानी: 18 ग्राम", "लिमिटिंग रिएजेंट: O₂, पानी: 72 ग्राम", "लिमिटिंग रिएजेंट: O₂, पानी: 36 ग्राम", "लिमिटिंग रिएजेंट: H₂, पानी: 90 ग्राम"], "answer": "लिमिटिंग रिएजेंट: O₂, पानी: 72 ग्राम", "explanation": "सबसे पहले, अभिकारकों के मोलों की संख्या ज्ञात करें: H₂ के मोल = 10 g / (2 × 1 g/mol) = 5 मोल। O₂ के मोल = 64 g / (2 × 16 g/mol) = 2 मोल। संतुलित समीकरण के अनुसार, 2 मोल H₂ को 1 मोल O₂ की आवश्यकता होती है। यदि 5 मोल H₂ है, तो उसे (5/2) = 2.5 मोल O₂ की आवश्यकता होगी। चूंकि हमारे पास केवल 2 मोल O₂ है, O₂ लिमिटिंग रिएजेंट है। अब, लिमिटिंग रिएजेंट (O₂) के आधार पर पानी की मात्रा की गणना करें: 1 मोल O₂ से 2 मोल H₂O बनता है, तो 2 मोल O₂ से (2 × 2) = 4 मोल H₂O बनेगा। पानी (H₂O) का मोलर द्रव्यमान = 18 g/mol। उत्पादित पानी का द्रव्यमान = 4 मोल18 g/mol = 72 ग्राम। इसलिए, लिमिटिंग रिएजेंट O₂ है और 72 ग्राम पानी बनेगा।"}, {"id": 8, "section": "Chemistry", "question": "एक उपकोश (subshell) के लिए, यदि मुख्य क्वांटम संख्या (principal quantum number) n = 4 और दिगंशी क्वांटम संख्या (azimuthal quantum number) l = 3 है, तो उस उपकोश में अधिकतम कितने इलेक्ट्रॉन (electrons) समायोजित किए जा सकते हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["14", "10", "18", "22"], "answer": "14", "explanation": "दिगंशी क्वांटम संख्या (l) किसी उपकोश के प्रकार को दर्शाती है। l = 3 का अर्थ है f-उपकोश। किसी उपकोश में कक्षकों (orbitals) की संख्या (2l + 1) होती है। इसलिए, l = 3 के लिए कक्षकों की संख्या 2(3) + 1 = 7 होगी। प्रत्येक कक्षक में अधिकतम 2 इलेक्ट्रॉन समायोजित किए जा सकते हैं (पाउली अपवर्जन सिद्धांत - Pauli Exclusion Principle के अनुसार)। अतः, अधिकतम इलेक्ट्रॉनों की संख्या 2 × 7 = 14 होगी। अन्य विकल्प गलत हैं क्योंकि वे इस सूत्र के अनुरूप नहीं हैं।"}, {"id": 9, "section": "Chemistry", "question": "एक इलेक्ट्रॉन (electron) के लिए, यदि दिगंशी क्वांटम संख्या (azimuthal quantum number) l = 2 है, तो चुंबकीय क्वांटम संख्या (magnetic quantum number) (mₗ₎ के कितने संभावित मान (possible values) हो सकते हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["5 मान: -2, -1, 0, +1, +2", "2 मान: +2, -2", "3 मान: -1, 0, +1", "7 मान: -3, -2, -1, 0, +1, +2, +3"], "answer": "5 मान: -2, -1, 0, +1, +2", "explanation": "दिगंशी क्वांटम संख्या (azimuthal quantum number) (l) किसी उपकोश (subshell) के आकार (shape) को निर्धारित करती है। चुंबकीय क्वांटम संख्या (magnetic quantum number) (mₗ₎ एक उपकोश में कक्षकों (orbitals) की संख्या और उनके स्थानिक अभिविन्यास (spatial orientation) को दर्शाती है। mₗ के संभावित मान -l से +l तक, शून्य सहित होते हैं।\nजब l = 2 होता है, तो mₗ के संभावित मान -2, -1, 0, +1, +2 होते हैं। इन मानों की कुल संख्या (2l + 1) सूत्र से प्राप्त की जा सकती है, जो 2(2) + 1 = 5 है। अन्य विकल्प गलत हैं क्योंकि वे या तो गलत मानों की संख्या दर्शाते हैं या गलत मानों को सूचीबद्ध करते हैं।"}, {"id": 10, "section": "Chemistry", "question": "पाउली के अपवर्जन सिद्धांत (Pauli's Exclusion Principle) के संबंध में निम्नलिखित में से कौन सा कथन सही है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["इलेक्ट्रॉन पहले उच्च ऊर्जा स्तर (higher energy level) में भरते हैं और फिर निम्न ऊर्जा स्तर (lower energy level) में।", "किसी भी परमाणु में किन्हीं भी दो इलेक्ट्रॉनों के लिए सभी चारों क्वांटम संख्याएँ (quantum numbers) समान नहीं हो सकतीं।", "एक ऑर्बिटल (orbital) में अधिकतम तीन इलेक्ट्रॉन हो सकते हैं, बशर्ते उनके चक्रण (spin) भिन्न हों।", "समान ऊर्जा वाले ऑर्बिटलों में इलेक्ट्रॉन पहले युग्मित (paired) होते हैं और फिर अकेले भरते हैं।"], "answer": "किसी भी परमाणु में किन्हीं भी दो इलेक्ट्रॉनों के लिए सभी चारों क्वांटम संख्याएँ (quantum numbers) समान नहीं हो सकतीं।", "explanation": "पाउली का अपवर्जन सिद्धांत (Pauli's Exclusion Principle) बताता है कि किसी भी परमाणु में किन्हीं भी दो इलेक्ट्रॉनों के लिए सभी चारों क्वांटम संख्याएँ (n, l, mₗ, mₛ₎ समान नहीं हो सकतीं। इसका अर्थ है कि एक ऑर्बिटल में अधिकतम दो इलेक्ट्रॉन हो सकते हैं, और यदि दो इलेक्ट्रॉन एक ही ऑर्बिटल में हैं, तो उनके चक्रण (spin) विपरीत होने चाहिए। अन्य विकल्प इस सिद्धांत के विपरीत हैं या अन्य नियमों (जैसे ऑफबाऊ सिद्धांत या हुंड का नियम) से संबंधित हैं।"}, {"id": 11, "section": "Chemistry", "question": "क्रोमियम (Cr, परमाणु संख्या 24) का सही इलेक्ट्रॉनिक विन्यास (electronic configuration) क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["[Ar] 3d⁵ 4s¹", "[Ar] 3d³ 4s² 4p¹", "[Ar] 3d⁴ 4s²", "[Ar] 3d⁶"], "answer": "[Ar] 3d⁵ 4s¹", "explanation": "क्रोमियम (Cr) इलेक्ट्रॉनिक विन्यास के ऑफबाऊ सिद्धांत (Aufbau principle) का एक अपवाद (exception) है। सामान्य नियम के अनुसार [Ar] 3d⁴ 4s² होना चाहिए, लेकिन 3d उपकोश (subshell) के अर्ध-भरे (half-filled) या पूर्ण-भरे (fully-filled) होने से अधिक स्थिरता प्राप्त होती है। इसलिए, एक इलेक्ट्रॉन 4s से 3d में चला जाता है, जिससे विन्यास [Ar] 3d⁵ 4s¹ हो जाता है, जहाँ 3d उपकोश अर्ध-भरा होता है, जो इसे अधिक स्थिर बनाता है।"}, {"id": 12, "section": "Chemistry", "question": "अभिकथन (A): दिगंशी क्वांटम संख्या (azimuthal quantum number, l) एक इलेक्ट्रॉन के ऑर्बिटल (orbital) के आकार (shape) को निर्धारित करती है।\nकारण (R): चुंबकीय क्वांटम संख्या (magnetic quantum number, mₗ₎ एक ऑर्बिटल के स्थानिक अभिविन्यास (spatial orientation) को निर्धारित करती है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A) और (R) दोनों सत्य हैं, लेकिन (R), (A) की सही व्याख्या नहीं है।", "(A) सत्य है, लेकिन (R) असत्य है।", "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "(A) असत्य है, लेकिन (R) सत्य है।"], "answer": "(A) और (R) दोनों सत्य हैं, लेकिन (R), (A) की सही व्याख्या नहीं है।", "explanation": "अभिकथन (A) सत्य है क्योंकि दिगंशी क्वांटम संख्या (l) उपकोश (subshell) के प्रकार और ऑर्बिटल के आकार (जैसे s गोलाकार, p डंबल-आकार) को निर्धारित करती है। कारण (R) भी सत्य है क्योंकि चुंबकीय क्वांटम संख्या (mₗ₎ एक ऑर्बिटल के स्थानिक अभिविन्यास (spatial orientation) को निर्धारित करती है, जैसे pₓ, py, pz ऑर्बिटल। हालाँकि, दोनों कथन व्यक्तिगत रूप से सही हैं, लेकिन कारण (R) अभिकथन (A) की व्याख्या नहीं करता है। वे दोनों अलग-अलग क्वांटम संख्याओं के अलग-अलग कार्यों का वर्णन करते हैं।"}, {"id": 13, "section": "Chemistry", "question": "निम्नलिखित क्वांटम संख्याओं (quantum numbers) को उनके द्वारा वर्णित गुणों (properties) के साथ सुमेलित (match) कीजिए:\nसूची-I\nJ: मुख्य क्वांटम संख्या (Principal quantum number)\nK: दिगंशी क्वांटम संख्या (Azimuthal quantum number)\nL: चुंबकीय क्वांटम संख्या (Magnetic quantum number)\nM: चक्रण क्वांटम संख्या (Spin quantum number)\nसूची-II\n1. ऑर्बिटल का स्थानिक अभिविन्यास (Spatial orientation of orbital)\n2. इलेक्ट्रॉन का चक्रण (Spin of electron)\n3. मुख्य ऊर्जा स्तर और परमाणु का आकार (Main energy level and size of atom)\n4. उपकोश का आकार (Shape of subshell)\nसही मिलान का चयन कीजिए:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-3, K-4, L-1, M-2", "J-3, K-1, L-4, M-2", "J-2, K-4, L-1, M-3", "J-4, K-3, L-2, M-1"], "answer": "J-3, K-4, L-1, M-2", "explanation": "मुख्य क्वांटम संख्या (P) मुख्य ऊर्जा स्तर और परमाणु के आकार (3) को निर्धारित करती है। दिगंशी क्वांटम संख्या (Q) उपकोश के आकार (4) को निर्धारित करती है। चुंबकीय क्वांटम संख्या (R) ऑर्बिटल के स्थानिक अभिविन्यास (1) को निर्धारित करती है। चक्रण क्वांटम संख्या (S) इलेक्ट्रॉन के चक्रण (2) को निर्धारित करती है। इस प्रकार, सही मिलान P-3, Q-4, R-1, S-2 है।"}, {"id": 14, "section": "Chemistry", "question": "हाइड्रोजन परमाणु (hydrogen atom) में, यदि एक इलेक्ट्रॉन (electron) n = 3 ऊर्जा स्तर (energy level) से n = 2 ऊर्जा स्तर में संक्रमण (transition) करता है, तो उत्सर्जित विकिरण (emitted radiation) की तरंगदैर्ध्य (wavelength) क्या होगी? (रिडबर्ग स्थिरांक (Rydberg constant) RH = 1.097 × 10⁷ m⁻¹)", "brand": "bilaspurtestseries.com 9669946966", "options": ["656.3 nm", "434.0 nm", "121.5 nm", "486.1 nm"], "answer": "656.3 nm", "explanation": "हाइड्रोजन परमाणु में इलेक्ट्रॉन संक्रमण के कारण उत्सर्जित विकिरण की तरंगदैर्ध्य (wavelength) की गणना रिडबर्ग सूत्र (Rydberg formula) का उपयोग करके की जाती है: 1/λ = RH (1/n₁² − 1/n₂²)।\nयहाँ, RH = 1.097 × 10⁷ m⁻¹, n₁ = 2 (अंतिम ऊर्जा स्तर) और n₂ = 3 (प्रारंभिक ऊर्जा स्तर) है।\n1/λ = 1.097 × 10⁷ m⁻¹ (1/2² − 1/3²) = 1.097 × 10⁷ (1/4 − 1/9) = 1.097 × 10⁷ ( (9-4)/36 ) = 1.097 × 10⁷ (5/36)\n1/λ ≈ 1.097 × 10⁷ × 0.13888 ≈ 1.5236 × 10⁶ m⁻¹\nλ = 1 / (1.5236 × 10⁶) m ≈ 6.563 × 10⁻⁷ m\nइसे नैनोमीटर (nm) में बदलने पर: λ ≈ 6.563 × 10⁻⁷ × 10⁹ nm = 656.3 nm।\nअन्य विकल्प (486.1 nm, 434.0 nm, 121.5 nm) क्रमशः n=4 से n=2, n=5 से n=2 और n=2 से n=1 जैसे विभिन्न संक्रमणों (transitions) के अनुरूप हैं।"}, {"id": 15, "section": "Chemistry", "question": "4f कक्षक (orbital) के लिए कुल नोड्स (nodes), त्रिज्यीय नोड्स (radial nodes) और कोणीय नोड्स (angular nodes) की संख्या क्रमशः क्या होगी?", "brand": "bilaspurtestseries.com 9669946966", "options": ["4, 1, 3", "3, 0, 3", "3, 2, 1", "4, 3, 1"], "answer": "3, 0, 3", "explanation": "किसी कक्षक के लिए कुल नोड्स की संख्या (n − 1) होती है। 4f कक्षक के लिए, मुख्य क्वांटम संख्या (principal quantum number) n = 4। अतः, कुल नोड्स = 4 − 1 = 3। त्रिज्यीय नोड्स (radial nodes) की संख्या (n − l − 1) होती है। 4f कक्षक के लिए, n = 4 और f कक्षक के लिए दिगंशी क्वांटम संख्या (azimuthal quantum number) l = 3। अतः, त्रिज्यीय नोड्स = 4 − 3 − 1 = 0। कोणीय नोड्स (angular nodes) की संख्या (l) होती है। 4f कक्षक के लिए, l = 3। अतः, कोणीय नोड्स = 3। इस प्रकार, कुल नोड्स, त्रिज्यीय नोड्स और कोणीय नोड्स की संख्या क्रमशः 3, 0, 3 होगी। अन्य विकल्प इन सूत्रों के गलत अनुप्रयोग को दर्शाते हैं।"}, {"id": 16, "section": "Chemistry", "question": "यदि हाइड्रोजन (H) की विद्युतऋणात्मकता (electronegativity) 2.20 और फ्लोरीन (F) की विद्युतऋणात्मकता 3.98 है, तो H-F बंध में आयनिक गुण (ionic character) का प्रतिशत लगभग कितना होगा? (पॉलिंग स्केल (Pauling scale) के अनुसार, आयनिक गुण का प्रतिशत = 16|XA − XB| + 3.5(XA − XB)² सूत्र का उपयोग करें)", "brand": "bilaspurtestseries.com 9669946966", "options": ["39.57%", "45.12%", "52.30%", "28.48%"], "answer": "39.57%", "explanation": "आयनिक गुण (ionic character) का प्रतिशत ज्ञात करने के लिए दिए गए सूत्र का उपयोग करेंगे:\n% आयनिक गुण = 16|XA − XB| + 3.5(XA − XB)²\nयहाँ, XA = 3.98 (फ्लोरीन की विद्युतऋणात्मकता) और XB = 2.20 (हाइड्रोजन की विद्युतऋणात्मकता)।\nसबसे पहले, विद्युतऋणात्मकता का अंतर (electronegativity difference) ज्ञात करें: |XA − XB| = |3.98 − 2.20| = 1.78\nअब सूत्र में मान रखने पर:\n% आयनिक गुण = 16(1.78) + 3.5(1.78)² = 28.48 + 3.5(3.1684) = 28.48 + 11.0894 = 39.5694\nलगभग 39.57%।\nविकल्प A केवल 16|XA − XB| भाग का परिणाम है, जो अधूरा है। विकल्प C और D गलत गणना पर आधारित हैं।"}, {"id": 17, "section": "Chemistry", "question": "निम्नलिखित कथनों पर विचार कीजिए और सही विकल्प का चयन कीजिए:\nJ: आवर्त सारणी (periodic table) में, समूह (group) 15 के तत्वों की प्रथम आयनीकरण ऊर्जा (first ionization energy) समूह 16 के संगत तत्वों की तुलना में अधिक होती है।\nK: BeCl₂ अणु में केंद्रीय परमाणु Be का संकरण (hybridization) sp² होता है, जिसके परिणामस्वरूप इसकी ज्यामिति त्रिकोणीय समतलीय (trigonal planar) होती है।\nL: F₂ अणु में बंध वियोजन ऊर्जा (bond dissociation energy) Cl₂ की तुलना में अधिक होती है, क्योंकि फ्लोरीन (F) क्लोरीन (Cl) से अधिक विद्युतऋणात्मक (electronegative) है।\nM: समूह 13 के तत्वों में, बोरॉन (B) एक अधातु (non-metal) है, जबकि गैलियम (Ga) एक धातु (metal) है, जो आवर्त सारणी में धात्विक गुण (metallic character) में नीचे की ओर वृद्धि को दर्शाता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और M", "केवल J, K और L", "केवल K और L", "केवल J, L और M"], "answer": "केवल J और M", "explanation": "कथन J सही है। समूह 15 के तत्वों में p-ऑर्बिटल (p-orbital) अर्ध-भरे (half-filled) होते हैं, जो उन्हें अतिरिक्त स्थिरता प्रदान करते हैं। इस स्थिर इलेक्ट्रॉनिक विन्यास (electronic configuration) के कारण, समूह 15 के तत्वों से इलेक्ट्रॉन निकालना समूह 16 के संगत तत्वों की तुलना में अधिक ऊर्जा की आवश्यकता होती है।\nकथन K गलत है। BeCl₂ अणु में केंद्रीय परमाणु Be का संकरण sp होता है, क्योंकि इसमें दो बंध युग्म (bond pairs) होते हैं और कोई एकाकी युग्म (lone pair) नहीं होता। इस sp संकरण के कारण इसकी ज्यामिति रेखीय (linear) होती है, न कि त्रिकोणीय समतलीय।\nकथन L गलत है। F₂ अणु की बंध वियोजन ऊर्जा Cl₂ की तुलना में कम होती है। इसका कारण फ्लोरीन परमाणु का छोटा आकार और एकाकी युग्म-एकाकी युग्म प्रतिकर्षण (lone pair-lone pair repulsion) है, जो F-F बंध को कमजोर करता है। विद्युतऋणात्मकता बंध ऊर्जा का सीधा संकेतक नहीं है।\nकथन M सही है। बोरॉन एक उपधातु (metalloid) है जिसमें अधातु गुण अधिक होते हैं, जबकि गैलियम एक धातु है। समूह 13 में नीचे जाने पर धात्विक गुण बढ़ता है, जो बोरॉन से गैलियम तक के परिवर्तन में स्पष्ट रूप से देखा जा सकता है।"}, {"id": 18, "section": "Chemistry", "question": "यदि दो परमाणुओं A और B की विद्युतऋणात्मकताएँ (electronegativities) क्रमशः 2.5 और 3.5 हैं, तो उनके बीच बने सहसंयोजक बंध (covalent bond) में आयनिक गुण (ionic character) का प्रतिशत क्या होगा? (Pauling के सूत्र का उपयोग करें: % आयनिक गुण = 16|χA − χB| + 3.5(χA − χB)²)", "brand": "bilaspurtestseries.com 9669946966", "options": ["19.5%", "23.0%", "16.0%", "26.5%"], "answer": "19.5%", "explanation": "आयनिक गुण का प्रतिशत (percentage ionic character) ज्ञात करने के लिए Pauling का सूत्र है: % आयनिक गुण = 16|χA − χB| + 3.5(χA − χB)²\nदिए गए मान (Given values) हैं: χA = 2.5 और χB = 3.5।\nविद्युतऋणात्मकता अंतर (Electronegativity difference), Δχ = |χA − χB| = |2.5 − 3.5| = |-1.0| = 1.0\nसूत्र में मान रखने पर (Substituting values into the formula):\n% आयनिक गुण = 16(1.0) + 3.5(1.0)² = 16 + 3.5(1) = 16 + 3.5 = 19.5%\nअतः, बंध में आयनिक गुण का प्रतिशत 19.5% होगा। अन्य विकल्प गलत हैं क्योंकि वे सही गणना या सूत्र के उचित अनुप्रयोग से मेल नहीं खाते हैं; उदाहरण के लिए, यदि केवल 16|Δχ| भाग का उपयोग किया जाता है, तो 16% प्राप्त होगा, जो अधूरा है।"}, {"id": 19, "section": "Chemistry", "question": "निम्नलिखित कथनों पर विचार कीजिए और सही विकल्प का चयन कीजिए:\nJ: आयनिक बंध (ionic bond) की प्रबलता (strength) आयनों के आवेश (charge) के गुणनफल के समानुपाती (proportional) होती है और उनके बीच की दूरी (distance) के वर्ग (square) के व्युत्क्रमानुपाती (inversely proportional) होती है।\nK: XeF₄ अणु की ज्यामिति वर्ग समतलीय (square planar) होती है और इसमें केंद्रीय परमाणु Xe का संकरण (hybridization) sp³d² होता है।\nL: आवर्त सारणी में, इलेक्ट्रॉन बंधुता (electron affinity) आमतौर पर एक आवर्त (period) में बाएं से दाएं बढ़ती है, लेकिन नोबल गैसों (noble gases) की इलेक्ट्रॉन बंधुता लगभग शून्य या धनात्मक (positive) होती है।\nM: कार्बन डाइऑक्साइड (CO₂) अणु में कार्बन और ऑक्सीजन के बीच द्विबंध (double bonds) होते हैं, और यह एक ध्रुवीय (polar) अणु है क्योंकि ऑक्सीजन कार्बन से अधिक विद्युतऋणात्मक है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, K और M", "केवल J, K और L", "केवल K और L", "केवल J और M"], "answer": "केवल J, K और L", "explanation": "कथन J सही है। आयनिक बंध की प्रबलता, जिसे जालक ऊर्जा (lattice energy) से मापा जाता है, कूलम्ब के नियम (Coulomb's law) के अनुसार आयनों के आवेश के गुणनफल के समानुपाती और उनके बीच की दूरी के वर्ग के व्युत्क्रमानुपाती होती है।\nकथन K सही है। XeF₄ अणु में केंद्रीय परमाणु क्सीनन (Xe) के पास 4 बंध युग्म (bond pairs) और 2 एकाकी युग्म (lone pairs) होते हैं। कुल 6 इलेक्ट्रॉन युग्मों के कारण, संकरण sp³d² होता है और VSEPR सिद्धांत (VSEPR theory) के अनुसार इसकी ज्यामिति वर्ग समतलीय होती है।\nकथन L सही है। इलेक्ट्रॉन बंधुता आमतौर पर एक आवर्त में बाएं से दाएं बढ़ती है क्योंकि परमाणु आकार घटता है और नाभिकीय आवेश (nuclear charge) बढ़ता है, जिससे इलेक्ट्रॉन को आकर्षित करने की क्षमता बढ़ती है। हालांकि, नोबल गैसों में एक स्थिर पूर्ण-भरा (fully-filled) इलेक्ट्रॉनिक विन्यास होता है, जिससे वे अतिरिक्त इलेक्ट्रॉन को आसानी से स्वीकार नहीं करतीं, और उनकी इलेक्ट्रॉन बंधुता या तो लगभग शून्य होती है या ऊर्जा की आवश्यकता के कारण धनात्मक होती है।\nकथन M गलत है। CO₂ अणु में कार्बन और ऑक्सीजन के बीच द्विबंध होते हैं और इसकी ज्यामिति रेखीय (linear) होती है। यद्यपि C-O बंध ध्रुवीय होते हैं, अणु की रेखीय ज्यामिति के कारण दो C=O बंधों के द्विध्रुव आघूर्ण (dipole moments) एक दूसरे को रद्द कर देते हैं, जिससे CO₂ एक अध्रुवीय (non-polar) अणु बन जाता है।"}, {"id": 20, "section": "Chemistry", "question": "निम्नलिखित कथनों पर विचार कीजिए:\nJ: आवर्त सारणी (periodic table) में एक आवर्त (period) में बाईं से दाईं ओर जाने पर, सामान्यतः आयनीकरण एन्थैल्पी (ionization enthalpy) बढ़ती है, लेकिन बेरिलियम (Be) और नाइट्रोजन (N) की आयनीकरण एन्थैल्पी उनके संबंधित अगले तत्वों (बोरॉन (B) और ऑक्सीजन (O)) से अधिक होती है।\nK: सहसंयोजक बंध (covalent bond) की ध्रुवीयता (polarity) बंधित परमाणुओं (bonded atoms) के बीच विद्युतऋणात्मकता (electronegativity) के अंतर पर निर्भर करती है; जितना अधिक अंतर होगा, बंध उतना ही अधिक ध्रुवीय होगा, जिससे बंध की आयनिक प्रकृति (ionic character) बढ़ती है।\nL: XeF₄ अणु की ज्यामिति (geometry) वर्ग समतलीय (square planar) होती है, जबकि इसका संकरण (hybridization) sp³d² होता है, जिसमें केंद्रीय परमाणु (central atom) पर दो एकाकी युग्म (lone pairs) होते हैं।\nM: एक ही आवर्त में, क्षार धातुओं (alkali metals) की परमाणु त्रिज्या (atomic radius) सबसे बड़ी होती है, और हैलोजेन (halogens) की इलेक्ट्रॉन लब्धि एन्थैल्पी (electron gain enthalpy) सबसे अधिक ऋणात्मक होती है, जो उनकी उच्च इलेक्ट्रॉन बंधुता (electron affinity) को दर्शाती है", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, L और M", "J, K, L और M सभी", "केवल J, K और L", "केवल K, L और M"], "answer": "J, K, L और M सभी", "explanation": "J. यह कथन सही है। आवर्त में बाईं से दाईं ओर जाने पर प्रभावी नाभिकीय आवेश (effective nuclear charge) बढ़ने के कारण आयनीकरण एन्थैल्पी बढ़ती है। हालांकि, Be (1s²2s²) में पूर्ण भरा हुआ s-उपकोश (subshell) और N (1s²2s²2p³) में अर्ध-भरा हुआ p-उपकोश होता है, जो उन्हें अतिरिक्त स्थायित्व (stability) प्रदान करता है, जिससे उनकी आयनीकरण एन्थैल्पी उनके अगले तत्वों B और O से अधिक होती है।\nK. यह कथन सही है। दो परमाणुओं के बीच विद्युतऋणात्मकता का अंतर जितना अधिक होता है, बंध उतना ही अधिक ध्रुवीय होता है, और बंध में आयनिक प्रकृति उतनी ही अधिक होती है।\nL. यह कथन सही है। XeF₄ में केंद्रीय परमाणु Xe के पास 8 संयोजी इलेक्ट्रॉन (valence electrons) होते हैं। 4 F परमाणुओं के साथ 4 बंध युग्म (bond pairs) बनते हैं। शेष 4 इलेक्ट्रॉन 2 एकाकी युग्म बनाते हैं। कुल 6 इलेक्ट्रॉन युग्म (4BP + 2LP) के लिए संकरण sp³d² होता है। VSEPR सिद्धांत के अनुसार, 4 बंध युग्म और 2 एकाकी युग्म के साथ ज्यामिति वर्ग समतलीय होती है।\nM. यह कथन सही है। क्षार धातुएँ आवर्त सारणी में सबसे बाईं ओर होती हैं, इसलिए उनका परमाणु आकार सबसे बड़ा होता है। हैलोजेन (समूह 17) को एक इलेक्ट्रॉन प्राप्त करके उत्कृष्ट गैस विन्यास (noble gas configuration) प्राप्त करने की तीव्र प्रवृत्ति होती है, इसलिए उनकी इलेक्ट्रॉन लब्धि एन्थैल्पी सबसे अधिक ऋणात्मक होती है, जो उच्च इलेक्ट्रॉन बंधुता को दर्शाती है।\nइसलिए, सभी कथन सही हैं।"}, {"id": 21, "section": "Chemistry", "question": "अभिकथन (A): H₂O अणु में O-H बंध ध्रुवीय (polar) होते हैं, लेकिन CO₂ अणु में C=O बंध न नहीं होता है।\nकथन IV गलत है। बफर विलयन का pH मान 7 के बराबर होना आवश्यक नहीं है; यह अम्लीय, क्षारीय या उदासीन हो सकता है, जो उसमें मौजूद दुर्बल अम्ल/क्षार और उसके संयुग्मी लवण की प्रकृति पर निर्भर करता है।"}, {"id": 26, "section": "Chemistry", "question": "निम्नलिखित कथनों पर विचार कीजिए और सही विकल्प का चयन कीजिए:\nJ: एक दुर्बल अम्ल (weak acid) और उसके संयुग्मी क्षार (conjugate base) के लिए, Ka × Kb का गुणनफल (product) हमेशा 25°C पर ही जल के आयनिक गुणनफल (ionic product of water, Kw) के बराबर होता है।\nK: एक बफर विलयन (buffer solution) का pH तनुकरण (dilution) पर महत्वपूर्ण रूप से नहीं बदलता है, लेकिन इसकी बफर क्षमता (buffer capacity) तनुकरण के साथ कम हो जाती है।\nL: सिल्वर क्लोराइड (AgCl) की विलेयता (solubility) को सोडियम क्लोराइड (NaCl) विलयन में जोड़ने पर घट जाती है, जबकि अमोनिया (NH₃) विलयन में जोड़ने पर बढ़ जाती है।\nM: एक गैसीय अभिक्रिया (gaseous reaction) में, यदि अभिकारकों (reactants) और उत्पादों (products) के गैसीय मोलों (gaseous moles) की संख्या समान हो (Δn_g = 0), तो स्थिर आयतन (constant volume) पर एक अक्रिय गैस (inert gas) मिलाने से साम्यावस्था (equilibrium) पर कोई प्रभाव नहीं पड़ता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, L और M सभी सही हैं।", "केवल J और M सही हैं।", "केवल K, L और M सही हैं।", "केवल J, K और L सही हैं।"], "answer": "J, K, L और M सभी सही हैं।", "explanation": "आइए प्रत्येक कथन का विश्लेषण करें:\n\nJ. कथन J सही है। जल का आयनिक गुणनफल (Kw) तापमान पर निर्भर करता है। इसलिए, एक दुर्बल अम्ल और उसके संयुग्मी क्षार के लिए Ka × Kb = Kw संबंध केवल एक विशिष्ट तापमान (आमतौर पर 25°C) पर ही मान्य होता है, जहाँ Kw का मान 1.0 × 10⁻¹⁴ होता है। तापमान बदलने पर Kw का मान भी बदल जाता है।\n\nK. कथन K सही है। बफर विलयन का pH, हेन्डर्सन-हैसलबाल्च समीकरण (Henderson-Hasselbalch equation) pH = pKa + log([लवण]/[अम्ल]) के अनुसार, अम्ल और उसके संयुग्मी क्षार की सांद्रता (concentration) के अनुपात पर निर्भर करता है। तनुकरण पर, दोनों की सांद्रता समानुपातिक रूप से कम होती है, जिससे उनका अनुपात लगभग अपरिवर्तित रहता है और pH में बहुत कम परिवर्तन होता है। हालांकि, बफर क्षमता बफर घटकों की निरपेक्ष सांद्रता पर निर्भर करती है, जो तनुकरण के साथ कम हो जाती है।\n\nL. कथन L सही है। सोडियम क्लोराइड (NaCl) मिलाने पर, AgCl की विलेयता सम आयन प्रभाव (common ion effect) के कारण घट जाती है क्योंकि Cl⁻ आयन की सांद्रता बढ़ जाती है, जिससे AgCl ⇌ Ag⁺ + Cl⁻ साम्यावस्था बाईं ओर विस्थापित होती है। अमोनिया (NH₃) मिलाने पर, Ag⁺ आयन अमोनिया के साथ अभिक्रिया करके एक स्थिर जटिल आयन [Ag(NH₃)₂]⁺ बनाते हैं। यह Ag⁺ आयनों को विलयन से हटाता है, जिससे AgCl की विलेयता बढ़ जाती है (साम्यावस्था दाईं ओर विस्थापित होती है)।\n\nM. कथन M सही है। ला शातेलिए के सिद्धांत (Le Chatelier's Principle) के अनुसार, स्थिर आयतन पर एक अक्रिय गैस मिलाने से अभिक्रिया में शामिल गैसीय अभिकारकों और उत्पादों के आंशिक दाब (partial pressures) में कोई परिवर्तन नहीं होता है। चूंकि साम्यावस्था आंशिक दाब पर निर्भर करती है, इसलिए साम्यावस्था की स्थिति पर कोई प्रभाव नहीं पड़ता है, खासकर जब गैसीय मोलों की संख्या में कोई शुद्ध परिवर्तन (Δn_g = 0) न हो।"}, {"id": 27, "section": "Chemistry", "question": "अभिकथन (A): BF₃ एक लुईस अम्ल (Lewis acid) है।\nकारण (R): BF₃ में केंद्रीय बोरोन परमाणु (central boron atom) का अष्टक (octet) अपूर्ण होता है और यह इलेक्ट्रॉन युग्म (electron pair) स्वीकार कर सकता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A) सत्य है, लेकिन (R) असत्य है।", "(A) और (R) दोनों सत्य हैं, लेकिन (R), (A) की सही व्याख्या नहीं है।", "(A) असत्य है, लेकिन (R) सत्य है।", "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।"], "answer": "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "explanation": "लुईस अम्ल वे पदार्थ होते हैं जो इलेक्ट्रॉन युग्म स्वीकार कर सकते हैं। BF₃ में, बोरोन परमाणु के संयोजकता कोश (valence shell) में केवल 6 इलेक्ट्रॉन होते हैं (3 बॉन्ड पेयर), जिससे इसका अष्टक अपूर्ण होता है। इस इलेक्ट्रॉन की कमी के कारण, बोरोन परमाणु एक इलेक्ट्रॉन युग्म स्वीकार करने में सक्षम होता है, जो इसे एक लुईस अम्ल बनाता है। इसलिए, अभिकथन (A) और कारण (R) दोनों सत्य हैं, और कारण (R) अभिकथन (A) की सही व्याख्या करता है।"}, {"id": 28, "section": "Chemistry", "question": "साम्य स्थिरांक (equilibrium constant) Kc और Kp के संबंध में निम्नलिखित कथनों पर विचार करें:\nJ: Kp = Kc जब अभिक्रिया में गैसीय उत्पादों (gaseous products) के मोलों की संख्या गैसीय अभिकारकों (gaseous reactants) के मोलों की संख्या के बराबर होती है।\nK: Kp = Kc(RT)Δn, जहाँ Δn = (गैसीय उत्पादों के मोलों की संख्या) − (गैसीय अभिकारकों के मोलों की संख्या)।\nL: यदि Δn धनात्मक (positive) है, तो Kp > Kc।\nM: साम्य स्थिरांक का मान अभिक्रिया के तापमान पर निर्भर करता है", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K और L", "J, K और M", "J, K, L और M", "K, L और M"], "answer": "J, K, L और M", "explanation": "कथन J सही है क्योंकि यदि गैसीय उत्पादों और अभिकारकों के मोलों की संख्या बराबर है, तो Δn = 0, और (RT)⁰ = 1, जिससे Kp = Kc होता है। कथन K साम्य स्थिरांकों के बीच सही संबंध सूत्र है। कथन L सही है क्योंकि यदि Δn धनात्मक है, तो (RT)Δn > 1 (सामान्य तापमान पर), जिससे Kp > Kc होगा। कथन M भी सही है क्योंकि साम्य स्थिरांक का मान केवल तापमान पर निर्भर करता है और अभिकारकों की सांद्रता या दाब पर नहीं।"}, {"id": 29, "section": "Chemistry", "question": "सूची-I में दिए गए लवणों (salts) को सूची-II में दिए गए उनके जलीय विलयन (aqueous solution) के pH प्रकृति (pH nature) से सुमेलित (match) कीजिए:\nसूची-I\nJ: NH₄Cl\nK: CH₃COONa\nL: K₂SO₄\nM: CH₃COONH₄\nसूची-II\n1. अम्लीय (acidic)\n2. क्षारीय (basic)\n3. लगभग उदासीन (nearly neutral)\n4. दुर्बल अम्लीय या दुर्बल क्षारीय (weakly acidic or weakly basic)\nसही मिलान का चयन करें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-1, K-2, L-4, M-3", "J-2, K-1, L-3, M-4", "J-1, K-2, L-3, M-4", "J-3, K-4, L-1, M-2"], "answer": "J-1, K-2, L-3, M-4", "explanation": "लवणों के जल-अपघटन (hydrolysis) के आधार पर pH प्रकृति निर्धारित की जाती है:\nP. NH₄Cl: यह एक प्रबल अम्ल (HCl) और दुर्बल क्षार (NH₄OH) से बना लवण है। दुर्बल क्षार का संयुग्मी अम्ल जल-अपघटित होता है, जिससे विलयन अम्लीय (acidic) होता है। (P-1)\nQ. CH₃COONa: यह एक दुर्बल अम्ल (CH₃COOH) और प्रबल क्षार (NaOH) से बना लवण है। दुर्बल अम्ल का संयुग्मी क्षार जल-अपघटित होता है, जिससे विलयन क्षारीय (basic) होता है। (Q-2)\nR. K₂SO₄: यह एक प्रबल अम्ल (H₂SO₄) और प्रबल क्षार (KOH) से बना लवण है। इसमें कोई भी आयन जल-अपघटित नहीं होता है, इसलिए विलयन लगभग उदासीन (nearly neutral) होता है। (R-3)\nS. CH₃COONH₄: यह एक दुर्बल अम्ल (CH₃COOH) और दुर्बल क्षार (NH₄OH) से बना लवण है। इसके विलयन का pH अम्ल और क्षार के Ka और Kb मानों पर निर्भर करता है। यदि Ka ≈ Kb, तो यह लगभग उदासीन होगा, लेकिन सामान्यतः इसे दुर्बल अम्लीय या दुर्बल क्षारीय माना जा सकता है, जो Ka और Kb के सापेक्ष मान पर निर्भर करता है। दिए गए विकल्पों में 'दुर्बल अम्लीय या दुर्बल क्षारीय' सबसे उपयुक्त है। (S-4)\nअतः, सही मिलान P-1, Q-2, R-3, S-4 है।"}, {"id": 30, "section": "Chemistry", "question": "एक दुर्बल अम्ल (weak acid) और प्रबल क्षार (strong base) के अनुमापन (titration) के दौरान pH परिवर्तन के निम्नलिखित चरणों को सही कालानुक्रमिक (chronological) क्रम में व्यवस्थित करें:\nJ: तुल्यता बिंदु (equivalence point) पर pH 7 से अधिक होता है।\nK: प्रारंभिक pH दुर्बल अम्ल की सांद्रता पर निर्भर करता है और 7 से कम होता है।\nL: बफर क्षेत्र (buffer region) जहाँ pH में परिवर्तन बहुत कम होता है।\nM: तुल्यता बिंदु के बाद, प्रबल क्षार की अधिकता के कारण pH तेजी से बढ़ता है।\nसही क्रम का चयन करें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["K, J, L, M", "K, L, J, M", "L, K, J, M", "J, K, L, M"], "answer": "K, L, J, M", "explanation": "दुर्बल अम्ल और प्रबल क्षार के अनुमापन वक्र (titration curve) के चरणों का सही कालानुक्रमिक क्रम इस प्रकार है:\n1. K. प्रारंभिक pH दुर्बल अम्ल की सांद्रता पर निर्भर करता है और 7 से कम होता है। अनुमापन की शुरुआत में, केवल दुर्बल अम्ल मौजूद होता है, इसलिए विलयन अम्लीय होता है और pH 7 से कम होता है।\n2. L. बफर क्षेत्र जहाँ pH में परिवर्तन बहुत कम होता है। जैसे-जैसे प्रबल क्षार मिलाया जाता है, दुर्बल अम्ल और उसके संयुग्मी क्षार का मिश्रण बनता है, जिससे एक बफर विलयन बनता है। इस क्षेत्र में, थोड़ी मात्रा में क्षार मिलाने पर pH में बहुत कम परिवर्तन होता है।\n3. J. तुल्यता बिंदु पर pH 7 से अधिक होता है। दुर्बल अम्ल और प्रबल क्षार के अनुमापन में, तुल्यता बिंदु पर विलयन क्षारीय होता है क्योंकि दुर्बल अम्ल का संयुग्मी क्षार जल-अपघटित होकर OH⁻ आयन उत्पन्न करता है।\n4. M. तुल्यता बिंदु के बाद, प्रबल क्षार की अधिकता के कारण pH तेजी से बढ़ता है। तुल्यता बिंदु के बाद, अतिरिक्त प्रबल क्षार pH को तेजी से बढ़ाता है क्योंकि विलयन में प्रबल क्षार की सांद्रता बढ़ जाती है।\nइसलिए, सही कालानुक्रमिक क्रम K, L, J, M है।"}, {"id": 31, "section": "Chemistry", "question": "यदि सिल्वर क्रोमेट (Ag₂CrO₄) की विलेयता (solubility) 25°C पर 1.3 × 10⁻⁴ mol/L है, तो इसका विलेयता गुणनफल (solubility product, Ksp) क्या होगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["39 × 10⁻¹²", "8.78 × 10⁻¹²", "69 × 10⁻⁸", "38 × 10⁻⁸"], "answer": "8.78 × 10⁻¹²", "explanation": "सिल्वर क्रोमेट (Ag₂CrO₄) के लिए, आयनीकरण (ionization) अभिक्रिया इस प्रकार होती है:\nAg₂CrO₄(s) ⇌ 2Ag⁺(aq) + CrO₄²⁻(aq)\nयदि Ag₂CrO₄ की विलेयता 's' mol/L है, तो साम्य पर [Ag⁺] = 2s और [CrO₄²⁻] = s होगा।\nविलेयता गुणनफल (Ksp) का व्यंजक (expression) है:\nKsp = [Ag⁺]²[CrO₄²⁻] = (2s)²(s) = 4s³\nदी गई विलेयता s = 1.3 × 10⁻⁴ mol/L है।\nKsp = 4 × (1.3 × 10⁻⁴)³\nKsp = 4 × (2.197 × 10⁻¹²)\nKsp = 8.788 × 10⁻¹²\nनिकटतम मान 8.78 × 10⁻¹² है।"}, {"id": 32, "section": "Chemistry", "question": "हैबर प्रक्रिया (Haber process) N₂(g) + 3H₂(g) ⇌ 2NH₃(g) के लिए, ΔH = -92 kJ/mol है। साम्यावस्था (equilibrium) पर इस अभिक्रिया के संबंध में निम्नलिखित कथनों का मूल्यांकन करें:\nJ: तापमान (temperature) बढ़ाने पर साम्यावस्था बाईं ओर विस्थापित होगी और साम्यावस्था स्थिरांक (equilibrium constant) Kp का मान घटेगा।\nK: दाब (pressure) बढ़ाने पर साम्यावस्था दाईं ओर विस्थापित होगी और अमोनिया (NH₃) का उत्पादन बढ़ेगा।\nL: एक अक्रिय गैस (inert gas) जैसे आर्गन (Ar) को स्थिर दाब (constant pressure) पर मिलाने से साम्यावस्था दाईं ओर विस्थापित होगी।\nM: एक उत्प्रेरक (catalyst) मिलाने से साम्यावस्था दाईं ओर विस्थापित होगी और अभिक्रिया की दर (rate of reaction) बढ़ जाएगी", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, K और M", "केवल J, K और L", "केवल J और K", "सभी J, K, L और M"], "answer": "केवल J और K", "explanation": "आइए प्रत्येक कथन का विश्लेषण करें:\nJ. अभिक्रिया ऊष्माक्षेपी (exothermic) है (ΔH = -92 kJ/mol)। ली-चेटेलियर सिद्धांत (Le Chatelier's principle) के अनुसार, तापमान बढ़ाने पर साम्यावस्था बाईं ओर (अभिकारकों की ओर) विस्थापित होगी और ऊष्माक्षेपी अभिक्रियाओं के लिए Kp का मान घटता है। अतः, कथन J सही है।\nK. अभिकारकों के कुल मोल (1+3=4) उत्पादों के कुल मोल (2) से अधिक हैं। दाब बढ़ाने पर साम्यावस्था कम मोल वाली दिशा में (उत्पादों की ओर) विस्थापित होगी, जिससे अमोनिया का उत्पादन बढ़ेगा। अतः, कथन K सही है।\nL. स्थिर दाब पर एक अक्रिय गैस मिलाने से कुल आयतन बढ़ता है, जिससे सभी गैसों के आंशिक दाब (partial pressures) कम हो जाते हैं। साम्यावस्था अधिक मोल वाली दिशा में (बाईं ओर) विस्थापित होगी। अतः, कथन L गलत है।\nM. एक उत्प्रेरक अभिक्रिया की दर को बढ़ाता है और साम्यावस्था को जल्दी प्राप्त करने में मदद करता है, लेकिन यह साम्यावस्था की स्थिति को विस्थापित नहीं करता है। अतः, कथन M गलत है।"}, {"id": 33, "section": "Chemistry", "question": "50 mL 0.1 M CH₃COOH (Ka = 1.8 × 10⁻⁵) के विलयन को 0.1 M NaOH के साथ अनुमापित (titrated) किया जा रहा है। इस अनुमापन (titration) के संबंध में निम्नलिखित कथनों का मूल्यांकन करें:\nJ: प्रारंभिक pH (initial pH) लगभग 2.87 होगा।\nK: 25 mL NaOH मिलाने पर विलयन का pH लगभग 4.74 होगा।\nL: तुल्यता बिंदु (equivalence point) पर विलयन का pH लगभग 8.72 होगा।\nM: 60 mL NaOH मिलाने पर विलयन का pH लगभग 12.50 होगा", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, K और L", "सभी J, K, L और M", "केवल J और K", "केवल J, K और M"], "answer": "केवल J, K और L", "explanation": "आइए प्रत्येक कथन का विश्लेषण करें:\nJ. प्रारंभिक pH (weak acid): [H⁺] = √(Ka × C) = √(1.8 × 10⁻⁵ × 0.1) = √(1.8 × 10⁻⁶) = 1.34 × 10⁻³ M। pH = -log(1.34 × 10⁻³) ≈ 2.87। अतः, कथन J सही है।\nK. 25 mL NaOH मिलाने पर, यह अर्ध-तुल्यता बिंदु (half-equivalence point) है क्योंकि 50 mL CH₃COOH का आधा भाग उदासीन हो गया है। इस बिंदु पर, [CH₃COOH] = [CH₃COO⁻], इसलिए pH = pKa = -log(1.8 × 10⁻⁵) ≈ 4.74। अतः, कथन K सही है।\nL. तुल्यता बिंदु पर, 50 mL NaOH मिलाया गया है। कुल आयतन 100 mL है और विलयन में 5 mmol CH₃COONa (0.05 M) है। CH₃COO⁻ का जल-अपघटन (hydrolysis) होता है: CH₃COO⁻ + H₂O ⇌ CH₃COOH + OH⁻। Kb = Kw/Ka = 10⁻¹⁴ / (1.8 × 10⁻⁵) = 5.56 × 10⁻¹⁰। [OH⁻] = √(Kb × C) = √(5.56 × 10⁻¹⁰ × 0.05) ≈ 5.27 × 10⁻⁶ M। pOH = -log(5.27 × 10⁻⁶) ≈ 5.28। pH = 14 − 5.28 = 8.72। अतः, कथन L सही है।\nM. 60 mL NaOH मिलाने पर, 10 mL NaOH अतिरिक्त है। अतिरिक्त NaOH के मोल = 10 mL × 0.1 M = 1 mmol। कुल आयतन = 50 + 60 = 110 mL। [OH⁻] = 1 mmol / 110 mL ≈ 0.00909 M। pOH = -log(0.00909) ≈ 2.04। pH = 14 − 2.04 = 11.96। कथन में दिया गया pH 12.50 गलत है। अतः, कथन M गलत है।"}, {"id": 34, "section": "Chemistry", "question": "एक बफर विलयन (buffer solution) 100 mL 0.1 M CH₃COOH (Ka = 1.8 × 10⁻⁵) और 50 mL 0.1 M NaOH को मिलाकर बनाया गया है। इस बफर के संबंध में निम्नलिखित कथनों का मूल्यांकन करें:\nJ: इस बफर विलयन का pH लगभग 4.74 होगा।\nK: यदि इस बफर विलयन में 10 mL 0.1 M HCl मिलाया जाए, तो pH में महत्वपूर्ण परिवर्तन नहीं होगा।\nL: बफर की क्षमता (buffer capacity) अधिकतम होती है जब दुर्बल अम्ल (weak acid) और उसके संयुग्मी क्षार (conjugate base) की सांद्रता (concentration) समान होती है।\nM: यह बफर एक अम्लीय बफर (acidic buffer) का उदाहरण है", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, L और M", "सभी J, K, L और M", "केवल J, K और M", "केवल J, K और L"], "answer": "केवल J, L और M", "explanation": "आइए प्रत्येक कथन का विश्लेषण करें:\nप्रारंभिक मोल: CH₃COOH = 100 mL × 0.1 M = 10 mmol; NaOH = 50 mL × 0.1 M = 5 mmol।\nअभिक्रिया के बाद: CH₃COOH + NaOH → CH₃COONa + H₂O। 5 mmol NaOH, 5 mmol CH₃COOH के साथ अभिक्रिया करेगा।\nशेष CH₃COOH = 10 − 5 = 5 mmol। बना CH₃COONa = 5 mmol। कुल आयतन = 100 + 50 = 150 mL।\nJ. pH = pKa + log([CH₃COONa]/[CH₃COOH])। चूंकि [CH₃COONa] = [CH₃COOH] (दोनों 5 mmol/150 mL), pH = pKa = -log(1.8 × 10⁻⁵) ≈ 4.74। अतः, कथन J सही है।\nK. यदि 10 mL 0.1 M HCl (1 mmol H⁺) मिलाया जाए: CH₃COO⁻ + H⁺ → CH₃COOH।\nनया CH₃COONa = 5 − 1 = 4 mmol। नया CH₃COOH = 5 + 1 = 6 mmol।\nनया pH = 4.74 + log(4/6) = 4.74 − 0.176 = 4.564। pH में 0.176 इकाई का परिवर्तन महत्वपूर्ण माना जाता है, इसलिए 'महत्वपूर्ण परिवर्तन नहीं होगा' कथन गलत है। अतः, कथन K गलत है।\nL. बफर की क्षमता अधिकतम होती है जब दुर्बल अम्ल और उसके संयुग्मी क्षार की सांद्रता समान होती है, क्योंकि इस स्थिति में बफर अम्ल और क्षार दोनों को समान रूप से बेअसर कर सकता है। अतः, कथन L सही है।\nM. यह एक दुर्बल अम्ल (CH₃COOH) और उसके प्रबल क्षार (NaOH) के साथ बने लवण (CH₃COONa) का मिश्रण है, जो एक अम्लीय बफर का उदाहरण है। अतः, कथन M सही है।"}, {"id": 35, "section": "Chemistry", "question": "AgCl (Ksp = 1.8 × 10⁻¹⁰) और Ag₂CrO₄ (Ksp = 1.1 × 10⁻¹²) के लिए विलेयता गुणनफल (solubility product) दिए गए हैं। इन लवणों की विलेयता (solubility) के संबंध में निम्नलिखित कथनों का मूल्यांकन करें:\nJ: AgCl की शुद्ध जल में मोलर विलेयता (molar solubility) लगभग 1.34 × 10⁻⁵ M है।\nK: 0.01 M NaCl विलयन में AgCl की विलेयता शुद्ध जल की तुलना में कम होगी।\nL: यदि 0.01 M AgNO₃ विलयन को 0.01 M Na₂CrO₄ विलयन के साथ समान आयतन (equal volume) में मिलाया जाए, तो Ag₂CrO₄ का अवक्षेपण (precipitation) नहीं होगा।\nM: AgCl, Ag₂CrO₄ की तुलना में शुद्ध जल में अधिक विलेय (soluble) है", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, K और L", "सभी J, K, L और M", "केवल J, K और M", "केवल J और K"], "answer": "केवल J और K", "explanation": "आइए प्रत्येक कथन का विश्लेषण करें:\nJ. AgCl के लिए, AgCl ⇌ Ag⁺ + Cl⁻, Ksp = s²। s = √Ksp = √(1.8 × 10⁻¹⁰) = 1.34 × 10⁻⁵ M। अतः, कथन J सही है।\nK. NaCl विलयन में Cl⁻ एक उभयनिष्ठ आयन (common ion) है। उभयनिष्ठ आयन प्रभाव (common ion effect) के कारण, AgCl की विलेयता शुद्ध जल की तुलना में कम हो जाएगी। अतः, कथन K सही है।\nL. समान आयतन में मिलाने पर, [Ag⁺] = 0.01/2 = 0.005 M और [CrO₄²⁻] = 0.01/2 = 0.005 M।\nAg₂CrO₄ के लिए, आयनिक गुणनफल (ionic product) Qsp = [Ag⁺]²[CrO₄²⁻] = (0.005)²(0.005) = (2.5 × 10⁻⁵)(5 × 10⁻³) = 1.25 × 10⁻⁷।\nचूंकि Qsp (1.25 × 10⁻⁷) > Ksp (1.1 × 10⁻¹²), Ag₂CrO₄ का अवक्षेपण होगा। कथन 'अवक्षेपण नहीं होगा' गलत है। अतः, कथन L गलत है।\nM. AgCl की विलेयता = 1.34 × 10⁻⁵ M।\nAg₂CrO₄ के लिए, Ag₂CrO₄ ⇌ 2Ag⁺ + CrO₄²⁻, Ksp = (2s)²(s) = 4s³।\ns³ = Ksp/4 = (1.1 × 10⁻¹²)/4 = 0.275 × 10⁻¹² = 275 × 10⁻¹⁵।\ns = (275 × 10⁻¹⁵)⁽¹/³⁾ ≈ 6.5 × 10⁻⁵ M।\nचूंकि 6.5 × 10⁻⁵ M (Ag₂CrO₄) > 1.34 × 10⁻⁵ M (AgCl), Ag₂CrO₄ शुद्ध जल में AgCl की तुलना में अधिक विलेय है। कथन 'AgCl अधिक विलेय है' गलत है। अतः, कथन M गलत है।"}, {"id": 36, "section": "Chemistry", "question": "25°C पर लवण विलयनों (salt solutions) के pH के संबंध में निम्नलिखित कथनों का मूल्यांकन करें:\nJ: 0.1 M NH₄Cl विलयन का pH 7 से कम होगा।\nK: 0.1 M CH₃COONa विलयन का pH 7 से अधिक होगा।\nL: यदि एक दुर्बल अम्ल (weak acid) और एक दुर्बल क्षार (weak base) से बने लवण के लिए Ka = 1.0 × 10⁻⁵ और Kb = 1.0 × 10⁻⁵ हो, तो उसके 0.1 M विलयन का pH 7 होगा।\nM: 0.1 M NaF विलयन का pH 7 से कम होगा, क्योंकि F⁻ आयन की जल-अपघटन (hydrolysis) क्षमता कम होती है", "brand": "bilaspurtestseries.com 9669946966", "options": ["सभी J, K, L और M", "केवल J, K और L", "केवल J और K", "केवल J, K और M"], "answer": "केवल J, K और L", "explanation": "आइए प्रत्येक कथन का विश्लेषण करें:\nJ. NH₄Cl एक प्रबल अम्ल (HCl) और दुर्बल क्षार (NH₄OH) का लवण है। NH₄⁺ आयन जल-अपघटित होकर H⁺ आयन उत्पन्न करता है, जिससे विलयन अम्लीय (pH < 7) हो जाता है। अतः, कथन J सही है।\nK. CH₃COONa एक दुर्बल अम्ल (CH₃COOH) और प्रबल क्षार (NaOH) का लवण है। CH₃COO⁻ आयन जल-अपघटित होकर OH⁻ आयन उत्पन्न करता है, जिससे विलयन क्षारीय (pH > 7) हो जाता है। अतः, कथन K सही है।\nL. दुर्बल अम्ल और दुर्बल क्षार से बने लवण के विलयन का pH इस सूत्र से दिया जाता है: pH = 7 + 0.5(pKa − pKb)। यदि Ka = Kb हो, तो pKa = pKb होगा, जिससे pH = 7 होगा। अतः, कथन L सही है।\nM. NaF एक प्रबल क्षार (NaOH) और दुर्बल अम्ल (HF) का लवण है। F⁻ आयन जल-अपघटित होकर OH⁻ आयन उत्पन्न करता है (F⁻ + H₂O ⇌ HF + OH⁻), जिससे विलयन क्षारीय (pH > 7) हो जाता है। कथन में कहा गया है कि pH 7 से कम होगा, और इसका कारण भी गलत है (F⁻ की जल-अपघटन क्षमता कम नहीं होती, बल्कि यह pH को बढ़ाती है)। अतः, कथन M गलत है।"}, {"id": 37, "section": "Chemistry", "question": "एक बंद पात्र (closed vessel) में, अभिक्रिया PCl₅(g) ⇌ PCl₃(g) + Cl₂(g) साम्यावस्था (equilibrium) में है। साम्यावस्था पर, PCl₅, PCl₃ और Cl₂ के आंशिक दाब (partial pressures) क्रमशः 0.5 atm, 0.2 atm और 0.2 atm हैं। निम्नलिखित कथनों का मूल्यांकन करें:\nJ: इस अभिक्रिया के लिए Kp का मान 0.08 होगा।\nK: यदि दाब (pressure) बढ़ाया जाता है, तो साम्यावस्था बाईं ओर विस्थापित होगी।\nL: यदि एक अक्रिय गैस (inert gas) को स्थिर आयतन (constant volume) पर मिलाया जाता है, तो साम्यावस्था पर कोई प्रभाव नहीं पड़ेगा।\nM: यदि तापमान बढ़ाया जाता है और अभिक्रिया ऊष्माशोषी (endothermic) है, तो PCl₅ का वियोजन (dissociation) बढ़ेगा", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, K और L", "केवल J, L और M", "सभी J, K, L और M", "केवल K, L और M"], "answer": "सभी J, K, L और M", "explanation": "आइए प्रत्येक कथन का विश्लेषण करें:\nJ. Kp की गणना: Kp = (PPCₗ₃ × PCₗ₂) / PPCₗ₅ = (0.2 atm × 0.2 atm) / 0.5 atm = 0.04 / 0.5 = 0.08। अतः, कथन J सही है।\nK. दाब का प्रभाव: अभिक्रिया में, अभिकारकों (reactants) के मोलों की संख्या (PCl₅ के 1 मोल) उत्पादों (products) के मोलों की संख्या (PCl₃ और Cl₂ के कुल 2 मोल) से कम है। ले-चेटेलियर के सिद्धांत (Le Chatelier's principle) के अनुसार, दाब बढ़ाने पर साम्यावस्था कम मोलों वाली दिशा में विस्थापित होती है, यानी बाईं ओर। अतः, कथन K सही है।\nL. अक्रिय गैस का प्रभाव (स्थिर आयतन पर): स्थिर आयतन पर अक्रिय गैस मिलाने से कुल दाब बढ़ता है, लेकिन अभिकारकों और उत्पादों के आंशिक दाब अपरिवर्तित रहते हैं। चूंकि साम्यावस्था आंशिक दाब पर निर्भर करती है, इसलिए साम्यावस्था पर कोई प्रभाव नहीं पड़ेगा। अतः, कथन L सही है।\nM. तापमान का प्रभाव (ऊष्माशोषी अभिक्रिया): यदि अभिक्रिया ऊष्माशोषी (endothermic) है (ΔH > 0), तो तापमान बढ़ाने पर साम्यावस्था उत्पादों की ओर (दाईं ओर) विस्थापित होती है। इससे PCl₅ का वियोजन (dissociation) बढ़ेगा। अतः, कथन M सही है।\nसभी कथन J, K, L और M सही हैं।"}, {"id": 38, "section": "Chemistry", "question": "एक 0.1 M सोडियम एसीटेट (sodium acetate, CH₃COONa) विलयन पर विचार करें। एसीटिक अम्ल (acetic acid, CH₃COOH) के लिए Ka = 1.8 × 10⁻⁵ है। निम्नलिखित कथनों का मूल्यांकन करें:\nJ: यह विलयन एक बफर विलयन (buffer solution) के रूप में कार्य करेगा।\nK: इस विलयन का pH 7 से अधिक होगा।\nL: विलयन में एसीटेट आयन (acetate ion, CH₃COO⁻) का जल-अपघटन (hydrolysis) होगा।\nM: विलयन में [OH⁻] की सांद्रता लगभग 7.45 × 10⁻⁶ M होगी। (Kw = 1.0 × 10⁻¹⁴)", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल K, L और M", "केवल J, L और M", "सभी J, K, L और M", "केवल J, K और L"], "answer": "केवल K, L और M", "explanation": "आइए प्रत्येक कथन का विश्लेषण करें:\nJ. सोडियम एसीटेट एक दुर्बल अम्ल (weak acid) और प्रबल क्षार (strong base) का लवण (salt) है। यह स्वयं एक बफर विलयन नहीं है; बफर विलयन के लिए एक दुर्बल अम्ल/क्षार और उसके संयुग्मी लवण (conjugate salt) दोनों की आवश्यकता होती है। अतः, कथन J गलत है।\nK. चूंकि यह एक दुर्बल अम्ल और प्रबल क्षार का लवण है, इसलिए एसीटेट आयन जल-अपघटन से OH⁻ आयन उत्पन्न करेगा, जिससे विलयन क्षारीय (basic) होगा और pH 7 से अधिक होगा। अतः, कथन K सही है।\nL. एसीटेट आयन (CH₃COO⁻) जल के साथ अभिक्रिया करके जल-अपघटन से CH₃COOH और OH⁻ आयन बनाता है: CH₃COO⁻ + H₂O ⇌ CH₃COOH + OH⁻। अतः, कथन L सही है।\nM. जल-अपघटन स्थिरांक (hydrolysis constant) Kh = Kw / Ka = (1.0 × 10⁻¹⁴) / (1.8 × 10⁻⁵) ≈ 5.55 × 10⁻¹⁰।\n CH₃COO⁻ + H₂O ⇌ CH₃COOH + OH⁻\n यदि [OH⁻] = x, तो Kh = x² / (0.1 − x) ≈ x² / 0.1 (क्योंकि x बहुत छोटा है)।\n x² = Kh × 0.1 = 5.55 × 10⁻¹⁰ × 0.1 = 5.55 × 10⁻¹¹।\n x = √(5.55 × 10⁻¹¹) = √(55.5 × 10⁻¹²) ≈ 7.45 × 10⁻⁶ M। अतः, कथन M सही है।\nकथन K, L और M सही हैं।"}, {"id": 39, "section": "Chemistry", "question": "मैग्नीशियम हाइड्रॉक्साइड, Mg(OH)₂ (Ksp = 1.8 × 10⁻¹¹ at 25°C) की विलेयता (solubility) के संबंध में निम्नलिखित कथनों पर विचार करें:\nJ: शुद्ध जल (pure water) में Mg(OH)₂ की मोलर विलेयता (molar solubility) लगभग 1.65 × 10⁻⁴ M है।\nK: 0.01 M MgCl₂ विलयन में Mg(OH)₂ की विलेयता शुद्ध जल की तुलना में कम होगी।\nL: यदि विलयन का pH 9 पर बनाए रखा जाता है, तो Mg(OH)₂ की विलेयता 1.8 × 10⁻² M होगी।\nM: Mg(OH)₂ की विलेयता अम्लीय विलयन (acidic solution) में क्षारीय विलयन (basic solution) की तुलना में अधिक होती है", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, K और M", "सभी J, K, L और M", "केवल K, L और M", "केवल J, K और L"], "answer": "केवल J, K और M", "explanation": "आइए प्रत्येक कथन का विश्लेषण करें:\nJ. शुद्ध जल में Mg(OH)₂ की विलेयता (solubility) 's' मान लें। Mg(OH)₂(s) ⇌ Mg²⁺(aq) + 2OH⁻(aq) के लिए, Ksp = [Mg²⁺][OH⁻]² = s(2s)² = 4s³।\n 1.8 × 10⁻¹¹ = 4s³ ⇒ s³ = 0.45 × 10⁻¹¹ = 4.5 × 10⁻¹²।\n s = (4.5 × 10⁻¹²)⁽¹/³⁾ ≈ 1.65 × 10⁻⁴ M। अतः, कथन J सही है।\nK. 0.01 M MgCl₂ विलयन में, Mg²⁺ एक उभयनिष्ठ आयन (common ion) है। उभयनिष्ठ आयन प्रभाव (common ion effect) के कारण, Mg(OH)₂ की विलेयता कम हो जाएगी। अतः, कथन K सही है।\nL. यदि विलयन का pH 9 है, तो pOH = 14 − 9 = 5 होगा, और [OH⁻] = 10⁻⁵ M।\n Ksp = [Mg²⁺][OH⁻]² ⇒ 1.8 × 10⁻¹¹ = [Mg²⁺](10⁻⁵)² = [Mg²⁺] × 10⁻¹⁰।\n [Mg²⁺] = 1.8 × 10⁻¹¹ / 10⁻¹⁰ = 1.8 × 10⁻¹ M। कथन में विलेयता 1.8 × 10⁻² M दी गई है, जो गलत है। अतः, कथन L गलत है।\nM. Mg(OH)₂ एक दुर्बल क्षार (weak base) है। अम्लीय विलयन में H⁺ आयन OH⁻ आयनों के साथ अभिक्रिया करके जल बनाते हैं, जिससे [OH⁻] कम हो जाती है। ला शातेलिए के सिद्धांत (Le Chatelier's principle) के अनुसार, साम्यावस्था (equilibrium) दाईं ओर विस्थापित होती है, जिससे Mg(OH)₂ की विलेयता बढ़ जाती है। क्षारीय विलयन में उच्च [OH⁻] विलेयता को कम करती है। अतः, कथन M सही है।\nसही कथन J, K और M हैं।"}, {"id": 40, "section": "Chemistry", "question": "सिल्वर क्लोराइड (silver chloride, AgCl) के लिए विलेयता गुणनफल (solubility product) Ksp = 1.8 × 10⁻¹⁰ है। निम्नलिखित कथनों का मूल्यांकन करें:\nJ: शुद्ध जल (pure water) में AgCl की मोलर विलेयता (molar solubility) लगभग 1.34 × 10⁻⁵ M होगी।\nK: यदि 0.1 M NaCl विलयन में AgCl घोला जाता है, तो इसकी विलेयता शुद्ध जल की तुलना में बढ़ जाएगी।\nL: AgCl की विलेयता (solubility) Ag(NH₃)₂⁺ जैसे संकुल आयन (complex ion) के निर्माण से बढ़ सकती है।\nM: यदि AgCl को 0.01 M AgNO₃ विलयन में घोला जाता है, तो AgCl की विleयता लगभग 1.8 × 10⁻⁸ M होगी", "brand": "bilaspurtestseries.com 9669946966", "options": ["सभी J, K, L और M", "केवल J, L और M", "केवल K, L और M", "केवल J, K और L"], "answer": "केवल J, L और M", "explanation": "आइए प्रत्येक कथन का विश्लेषण करें:\nJ. शुद्ध जल में AgCl की विलेयता (s) के लिए, AgCl ⇌ Ag⁺ + Cl⁻। Ksp = [Ag⁺][Cl⁻] = s²।\n s = √Ksp = √(1.8 × 10⁻¹⁰) = √(18 × 10⁻¹¹) = √(180 × 10⁻¹²) ≈ 13.4 × 10⁻⁶ M = 1.34 × 10⁻⁵ M। अतः, कथन J सही है।\nK. 0.1 M NaCl विलयन में Cl⁻ आयन एक उभयनिष्ठ आयन (common ion) है। उभयनिष्ठ आयन प्रभाव (common ion effect) के कारण, AgCl की विलेयता शुद्ध जल की तुलना में कम हो जाएगी, न कि बढ़ेगी। अतः, कथन K गलत है।\nL. यदि Ag⁺ आयन विलयन से संकुल आयन (complex ion) जैसे Ag(NH₃)₂⁺ बनाने के लिए हटा दिए जाते हैं, तो ले-चेटेलियर के सिद्धांत के अनुसार, AgCl ⇌ Ag⁺ + Cl⁻ साम्यावस्था दाईं ओर विस्थापित होगी, जिससे AgCl की विलेयता बढ़ जाएगी। अतः, कथन L सही है।\nM. 0.01 M AgNO₃ विलयन में, [Ag⁺] = 0.01 M। AgCl की विलेयता (s) को मानते हुए, [Ag⁺] = (0.01 + s) और [Cl⁻] = s।\n Ksp = (0.01 + s) × s। चूंकि s << 0.01, इसलिए Ksp ≈ 0.01 × s।\n 1.8 × 10⁻¹⁰ = 0.01 × s।\n s = (1.8 × 10⁻¹⁰) / 0.01 = 1.8 × 10⁻⁸ M। अतः, कथन M सही है।\nकथन J, L और M सही हैं।"}, {"id": 41, "section": "Chemistry", "question": "निम्नलिखित कथनों पर विचार कीजिए और सही संयोजन (combination) का चयन कीजिए:\nJ: एक यौगिक जिसमें दो काइरल केंद्र (chiral centers) होते हैं, हमेशा चार स्टीरियोआइसोमर्स (stereoisomers) उत्पन्न करता है, बशर्ते वह मेसो यौगिक (meso compound) न हो।\nK: बेंजाइल कार्बोकैटायन (benzyl carbocation) की स्थिरता (stability) 2° एल्काइल कार्बोकैटायन (alkyl carbocation) की तुलना में अधिक होती है, मुख्य रूप से अनुनाद (resonance) के कारण।\nL: एल्कीन (alkene) पर HBr का योग (addition) मार्कोवनिकोव के नियम (Markovnikov's rule) का पालन करता है, जहाँ Br परमाणु उस कार्बन से जुड़ता है जिस पर अधिक हाइड्रोजन परमाणु होते हैं, और यह एक इलेक्ट्रोफिलिक योग अभिक्रिया (electrophilic addition reaction) है।\nM: साइक्लोहेक्सेन (cyclohexane) के चेयर कन्फॉर्मेशन (chair conformation) में, सभी हाइड्रोजन परमाणु समतुल्य (equivalent) होते हैं और कमरे के तापमान पर तेजी से फ्लिपिंग (flipping) के कारण उनका NMR स्पेक्ट्रम (NMR spectrum) एक एकल संकेत (singlet) दिखाता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, K और M", "केवल J और K", "केवल K, L और M", "केवल J, L और M"], "answer": "केवल J, K और M", "explanation": "आइए प्रत्येक कथन का विश्लेषण करें:\nJ. यह कथन सही है। यदि किसी यौगिक में दो काइरल केंद्र (chiral centers) होते हैं और वह मेसो यौगिक (meso compound) नहीं है (अर्थात, उसमें समरूपता का तल (plane of symmetry) नहीं है), तो वह 2ⁿ स्टीरियोआइसोमर्स (stereoisomers) उत्पन्न कर सकता है, जहाँ n काइरल केंद्रों की संख्या है। दो काइरल केंद्रों के लिए, यह 2² = 4 स्टीरियोआइसोमर्स होंगे (दो एनैन्शियोमरिक जोड़े या एक एनैन्शियोमरिक जोड़ा और दो डायस्टीरियोआइसोमर्स)।\nK. यह कथन सही है। बेंजाइल कार्बोकैटायन (benzyl carbocation) अनुनाद (resonance) द्वारा अत्यधिक स्थिर होता है क्योंकि धनात्मक आवेश (positive charge) बेंजीन वलय (benzene ring) पर विस्थानीकृत (delocalized) हो सकता है। 2° एल्काइल कार्बोकैटायन की तुलना में, बेंजाइल कार्बोकैटायन की स्थिरता काफी अधिक होती है।\nL. यह कथन गलत है। मार्कोवनिकोव का नियम (Markovnikov's rule) कहता है कि असममित एल्कीन (unsymmetrical alkene) पर HBr जैसे असममित अभिकर्मक (unsymmetrical reagent) के योग (addition) में, हाइड्रोजन परमाणु (H) उस कार्बन से जुड़ता है जिस पर पहले से ही अधिक हाइड्रोजन परमाणु होते हैं, और हैलोजन (Br) उस कार्बन से जुड़ता है जिस पर कम हाइड्रोजन परमाणु होते हैं (यानी, अधिक प्रतिस्थापित कार्बन)। कथन में कहा गया है कि Br परमाणु उस कार्बन से जुड़ता है जिस पर अधिक हाइड्रोजन परमाणु होते हैं, जो कि गलत है। यह अभिक्रिया एक इलेक्ट्रोफिलिक योग अभिक्रिया (electrophilic addition reaction) है।\nM. यह कथन सही है। साइक्लोहेक्सेन (cyclohexane) के चेयर कन्फॉर्मेशन (chair conformation) में, दो प्रकार के हाइड्रोजन परमाणु होते हैं: अक्षीय (axial) और विषुवतीय (equatorial)। हालांकि ये कम तापमान पर भिन्न होते हैं, कमरे के तापमान पर चेयर फ्लिपिंग (chair flipping) की तीव्र दर के कारण, अक्षीय और विषुवतीय हाइड्रोजन परमाणु तेजी से एक-दूसरे में परिवर्तित होते रहते हैं। इस तीव्र अंतर-परिवर्तन के कारण, NMR स्पेक्ट्रम (NMR spectrum) में सभी हाइड्रोजन परमाणु एक औसत वातावरण का अनुभव करते हैं और एक एकल संकेत (singlet) दिखाते हैं।\nअतः, कथन J, K और M सही हैं, जबकि कथन L गलत है।"}, {"id": 42, "section": "Chemistry", "question": "यौगिक C₄H₁₀O के कितने संरचनात्मक समावयवी (structural isomers) संभव हैं, जिनमें अल्कोहल (alcohol) और ईथर (ether) दोनों शामिल हों?", "brand": "bilaspurtestseries.com 9669946966", "options": ["7", "8", "5", "6"], "answer": "7", "explanation": "C₄H₁₀O के लिए, अल्कोहल समावयवी (alcohol isomers) हैं: ब्यूटेन-1-ऑल (butan-1-ol), ब्यूटेन-2-ऑल (butan-2-ol), 2-मेथिलप्रोपेन-1-ऑल (2-methylpropan-1-ol), और 2-मेथिलप्रोपेन-2-ऑल (2-methylpropan-2-ol) (कुल 4)। ईथर समावयवी (ether isomers) हैं: डाइएथिल ईथर (diethyl ether), मेथिल प्रोपिल ईथर (methyl propyl ether), और मेथिल आइसोप्रोपिल ईथर (methyl isopropyl ether) (कुल 3)। इस प्रकार, कुल 4 + 3 = 7 संरचनात्मक समावयवी संभव हैं।"}, {"id": 43, "section": "Chemistry", "question": "निम्नलिखित में से कौन सी अभिक्रिया एल्केनों (alkanes) की विशिष्ट अभिक्रिया है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["नाभिकरागी प्रतिस्थापन अभिक्रिया (Nucleophilic substitution reaction)", "मुक्त मूलक प्रतिस्थापन अभिक्रिया (Free radical substitution reaction)", "अपचयन अभिक्रिया (Reduction reaction)", "इलेक्ट्रॉनरागी योगात्मक अभिक्रिया (Electrophilic addition reaction)"], "answer": "मुक्त मूलक प्रतिस्थापन अभिक्रिया (Free radical substitution reaction)", "explanation": "एल्केन (alkanes) संतृप्त हाइड्रोकार्बन (saturated hydrocarbons) होते हैं और उनमें केवल सिग्मा (σ) बंध होते हैं। वे सामान्यतः मुक्त मूलक प्रतिस्थापन अभिक्रियाएं (free radical substitution reactions) दर्शाते हैं, जैसे हैलोजनीकरण (halogenation) सूर्य के प्रकाश की उपस्थिति में। इलेक्ट्रॉनरागी योगात्मक अभिक्रियाएं एल्कीन (alkenes) और एल्काइन (alkynes) की विशेषता हैं, जबकि नाभिकरागी प्रतिस्थापन अभिक्रियाएं हैलोएल्केन (haloalkanes) जैसे यौगिकों में होती हैं।"}, {"id": 44, "section": "Chemistry", "question": "निम्नलिखित में से कौन सा यौगिक SN₁ अभिक्रिया के प्रति सबसे कम क्रियाशील (least reactive) होगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["टर्शियरी ब्यूटिल ब्रोमाइड (Tertiary butyl bromide)", "क्लोरोमेथेन (Chloromethane)", "ब्रोमोप्रोपेन (2-Bromopropane)", "ब्रोमोबेंजीन (Bromobenzene)"], "answer": "ब्रोमोबेंजीन (Bromobenzene)", "explanation": "SN₁ अभिक्रिया की क्रियाशीलता मध्यवर्ती कार्बधनायन (carbocation) की स्थिरता पर निर्भर करती है। टर्शियरी ब्यूटिल ब्रोमाइड एक तृतीयक कार्बधनायन (tertiary carbocation) बनाता है जो अत्यधिक स्थिर होता है, इसलिए यह SN₁ के प्रति अत्यधिक क्रियाशील होता है। 2-ब्रोमोप्रोपेन एक द्वितीयक कार्बधनायन (secondary carbocation) बनाता है, और क्लोरोमेथेन एक प्राथमिक कार्बधनायन (primary carbocation) बनाता है, जिनकी स्थिरता कम होती है। ब्रोमोबेंजीन में, हैलोजन (halogen) सीधे बेंजीन वलय (benzene ring) से जुड़ा होता है, जिससे कार्बन-हैलोजन बंध में आंशिक द्विबंध गुण (partial double bond character) आ जाता है और यह आसानी से नहीं टूटता। इसके अतिरिक्त, फेनिल कार्बधनायन (phenyl carbocation) अत्यधिक अस्थिर होता है, जिससे ब्रोमोबेंजीन SN₁ अभिक्रिया के प्रति लगभग अक्रियाशील (unreactive) होता है।"}, {"id": 45, "section": "Chemistry", "question": "निम्नलिखित यौगिकों को उनकी अम्लता (acidity) के बढ़ते क्रम में व्यवस्थित कीजिए:\n(I) एथेन (Ethane)\n(II) एथीन (Ethene)\n(III) एथाइन (Ethyne)\n(IV) अमोनिया (Ammonia)", "brand": "bilaspurtestseries.com 9669946966", "options": ["(I) < (II) < (IV) < (III)", "(IV) < (I) < (II) < (III)", "(I) < (II) < (III) < (IV)", "(II) < (I) < (IV) < (III)"], "answer": "(I) < (II) < (IV) < (III)", "explanation": "अम्लता (acidity) कार्बन परमाणु के संकरण (hybridization) पर निर्भर करती है। sp संकरित कार्बन (sp hybridized carbon) में s-गुण (s-character) 50% होता है, जो इसे अधिक विद्युतऋणात्मक (electronegative) बनाता है और प्रोटॉन (proton) को आसानी से त्यागने में मदद करता है। एथाइन (Ethyne) में sp संकरित कार्बन होता है, एथीन (Ethene) में sp² संकरित कार्बन (33% s-गुण), और एथेन (Ethane) में sp³ संकरित कार्बन (25% s-गुण) होता है। अमोनिया (Ammonia) की अम्लता एथीन से अधिक लेकिन एथाइन से कम होती है। इसलिए, अम्लता का बढ़ता क्रम है: एथेन (sp³) < एथीन (sp²) < अमोनिया < एथाइन (sp)।"}, {"id": 46, "section": "Chemistry", "question": "स्टीरियोआइसोमेरिज्म (Stereoisomerism) के संबंध में निम्नलिखित कथनों पर विचार कीजिए:\nJ: एक काइरल केंद्र (chiral center) वाले सभी अणु ध्रुवण घूर्णक (optically active) होते हैं।\nK: ज्यामितीय समावयवता (Geometrical isomerism) केवल द्विबंध (double bond) वाले यौगिकों में ही संभव है।\nL: एनैन्टिओमर (Enantiomers) एक दूसरे के दर्पण प्रतिबिंब (mirror images) होते हैं और अध्यारोपित (superimposable) नहीं होते।\nM: डाइस्टीरियोमर (Diastereomers) वे स्टीरियोआइसोमर (stereoisomers) होते हैं जो एक दूसरे के दर्पण प्रतिबिंब नहीं होते और अध्यारोपित भी नहीं होते", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, L और M", "केवल J और K", "केवल K और L", "केवल L और M"], "answer": "केवल L और M", "explanation": "कथन J गलत है क्योंकि एक काइरल केंद्र वाले अणु ध्रुवण घूर्णक हो सकते हैं, लेकिन मेसो यौगिक (meso compounds) जैसे कुछ अपवाद भी हैं जिनमें काइरल केंद्र होते हुए भी वे आंतरिक प्रतिकार (internal compensation) के कारण ध्रुवण अघूर्णक (optically inactive) होते हैं। कथन K गलत है क्योंकि ज्यामितीय समावयवता चक्रीय यौगिकों (cyclic compounds) में भी संभव है, न कि केवल द्विबंध वाले यौगिकों में। कथन L और M दोनों सही हैं क्योंकि एनैन्टिओमर वास्तव में एक दूसरे के गैर-अध्यारोपित दर्पण प्रतिबिंब होते हैं, और डाइस्टीरियोमर वे स्टीरियोआइसोमर होते हैं जो दर्पण प्रतिबिंब नहीं होते और अध्यारोपित भी नहीं होते।"}, {"id": 47, "section": "Chemistry", "question": "अभिकथन (A): तृतीयक कार्बधनायन (tertiary carbocation) प्राथमिक कार्बधनायन (primary carbocation) की तुलना में अधिक स्थिर होता है।\nकारण (R): तृतीयक कार्बधनायन में अतिसंयुग्मन (hyperconjugation) और प्रेरणिक प्रभाव (inductive effect) के कारण इलेक्ट्रॉन घनत्व (electron density) का अधिक विस्थानीकरण होता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["अभिकथन (A) गलत है, लेकिन कारण (R) सही है।", "अभिकथन (A) और कारण (R) दोनों सही हैं, और कारण (R) अभिकथन (A) की सही व्याख्या है।", "अभिकथन (A) और कारण (R) दोनों सही हैं, लेकिन कारण (R) अभिकथन (A) की सही व्याख्या नहीं है।", "अभिकथन (A) सही है, लेकिन कारण (R) गलत है।"], "answer": "अभिकथन (A) और कारण (R) दोनों सही हैं, और कारण (R) अभिकथन (A) की सही व्याख्या है।", "explanation": "अभिकथन (A) सही है क्योंकि तृतीयक कार्बधनायन (जैसे (CH₃)₃C⁺) में तीन एल्किल समूह (alkyl groups) होते हैं जो +I प्रभाव (प्रेरणिक प्रभाव) और अतिसंयुग्मन (hyperconjugation) के माध्यम से इलेक्ट्रॉन दान करते हैं, जिससे धनावेश (positive charge) का विस्थानीकरण होता है और कार्बधनायन स्थिर होता है। कारण (R) भी सही है और यह अभिकथन (A) की सही व्याख्या करता है। प्राथमिक कार्बधनायन (जैसे CH₃CH₂⁺) में कम एल्किल समूह होते हैं, जिससे इलेक्ट्रॉन दान करने वाले प्रभाव कम होते हैं और यह कम स्थिर होता है।"}, {"id": 48, "section": "Chemistry", "question": "निम्नलिखित में से कौन से यौगिक हकल नियम (Huckel's Rule) का पालन करते हुए एरोमैटिक (aromatic) प्रकृति दर्शाते हैं?\nJ: बेंजीन (Benzene)\nK: साइक्लोपेंटाडाइएनिल धनायन (Cyclopentadienyl cation)\nL: साइक्लोप्रोपेनिल धनायन (Cyclopropenyl cation)\nM: साइक्लोऑक्टाटेट्राईन (Cyclooctatetraene)", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और M", "केवल J, L और M", "केवल J और L", "केवल J, K और L"], "answer": "केवल J और L", "explanation": "हकल नियम (Huckel's Rule) के अनुसार, एक यौगिक एरोमैटिक होता है यदि वह चक्रीय (cyclic), समतलीय (planar) हो, और उसमें (4n+2) π इलेक्ट्रॉन (π electrons) हों।\nJ. बेंजीन (Benzene) में 6 π इलेक्ट्रॉन होते हैं (n=1), जो हकल नियम का पालन करता है।\nK. साइक्लोपेंटाडाइएनिल धनायन (Cyclopentadienyl cation) में 4 π इलेक्ट्रॉन होते हैं (4n), जो एंटी-एरोमैटिक (anti-aromatic) है।\nL. साइक्लोप्रोपेनिल धनायन (Cyclopropenyl cation) में 2 π इलेक्ट्रॉन होते हैं (n=0), जो हकल नियम का पालन करता है।\nM. साइक्लोऑक्टाटेट्राईन (Cyclooctatetraene) में 8 π इलेक्ट्रॉन होते हैं (4n), और यह गैर-समतलीय (non-planar) होता है, इसलिए यह गैर-एरोमैटिक (non-aromatic) है।\nअतः, केवल बेंजीन और साइक्लोप्रोपेनिल धनायन एरोमैटिक हैं।"}, {"id": 49, "section": "Chemistry", "question": "सूची-I में दिए गए यौगिकों को सूची-II में दिए गए उनके संकरण (hybridization) और बंध कोण (bond angle) के साथ सुमेलित कीजिए:\nसूची-I\nA: एथाइन (Ethyne)\nB: एथीन (Ethene)\nC: मेथेन (Methane)\nD: अमोनिया (Ammonia)\nसूची-II\n1. sp³, ~107°\n2. sp², ~120°\n3. sp³, 109.5°\n4. sp, 180°", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A)-2, (B)-4, (C)-1, (D)-3", "(A)-4, (B)-3, (C)-2, (D)-1", "(A)-4, (B)-2, (C)-3, (D)-1", "(A)-1, (B)-2, (C)-3, (D)-4"], "answer": "(A)-4, (B)-2, (C)-3, (D)-1", "explanation": "एथाइन (Ethyne) में कार्बन परमाणु sp संकरित होते हैं और बंध कोण 180° होता है। एथीन (Ethene) में कार्बन परमाणु sp² संकरित होते हैं और बंध कोण लगभग 120° होता है। मेथेन (Methane) में कार्बन परमाणु sp³ संकरित होता है और बंध कोण 109.5° होता है। अमोनिया (Ammonia) में नाइट्रोजन परमाणु sp³ संकरित होता है, लेकिन एक एकाकी युग्म (lone pair) की उपस्थिति के कारण बंध कोण विकृत होकर लगभग 107° हो जाता है। अतः, सही मिलान (A)-(IV), (B)-(II), (C)-(III), (D)-(I) है।"}, {"id": 50, "section": "Chemistry", "question": "SN₁ अभिक्रिया क्रियाविधि (reaction mechanism) के चरणों को सही कालानुक्रमिक क्रम (chronological order) में व्यवस्थित कीजिए:\nJ: नाभिकरागी (nucleophile) का कार्बधनायन (carbocation) पर आक्रमण।\nK: विलगन समूह (leaving group) का निष्कासन (departure) और कार्बधनायन का निर्माण।\nL: विलायक (solvent) अणुओं द्वारा कार्बधनायन का स्थिरीकरण (stabilization)।\nM: उत्पाद (product) का निर्माण।", "brand": "bilaspurtestseries.com 9669946966", "options": ["K → L → J → M", "J → K → L → M", "K → J → L → M", "L → K → J → M"], "answer": "K → L → J → M", "explanation": "SN₁ अभिक्रिया एक दो-चरणीय क्रियाविधि (two-step mechanism) है। पहले चरण में, विलगन समूह (leaving group) निष्कासित होता है, जिससे एक कार्बधनायन (carbocation) बनता है (K)। यह चरण दर-निर्धारण चरण (rate-determining step) होता है। इसके तुरंत बाद, विलायक (solvent) अणु कार्बधनायन को स्थिरीकृत (stabilize) करते हैं (L)। फिर, नाभिकरागी (nucleophile) इस स्थिर कार्बधनायन पर आक्रमण करता है (J), जिससे अंततः उत्पाद (product) का निर्माण होता है (M)। इसलिए, सही कालानुक्रमिक क्रम K → L → J → M है।"}];const SUBMIT_URL="https://mqorslvouzmrvciubpoq.supabase.co/functions/v1/result-collector";const TEST_CODE="DEMO_VARG_1_CHEMISTRY_SCORIN_CHEMISTRY_ATOMIC_STRUCTURE_Q_05B3991B";const TEST_TITLE="CG Teacher Varg 1 Chemistry Demo Test";const CONTACT_WHATSAPP="96699
