</style></head><body><div class="wrap"><div class="top"><div class="brandbar"><div class="brand-logo" id="brandLogo"><img src="assets/bts-logo.png" alt="Bilaspur Test Series logo"></div><div><h1 style="margin:0;color:#0f172a;font-size:38px;letter-spacing:.8px;font-weight:900;line-height:1.05">BILASPUR TEST SERIES</h1><h2 style="margin:8px 0 0;font-size:16px;font-weight:800;color:#1d4ed8">By Azad Institute</h2><div style="margin-top:8px;font-size:14px;color:#334155;font-weight:600">🎓 DEMO_Varg_1_Commerce_Accountancy_High-Value_Topics_Day_01_01_COMMERCE_ACCOUNTING_PRINCIPLES</div></div></div></div><div id="app"></div></div><script>const Q=[{"id": 1, "section": "Commerce", "question": "लेखांकन अवधारणा (Accounting Concept) 'मनी मेज़रमेंट कॉन्सेप्ट' (Money Measurement Concept) का प्राथमिक उद्देश्य क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["वित्तीय विवरणों (financial statements) की सटीकता (accuracy) सुनिश्चित करना।", "लेखांकन जानकारी (accounting information) की तुलनात्मकता (comparability) बढ़ाना।", "सभी लेन-देनों को मौद्रिक इकाइयों (monetary units) में रिकॉर्ड करना।", "केवल उन लेन-देनों को रिकॉर्ड करना जिनका मौद्रिक मूल्य (monetary value) हो।"], "answer": "केवल उन लेन-देनों को रिकॉर्ड करना जिनका मौद्रिक मूल्य (monetary value) हो।", "explanation": "मनी मेज़रमेंट कॉन्सेप्ट (Money Measurement Concept) के अनुसार, लेखांकन में केवल उन्हीं लेन-देनों और घटनाओं को रिकॉर्ड किया जाता है जिन्हें मुद्रा (money) के रूप में व्यक्त किया जा सकता है। यह अवधारणा उन गुणात्मक पहलुओं (qualitative aspects) को छोड़ देती है जिनका मौद्रिक मूल्य नहीं होता, जैसे प्रबंधन की गुणवत्ता या कर्मचारियों का मनोबल। अन्य विकल्प इस अवधारणा के परिणाम हो सकते हैं लेकिन प्राथमिक उद्देश्य नहीं हैं।"}, {"id": 2, "section": "Commerce", "question": "एक कंपनी ने ₹5,00,000 की मशीनरी खरीदी और उसे अपने बैलेंस शीट (Balance Sheet) में ₹5,00,000 पर ही दिखाया, भले ही बाजार मूल्य (market value) ₹5,50,000 हो गया हो। यह किस लेखांकन सिद्धांत (Accounting Principle) का अनुप्रयोग है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["कॉस्ट कॉन्सेप्ट (Cost Concept)", "गोइंग कंसर्न कॉन्सेप्ट (Going Concern Concept)", "अक्रूअल कॉन्सेप्ट (Accrual Concept)", "मैचिंग कॉन्सेप्ट (Matching Concept)"], "answer": "कॉस्ट कॉन्सेप्ट (Cost Concept)", "explanation": "कॉस्ट कॉन्सेप्ट (Cost Concept) या ऐतिहासिक लागत सिद्धांत (Historical Cost Principle) के अनुसार, संपत्तियों (assets) को उनकी अधिग्रहण लागत (acquisition cost) पर रिकॉर्ड किया जाना चाहिए, न कि उनके वर्तमान बाजार मूल्य पर। इस मामले में, मशीनरी को ₹5,00,000 की खरीद लागत पर दिखाया गया है, जो इस सिद्धांत का सीधा अनुप्रयोग है। गोइंग कंसर्न, मैचिंग और अक्रूअल कॉन्सेप्ट इस स्थिति में सीधे लागू नहीं होते।"}, {"id": 3, "section": "Commerce", "question": "लेखांकन परंपराओं (Accounting Conventions) के संबंध में निम्नलिखित कथनों का मूल्यांकन करें और सही कथन चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["पूर्ण प्रकटीकरण की परंपरा (Convention of Full Disclosure) का अर्थ है कि सभी महत्वपूर्ण और प्रासंगिक जानकारी (relevant information) वित्तीय विवरणों में प्रकट की जानी चाहिए।", "रूढ़िवादिता की परंपरा (Convention of Conservatism) यह सुनिश्चित करती है कि सभी संभावित लाभों को तुरंत रिकॉर्ड किया जाए।", "भौतिकता की परंपरा (Convention of Materiality) यह बताती है कि केवल बड़ी राशि के लेन-देन ही रिकॉर्ड किए जाने चाहिए।", "संगति की परंपरा (Convention of Consistency) का अर्थ है कि लेखांकन नीतियां (accounting policies) हर लेखांकन अवधि (accounting period) में बदली जा सकती हैं।"], "answer": "पूर्ण प्रकटीकरण की परंपरा (Convention of Full Disclosure) का अर्थ है कि सभी महत्वपूर्ण और प्रासंगिक जानकारी (relevant information) वित्तीय विवरणों में प्रकट की जानी चाहिए।", "explanation": "पूर्ण प्रकटीकरण की परंपरा (Convention of Full Disclosure) के अनुसार, वित्तीय विवरणों में सभी महत्वपूर्ण और प्रासंगिक जानकारी को स्पष्ट रूप से प्रकट किया जाना चाहिए ताकि उपयोगकर्ता सही निर्णय ले सकें। रूढ़िवादिता की परंपरा संभावित हानियों को रिकॉर्ड करने पर जोर देती है, लाभों को नहीं। भौतिकता की परंपरा यह बताती है कि केवल महत्वपूर्ण मदों को ही अलग से प्रकट किया जाना चाहिए, न कि केवल बड़ी राशि के लेन-देन को। संगति की परंपरा यह सुनिश्चित करती है कि लेखांकन नीतियां एक अवधि से दूसरी अवधि तक समान रहें, जब तक कि परिवर्तन आवश्यक न हो।"}, {"id": 4, "section": "Commerce", "question": "निम्नलिखित में से कौन सा कथन लेखांकन सिद्धांतों (Accounting Principles) के अपवाद (exception) या विशेष परिस्थिति (special circumstance) को सबसे सटीक रूप से दर्शाता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["गोइंग कंसर्न कॉन्सेप्ट (Going Concern Concept) हमेशा लागू होता है, भले ही कंपनी दिवालियापन (bankruptcy) के कगार पर हो।", "अक्रूअल कॉन्सेप्ट (Accrual Concept) केवल उन कंपनियों पर लागू होता है जो लाभ कमाने वाली संस्थाएं (profit-making entities) हैं।", "कॉस्ट कॉन्सेप्ट (Cost Concept) के तहत, कुछ संपत्तियों (assets) को उनके बाजार मूल्य (market value) पर दिखाया जा सकता है यदि बाजार मूल्य लागत से कम हो (जैसे इन्वेंट्री)।", "मनी मेज़रमेंट कॉन्सेप्ट (Money Measurement Concept) के अनुसार, मुद्रास्फीति (inflation) के प्रभाव को हमेशा वित्तीय विवरणों में समायोजित (adjusted) किया जाता है।"], "answer": "कॉस्ट कॉन्सेप्ट (Cost Concept) के तहत, कुछ संपत्तियों (assets) को उनके बाजार मूल्य (market value) पर दिखाया जा सकता है यदि बाजार मूल्य लागत से कम हो (जैसे इन्वेंट्री)।", "explanation": "कॉस्ट कॉन्सेप्ट (Cost Concept) का एक महत्वपूर्ण अपवाद 'कॉस्ट या मार्केट प्राइस, जो भी कम हो' (Cost or Market Price, whichever is lower) का नियम है, जो विशेष रूप से इन्वेंट्री (inventory) के मूल्यांकन पर लागू होता है। यदि इन्वेंट्री का बाजार मूल्य उसकी लागत से कम हो जाता है, तो उसे बाजार मूल्य पर दिखाया जाता है ताकि रूढ़िवादिता की परंपरा (Convention of Conservatism) का पालन किया जा सके। गोइंग कंसर्न कॉन्सेप्ट तब लागू नहीं होता जब कंपनी दिवालियापन के कगार पर हो। अक्रूअल कॉन्सेप्ट सभी प्रकार की संस्थाओं पर लागू होता है, और मनी मेज़रमेंट कॉन्सेप्ट मुद्रास्फीति के प्रभाव को समायोजित नहीं करता है, यह इसकी एक सीमा है।"}, {"id": 5, "section": "Commerce", "question": "अभिकथन (A): लेखांकन में, 'गोइंग कंसर्न कॉन्सेप्ट' (Going Concern Concept) यह मानता है कि व्यवसाय निकट भविष्य में अनिश्चित काल तक चलता रहेगा।\nकारण (R): यह अवधारणा व्यवसायों को अपनी संपत्तियों (assets) को उनके ऐतिहासिक लागत (historical cost) पर रिकॉर्ड करने की अनुमति देती है, बजाय इसके कि उन्हें परिसमापन मूल्य (liquidation value) पर रिकॉर्ड किया जाए।", "brand": "bilaspurtestseries.com 9669946966", "options": ["A असत्य है, लेकिन R सत्य है।", "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं है।", "A सत्य है, लेकिन R असत्य है।"], "answer": "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "explanation": "अभिकथन (A) सही है क्योंकि गोइंग कंसर्न कॉन्सेप्ट (Going Concern Concept) यह मानता है कि व्यवसाय निकट भविष्य में बंद नहीं होगा। कारण (R) भी सही है क्योंकि इसी अवधारणा के कारण व्यवसाय अपनी संपत्तियों को ऐतिहासिक लागत पर रिकॉर्ड कर सकते हैं। यदि व्यवसाय के बंद होने की संभावना होती, तो संपत्तियों को उनके परिसमापन मूल्य पर रिकॉर्ड किया जाता। इस प्रकार, कारण (R) अभिकथन (A) की सही व्याख्या है।"}, {"id": 6, "section": "Commerce", "question": "निम्नलिखित में से कौन से कथन जर्नल प्रविष्टियों (Journal Entries) के पीछे के तर्क (reasoning) और संबंधित सिद्धांतों (principles) के संबंध में सही हैं?\nJ: प्रत्येक जर्नल प्रविष्टि में कम से कम एक डेबिट (Debit) और एक क्रेडिट (Credit) खाता (account) शामिल होता है।\nK: जर्नल प्रविष्टियाँ 'द्वि-प्रविष्टि प्रणाली' (Double-Entry System) के सिद्धांत पर आधारित होती हैं।\nL: एक संपत्ति (asset) में वृद्धि को हमेशा डेबिट किया जाता है।\nM: एक आय (income) में वृद्धि को हमेशा डेबिट किया जाता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और L", "केवल J, K और M", "केवल K, L और M", "केवल J, K और L"], "answer": "केवल J, K और L", "explanation": "J, K और L कथन सही हैं। प्रत्येक जर्नल प्रविष्टि में कम से कम एक डेबिट और एक क्रेडिट खाता होता है (J), और यह द्वि-प्रविष्टि प्रणाली (Double-Entry System) का आधार है (K)। संपत्ति (asset) में वृद्धि को हमेशा डेबिट किया जाता है (L)। हालांकि, आय (income) में वृद्धि को हमेशा क्रेडिट किया जाता है, डेबिट नहीं (M)। इसलिए, M कथन गलत है।"}, {"id": 7, "section": "Commerce", "question": "सूची-I में दिए गए लेखांकन सिद्धांतों (Accounting Principles) को सूची-II में दी गई उनकी सटीक परिभाषाओं (precise definitions) से सुमेलित (match) करें:\nसूची-I (सिद्धांत)\n(A) रेवेन्यू रिकॉग्निशन कॉन्सेप्ट (Revenue Recognition Concept)\n(B) मैचिंग कॉन्सेप्ट (Matching Concept)\n(C) गोइंग कंसर्न कॉन्सेप्ट (Going Concern Concept)\n(D) बिज़नेस एंटिटी कॉन्सेप्ट (Business Entity Concept)\nसूची-II (परिभाषा)\n(I) व्यवसाय को उसके मालिकों से अलग इकाई (separate entity) के रूप में माना जाता है।\n(II) आय को उस अवधि में पहचाना जाता है जब वह अर्जित (earned) होती है, भले ही नकद प्राप्त न हुआ हो।\n(III) व्यवसाय निकट भविष्य में अनिश्चित काल तक चलता रहेगा।\n(IV) एक लेखांकन अवधि (accounting period) की आय को उसी अवधि के खर्चों से मिलान किया जाना चाहिए।\nसही विकल्प चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["-(II), (B)-(IV), (C)-(III), (D)-(I)", "-(IV), (B)-(I), (C)-(II), (D)-(III)", "(A)-(I), (B)-(II), (C)-(III), (D)-(IV)", "-(II), (B)-(III), (C)-(IV), (D)-(I)"], "answer": "-(II), (B)-(IV), (C)-(III), (D)-(I)", "explanation": "सही मिलान इस प्रकार है: रेवेन्यू रिकॉग्निशन कॉन्सेप्ट (A) यह बताता है कि आय को तब पहचाना जाना चाहिए जब वह अर्जित हो (II)। मैचिंग कॉन्सेप्ट (B) यह सुनिश्चित करता है कि एक अवधि की आय को उसी अवधि के खर्चों से मिलान किया जाए (IV)। गोइंग कंसर्न कॉन्सेप्ट (C) यह मानता है कि व्यवसाय अनिश्चित काल तक चलता रहेगा (III)। बिज़नेस एंटिटी कॉन्सेप्ट (D) व्यवसाय को उसके मालिकों से एक अलग इकाई मानता है (I)। यह मिलान लेखांकन सिद्धांतों की गहरी समझ को दर्शाता है।"}, {"id": 8, "section": "Commerce", "question": "लेखांकन चक्र (Accounting Cycle) के चरणों को सही कालानुक्रमिक क्रम (chronological order) में व्यवस्थित करें:\nJ: जर्नल में लेन-देनों को रिकॉर्ड करना (Recording transactions in the Journal)\nK: ट्रायल बैलेंस (Trial Balance) तैयार करना\nL: वित्तीय विवरण (Financial Statements) तैयार करना\nM: लेजर (Ledger) में पोस्ट करना\nN: समायोजन प्रविष्टियाँ (Adjusting Entries) करना", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, M, N, K, L", "J, M, K, N, L", "J, K, M, N, L", "M, J, K, N, L"], "answer": "J, M, K, N, L", "explanation": "लेखांकन चक्र का सही क्रम इस प्रकार है: सबसे पहले, लेन-देनों को जर्नल (Journal) में रिकॉर्ड किया जाता है (J)। फिर, इन जर्नल प्रविष्टियों को लेजर (Ledger) में पोस्ट किया जाता है (M)। इसके बाद, एक अनएडजस्टेड ट्रायल बैलेंस (Unadjusted Trial Balance) तैयार किया जाता है (K)। फिर, समायोजन प्रविष्टियाँ (Adjusting Entries) की जाती हैं (N)। अंत में, समायोजित ट्रायल बैलेंस (Adjusted Trial Balance) के आधार पर वित्तीय विवरण (Financial Statements) तैयार किए जाते हैं (L)।"}, {"id": 9, "section": "Commerce", "question": "एक कंपनी ने ₹20,000 का माल नकद में बेचा। इस लेन-देन का लेखांकन समीकरण (Accounting Equation) पर क्या प्रभाव पड़ेगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["संपत्तियाँ (Assets) पर कोई शुद्ध प्रभाव नहीं पड़ेगा, इक्विटी (Equity) ₹20,000 से बढ़ेंगी।", "संपत्तियाँ (Assets) ₹20,000 से बढ़ेंगी, देनदारियाँ (Liabilities) ₹20,000 से बढ़ेंगी।", "संपत्तियाँ (Assets) ₹20,000 से बढ़ेंगी, इक्विटी (Equity) ₹20,000 से बढ़ेंगी।", "संपत्तियाँ (Assets) ₹20,000 से घटेंगी, इक्विटी (Equity) ₹20,000 से घटेंगी।"], "answer": "संपत्तियाँ (Assets) ₹20,000 से बढ़ेंगी, इक्विटी (Equity) ₹20,000 से बढ़ेंगी।", "explanation": "जब ₹20,000 का माल नकद में बेचा जाता है, तो कंपनी की नकद संपत्ति (Cash Asset) ₹20,000 से बढ़ जाती है। साथ ही, यह बिक्री कंपनी के राजस्व (Revenue) को बढ़ाती है, जिससे मालिक की इक्विटी (Owner's Equity) भी ₹20,000 से बढ़ जाती है। लेखांकन समीकरण (Assets = Liabilities + Equity) संतुलित रहता है क्योंकि दोनों पक्ष ₹20,000 से बढ़ते हैं।"}, {"id": 10, "section": "Commerce", "question": "एक कंपनी ने 1 अक्टूबर 2023 को ₹12,000 का बीमा प्रीमियम (Insurance Premium) एक वर्ष के लिए अग्रिम (in advance) भुगतान किया। 31 दिसंबर 2023 को समाप्त होने वाली तिमाही के लिए समायोजन प्रविष्टि (Adjustment Entry) का शुद्ध संख्यात्मक प्रभाव (net numerical impact) क्या होगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["प्रीपेड बीमा (Prepaid Insurance) ₹3,000 से डेबिट होगा, बीमा व्यय (Insurance Expense) ₹3,000 से क्रेडिट होगा।", "बीमा व्यय (Insurance Expense) ₹3,000 से डेबिट होगा, प्रीपेड बीमा (Prepaid Insurance) ₹3,000 से क्रेडिट होगा।", "बीमा व्यय (Insurance Expense) ₹9,000 से डेबिट होगा, प्रीपेड बीमा (Prepaid Insurance) ₹9,000 से क्रेडिट होगा।", "बीमा व्यय (Insurance Expense) ₹12,000 से डेबिट होगा, नकद (Cash) ₹12,000 से क्रेडिट होगा।"], "answer": "बीमा व्यय (Insurance Expense) ₹3,000 से डेबिट होगा, प्रीपेड बीमा (Prepaid Insurance) ₹3,000 से क्रेडिट होगा।", "explanation": "बीमा प्रीमियम 1 अक्टूबर 2023 से 30 सितंबर 2024 तक एक वर्ष के लिए ₹12,000 है। 31 दिसंबर 2023 तक, तीन महीने (अक्टूबर, नवंबर, दिसंबर) का बीमा समाप्त हो चुका है। इसलिए, प्रति माह बीमा व्यय ₹12,000 / 12 = ₹1,000 है। तीन महीने का व्यय ₹1,000 × 3 = ₹3,000 होगा। समायोजन प्रविष्टि में, बीमा व्यय (Insurance Expense) को ₹3,000 से डेबिट किया जाएगा (व्यय में वृद्धि) और प्रीपेड बीमा (Prepaid Insurance) (एक संपत्ति खाता) को ₹3,000 से क्रेडिट किया जाएगा (संपत्ति में कमी)।"}, {"id": 11, "section": "Commerce", "question": "खाता बही (Ledger) का प्राथमिक उद्देश्य (primary objective) क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["अशुद्धियों (errors) का पता लगाना और उन्हें सुधारना।", "प्रत्येक खाते (account) का सारांश (summary) और उसका अंतिम शेष (final balance) प्रदान करना।", "व्यवसाय की वित्तीय स्थिति (financial position) को एक निश्चित तिथि पर दर्शाना।", "सभी लेन-देनों (transactions) को कालानुक्रमिक (chronological) क्रम में रिकॉर्ड करना।"], "answer": "प्रत्येक खाते (account) का सारांश (summary) और उसका अंतिम शेष (final balance) प्रदान करना।", "explanation": "खाता बही (Ledger) का प्राथमिक उद्देश्य जर्नल (Journal) से पोस्ट की गई प्रविष्टियों के आधार पर प्रत्येक व्यक्तिगत खाते का सारांश प्रस्तुत करना और उसका अंतिम शेष (final balance) ज्ञात करना है। यह हमें किसी भी समय किसी विशेष खाते की स्थिति जानने में मदद करता है। लेन-देनों को कालानुक्रमिक क्रम में रिकॉर्ड करना जर्नल का कार्य है, जबकि वित्तीय स्थिति दर्शाना तुलन पत्र (Balance Sheet) का उद्देश्य है, और अशुद्धियों का पता लगाना तलपट (Trial Balance) और अशुद्धि सुधार (Rectification of Errors) का हिस्सा है।"}, {"id": 12, "section": "Commerce", "question": "एक व्यवसाय द्वारा क्रेडिट (credit) पर माल की बिक्री (sales) को रिकॉर्ड करने के लिए किस सहायक पुस्तक (Subsidiary Book) का उपयोग किया जाएगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["क्रय बही (Purchase Book)", "जर्नल प्रॉपर (Journal Proper)", "विक्रय बही (Sales Book)", "रोकड़ बही (Cash Book)"], "answer": "विक्रय बही (Sales Book)", "explanation": "क्रेडिट पर माल की बिक्री को रिकॉर्ड करने के लिए विशेष रूप से विक्रय बही (Sales Book) का उपयोग किया जाता है। क्रय बही का उपयोग क्रेडिट पर माल की खरीद के लिए, रोकड़ बही का उपयोग सभी नकद लेन-देनों के लिए, और जर्नल प्रॉपर का उपयोग उन लेन-देनों के लिए किया जाता है जो किसी अन्य सहायक पुस्तक में दर्ज नहीं होते हैं।"}, {"id": 13, "section": "Commerce", "question": "तलपट (Trial Balance) के संबंध में निम्नलिखित कथनों पर विचार करें:\nI. तलपट यह सुनिश्चित करता है कि सभी लेन-देन (transactions) सही ढंग से जर्नल (Journal) में दर्ज किए गए हैं।\nII. तलपट केवल अंकगणितीय सटीकता (arithmetical accuracy) की जाँच करता है।\nIII. तलपट सभी प्रकार की अशुद्धियों (errors) को प्रकट करता है।\nIV. तलपट अंतिम खाते (final accounts) तैयार करने का आधार प्रदान करता है।\nउपरोक्त कथनों में से कौन सा/से सही है/हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल II और IV", "केवल I, II और IV", "केवल II, III और IV", "केवल I और III"], "answer": "केवल II और IV", "explanation": "कथन II और IV सही हैं। तलपट मुख्य रूप से खाता बही (Ledger) के डेबिट और क्रेडिट शेषों की अंकगणितीय सटीकता की जाँच करता है और अंतिम खाते तैयार करने के लिए एक आधार प्रदान करता है। कथन I गलत है क्योंकि तलपट जर्नल में लेन-देनों की सही रिकॉर्डिंग की गारंटी नहीं देता है, यह केवल खाता बही के शेषों की जाँच करता है। कथन III भी गलत है क्योंकि तलपट भूल की अशुद्धि (error of omission), क्षतिपूरक अशुद्धि (compensating error) और सैद्धांतिक अशुद्धि (error of principle) जैसी कई अशुद्धियों को प्रकट नहीं करता है।"}, {"id": 14, "section": "Commerce", "question": "लेखांकन प्रक्रिया (Accounting Process) और अशुद्धियों के सुधार (Rectification of Errors) के संबंध में निम्नलिखित कथनों का विश्लेषण करें और सही संयोजन (combination) चुनें:\nJ: तलपट (Trial Balance) केवल अंकगणितीय शुद्धता (arithmetical accuracy) की जाँच करता है और सैद्धांतिक अशुद्धियों (errors of principle) को प्रकट नहीं कर सकता।\nK: यदि क्रय बही (Purchase Book) का योग ₹5,000 कम लगाया गया है, तो इस अशुद्धि को सुधारने के लिए क्रय खाते (Purchase Account) को डेबिट किया जाएगा और सस्पेंस अकाउंट (Suspense Account) को क्रेडिट किया जाएगा।\nL: सहायक पुस्तकें (Subsidiary Books) जर्नल (Journal) का एक विस्तृत रूप हैं और सीधे खाता बही (Ledger) में पोस्टिंग के लिए उपयोग नहीं की जाती हैं।\nM: एक पूर्ण भूल की अशुद्धि (complete error of omission) तलपट के दोनों पक्षों को समान रूप से प्रभावित करती है, इसलिए तलपट का मिलान हो जाता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, K और M सही हैं।", "केवल J और K सही हैं।", "केवल K, L और M सही हैं।", "केवल J और M सही हैं।"], "answer": "केवल J, K और M सही हैं।", "explanation": "कथन J सही है क्योंकि तलपट केवल डेबिट और क्रेडिट शेषों की समानता की जाँच करता है, यह सैद्धांतिक अशुद्धियों (जैसे पूंजीगत व्यय को राजस्व व्यय मानना) को प्रकट नहीं कर सकता। कथन K भी सही है; क्रय बही का योग कम होने का मतलब है कि क्रय खाता कम डेबिट हुआ है, इसलिए उसे डेबिट करके और सस्पेंस अकाउंट को क्रेडिट करके सुधार किया जाएगा। कथन M सही है क्योंकि यदि कोई लेन-देन पूरी तरह से दर्ज होने से छूट जाता है, तो डेबिट और क्रेडिट दोनों पक्ष प्रभावित नहीं होते, जिससे तलपट का मिलान हो जाता है। हालांकि, कथन L गलत है; सहायक पुस्तकें जर्नल का विस्तृत रूप हैं, लेकिन वे सीधे खाता बही में पोस्टिंग के लिए उपयोग की जाती हैं, जर्नल प्रॉपर (Journal Proper) को छोड़कर।"}, {"id": 15, "section": "Commerce", "question": "अभिकथन (A): तलपट (Trial Balance) का मिलान (matching) यह गारंटी नहीं देता कि लेखा पुस्तकों में कोई अशुद्धि नहीं है।\nकारण (R): कुछ अशुद्धियाँ, जैसे भूल की अशुद्धि (error of omission) या क्षतिपूरक अशुद्धि (compensating error), तलपट के मिलान को प्रभावित नहीं करती हैं।", "brand": "bilaspurtestseries.com 9669946966", "options": ["A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं है।", "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "A सत्य है, लेकिन R असत्य है।", "A असत्य है, लेकिन R सत्य है।"], "answer": "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "explanation": "अभिकथन (A) सत्य है क्योंकि तलपट का मिलान केवल अंकगणितीय सटीकता (arithmetical accuracy) की जाँच करता है, सभी प्रकार की अशुद्धियों की नहीं। कारण (R) भी सत्य है और यह अभिकथन की सही व्याख्या करता है। भूल की अशुद्धि (विशेषकर पूर्ण भूल) और क्षतिपूरक अशुद्धियाँ ऐसी अशुद्धियाँ हैं जो तलपट के डेबिट और क्रेडिट पक्षों को समान रूप से प्रभावित करती हैं या बिल्कुल भी प्रभावित नहीं करती हैं, जिससे तलपट का मिलान हो जाता है, भले ही पुस्तकें गलत हों।"}, {"id": 16, "section": "Commerce", "question": "सूची-I को सूची-II से सुमेलित (Match) करें:\nसूची-I (खाते का प्रकार) × A. व्यक्तिगत खाता (Personal Account)\nB. वास्तविक खाता (Real Account)\nC. नाममात्र खाता (Nominal Account)\nD. प्रतिनिधित्व व्यक्तिगत खाता (Representative Personal Account)\n*सूची-II (उदाहरण/विशेषता) ×\n1. वेतन बकाया (Outstanding Salary)\n2. मशीनरी (Machinery)\n3. किराया (Rent)\n4. बैंक (Bank)", "brand": "bilaspurtestseries.com 9669946966", "options": ["A-4, B-2, C-3, D-1", "A-4, B-3, C-2, D-1", "A-2, B-4, C-1, D-3", "A-1, B-2, C-3, D-4"], "answer": "A-4, B-2, C-3, D-1", "explanation": "सही मिलान है: A-4, B-2, C-3, D-1। व्यक्तिगत खाते (Personal Accounts) व्यक्तियों, फर्मों या कंपनियों से संबंधित होते हैं, और बैंक एक कृत्रिम व्यक्तिगत खाता (Artificial Personal Account) है। वास्तविक खाते (Real Accounts) संपत्ति (assets) से संबंधित होते हैं, जैसे मशीनरी। नाममात्र खाते (Nominal Accounts) आय, व्यय, लाभ और हानि से संबंधित होते हैं, जैसे किराया। प्रतिनिधित्व व्यक्तिगत खाते (Representative Personal Accounts) उन व्यक्तियों का प्रतिनिधित्व करते हैं जिनसे या जिनको कुछ देय या प्राप्य है, जैसे वेतन बकाया (Outstanding Salary) जो उन कर्मचारियों का प्रतिनिधित्व करता है जिन्हें वेतन देना बाकी है।"}, {"id": 17, "section": "Commerce", "question": "एक व्यवसाय के तलपट (Trial Balance) में डेबिट पक्ष का योग ₹1,00,000 है और क्रेडिट पक्ष का योग ₹99,000 है। यदि यह पता चलता है कि विक्रय बही (Sales Book) का योग ₹1,000 कम लगाया गया था, तो इस अशुद्धि के सुधार के बाद तलपट का डेबिट और क्रेडिट पक्ष का योग क्या होगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["डेबिट ₹1,00,000, क्रेडिट ₹98,000", "डेबिट ₹1,01,000, क्रेडिट ₹99,000", "डेबिट ₹1,00,000, क्रेडिट ₹1,00,000", "डेबिट ₹99,000, क्रेडिट ₹99,000"], "answer": "डेबिट ₹1,00,000, क्रेडिट ₹1,00,000", "explanation": "प्रारंभ में, तलपट का डेबिट योग ₹1,00,000 और क्रेडिट योग ₹99,000 था। विक्रय बही (Sales Book) का योग ₹1,000 कम लगाया गया था। विक्रय (Sales) हमेशा क्रेडिट होती है, इसलिए विक्रय खाते (Sales Account) को ₹1,000 से कम क्रेडिट किया गया था। इस अशुद्धि को सुधारने के लिए, विक्रय खाते को ₹1,000 से क्रेडिट किया जाएगा। इससे तलपट के क्रेडिट पक्ष का योग ₹99,000 + ₹1,000 = ₹1,00,000 हो जाएगा। डेबिट पक्ष का योग ₹1,00,000 ही रहेगा। इस प्रकार, सुधार के बाद तलपट का डेबिट और क्रेडिट पक्ष का योग दोनों ₹1,00,000 होगा।"}, {"id": 18, "section": "Commerce", "question": "एक व्यवसाय के तलपट (Trial Balance) में ₹1,000 का डेबिट अंतर (debit difference) था, जिसे सस्पेंस अकाउंट (Suspense Account) में स्थानांतरित कर दिया गया। बाद में पता चला कि विक्रय वापसी बही (Sales Return Book) का योग ₹500 कम लगाया गया था और क्रय खाते (Purchase Account) को ₹200 से अधिक डेबिट कर दिया गया था। इन अशुद्धियों के सुधार के बाद सस्पेंस अकाउंट का शेष (balance) क्या होगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["₹300 डेबिट शेष (Debit Balance)", "₹700 डेबिट शेष (Debit Balance)", "₹700 क्रेडिट शेष (Credit Balance)", "₹1,300 डेबिट शेष (Debit Balance)"], "answer": "₹700 डेबिट शेष (Debit Balance)", "explanation": "प्रारंभ में, तलपट में ₹1,000 का डेबिट अंतर था, जिसका अर्थ है कि डेबिट पक्ष क्रेडिट पक्ष से ₹1,000 कम था। इस अंतर को बराबर करने के लिए सस्पेंस अकाउंट को ₹1,000 से डेबिट किया गया, यानी सस्पेंस अकाउंट का प्रारंभिक डेबिट शेष ₹1,000 था।\n1. विक्रय वापसी बही का योग ₹500 कम लगाया गया था:* विक्रय वापसी (Sales Return) डेबिट होती है। इसका मतलब है कि विक्रय वापसी खाते (Sales Return Account) को ₹500 से कम डेबिट किया गया था। इस अशुद्धि को सुधारने के लिए, विक्रय वापसी खाते को ₹500 से डेबिट किया जाएगा और सस्पेंस अकाउंट को ₹500 से क्रेडिट किया जाएगा। (सस्पेंस अकाउंट: Dr ₹1,000, Cr ₹500)\n2. क्रय खाते को ₹200 से अधिक डेबिट कर दिया गया था:* क्रय खाता (Purchase Account) डेबिट होता है। इसे ₹200 से अधिक डेबिट किया गया था। इस अशुद्धि को सुधारने के लिए, क्रय खाते को ₹200 से क्रेडिट किया जाएगा और सस्पेंस अकाउंट को ₹200 से डेबिट किया जाएगा। (सस्पेंस अकाउंट: Dr ₹1,000 + ₹200, Cr ₹500)\n\nसस्पेंस अकाउंट का अंतिम शेष = (प्रारंभिक डेबिट शेष + दूसरी अशुद्धि का डेबिट) - पहली अशुद्धि का क्रेडिट = (₹1,000 Dr + ₹200 Dr) - ₹500 Cr = ₹1,200 Dr - ₹500 Cr = ₹700 डेबिट शेष (Debit Balance)।"}, {"id": 19, "section": "Commerce", "question": "बकाया व्यय (Outstanding Expenses) के समायोजन (adjustment) का मुख्य उद्देश्य क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["अगले वर्ष के व्ययों को चालू वर्ष में दर्ज करना।", "चालू वर्ष की आय से संबंधित सभी व्ययों को मिलाना।", "चालू वर्ष के लाभ को बढ़ाना।", "व्यवसाय की तरलता (liquidity) स्थिति को बेहतर दिखाना।"], "answer": "चालू वर्ष की आय से संबंधित सभी व्ययों को मिलाना।", "explanation": "बकाया व्यय का समायोजन लेखांकन के उपार्जन आधार (accrual basis of accounting) के तहत किया जाता है। इसका मुख्य उद्देश्य यह सुनिश्चित करना है कि चालू लेखांकन अवधि (current accounting period) से संबंधित सभी व्यय, चाहे उनका भुगतान किया गया हो या नहीं, उस अवधि की आय से मिलान (match) किए जाएं, जिससे सही लाभ या हानि (profit or loss) निर्धारित हो सके। विकल्प (a) और (d) गलत हैं क्योंकि समायोजन का उद्देश्य लाभ को बढ़ाना या तरलता को बेहतर दिखाना नहीं है, बल्कि सही वित्तीय स्थिति प्रस्तुत करना है। विकल्प (c) भी गलत है क्योंकि यह चालू वर्ष के व्ययों से संबंधित है, न कि अगले वर्ष के।"}, {"id": 20, "section": "Commerce", "question": "मूल्यह्रास (Depreciation) के समायोजन (adjustment) का वित्तीय विवरणों (Financial Statements) पर क्या प्रभाव पड़ता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह लाभ-हानि खाते में व्यय के रूप में दर्ज होता है और तुलन पत्र में संबंधित संपत्ति के मूल्य को कम करता है।", "यह केवल लाभ-हानि खाते (Profit & Loss Account) को प्रभावित करता है।", "यह केवल तुलन पत्र (Balance Sheet) में संपत्ति (asset) के मूल्य को कम करता है।", "यह व्यवसाय की देनदारियों (liabilities) को बढ़ाता है।"], "answer": "यह लाभ-हानि खाते में व्यय के रूप में दर्ज होता है और तुलन पत्र में संबंधित संपत्ति के मूल्य को कम करता है।", "explanation": "मूल्यह्रास एक गैर-नकद व्यय (non-cash expense) है जो परिसंपत्ति (asset) के उपयोग या समय बीतने के कारण उसके मूल्य में कमी को दर्शाता है। इसे लाभ-हानि खाते (Profit & Loss Account) के डेबिट पक्ष में व्यय के रूप में दिखाया जाता है, जिससे शुद्ध लाभ (net profit) कम होता है। साथ ही, इसे तुलन पत्र (Balance Sheet) में संबंधित स्थायी संपत्ति (fixed asset) के मूल्य से घटाया जाता है, जिससे संपत्ति का पुस्तक मूल्य (book value) कम हो जाता है। इस प्रकार, यह दोनों वित्तीय विवरणों को प्रभावित करता है।"}, {"id": 21, "section": "Commerce", "question": "अनुपात विश्लेषण (Ratio Analysis) के संबंध में निम्नलिखित में से कौन सा कथन सही नहीं है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह भविष्य की प्रवृत्तियों (trends) और पूर्वानुमान (forecasting) के लिए एक अचूक उपकरण (infallible tool) है।", "यह वित्तीय विवरणों (Financial Statements) में निहित जानकारी को सरल बनाता है।", "यह व्यवसाय की ताकत (strengths) और कमजोरियों (weaknesses) की पहचान करने में मदद करता है।", "यह विभिन्न अवधियों (periods) या फर्मों (firms) के बीच तुलना (comparison) करने में सहायक होता है।"], "answer": "यह भविष्य की प्रवृत्तियों (trends) और पूर्वानुमान (forecasting) के लिए एक अचूक उपकरण (infallible tool) है।", "explanation": "अनुपात विश्लेषण वित्तीय विवरणों की जानकारी को सरल बनाने, तुलना करने और व्यवसाय की ताकत व कमजोरियों को पहचानने में बहुत उपयोगी है। हालांकि, यह भविष्य की प्रवृत्तियों और पूर्वानुमान के लिए एक उपयोगी उपकरण हो सकता है, लेकिन यह 'अचूक' (infallible) नहीं है। अनुपात विश्लेषण ऐतिहासिक डेटा (historical data) पर आधारित होता है और भविष्य की अनिश्चितताओं (uncertainties) या गुणात्मक कारकों (qualitative factors) को पूरी तरह से ध्यान में नहीं रख सकता। इसलिए, इसे हमेशा अन्य जानकारी के साथ मिलाकर उपयोग किया जाना चाहिए।"}, {"id": 22, "section": "Commerce", "question": "यदि प्रबंधक का कमीशन (Manager's Commission) शुद्ध लाभ (Net Profit) पर 'ऐसे कमीशन को चार्ज करने के बाद' (after charging such commission) देय है, और शुद्ध लाभ कमीशन से पहले ₹1,10,000 है, तथा कमीशन की दर 10% है, तो कमीशन की राशि क्या होगी?", "brand": "bilaspurtestseries.com 9669946966", "options": ["₹10,000", "₹9,091 (लगभग)", "₹12,100", "₹11,000"], "answer": "₹10,000", "explanation": "जब कमीशन 'ऐसे कमीशन को चार्ज करने के बाद' शुद्ध लाभ पर देय होता है, तो कमीशन की गणना का सूत्र होता है: (शुद्ध लाभ दर) / (100 + दर)। इस मामले में, शुद्ध लाभ कमीशन से पहले ₹1,10,000 है और दर 10% है। अतः, कमीशन = (₹1,10,000 × 10) / (100 + 10) = (₹1,10,000 × 10) / 110 = ₹10,000। यदि कमीशन 'ऐसे कमीशन को चार्ज करने से पहले' होता, तो यह ₹11,000 होता, जो एक सामान्य गलती है।"}, {"id": 23, "section": "Commerce", "question": "अभिकथन (A): एक उच्च चालू अनुपात (Current Ratio) हमेशा एक फर्म की बेहतर तरलता स्थिति (liquidity position) का संकेत देता है।\nकारण (R): चालू अनुपात चालू संपत्तियों (Current Assets) और चालू देनदारियों (Current Liabilities) के बीच संबंध स्थापित करता है, जो अल्पकालिक शोधनक्षमता (short-term solvency) का माप है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A) सत्य है लेकिन (R) असत्य है।", "(A) असत्य है लेकिन (R) सत्य है।", "(A) और (R) दोनों सत्य हैं लेकिन (R), (A) की सही व्याख्या नहीं है।", "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।"], "answer": "(A) असत्य है लेकिन (R) सत्य है।", "explanation": "अभिकथन (A) असत्य है क्योंकि एक उच्च चालू अनुपात हमेशा बेहतर तरलता का संकेत नहीं देता है। यह अत्यधिक इन्वेंट्री (inventory) या अप्रचलित देनदारों (obsolete debtors) के कारण भी हो सकता है, जो वास्तव में खराब तरलता का संकेत है। कारण (R) सत्य है क्योंकि चालू अनुपात वास्तव में चालू संपत्तियों और चालू देनदारियों के बीच संबंध स्थापित करता है और अल्पकालिक शोधनक्षमता (short-term solvency) या तरलता का एक महत्वपूर्ण माप है।"}, {"id": 24, "section": "Commerce", "question": "निम्नलिखित में से कौन से समायोजन (adjustments) लाभ-हानि खाते (Profit & Loss Account) और तुलन पत्र (Balance Sheet) दोनों को प्रभावित करते हैं?\nJ: बकाया व्यय (Outstanding Expenses)\nK: पूर्वदत्त व्यय (Prepaid Expenses)\nL: मूल्यह्रास (Depreciation)\nM: डूबत ऋण के लिए प्रावधान (Provision for Doubtful Debts)", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और K", "केवल L और M", "केवल K और L", "J, K, L और M सभी"], "answer": "J, K, L और M सभी", "explanation": "ये सभी समायोजन लाभ-हानि खाते और तुलन पत्र दोनों को प्रभावित करते हैं। बकाया व्यय लाभ-हानि खाते में व्यय के रूप में जुड़ते हैं और तुलन पत्र में देनदारी (liability) के रूप में दिखाए जाते हैं। पूर्वदत्त व्यय लाभ-हानि खाते से घटाए जाते हैं (यदि पहले से दर्ज हों) या व्यय के रूप में समायोजित होते हैं, और तुलन पत्र में संपत्ति (asset) के रूप में दिखाए जाते हैं। मूल्यह्रास लाभ-हानि खाते में व्यय के रूप में दर्ज होता है और तुलन पत्र में संपत्ति के मूल्य को कम करता है। डूबत ऋण के लिए प्रावधान लाभ-हानि खाते में व्यय के रूप में दर्ज होता है और तुलन पत्र में देनदारों (debtors) से घटाया जाता है।"}, {"id": 25, "section": "Commerce", "question": "निम्नलिखित वित्तीय अनुपातों (Financial Ratios) को उनके सूत्र (Formula) या मुख्य उद्देश्य (Main Purpose) के साथ सुमेलित (Match) कीजिए:\nसूची-I (अनुपात) ×\nJ: ऋण-इक्विटी अनुपात (Debt-Equity Ratio)\nK: स्टॉक आवर्त अनुपात (Inventory Turnover Ratio)\nL: सकल लाभ अनुपात (Gross Profit Ratio)\nM: त्वरित अनुपात (Quick Ratio)\n*सूची-II (सूत्र/उद्देश्य) ×\n1. शुद्ध बिक्री (Net Sales) / औसत स्टॉक (Average Inventory)\n2. सकल लाभ (Gross Profit) / शुद्ध बिक्री (Net Sales) × 100\n3. कुल बाहरी देनदारियाँ (Total External Liabilities) / शेयरधारक निधि (Shareholders' Funds)\n4. त्वरित संपत्तियाँ (Quick Assets) / चालू देनदारियाँ (Current Liabilities)", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-4, K-1, L-2, M-3", "J-3, K-1, L-2, M-4", "J-3, K-2, L-1, M-4", "J-1, K-3, L-2, M-4"], "answer": "J-3, K-1, L-2, M-4", "explanation": "सही मिलान इस प्रकार है:\nJ. ऋण-इक्विटी अनुपात (Debt-Equity Ratio) दीर्घकालिक शोधनक्षमता (long-term solvency) का माप है, जिसका सूत्र है कुल बाहरी देनदारियाँ (Total External Liabilities) / शेयरधारक निधि (Shareholders' Funds)। (J-3)\nK. स्टॉक आवर्त अनुपात (Inventory Turnover Ratio) दर्शाता है कि स्टॉक कितनी कुशलता से बेचा जा रहा है, जिसका सूत्र है शुद्ध बिक्री (Net Sales) / औसत स्टॉक (Average Inventory) या बेचे गए माल की लागत (Cost of Goods Sold) / औसत स्टॉक। (K-1)\nL. सकल लाभ अनुपात (Gross Profit Ratio) बिक्री पर सकल लाभ की लाभप्रदता (profitability) को मापता है, जिसका सूत्र है सकल लाभ (Gross Profit) / शुद्ध बिक्री (Net Sales) × 100। (L-2)\nM. त्वरित अनुपात (Quick Ratio) तत्काल तरलता (immediate liquidity) को मापता है, जिसका सूत्र है त्वरित संपत्तियाँ (Quick Assets) / चालू देनदारियाँ (Current Liabilities)। (M-4)"}, {"id": 26, "section": "Commerce", "question": "समायोजनों (Adjustments) के साथ अंतिम खाते (Final Accounts) तैयार करने के चरणों को सही कालानुक्रमिक क्रम (chronological order) में व्यवस्थित करें:\nJ: व्यापार खाता (Trading Account) तैयार करना।\nK: तुलन पत्र (Balance Sheet) तैयार करना।\nL: लाभ-हानि खाता (Profit & Loss Account) तैयार करना।\nM: समायोजन प्रविष्टियाँ (Adjustment Entries) करना और तलपट (Trial Balance) को समायोजित करना।", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, M, L, K", "J, L, M, K", "M, J, L, K", "M, L, J, K"], "answer": "M, J, L, K", "explanation": "अंतिम खाते तैयार करने की प्रक्रिया में सबसे पहले सभी आवश्यक समायोजन प्रविष्टियाँ (Adjustment Entries) की जाती हैं और तलपट (Trial Balance) को समायोजित किया जाता है ताकि सभी आय और व्यय सही अवधि से संबंधित हों और संपत्तियां व देनदारियां उनके सही मूल्य पर दिखाई दें (M)। इसके बाद, सकल लाभ या हानि (Gross Profit or Loss) की गणना के लिए व्यापार खाता (Trading Account) तैयार किया जाता है (J)। व्यापार खाते से प्राप्त सकल लाभ/हानि को लाभ-हानि खाते में स्थानांतरित किया जाता है, और शुद्ध लाभ या हानि (Net Profit or Loss) की गणना के लिए लाभ-हानि खाता (Profit & Loss Account) तैयार किया जाता है (L)। अंत में, व्यवसाय की वित्तीय स्थिति (financial position) को दर्शाने के लिए तुलन पत्र (Balance Sheet) तैयार किया जाता है, जिसमें सभी संपत्तियां, देनदारियां और पूंजी शामिल होती हैं (K)।"}, {"id": 27, "section": "Commerce", "question": "लेखांकन अवधारणा (Accounting Concept) जो यह मानती है कि व्यवसाय का अस्तित्व उसके मालिकों से अलग और स्वतंत्र है, उसे क्या कहा जाता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["पृथक व्यावसायिक इकाई अवधारणा (Separate Business Entity Concept)", "लागत अवधारणा (Cost Concept)", "मुद्रा मापन अवधारणा (Money Measurement Concept)", "चालू व्यवसाय अवधारणा (Going Concern Concept)"], "answer": "पृथक व्यावसायिक इकाई अवधारणा (Separate Business Entity Concept)", "explanation": "पृथक व्यावसायिक इकाई अवधारणा (Separate Business Entity Concept) यह मानती है कि व्यवसाय और उसके मालिक दो अलग-अलग कानूनी संस्थाएँ (legal entities) हैं। इस अवधारणा के अनुसार, व्यवसाय के लेनदेन (transactions) को मालिकों के व्यक्तिगत लेनदेन से अलग दर्ज किया जाता है। चालू व्यवसाय अवधारणा यह मानती है कि व्यवसाय अनिश्चित काल तक चलता रहेगा, मुद्रा मापन अवधारणा केवल मौद्रिक लेनदेन को रिकॉर्ड करती है, और लागत अवधारणा संपत्ति को उनके अधिग्रहण की लागत पर रिकॉर्ड करती है।"}, {"id": 28, "section": "Commerce", "question": "लेखांकन अवधारणा (Accounting Concept) जो यह मानती है कि व्यवसाय का अस्तित्व उसके मालिकों से अलग और स्वतंत्र है, उसे क्या कहा जाता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["पृथक व्यावसायिक इकाई अवधारणा (Separate Business Entity Concept)", "लागत अवधारणा (Cost Concept)", "मुद्रा मापन अवधारणा (Money Measurement Concept)", "चालू व्यवसाय अवधारणा (Going Concern Concept)"], "answer": "पृथक व्यावसायिक इकाई अवधारणा (Separate Business Entity Concept)", "explanation": "पृथक व्यावसायिक इकाई अवधारणा (Separate Business Entity Concept) यह मानती है कि व्यवसाय और उसके मालिक दो अलग-अलग कानूनी संस्थाएँ (legal entities) हैं। इस अवधारणा के अनुसार, व्यवसाय के लेनदेन (transactions) को मालिकों के व्यक्तिगत लेनदेन से अलग दर्ज किया जाता है। चालू व्यवसाय अवधारणा यह मानती है कि व्यवसाय अनिश्चित काल तक चलता रहेगा, मुद्रा मापन अवधारणा केवल मौद्रिक लेनदेन को रिकॉर्ड करती है, और लागत अवधारणा संपत्ति को उनके अधिग्रहण की लागत पर रिकॉर्ड करती है।"}, {"id": 29, "section": "Commerce", "question": "लेखांकन अवधारणा (Accounting Concept) जो यह मानती है कि व्यवसाय का अस्तित्व उसके मालिकों से अलग और स्वतंत्र है, उसे क्या कहा जाता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["पृथक व्यावसायिक इकाई अवधारणा (Separate Business Entity Concept)", "लागत अवधारणा (Cost Concept)", "मुद्रा मापन अवधारणा (Money Measurement Concept)", "चालू व्यवसाय अवधारणा (Going Concern Concept)"], "answer": "पृथक व्यावसायिक इकाई अवधारणा (Separate Business Entity Concept)", "explanation": "पृथक व्यावसायिक इकाई अवधारणा (Separate Business Entity Concept) यह मानती है कि व्यवसाय और उसके मालिक दो अलग-अलग कानूनी संस्थाएँ (legal entities) हैं। इस अवधारणा के अनुसार, व्यवसाय के लेनदेन (transactions) को मालिकों के व्यक्तिगत लेनदेन से अलग दर्ज किया जाता है। चालू व्यवसाय अवधारणा यह मानती है कि व्यवसाय अनिश्चित काल तक चलता रहेगा, मुद्रा मापन अवधारणा केवल मौद्रिक लेनदेन को रिकॉर्ड करती है, और लागत अवधारणा संपत्ति को उनके अधिग्रहण की लागत पर रिकॉर्ड करती है।"}, {"id": 30, "section": "Commerce", "question": "एक कंपनी के लिए निम्नलिखित जानकारी उपलब्ध है:\nशुद्ध बिक्री (Net Sales): ₹10,00,000\n* बेचे गए माल की लागत (Cost of Goods Sold): ₹6,00,000\n* प्रचालन व्यय (Operating Expenses): ₹1,50,000 (इसमें ₹20,000 का मूल्यह्रास शामिल है)\n* गैर-प्रचालन आय (Non-Operating Income): ₹50,000\n* गैर-प्रचालन व्यय (Non-Operating Expenses): ₹30,000\nकंपनी का शुद्ध लाभ अनुपात (Net Profit Ratio) क्या होगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["22%", "25%", "20%", "27%"], "answer": "27%", "explanation": "शुद्ध लाभ अनुपात (Net Profit Ratio) की गणना के लिए हमें शुद्ध लाभ (Net Profit) की आवश्यकता होती है।\n1. सकल लाभ (Gross Profit) = शुद्ध बिक्री - बेचे गए माल की लागत = ₹10,00,000 - ₹6,00,000 = ₹4,00,000\n2. प्रचालन लाभ (Operating Profit) = सकल लाभ - प्रचालन व्यय = ₹4,00,000 - ₹1,50,000 = ₹2,50,000\n3. शुद्ध लाभ (Net Profit) = प्रचालन लाभ + गैर-प्रचालन आय - गैर-प्रचालन व्यय = ₹2,50,000 + ₹50,000 - ₹30,000 = ₹2,70,000\n4. शुद्ध लाभ अनुपात = (शुद्ध लाभ / शुद्ध बिक्री) × 100 = (₹2,70,000 / ₹10,00,000) × 100 = 27%\nमूल्यह्रास (Depreciation) पहले से ही प्रचालन व्यय में शामिल है, इसलिए इसे अलग से समायोजित करने की आवश्यकता नहीं है।"}, {"id": 31, "section": "Commerce", "question": "एक नए साझेदार (new partner) के प्रवेश पर साझेदारी (partnership) के पुनर्गठन (reconstitution) का प्राथमिक अर्थ क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["सभी पुराने साझेदारों (old partners) को सेवानिवृत्त (retire) होना पड़ता है।", "फर्म का व्यवसाय (business) पूरी तरह से बदल जाता है।", "फर्म (firm) का विघटन (dissolution) हो जाता है।", "साझेदारी समझौते (partnership agreement) में परिवर्तन होता है।"], "answer": "साझेदारी समझौते (partnership agreement) में परिवर्तन होता है।", "explanation": "एक नए साझेदार के प्रवेश पर साझेदारी का पुनर्गठन तब होता है जब मौजूदा साझेदारी समझौते में परिवर्तन होता है। यह फर्म के विघटन का कारण नहीं बनता है, बल्कि केवल साझेदारों के बीच संबंधों और लाभ-हानि विभाजन अनुपात (profit-sharing ratio) को बदलता है। फर्म का व्यवसाय आमतौर पर वही रहता है, और सभी पुराने साझेदारों को सेवानिवृत्त होना आवश्यक नहीं है।"}, {"id": 32, "section": "Commerce", "question": "निम्नलिखित में से किस परिस्थिति में त्याग अनुपात (Sacrificing Ratio) की गणना की जाती है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["जब कोई नया साझेदार (new partner) फर्म में प्रवेश करता है।", "जब साझेदारों के बीच लाभ-हानि विभाजन अनुपात (profit-sharing ratio) में कोई परिवर्तन नहीं होता है।", "जब कोई साझेदार सेवानिवृत्त (retires) होता है।", "जब फर्म का विघटन (dissolution) होता है।"], "answer": "जब कोई नया साझेदार (new partner) फर्म में प्रवेश करता है।", "explanation": "त्याग अनुपात की गणना तब की जाती है जब कोई नया साझेदार फर्म में प्रवेश करता है। इस स्थिति में, पुराने साझेदार नए साझेदार के लिए अपने लाभ के हिस्से का त्याग करते हैं, और इस त्याग को त्याग अनुपात के माध्यम से मापा जाता है। साझेदार की सेवानिवृत्ति या लाभ-हानि विभाजन अनुपात में परिवर्तन की स्थिति में लाभ प्राप्ति अनुपात (gaining ratio) की गणना की जा सकती है, जबकि फर्म के विघटन पर इन अनुपातों की गणना का कोई औचित्य नहीं होता।"}, {"id": 33, "section": "Commerce", "question": "एक नए साझेदार के प्रवेश पर ख्याति (Goodwill) के लेखांकन उपचार (accounting treatment) के संबंध में निम्नलिखित में से कौन सा कथन सही है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यदि नया साझेदार ख्याति के लिए नकद में भुगतान करता है, तो यह राशि त्याग करने वाले साझेदारों (sacrificing partners) के पूंजी खातों में उनके त्याग अनुपात (sacrificing ratio) में क्रेडिट की जाती है।", "नया साझेदार हमेशा ख्याति के लिए नकद (cash) में भुगतान करता है।", "ख्याति को हमेशा फर्म की पुस्तकों (books) में अपलिखित (written off) किया जाता है, भले ही नया साझेदार इसके लिए भुगतान करे या न करे।", "ख्याति की राशि को पुराने साझेदारों के पूंजी खातों (capital accounts) में उनके नए लाभ-हानि विभाजन अनुपात में क्रेडिट (credit) किया जाता है।"], "answer": "यदि नया साझेदार ख्याति के लिए नकद में भुगतान करता है, तो यह राशि त्याग करने वाले साझेदारों (sacrificing partners) के पूंजी खातों में उनके त्याग अनुपात (sacrificing ratio) में क्रेडिट की जाती है।", "explanation": "जब एक नया साझेदार फर्म में प्रवेश करता है और ख्याति के लिए नकद में भुगतान करता है, तो यह राशि उन पुराने साझेदारों को क्षतिपूर्ति (compensate) करने के लिए होती है जिन्होंने नए साझेदार के पक्ष में अपने लाभ के हिस्से का त्याग किया है। इसलिए, यह राशि त्याग करने वाले साझेदारों के पूंजी खातों में उनके त्याग अनुपात में क्रेडिट की जाती है। नया साझेदार हमेशा नकद में भुगतान नहीं करता है, और ख्याति को हमेशा अपलिखित नहीं किया जाता है। ख्याति की राशि को नए लाभ-हानि विभाजन अनुपात में क्रेडिट करना गलत है, क्योंकि यह त्याग अनुपात में होता है।"}, {"id": 34, "section": "Commerce", "question": "साझेदारी फर्म (partnership firm) में साझेदार के प्रवेश (admission) या सेवानिवृत्ति (retirement) के संबंध में निम्नलिखित कथनों पर विचार करें और सही कथन/कथनों का चयन करें:\nJ: एक नए साझेदार के प्रवेश पर, यदि नया साझेदार केवल अपने हिस्से के लिए प्रवेश करता है और पुराने साझेदारों के बीच लाभ-हानि विभाजन अनुपात (profit-sharing ratio) अपरिवर्तित रहता है, तो त्याग अनुपात (sacrificing ratio) पुराने लाभ-हानि विभाजन अनुपात के समान होगा।\nK: एक साझेदार की सेवानिवृत्ति पर, यदि सेवानिवृत्त साझेदार का हिस्सा शेष साझेदारों द्वारा उनके पुराने लाभ-हानि विभाजन अनुपात में प्राप्त किया जाता है, तो लाभ प्राप्ति अनुपात (gaining ratio) शेष साझेदारों के पुराने अनुपात के समान होगा।\nL: ख्याति (Goodwill) को पुस्तकों में न दिखाने की स्थिति में, नए साझेदार के प्रवेश पर, नए साझेदार द्वारा लाई गई ख्याति (premium for goodwill) की राशि को पुराने साझेदारों के पूंजी खातों में उनके त्याग अनुपात (sacrificing ratio) में क्रेडिट किया जाता है।\nM: एक साझेदार की सेवानिवृत्ति पर, यदि ख्याति को पुस्तकों में नहीं दिखाया जाता है, तो सेवानिवृत्त साझेदार के हिस्से की ख्याति के लिए शेष साझेदारों के पूंजी खातों को उनके लाभ प्राप्ति अनुपात (gaining ratio) में डेबिट किया जाता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल K और L", "J, K, L और M सभी", "केवल J, K और L", "केवल J और K"], "answer": "J, K, L और M सभी", "explanation": "सभी कथन साझेदारी लेखांकन (partnership accounting) के मूलभूत सिद्धांतों (fundamental principles) के अनुसार सही हैं:\nJ. जब एक नया साझेदार प्रवेश करता है और पुराने साझेदारों का अनुपात अपरिवर्तित रहता है, तो वे नए साझेदार के लिए अपने पुराने अनुपात में ही त्याग करते हैं।\nK. सेवानिवृत्ति के मामले में, यदि सेवानिवृत्त साझेदार का हिस्सा शेष साझेदारों द्वारा उनके पुराने अनुपात में लिया जाता है, तो उनका लाभ प्राप्ति अनुपात भी उनके पुराने अनुपात के समान होगा।\nL. ख्याति को पुस्तकों में न दिखाने की स्थिति में, नए साझेदार द्वारा लाई गई ख्याति की राशि को त्याग करने वाले साझेदारों के पूंजी खातों में उनके त्याग अनुपात में क्रेडिट किया जाता है।\nM. इसी प्रकार, सेवानिवृत्ति पर, यदि ख्याति को पुस्तकों में नहीं दिखाया जाता है, तो सेवानिवृत्त साझेदार के हिस्से की ख्याति के लिए शेष साझेदारों के पूंजी खातों को उनके लाभ प्राप्ति अनुपात में डेबिट किया जाता है, क्योंकि वे लाभ प्राप्त कर रहे हैं।"}, {"id": 35, "section": "Commerce", "question": "अभिकथन (A): पुनर्मूल्यांकन खाता (Revaluation Account) परिसंपत्तियों (assets) और देनदारियों (liabilities) के मूल्य में परिवर्तन को रिकॉर्ड करने के लिए तैयार किया जाता है।\nकारण (R): पुनर्मूल्यांकन पर होने वाले लाभ या हानि को साझेदारों के पूंजी खातों (Partners' Capital Accounts) में उनके पुराने लाभ-हानि विभाजन अनुपात (old profit-sharing ratio) में वितरित किया जाता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["A सत्य है, लेकिन R असत्य है।", "A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं है।", "A असत्य है, लेकिन R सत्य है।", "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।"], "answer": "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "explanation": "अभिकथन (A) सही है क्योंकि पुनर्मूल्यांकन खाता वास्तव में परिसंपत्तियों और देनदारियों के मूल्य में हुए परिवर्तनों को रिकॉर्ड करने के लिए बनाया जाता है ताकि पुनर्गठन के समय उनकी सही स्थिति का पता चल सके। कारण (R) भी सही है क्योंकि पुनर्मूल्यांकन पर होने वाले लाभ या हानि का संबंध उन अवधियों से होता है जब पुराने साझेदार फर्म में थे, इसलिए इसे पुराने लाभ-हानि विभाजन अनुपात में उनके पूंजी खातों में वितरित किया जाता है। कारण (R) अभिकथन (A) की सही व्याख्या है क्योंकि पुनर्मूल्यांकन खाते का उद्देश्य ही यह सुनिश्चित करना है कि परिसंपत्तियों और देनदारियों के पुनर्मूल्यांकन से उत्पन्न होने वाले लाभ या हानि को सही तरीके से साझेदारों के पूंजी खातों में समायोजित किया जाए।"}, {"id": 36, "section": "Commerce", "question": "निम्नलिखित में से कौन से कारण साझेदारों के लाभ-हानि विभाजन अनुपात (Profit-Sharing Ratio) में परिवर्तन का कारण बन सकते हैं?\nJ: किसी नए साझेदार का प्रवेश (Admission of a new partner)\nK: किसी साझेदार की सेवानिवृत्ति (Retirement of a partner)\nL: साझेदारों के बीच आपसी समझौता (Mutual agreement among partners)\nM: किसी साझेदार की मृत्यु (Death of a partner)", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, L और M सभी", "केवल J, K और L", "केवल J और K", "केवल K, L और M"], "answer": "J, K, L और M सभी", "explanation": "साझेदारी के लाभ-हानि विभाजन अनुपात में परिवर्तन कई कारणों से हो सकता है। नए साझेदार का प्रवेश (J), साझेदार की सेवानिवृत्ति (K), और साझेदार की मृत्यु (M) सभी साझेदारी के पुनर्गठन की स्थितियाँ हैं जो स्वाभाविक रूप से लाभ-हानि विभाजन अनुपात को बदल देती हैं। इसके अतिरिक्त, मौजूदा साझेदार भी आपसी समझौते (L) से अपने लाभ-हानि विभाजन अनुपात को बदल सकते हैं। इसलिए, दिए गए सभी विकल्प लाभ-हानि विभाजन अनुपात में परिवर्तन के कारण हैं।"}, {"id": 37, "section": "Commerce", "question": "सूची-I में दिए गए लेखांकन शब्दों का सूची-II में दिए गए उनके अर्थों से मिलान करें:\nसूची-I (लेखांकन शब्द) × (A) त्याग अनुपात (Sacrificing Ratio)\n(B) लाभ प्राप्ति अनुपात (Gaining Ratio)\n(C) पुनर्मूल्यांकन खाता (Revaluation Account)\n(D) ख्याति (Goodwill)\n*सूची-II (अर्थ) × (i) फर्म की भविष्य की कमाई क्षमता (earning capacity) का मौद्रिक मूल्य (monetary value)\n(ii) वह अनुपात जिसमें पुराने साझेदार नए साझेदार के पक्ष में अपने लाभ के हिस्से का त्याग करते हैं\n(iii) वह अनुपात जिसमें शेष साझेदार सेवानिवृत्त साझेदार के हिस्से को प्राप्त करते हैं\n(iv) परिसंपत्तियों और देनदारियों के मूल्य में परिवर्तन को रिकॉर्ड करने के लिए बनाया गया खाता", "brand": "bilaspurtestseries.com 9669946966", "options": ["-(ii), (B)-(i), (C)-(iv), (D)-(iii)", "-(iv), (B)-(iii), (C)-(ii), (D)-(i)", "-(ii), (B)-(iii), (C)-(iv), (D)-(i)", "-(iii), (B)-(ii), (C)-(iv), (D)-(i)"], "answer": "-(ii), (B)-(iii), (C)-(iv), (D)-(i)", "explanation": "सही मिलान इस प्रकार है: त्याग अनुपात (Sacrificing Ratio) वह अनुपात है जिसमें पुराने साझेदार नए साझेदार के पक्ष में अपने लाभ के हिस्से का त्याग करते हैं (ii)। लाभ प्राप्ति अनुपात (Gaining Ratio) वह अनुपात है जिसमें शेष साझेदार सेवानिवृत्त साझेदार के हिस्से को प्राप्त करते हैं (iii)। पुनर्मूल्यांकन खाता (Revaluation Account) परिसंपत्तियों और देनदारियों के मूल्य में परिवर्तन को रिकॉर्ड करने के लिए बनाया गया खाता है (iv)। ख्याति (Goodwill) फर्म की भविष्य की कमाई क्षमता का मौद्रिक मूल्य है (i)। अन्य विकल्प गलत हैं क्योंकि वे इन अवधारणाओं को गलत तरीके से जोड़ते हैं, जिससे उनके मूल अर्थों में भ्रम पैदा होता है।"}, {"id": 38, "section": "Commerce", "question": "एक नए साझेदार के प्रवेश पर लेखांकन प्रक्रिया (accounting procedure) के निम्नलिखित चरणों को सही कालानुक्रमिक क्रम (chronological order) में व्यवस्थित करें:\nJ: परिसंपत्तियों और देनदारियों का पुनर्मूल्यांकन (Revaluation of assets and liabilities)\nK: नए लाभ-हानि विभाजन अनुपात (New Profit-Sharing Ratio) और त्याग अनुपात (Sacrificing Ratio) की गणना\nL: संचित लाभों (Accumulated Profits) और हानियों (Losses) का समायोजन (Adjustment)\nM: ख्याति (Goodwill) का लेखांकन उपचार (Accounting Treatment)", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, M, L, K", "K, J, L, M", "K, J, M, L", "J, K, L, M"], "answer": "K, J, L, M", "explanation": "एक नए साझेदार के प्रवेश पर लेखांकन प्रक्रिया का सही क्रम इस प्रकार है: सबसे पहले, नए लाभ-हानि विभाजन अनुपात और त्याग अनुपात की गणना (K) की जाती है, क्योंकि ये अनुपात बाद के समायोजनों के लिए आधार प्रदान करते हैं। इसके बाद, परिसंपत्तियों और देनदारियों का पुनर्मूल्यांकन (J) किया जाता है ताकि उनकी वास्तविक स्थिति का पता चल सके। फिर, संचित लाभों और हानियों का समायोजन (L) किया जाता है, क्योंकि ये पुराने साझेदारों से संबंधित होते हैं। अंत में, ख्याति का लेखांकन उपचार (M) किया जाता है, जिसमें नए साझेदार द्वारा लाई गई ख्याति को त्याग करने वाले साझेदारों में वितरित किया जाता है। यह क्रम सुनिश्चित करता है कि सभी समायोजन सही आधार पर और उचित समय पर किए जाएं।"}, {"id": 39, "section": "Commerce", "question": "A और B एक फर्म में 3:2 के अनुपात में लाभ साझा करते हैं। वे C को 1/5वें हिस्से के लिए साझेदार के रूप में प्रवेश देते हैं। यदि C अपना हिस्सा A और B से उनके पुराने लाभ-हानि विभाजन अनुपात में प्राप्त करता है, तो नया लाभ-हानि विभाजन अनुपात (New Profit-Sharing Ratio) क्या होगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["10:10:5", "12:8:5", "11:9:5", "13:7:5"], "answer": "12:8:5", "explanation": "A और B का पुराना लाभ-हानि विभाजन अनुपात 3:2 है। C को 1/5 हिस्सा मिलता है। C अपना हिस्सा A और B से उनके पुराने लाभ-हानि विभाजन अनुपात (3:2) में प्राप्त करता है।\n\nA द्वारा त्याग = C के हिस्से का 3/5 = (1/5) × (3/5) = 3/25\nB द्वारा त्याग = C के हिस्से का 2/5 = (1/5) × (2/5) = 2/25\n\nA का नया हिस्सा = पुराना हिस्सा - त्याग = 3/5 − 3/25 = (15 − 3)/25 = 12/25\nB का नया हिस्सा = पुराना हिस्सा - त्याग = 2/5 − 2/25 = (10 − 2)/25 = 8/25\nC का हिस्सा = 1/5 = 5/25\n\nअतः, नया लाभ-हानि विभाजन अनुपात A:B:C = 12/25: 8/25: 5/25 = 12:8:5 होगा।"}, {"id": 40, "section": "Commerce", "question": "A, B और C एक फर्म में 3:2:1 के अनुपात में लाभ साझा करते हैं। C सेवानिवृत्त होता है। सेवानिवृत्ति की तिथि पर, C की पूंजी (capital) ₹60,000 थी। फर्म की ख्याति (goodwill) का मूल्यांकन ₹90,000 किया गया था, पुनर्मूल्यांकन पर लाभ (revaluation profit) ₹30,000 था, और सामान्य संचय (General Reserve) ₹18,000 था। C को देय कुल राशि की गणना करें।", "brand": "bilaspurtestseries.com 9669946966", "options": ["₹75,000", "₹78,000", "₹83,000", "₹90,000"], "answer": "₹83,000", "explanation": "C को देय कुल राशि की गणना इस प्रकार की जाएगी:\n1. C की पूंजी = ₹60,000\n2. ख्याति में C का हिस्सा = फर्म की ख्याति C का लाभ हिस्सा = ₹90,000 (1/6) = ₹15,000\n3. पुनर्मूल्यांकन लाभ में C का हिस्सा = पुनर्मूल्यांकन लाभ C का लाभ हिस्सा = ₹30,000 (1/6) = ₹5,000\n4. सामान्य संचय में C का हिस्सा = सामान्य संचय C का लाभ हिस्सा = ₹18,000 (1/6) = ₹3,000\n\nC को देय कुल राशि = पूंजी + ख्याति का हिस्सा + पुनर्मूल्यांकन लाभ का हिस्सा + सामान्य संचय का हिस्सा = ₹60,000 + ₹15,000 + ₹5,000 + ₹3,000 = ₹83,000।"}, {"id": 41, "section": "Commerce", "question": "निम्नलिखित में से कौन सा कथन अंशों (Shares) और ऋणपत्रों (Debentures) के बीच सही अंतर बताता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["अंशधारक (Shareholders) कंपनी के लेनदार (creditors) होते हैं, जबकि ऋणपत्रधारक (Debenture holders) कंपनी के मालिक (owners) होते हैं।", "अंश (Shares) कंपनी की स्वामित्व पूंजी (ownership capital) का प्रतिनिधित्व करते हैं, जबकि ऋणपत्र (Debentures) ऋण पूंजी (debt capital) का प्रतिनिधित्व करते हैं।", "अंशों पर निश्चित ब्याज (fixed interest) का भुगतान किया जाता है, जबकि ऋणपत्रों पर लाभांश (dividend) का भुगतान किया जाता है।", "अंशों का शोधन (redemption) एक निश्चित अवधि के बाद होता है, जबकि ऋणपत्रों का शोधन कंपनी के जीवनकाल में कभी भी नहीं होता।"], "answer": "अंश (Shares) कंपनी की स्वामित्व पूंजी (ownership capital) का प्रतिनिधित्व करते हैं, जबकि ऋणपत्र (Debentures) ऋण पूंजी (debt capital) का प्रतिनिधित्व करते हैं।", "explanation": "यह कथन अंशों और ऋणपत्रों के बीच के मूलभूत अंतर को सही ढंग से बताता है। अंश कंपनी में स्वामित्व का प्रतिनिधित्व करते हैं, जबकि ऋणपत्र कंपनी के लिए एक ऋण होते हैं। विकल्प B गलत है क्योंकि अंशों पर लाभांश और ऋणपत्रों पर ब्याज का भुगतान किया जाता है। विकल्प C गलत है क्योंकि अंशधारक मालिक होते हैं और ऋणपत्रधारक लेनदार होते हैं। विकल्प D गलत है क्योंकि ऋणपत्रों का शोधन एक निश्चित अवधि के बाद होता है, जबकि अंशों का शोधन सामान्यतः कंपनी के समापन पर होता है (कुछ अपवादों को छोड़कर जैसे बायबैक)।"}, {"id": 42, "section": "Commerce", "question": "कंपनी खातों (Company Accounts), अंशों (Shares), ऋणपत्रों (Debentures) और रोकड़ प्रवाह विवरण (Cash Flow Statement) से संबंधित निम्नलिखित कथनों का विश्लेषण करें और सही कथन/कथनों का चयन करें:\nJ: एक कंपनी द्वारा अंशों के हरण (forfeiture of shares) के बाद, यदि उन अंशों को पुनः जारी (re-issue) किया जाता है और पुनः जारी मूल्य (re-issue price) उनके अंकित मूल्य (face value) से कम है, तो इस कमी को 'अंश हरण खाते' (Share Forfeiture Account) से समायोजित किया जाता है, और यदि कोई शेष बचता है तो उसे पूंजी संचय (Capital Reserve) में स्थानांतरित किया जाता है।\nK: परिवर्तनीय ऋणपत्रों (Convertible Debentures) को अंशों में परिवर्तित (converted into shares) करने पर, ऋणपत्रों के मोचन पर प्रीमियम (Premium on Redemption of Debentures) को 'पूंजी संचय' (Capital Reserve) से अपलिखित (write off) किया जा सकता है।\nL: अप्रत्यक्ष विधि (Indirect Method) से परिचालन गतिविधियों से रोकड़ प्रवाह (Cash Flow from Operating Activities) की गणना करते समय, निवेश पर प्राप्त लाभांश (Dividend Received on Investments) को शुद्ध लाभ (Net Profit) में वापस जोड़ा जाता है क्योंकि यह एक गैर-परिचालन आय है।\nM: ऋणपत्रों के निर्गम पर छूट (Discount on Issue of Debentures) को कंपनी के जीवनकाल में अपलिखित (written off) किया जाता है, और इसे 'प्रतिभूति प्रीमियम खाते' (Securities Premium Account) से भी अपलिखित किया जा सकता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और M सही हैं।", "केवल J और L सही हैं।", "केवल J, K और M सही हैं।", "केवल K और L सही हैं।"], "answer": "केवल J और M सही हैं।", "explanation": "कथन J सही है। अंशों के हरण के बाद, पुनः जारी करने पर दी गई छूट को अंश हरण खाते (Share Forfeiture Account) से समायोजित किया जाता है। हरण खाते में बची हुई राशि (जो पुनः जारी किए गए अंशों से संबंधित है) को पूंजी संचय (Capital Reserve) में स्थानांतरित किया जाता है क्योंकि यह एक पूंजीगत लाभ है।\nकथन K गलत है। ऋणपत्रों के मोचन पर प्रीमियम को 'प्रतिभूति प्रीमियम खाते' (Securities Premium Account) या लाभ-हानि विवरण (Statement of Profit & Loss) से अपलिखित किया जाता है, न कि पूंजी संचय (Capital Reserve) से। पूंजी संचय पूंजीगत लाभों से बनता है और इसका उपयोग प्रीमियम के अपलेखन के लिए नहीं किया जाता है।\nकथन L गलत है। अप्रत्यक्ष विधि (Indirect Method) से परिचालन गतिविधियों से रोकड़ प्रवाह (Cash Flow from Operating Activities) की गणना करते समय, निवेश पर प्राप्त लाभांश (जो एक गैर-परिचालन आय और निवेश गतिविधि है) को शुद्ध लाभ (Net Profit) से घटाया जाता है, न कि जोड़ा जाता है, ताकि केवल परिचालन आय को शामिल किया जा सके। इसे बाद में निवेश गतिविधियों से रोकड़ प्रवाह के तहत दिखाया जाता है।\nकथन M सही है। ऋणपत्रों के निर्गम पर छूट (Discount on Issue of Debentures) को ऋणपत्रों के जीवनकाल में अपलिखित किया जाता है। कंपनी अधिनियम, 2013 की धारा 52 के अनुसार, प्रतिभूति प्रीमियम खाते (Securities Premium Account) का उपयोग ऋणपत्रों के निर्गम पर छूट को अपलिखित करने के लिए किया जा सकता है।"}, {"id": 43, "section": "Commerce", "question": "अंशों के निर्गमन (Issue of Shares) से संबंधित निम्नलिखित कथनों पर विचार करें:\nI. अंशों को सममूल्य (at par), प्रीमियम (at premium) या बट्टे (at discount) पर जारी किया जा सकता है।\nII. अंशों के निर्गमन पर प्राप्त प्रीमियम को प्रतिभूति प्रीमियम आरक्षित (Securities Premium Reserve) खाते में क्रेडिट किया जाता है।\nIII. कंपनी अधिनियम, 2013 के अनुसार, एक कंपनी अपने अंशों को बट्टे पर जारी नहीं कर सकती है, सिवाय स्वेट इक्विटी अंशों (Sweat Equity Shares) के।\nIV. अंश आवेदन खाते (Share Application Account) में प्राप्त राशि को कंपनी की बैलेंस शीट (Balance Sheet) में 'चालू देनदारियों' (Current Liabilities) के तहत दिखाया जाता है जब तक कि अंश आवंटित न हो जाएं।\nउपरोक्त कथनों में से कौन से कथन सही हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल II और III", "केवल I, II और IV", "केवल I और II", "केवल II, III और IV"], "answer": "केवल II और III", "explanation": "कथन I गलत है क्योंकि कंपनी अधिनियम, 2013 (Companies Act, 2013) के अनुसार, एक कंपनी अपने अंशों को बट्टे (at discount) पर जारी नहीं कर सकती है, सिवाय स्वेट इक्विटी अंशों (Sweat Equity Shares) के। कथन II सही है क्योंकि अंशों के निर्गमन पर प्राप्त प्रीमियम को प्रतिभूति प्रीमियम आरक्षित (Securities Premium Reserve) खाते में क्रेडिट किया जाता है, जिसका उपयोग विशिष्ट उद्देश्यों के लिए किया जाता है। कथन III सही है और कथन I की व्याख्या करता है। कथन IV गलत है क्योंकि अंश आवेदन खाते में प्राप्त राशि को 'चालू देनदारियों' के तहत नहीं, बल्कि 'अंश पूंजी' (Share Capital) के तहत 'अंश आवेदन राशि लंबित आवंटन' (Share Application Money Pending Allotment) शीर्षक से दिखाया जाता है, जब तक कि अंश आवंटित न हो जाएं।"}, {"id": 44, "section": "Commerce", "question": "ऋणपत्रों के शोधन (Redemption of Debentures) के संबंध में निम्नलिखित कथनों पर विचार करें:\n1. ऋणपत्र शोधन आरक्षित निधि (Debenture Redemption Reserve − DRR) का निर्माण ऋणपत्रों के शोधन के लिए अनिवार्य है, भले ही कंपनी एक गैर-बैंकिंग वित्तीय कंपनी (NBFC) या हाउसिंग फाइनेंस कंपनी (HFC) हो।\n2. ऋणपत्र शोधन निवेश (Debenture Redemption Investment − DRI) को ऋणपत्रों के शोधन की देय तिथि (due date) से कम से कम 15 दिन पहले किया जाना चाहिए।\n3. खुले बाजार से ऋणपत्रों की खरीद (purchase of debentures from open market) शोधन का एक तरीका है, और ऐसे खरीदे गए ऋणपत्रों को तुरंत रद्द (cancelled) किया जा सकता है या निवेश के रूप में रखा जा सकता है।\nउपरोक्त कथनों में से कौन सा/से सही है/हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल 3", "केवल 1, 2 और 3", "केवल 2 और 3", "केवल 1 और 2"], "answer": "केवल 3", "explanation": "कथन 1 गलत है। कंपनी अधिनियम, 2013 (Companies Act, 2013) और SEBI (LODR) विनियमों के तहत, कुछ कंपनियों (जैसे NBFCs और HFCs) को DRR बनाने से छूट दी गई है या कम DRR की आवश्यकता होती है। कथन 2 गलत है। DRI को वित्तीय वर्ष (financial year) के 30 अप्रैल तक किया जाना चाहिए, न कि शोधन की देय तिथि से 15 दिन पहले। कथन 3 सही है। कंपनी खुले बाजार से अपने स्वयं के ऋणपत्र खरीद सकती है, या तो उन्हें तुरंत रद्द करने के लिए (शोधन) या उन्हें निवेश के रूप में रखने के लिए (यदि वे भविष्य में लाभ पर बेचे जा सकते हैं)।"}, {"id": 45, "section": "Commerce", "question": "अभिकथन (A): तुलन पत्र (Balance Sheet) में शेयर पूंजी (Share Capital) को 'इक्विटी और देनदारियां' (Equity and Liabilities) शीर्षक के तहत 'शेयरधारकों के फंड' (Shareholders' Funds) के रूप में प्रस्तुत किया जाता है, जबकि ऋण पूंजी (Debt Capital) को 'गैर-चालू देनदारियां' (Non-Current Liabilities) या 'चालू देनदारियां' (Current Liabilities) के तहत दिखाया जाता है।\nकारण (R): शेयर पूंजी कंपनी के मालिकों द्वारा प्रदान की गई स्थायी पूंजी है और इसका शोधन कंपनी के समापन पर होता है, जबकि ऋण पूंजी बाहरी स्रोतों से ली गई उधार पूंजी है जिसका शोधन एक निश्चित अवधि के बाद होता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A) सत्य है, लेकिन (R) असत्य है।", "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "(A) और (R) दोनों सत्य हैं, लेकिन (R), (A) की सही व्याख्या नहीं है।", "(A) असत्य है, लेकिन (R) सत्य है।"], "answer": "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "explanation": "अभिकथन (A) सही है क्योंकि शेयर पूंजी को तुलन पत्र में शेयरधारकों के फंड के हिस्से के रूप में दिखाया जाता है, जो कंपनी के स्वामित्व वाले हिस्से का प्रतिनिधित्व करता है। ऋण पूंजी को उसकी परिपक्वता अवधि (maturity period) के आधार पर गैर-चालू या चालू देनदारियों के तहत दिखाया जाता है। कारण (R) भी सही है और अभिकथन (A) की सही व्याख्या करता है। शेयर पूंजी कंपनी के मालिकों द्वारा योगदान की गई स्थायी पूंजी है और यह कंपनी के समापन तक बनी रहती है, जबकि ऋण पूंजी बाहरी स्रोतों से प्राप्त होती है और इसका शोधन एक पूर्व-निर्धारित अवधि के बाद किया जाता है, जो उनके प्रस्तुतीकरण में अंतर का मूल कारण है।"}, {"id": 46, "section": "Commerce", "question": "रोकड़ प्रवाह विवरण (Cash Flow Statement) में परिचालन गतिविधियों (Operating Activities) से नकदी प्रवाह की गणना करते समय निम्नलिखित में से किन मदों को समायोजित (adjusted) किया जाता है?\nJ: मूल्यह्रास (Depreciation)\nK: सद्भावना का अपलेखन (Amortization of Goodwill)\nL: निवेश की बिक्री पर लाभ (Profit on Sale of Investments)\nM: लाभांश का भुगतान (Dividend Paid)\nसही संयोजन का चयन करें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, K और M", "केवल K, L और M", "केवल J, K और L", "केवल J और K"], "answer": "केवल J, K और L", "explanation": "परिचालन गतिविधियों से नकदी प्रवाह की गणना करते समय, मूल्यह्रास (J) और सद्भावना का अपलेखन (K) जैसे गैर-नकदी व्यय (non-cash expenses) को शुद्ध लाभ (net profit) में वापस जोड़ा जाता है। निवेश की बिक्री पर लाभ (L) एक गैर-परिचालन आय (non-operating income) है, इसलिए इसे शुद्ध लाभ से घटाया जाता है ताकि केवल परिचालन नकदी प्रवाह प्राप्त हो सके। लाभांश का भुगतान (M) एक वित्तपोषण गतिविधि (financing activity) है, न कि परिचालन गतिविधि, इसलिए इसे परिचालन गतिविधियों में समायोजित नहीं किया जाता है।"}, {"id": 47, "section": "Commerce", "question": "निम्नलिखित सूची-I (List-I) में अंशों के प्रकार दिए गए हैं और सूची-II (List-II) में उनसे संबंधित विशिष्ट अधिकार या विशेषताएँ दी गई हैं। सही मिलान का चयन करें:\nसूची-I (Types of Shares)\n(a) समता अंश (Equity Shares)\n(b) अधिमान अंश (Preference Shares)\n(c) स्वेट इक्विटी अंश (Sweat Equity Shares)\n(d) बोनस अंश (Bonus Shares)\nसूची-II (Specific Rights/Characteristics)\n(i) कंपनी के समापन पर पूंजी की वापसी में प्राथमिकता और निश्चित लाभांश का अधिकार।\n(ii) कर्मचारियों या निदेशकों को रियायती दर पर या नकद के अलावा अन्य प्रतिफल (consideration) के लिए जारी किए गए अंश।\n(iii) कंपनी के अवितरित लाभों (undistributed profits) से मौजूदा अंशधारकों को बिना किसी अतिरिक्त लागत के जारी किए गए अंश।\n(iv) मतदान का अधिकार (voting rights) और कंपनी के जोखिम पूंजी (risk capital) का प्रतिनिधित्व करते हैं।", "brand": "bilaspurtestseries.com 9669946966", "options": ["-(iv), (b)-(ii), (c)-(i), (d)-(iii)", "-(iii), (b)-(i), (c)-(iv), (d)-(ii)", "-(iv), (b)-(i), (c)-(ii), (d)-(iii)", "(a)-(i), (b)-(iv), (c)-(ii), (d)-(iii)"], "answer": "-(iv), (b)-(i), (c)-(ii), (d)-(iii)", "explanation": "(a) समता अंश (Equity Shares) कंपनी के वास्तविक मालिक होते हैं और उन्हें मतदान का अधिकार होता है। वे कंपनी की जोखिम पूंजी का प्रतिनिधित्व करते हैं। इसलिए, (a)-(iv) सही है। (b) अधिमान अंश (Preference Shares) को लाभांश के भुगतान और कंपनी के समापन पर पूंजी की वापसी में प्राथमिकता मिलती है। उन्हें आमतौर पर एक निश्चित दर पर लाभांश मिलता है। इसलिए, (b)-(i) सही है। (c) स्वेट इक्विटी अंश (Sweat Equity Shares) कर्मचारियों या निदेशकों को उनके विशेषज्ञता या बौद्धिक संपदा (intellectual property) के लिए रियायती दर पर या नकद के अलावा अन्य प्रतिफल के लिए जारी किए जाते हैं। इसलिए, (c)-(ii) सही है। (d) बोनस अंश (Bonus Shares) कंपनी के संचित लाभों (accumulated profits) से मौजूदा अंशधारकों को बिना किसी अतिरिक्त लागत के जारी किए जाते हैं, जिससे उनकी शेयर पूंजी बढ़ती है। इसलिए, (d)-(iii) सही है।"}, {"id": 48, "section": "Commerce", "question": "अंशों के हरण (Forfeiture of Shares) और पुनः निर्गमन (Re-issue) की प्रक्रिया को सही कालानुक्रमिक क्रम (chronological order) में व्यवस्थित करें:\nJ: अंशधारकों को बकाया राशि (calls in arrears) का भुगतान करने के लिए अंतिम नोटिस (final notice) भेजना।\nK: निदेशक मंडल (Board of Directors) द्वारा अंशों के हरण का प्रस्ताव (resolution) पारित करना।\nL: हरण किए गए अंशों को पुनः निर्गमित (re-issue) करना।\nM: पुनः निर्गमन पर पूंजीगत आरक्षित निधि (Capital Reserve) में लाभ का हस्तांतरण (transfer of profit).", "brand": "bilaspurtestseries.com 9669946966", "options": ["K, J, L, M", "K, J, M, L", "J, L, K, M", "J, K, L, M"], "answer": "J, K, L, M", "explanation": "अंशों के हरण और पुनः निर्गमन की प्रक्रिया का सही क्रम इस प्रकार है:\n1. J. अंशधारकों को बकाया राशि (calls in arrears) का भुगतान करने के लिए अंतिम नोटिस (final notice) भेजना। यह पहला कदम है जब कोई अंशधारक देय राशि का भुगतान करने में विफल रहता है।\n2. K. निदेशक मंडल (Board of Directors) द्वारा अंशों के हरण का प्रस्ताव (resolution) पारित करना। यदि नोटिस के बाद भी भुगतान नहीं होता है, तो बोर्ड अंशों को हरण करने का निर्णय लेता है।\n3. L. हरण किए गए अंशों को पुनः निर्गमित (re-issue) करना। हरण के बाद, कंपनी इन अंशों को किसी अन्य व्यक्ति को पुनः निर्गमित कर सकती है।\n4. M. पुनः निर्गमन पर पूंजीगत आरक्षित निधि (Capital Reserve) में लाभ का हस्तांतरण (transfer of profit). हरण किए गए अंशों के पुनः निर्गमन से यदि कोई लाभ होता है (यानी, हरण खाते में शेष राशि जो पुनः निर्गमन पर छूट से अधिक है), तो उसे पूंजीगत आरक्षित निधि में स्थानांतरित किया जाता है।"}, {"id": 49, "section": "Commerce", "question": "एक कंपनी ने ₹100 अंकित मूल्य (face value) के 10,000 समता अंश (equity shares) ₹120 प्रति अंश पर निर्गमित किए। आवेदन पर ₹30, आवंटन पर ₹50 (प्रीमियम सहित), और प्रथम व अंतिम मांग पर ₹40 देय थे। सुरक्षा प्रीमियम खाते (Securities Premium Account) में कितनी राशि क्रेडिट की जाएगी?", "brand": "bilaspurtestseries.com 9669946966", "options": ["₹2,00,000", "₹12,00,000", "₹3,00,000", "₹5,00,000"], "answer": "₹2,00,000", "explanation": "अंश का अंकित मूल्य ₹100 है और इसे ₹120 पर निर्गमित किया गया है। इसका मतलब है कि प्रति अंश प्रीमियम ₹120 - ₹100 = ₹20 है।\nकुल प्रीमियम राशि = निर्गमित अंशों की संख्याप्रति अंश प्रीमियम\nकुल प्रीमियम राशि = 10,000 अंश₹20/अंश = ₹2,00,000।\nयह राशि सुरक्षा प्रीमियम खाते में क्रेडिट की जाएगी। आवंटन पर ₹50 में प्रीमियम शामिल है, जिसका अर्थ है कि आवंटन पर पूंजी का हिस्सा ₹30 (₹50 - ₹20 प्रीमियम) है।"}, {"id": 50, "section": "Commerce", "question": "एक कंपनी का शुद्ध लाभ (Net Profit) ₹5,00,000 था। इसमें ₹50,000 का मूल्यह्रास (depreciation), ₹20,000 का सद्भावना का अपलेखन (amortization of goodwill) और ₹30,000 का निवेश की बिक्री पर लाभ (profit on sale of investments) शामिल था। परिचालन गतिविधियों से नकदी प्रवाह (Cash Flow from Operating Activities) की गणना करते समय, इन समायोजनों के बाद शुद्ध लाभ क्या होगा (प्रत्यक्ष विधि का उपयोग किए बिना)?", "brand": "bilaspurtestseries.com 9669946966", "options": ["₹6,00,000", "₹5,00,000", "₹4,60,000", "₹5,40,000"], "answer": "₹5,40,000", "explanation": "परिचालन गतिविधियों से नकदी प्रवाह की गणना अप्रत्यक्ष विधि (indirect method) से करते समय, शुद्ध लाभ को गैर-नकदी और गैर-परिचालन मदों के लिए समायोजित किया जाता है।\nशुद्ध लाभ = ₹5,00,000\nमूल्यह्रास (गैर-नकदी व्यय) को वापस जोड़ा जाता है: + ₹50,000\nसद्भावना का अपलेखन (गैर-नकदी व्यय) को वापस जोड़ा जाता है: + ₹20,000\nनिवेश की बिक्री पर लाभ (गैर-परिचालन आय) को घटाया जाता है: - ₹30,000\nसमायोजित शुद्ध लाभ = ₹5,00,000 + ₹50,000 + ₹20,000 - ₹30,000 = ₹5,40,000।\nयह परिचालन लाभ से पहले कर और असाधारण मदों (Operating Profit before Working Capital Changes) तक पहुंचने का प्रारंभिक बिंदु है।"}];const SUBMIT_URL="https://mqorslvouzmrvciubpoq.supabase.co/functions/v1/result-collector";const TEST_CODE="DEMO_VARG_1_COMMERCE_ACCOUNT_COMMERCE_ACCOUNTING_PRINCIP_5BA91F1C";const TEST_TITLE="DEMO_Varg_1_Commerce_Accountancy_High-Value_Topics_Day_01_01_COMMERCE_ACCOUNTING_PRINCIPLES";const CONTACT_WHATSAPP="9669946966";const PRINT_QR_TEXT="";const PRINT_QR_MESSAGE="";const LOGO_SRC="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEASABIAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAA
