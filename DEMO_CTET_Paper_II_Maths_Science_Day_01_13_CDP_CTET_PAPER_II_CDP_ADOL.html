</style></head><body><div class="wrap"><div class="top"><div class="brandbar"><div class="brand-logo" id="brandLogo"><img src="assets/bts-logo.png" alt="Bilaspur Test Series logo"></div><div><h1 style="margin:0;color:#0f172a;font-size:38px;letter-spacing:.8px;font-weight:900;line-height:1.05">BILASPUR TEST SERIES</h1><h2 style="margin:8px 0 0;font-size:16px;font-weight:800;color:#1d4ed8">By Azad Institute</h2><div style="margin-top:8px;font-size:14px;color:#334155;font-weight:600">🎓 DEMO_CTET_Paper_II_Maths_Science_Day_01_13_CDP_CTET_PAPER_II_CDP_ADOL</div></div></div></div><div id="app"></div></div><script>const Q=[{"id": 1, "section": "CDP", "question": "किशोरावस्था (Adolescence) के संदर्भ में, निम्नलिखित में से कौन सा कथन सबसे उपयुक्त रूप से 'पहचान संकट' (identity crisis) की अवधारणा को दर्शाता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["शारीरिक विकास में तेजी के कारण होने वाला भावनात्मक असंतुलन।", "सामाजिक अलगाव और साथियों के साथ संबंध बनाने में कठिनाई।", "अपने भविष्य के लक्ष्यों और भूमिकाओं के बारे में अनिश्चितता और भ्रम की स्थिति।", "अकादमिक प्रदर्शन में गिरावट और सीखने में रुचि की कमी।"], "answer": "अपने भविष्य के लक्ष्यों और भूमिकाओं के बारे में अनिश्चितता और भ्रम की स्थिति।", "explanation": "पहचान संकट (identity crisis) किशोरावस्था की एक प्रमुख विशेषता है, जैसा कि एरिक एरिकसन (Erik Erikson) ने अपने मनोसामाजिक विकास के सिद्धांत (psychosocial development theory) में बताया है। यह वह अवधि है जब किशोर अपनी पहचान, मूल्यों, विश्वासों और भविष्य की भूमिकाओं के बारे में अनिश्चितता और भ्रम का अनुभव करते हैं। अन्य विकल्प किशोरावस्था की अन्य समस्याओं या पहलुओं को दर्शाते हैं, लेकिन सीधे तौर पर 'पहचान संकट' की केंद्रीय अवधारणा को परिभाषित नहीं करते हैं।"}, {"id": 2, "section": "CDP", "question": "एक शिक्षिका छात्रों को जटिल समस्याओं को हल करने के लिए विभिन्न रणनीतियों (strategies) पर विचार करने और उन्हें लागू करने के लिए प्रोत्साहित करती है। यह किस अधिगम सिद्धांत (learning theory) के अनुप्रयोग को दर्शाता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["व्यवहारवाद (Behaviorism)", "मानवतावादी सिद्धांत (Humanistic Theory)", "संज्ञानात्मक अधिगम सिद्धांत (Cognitive Learning Theory)", "सामाजिक-सांस्कृतिक सिद्धांत (Socio-cultural Theory)"], "answer": "संज्ञानात्मक अधिगम सिद्धांत (Cognitive Learning Theory)", "explanation": "संज्ञानात्मक अधिगम सिद्धांत (Cognitive Learning Theory) इस बात पर जोर देता है कि अधिगम एक सक्रिय मानसिक प्रक्रिया है जिसमें छात्र जानकारी को संसाधित (process), व्यवस्थित (organize) और व्याख्या (interpret) करते हैं। जटिल समस्याओं को हल करने के लिए विभिन्न रणनीतियों पर विचार करना और उन्हें लागू करना छात्रों की उच्च-स्तरीय संज्ञानात्मक प्रक्रियाओं (higher-order cognitive processes) जैसे समस्या-समाधान (problem-solving), आलोचनात्मक सोच (critical thinking) और निर्णय लेने (decision-making) को बढ़ावा देता है, जो संज्ञानात्मक सिद्धांत का मुख्य केंद्र बिंदु है। व्यवहारवाद बाहरी उद्दीपकों (stimuli) और प्रतिक्रियाओं (responses) पर केंद्रित है, जबकि सामाजिक-सांस्कृतिक सिद्धांत सामाजिक अंतःक्रिया (social interaction) और संस्कृति पर जोर देता है, और मानवतावादी सिद्धांत आत्म-बोध (self-actualization) और व्यक्तिगत विकास पर केंद्रित है।"}, {"id": 3, "section": "CDP", "question": "अभिप्रेरणा (Motivation) के संदर्भ में निम्नलिखित कथनों पर विचार करें:\nI. आंतरिक अभिप्रेरणा (Intrinsic motivation) तब होती है जब कोई व्यक्ति किसी गतिविधि को उसके आंतरिक पुरस्कारों (internal rewards) के लिए करता है, जैसे कि आनंद या संतुष्टि।\nII. बाह्य अभिप्रेरणा (Extrinsic motivation) तब होती है जब कोई व्यक्ति किसी गतिविधि को बाहरी पुरस्कारों (external rewards) या दंड से बचने के लिए करता है।\nIII. आंतरिक अभिप्रेरणा आमतौर पर बाह्य अभिप्रेरणा की तुलना में अधिक टिकाऊ और प्रभावी होती है।\nउपरोक्त कथनों में से कौन सा/से सही है/हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["I, II और III सभी", "केवल I और II", "केवल I और III", "केवल II और III"], "answer": "I, II और III सभी", "explanation": "सभी तीनों कथन अभिप्रेरणा (motivation) के संदर्भ में सही हैं। आंतरिक अभिप्रेरणा (intrinsic motivation) व्यक्ति की अपनी रुचि और आनंद से उत्पन्न होती है, जैसे कि किसी कार्य को सीखने के लिए करना क्योंकि वह उसे पसंद है (कथन I)। बाह्य अभिप्रेरणा (extrinsic motivation) बाहरी कारकों जैसे पुरस्कार, ग्रेड या दंड से बचने के लिए होती है (कथन II)। शोध से पता चला है कि आंतरिक अभिप्रेरणा आमतौर पर अधिक टिकाऊ होती है और सीखने में गहरी भागीदारी और बेहतर परिणामों की ओर ले जाती है, जबकि बाह्य अभिप्रेरणा अल्पकालिक हो सकती है और बाहरी प्रोत्साहन के हट जाने पर समाप्त हो सकती है (कथन III)।"}, {"id": 4, "section": "CDP", "question": "किशोरावस्था (Adolescence), अधिगम (Learning), अभिप्रेरणा (Motivation) और समावेशी शिक्षा (Inclusive Education) के संदर्भ में निम्नलिखित कथनों पर विचार करें:\nJ: किशोरावस्था में अमूर्त चिंतन (abstract thinking) और मेटाकॉग्निशन (metacognition) का विकास छात्रों को अपनी अधिगम प्रक्रियाओं (learning processes) को अधिक प्रभावी ढंग से विनियमित (regulate) करने में सक्षम बनाता है, जिससे आंतरिक अभिप्रेरणा (intrinsic motivation) बढ़ती है।\nK: समावेशी शिक्षा का मुख्य उद्देश्य केवल विशेष आवश्यकता वाले बच्चों को सामान्य कक्षा में समायोजित (accommodate) करना है, जिससे उन्हें मुख्यधारा में शामिल होने की बाह्य अभिप्रेरणा (extrinsic motivation) मिले।\nL: सामाजिक-संज्ञानात्मक अधिगम सिद्धांत (Socio-cognitive learning theory) के अनुसार, किशोरों में आत्म-प्रभावकारिता (self-efficacy) की भावना साथियों के अवलोकन (observational learning) और मॉडलिंग (modeling) के माध्यम से विकसित होती है, जो उनके शैक्षणिक प्रदर्शन को महत्वपूर्ण रूप से प्रभावित करती है।\nM: विभेदित अनुदेश (Differentiated Instruction) समावेशी कक्षाओं में छात्रों की विविध अधिगम आवश्यकताओं को पूरा करने का एक प्रभावी तरीका है, लेकिन यह आंतरिक अभिप्रेरणा को बढ़ावा देने में अप्रभावी है क्योंकि यह सभी के लिए समान चुनौती प्रदान नहीं करता।\nउपरोक्त कथनों में से कौन सा/से सही है/हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और L सही हैं।", "J, K, L और M सभी सही हैं।", "केवल J और K सही हैं।", "केवल K और M सही हैं।"], "answer": "केवल J और L सही हैं।", "explanation": "कथन J सही है। किशोरावस्था में संज्ञानात्मक विकास (cognitive development) के परिणामस्वरूप अमूर्त चिंतन और मेटाकॉग्निशन की क्षमता बढ़ती है, जिससे किशोर अपनी सीखने की रणनीतियों को बेहतर ढंग से समझ और नियंत्रित कर पाते हैं। यह स्वायत्तता (autonomy) और दक्षता (competence) की भावना को बढ़ावा देता है, जो आंतरिक अभिप्रेरणा के प्रमुख घटक हैं।\nकथन K गलत है। समावेशी शिक्षा का उद्देश्य केवल विशेष आवश्यकता वाले बच्चों को समायोजित करना नहीं है, बल्कि सभी छात्रों (चाहे उनकी क्षमता, पृष्ठभूमि या आवश्यकताएं कुछ भी हों) को एक साथ गुणवत्तापूर्ण शिक्षा प्रदान करना है। इसका लक्ष्य सभी छात्रों में सीखने के प्रति आंतरिक रुचि और जुड़ाव (engagement) विकसित करना है, न कि केवल बाह्य अभिप्रेरणा पर निर्भर रहना।\nकथन L सही है। अल्बर्ट बंडूरा (Albert Bandura) के सामाजिक-संज्ञानात्मक सिद्धांत के अनुसार, आत्म-प्रभावकारिता (self-efficacy) (किसी कार्य को सफलतापूर्वक करने की अपनी क्षमता में विश्वास) अवलोकन अधिगम, विशेष रूप से साथियों के मॉडलिंग के माध्यम से विकसित होती है। किशोर अपने साथियों को देखकर सीखते हैं और यह विश्वास उनके शैक्षणिक प्रदर्शन को सीधे प्रभावित करता है।\nकथन M गलत है। विभेदित अनुदेश (Differentiated Instruction) समावेशी कक्षाओं में छात्रों की विविध आवश्यकताओं को पूरा करने का एक अत्यंत प्रभावी तरीका है। यह छात्रों को उनकी व्यक्तिगत क्षमताओं और रुचियों के अनुसार उपयुक्त चुनौतियाँ प्रदान करके आंतरिक अभिप्रेरणा को बढ़ावा देता है, जिससे वे सीखने की प्रक्रिया में अधिक सक्रिय रूप से संलग्न होते हैं। यह कहना कि यह आंतरिक अभिप्रेरणा को बढ़ावा देने में अप्रभावी है, गलत है।"}, {"id": 5, "section": "CDP", "question": "अभिकथन (A): किशोरावस्था (Adolescence) पहचान निर्माण (identity formation) की एक महत्वपूर्ण अवधि है, जहाँ व्यक्ति अपनी भूमिकाओं और मूल्यों को परिभाषित करने का प्रयास करते हैं।\nकारण (R): इस अवस्था में, किशोरों को अक्सर 'भूमिका भ्रम' (role confusion) का अनुभव होता है क्योंकि वे विभिन्न सामाजिक अपेक्षाओं और अपनी व्यक्तिगत इच्छाओं के बीच संतुलन बनाने की कोशिश करते हैं।", "brand": "bilaspurtestseries.com 9669946966", "options": ["A सत्य है, लेकिन R असत्य है।", "A असत्य है, लेकिन R सत्य है।", "A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं करता है।", "A और R दोनों सत्य हैं, और R, A की सही व्याख्या करता है।"], "answer": "A और R दोनों सत्य हैं, और R, A की सही व्याख्या करता है।", "explanation": "अभिकथन (A) सत्य है क्योंकि किशोरावस्था एरिक एरिकसन (Erik Erikson) के मनोसामाजिक विकास के सिद्धांत (psychosocial development theory) के अनुसार पहचान बनाम भूमिका भ्रम (identity vs. role confusion) की अवस्था है, जहाँ किशोर अपनी पहचान स्थापित करने का प्रयास करते हैं। कारण (R) भी सत्य है और अभिकथन की सही व्याख्या करता है। इस अवस्था में, किशोरों को अक्सर 'भूमिका भ्रम' (role confusion) का अनुभव होता है क्योंकि वे यह समझने की कोशिश करते हैं कि वे कौन हैं और समाज में उनकी क्या भूमिका है, विभिन्न सामाजिक अपेक्षाओं (जैसे माता-पिता, साथियों, समाज) और अपनी व्यक्तिगत इच्छाओं के बीच संतुलन बनाने की कोशिश करते हैं। यह भ्रम ही पहचान निर्माण की प्रक्रिया का एक अभिन्न अंग है।"}, {"id": 6, "section": "CDP", "question": "निम्नलिखित में से कौन से कारक अधिगम (learning) को प्रभावित करते हैं?\nJ: छात्र की परिपक्वता (maturity)\nK: शिक्षक की शिक्षण शैली (teaching style)\nL: कक्षा का भौतिक वातावरण (physical environment of the classroom)\nM: छात्र की अभिप्रेरणा (motivation)", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल K, L और M", "J, K, L और M सभी", "केवल J, L और M", "केवल J और K"], "answer": "J, K, L और M सभी", "explanation": "अधिगम (learning) एक जटिल प्रक्रिया है जो कई कारकों से प्रभावित होती है। छात्र की परिपक्वता (J) सीखने की क्षमता को सीधे प्रभावित करती है, क्योंकि संज्ञानात्मक और शारीरिक परिपक्वता सीखने के लिए आवश्यक है। शिक्षक की शिक्षण शैली (K) छात्रों की समझ और जुड़ाव को प्रभावित कर सकती है। कक्षा का भौतिक वातावरण (L) जैसे रोशनी, शोर का स्तर, और बैठने की व्यवस्था भी सीखने के अनुभव को प्रभावित करती है। अंत में, छात्र की अभिप्रेरणा (M) सीखने की इच्छा और प्रयास को निर्धारित करने वाला एक महत्वपूर्ण आंतरिक कारक है। इसलिए, ये सभी कारक अधिगम को प्रभावित करते हैं।"}, {"id": 7, "section": "CDP", "question": "निम्नलिखित अभिप्रेरणा सिद्धांतों (Motivation Theories) को उनके प्रतिपादकों (Proponents) के साथ सुमेलित करें:\nसूची-I (सिद्धांत) सूची-II (प्रतिपादक)\nJ: पदानुक्रमित आवश्यकताओं का सिद्धांत (Hierarchy of Needs Theory)\n1. बी.एफ. स्किनर (B.F. Skinner)\nK: प्रत्याशा सिद्धांत (Expectancy Theory)\n2. अब्राहम मास्लो (Abraham Maslow)\nL: प्रबलन सिद्धांत (Reinforcement Theory)\n3. विक्टर वूम (Victor Vroom)\nM: उपलब्धि अभिप्रेरणा सिद्धांत (Achievement Motivation Theory)\n4. डेविड मैक्लेलैंड (David McClelland)\nसही विकल्प चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-3, K-2, L-4, M-1", "J-2, K-3, L-1, M-4", "J-4, K-3, L-1, M-2", "J-2, K-1, L-3, M-4"], "answer": "J-2, K-3, L-1, M-4", "explanation": "सही मिलान इस प्रकार है: पदानुक्रमित आवश्यकताओं का सिद्धांत (Hierarchy of Needs Theory) अब्राहम मास्लो (Abraham Maslow) द्वारा प्रतिपादित किया गया था (J-2)। प्रत्याशा सिद्धांत (Expectancy Theory) विक्टर वूम (Victor Vroom) द्वारा दिया गया था (K-3)। प्रबलन सिद्धांत (Reinforcement Theory) बी.एफ. स्किनर (B.F. Skinner) के व्यवहारवाद (behaviorism) से जुड़ा है (L-1)। उपलब्धि अभिप्रेरणा सिद्धांत (Achievement Motivation Theory) डेविड मैक्लेलैंड (David McClelland) द्वारा विकसित किया गया था (M-4)। इन सिद्धांतों और उनके प्रतिपादकों को याद रखना अभिप्रेरणा के क्षेत्र में महत्वपूर्ण है।"}, {"id": 8, "section": "CDP", "question": "एक समावेशी कक्षा (inclusive classroom) में शिक्षण-अधिगम प्रक्रिया (teaching-learning process) को प्रभावी बनाने के लिए निम्नलिखित चरणों को सही कालानुक्रमिक क्रम (chronological order) में व्यवस्थित करें:\nJ: छात्रों की विविध आवश्यकताओं का आकलन (assessment) करना।\nK: व्यक्तिगत शैक्षिक योजनाएँ (Individualized Education Plans − IEPs) विकसित करना।\nL: लचीले पाठ्यक्रम (flexible curriculum) और शिक्षण विधियों को लागू करना।\nM: नियमित रूप से प्रगति की निगरानी (monitoring progress) करना और प्रतिक्रिया (feedback) प्रदान करना।", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, L, M", "J, L, K, M", "L, J, K, M", "K, J, L, M"], "answer": "J, K, L, M", "explanation": "एक समावेशी कक्षा में प्रभावी शिक्षण-अधिगम प्रक्रिया के लिए एक तार्किक और कालानुक्रमिक क्रम का पालन करना महत्वपूर्ण है। सबसे पहले, छात्रों की विविध आवश्यकताओं का आकलन (J) करना आवश्यक है ताकि उनकी शक्तियों और कमजोरियों को समझा जा सके। इस आकलन के आधार पर, व्यक्तिगत शैक्षिक योजनाएँ (IEPs) (K) विकसित की जाती हैं जो प्रत्येक छात्र की विशिष्ट आवश्यकताओं को पूरा करती हैं। इसके बाद, इन योजनाओं को लागू करने के लिए लचीले पाठ्यक्रम और शिक्षण विधियों (L) का उपयोग किया जाता है, जो सभी छात्रों को शामिल करते हैं। अंत में, छात्रों की प्रगति की नियमित रूप से निगरानी (M) करना और उन्हें प्रतिक्रिया प्रदान करना महत्वपूर्ण है ताकि शिक्षण-अधिगम प्रक्रिया को आवश्यकतानुसार समायोजित किया जा सके। यह क्रम सुनिश्चित करता है कि शिक्षण व्यक्तिगत आवश्यकताओं पर आधारित हो और लगातार अनुकूलित होता रहे।"}, {"id": 9, "section": "CDP", "question": "एक रचनात्मक कक्षा (constructivist classroom) में, अधिगम (learning) को बढ़ावा देने के लिए एक शिक्षक को क्या करना चाहिए?", "brand": "bilaspurtestseries.com 9669946966", "options": ["छात्रों को निष्क्रिय श्रोता (passive listeners) के रूप में रखना और व्याख्यान विधि (lecture method) का अधिक उपयोग करना।", "छात्रों को सक्रिय रूप से ज्ञान का निर्माण करने के लिए अवसर प्रदान करना, जैसे कि अन्वेषण (exploration) और चर्चा के माध्यम से।", "कठोर अनुशासन बनाए रखना और त्रुटियों (errors) के लिए दंडित करना।", "छात्रों को जानकारी याद रखने और दोहराने के लिए प्रोत्साहित करना।"], "answer": "छात्रों को सक्रिय रूप से ज्ञान का निर्माण करने के लिए अवसर प्रदान करना, जैसे कि अन्वेषण (exploration) और चर्चा के माध्यम से।", "explanation": "रचनात्मक कक्षा (constructivist classroom) में, अधिगम को एक सक्रिय प्रक्रिया के रूप में देखा जाता है जहाँ छात्र अपने अनुभवों और अंतःक्रियाओं के माध्यम से ज्ञान का निर्माण करते हैं। इसलिए, शिक्षक को ऐसे अवसर प्रदान करने चाहिए जहाँ छात्र सक्रिय रूप से अन्वेषण (exploration) कर सकें, समस्याओं को हल कर सकें, और साथियों के साथ चर्चा (discussion) कर सकें। जानकारी को याद रखना और दोहराना (रटना), निष्क्रिय श्रोता होना, या कठोर अनुशासन रचनात्मक दृष्टिकोण के विपरीत हैं, क्योंकि वे छात्रों को ज्ञान के निष्क्रिय प्राप्तकर्ता के रूप में देखते हैं।"}, {"id": 10, "section": "CDP", "question": "एक समावेशी कक्षा (inclusive classroom) में छात्रों की विविधता (diversity) को संबोधित करने के लिए निम्नलिखित में से कौन सी रणनीति अनुपयुक्त (inappropriate) होगी?", "brand": "bilaspurtestseries.com 9669946966", "options": ["छात्रों की व्यक्तिगत सीखने की शैलियों (learning styles) और आवश्यकताओं के अनुसार शिक्षण को अनुकूलित करना।", "सांस्कृतिक रूप से संवेदनशील (culturally sensitive) और प्रासंगिक (relevant) शिक्षण सामग्री का उपयोग करना।", "सहयोगी अधिगम (collaborative learning) और सहकर्मी शिक्षण (peer tutoring) को बढ़ावा देना।", "सभी छात्रों के लिए समान और मानकीकृत (standardized) शिक्षण सामग्री और मूल्यांकन विधियों का उपयोग करना।"], "answer": "सभी छात्रों के लिए समान और मानकीकृत (standardized) शिक्षण सामग्री और मूल्यांकन विधियों का उपयोग करना।", "explanation": "समावेशी शिक्षा (inclusive education) का मूल सिद्धांत छात्रों की विविधता को स्वीकार करना और उनकी व्यक्तिगत आवश्यकताओं के अनुसार शिक्षण को अनुकूलित करना है। सभी छात्रों के लिए समान और मानकीकृत (standardized) शिक्षण सामग्री और मूल्यांकन विधियों का उपयोग करना इस सिद्धांत के विपरीत है, क्योंकि यह विविध आवश्यकताओं वाले छात्रों की उपेक्षा करता है और उन्हें सीखने में बाधा डाल सकता है। इसके बजाय, एक समावेशी कक्षा में शिक्षण को लचीला और व्यक्तिगत होना चाहिए। अन्य विकल्प (व्यक्तिगत सीखने की शैलियों के अनुसार अनुकूलन, सहयोगी अधिगम को बढ़ावा देना, और सांस्कृतिक रूप से संवेदनशील सामग्री का उपयोग करना) सभी समावेशी शिक्षा के प्रभावी और उपयुक्त रणनीतियाँ हैं।"}, {"id": 11, "section": "Maths", "question": "निम्नलिखित में से कौन सा कथन परिमेय संख्याओं (rational numbers) के गुणधर्मों (properties) के संबंध में सही नहीं है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["एक परिमेय संख्या को दूसरी परिमेय संख्या से भाग देने पर (शून्य को छोड़कर) हमेशा एक अपरिमेय संख्या (irrational number) प्राप्त होती है।", "दो परिमेय संख्याओं के बीच अनंत (infinite) परिमेय संख्याएँ होती हैं।", "दो परिमेय संख्याओं का गुणनफल (product) हमेशा एक परिमेय संख्या होता है।", "दो परिमेय संख्याओं का योग (sum) हमेशा एक परिमेय संख्या होता है।"], "answer": "एक परिमेय संख्या को दूसरी परिमेय संख्या से भाग देने पर (शून्य को छोड़कर) हमेशा एक अपरिमेय संख्या (irrational number) प्राप्त होती है।", "explanation": "विकल्प (D) गलत है। यदि एक परिमेय संख्या को दूसरी गैर-शून्य (non-zero) परिमेय संख्या से भाग दिया जाता है, तो परिणाम हमेशा एक परिमेय संख्या ही होता है, न कि अपरिमेय संख्या। उदाहरण के लिए, 4/2 = 2, जो एक परिमेय संख्या है। अन्य सभी विकल्प परिमेय संख्याओं के मूलभूत गुणधर्म हैं। दो परिमेय संख्याओं का योग और गुणनफल हमेशा परिमेय होता है, और दो परिमेय संख्याओं के बीच अनंत परिमेय संख्याएँ होती हैं।"}, {"id": 12, "section": "Maths", "question": "एक पिता की वर्तमान आयु (current age) अपने पुत्र की वर्तमान आयु के तीन गुने से 5 वर्ष अधिक है। यदि 5 वर्ष बाद पिता की आयु पुत्र की आयु के दोगुने से 10 वर्ष अधिक होगी, तो पुत्र की वर्तमान आयु क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["10 वर्ष", "15 वर्ष", "20 वर्ष", "25 वर्ष"], "answer": "10 वर्ष", "explanation": "मान लीजिए पुत्र की वर्तमान आयु 'x' वर्ष है।\nतो, पिता की वर्तमान आयु = 3x + 5 वर्ष।\n5 वर्ष बाद, पुत्र की आयु = x + 5 वर्ष।\n5 वर्ष बाद, पिता की आयु = (3x + 5) + 5 = 3x + 10 वर्ष।\nप्रश्न के अनुसार, 5 वर्ष बाद पिता की आयु पुत्र की आयु के दोगुने से 10 वर्ष अधिक होगी:\n3x + 10 = 2(x + 5) + 10\n3x + 10 = 2x + 10 + 10\n3x + 10 = 2x + 20\n3x − 2x = 20 − 10\nx = 10\nअतः, पुत्र की वर्तमान आयु 10 वर्ष है।"}, {"id": 13, "section": "Maths", "question": "चतुर्भुजों (quadrilaterals) के गुणधर्मों के संबंध में निम्नलिखित कथनों पर विचार करें:\nI. एक आयत (rectangle) हमेशा एक समांतर चतुर्भुज (parallelogram) होता है।\nII. एक समचतुर्भुज (rhombus) हमेशा एक वर्ग (square) होता है।\nIII. एक वर्ग हमेशा एक आयत और एक समचतुर्भुज दोनों होता है।\nIV. एक समलंब चतुर्भुज (trapezium) में सम्मुख भुजाओं (opposite sides) का एक युग्म (pair) समांतर होता है।\nउपरोक्त कथनों में से कौन से कथन सही हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल I और IV", "केवल I, II और III", "केवल II और IV", "केवल I, III और IV"], "answer": "केवल I, III और IV", "explanation": "कथन I: एक आयत में सम्मुख भुजाएँ समांतर और बराबर होती हैं, और सभी कोण 90 डिग्री होते हैं। समांतर चतुर्भुज की परिभाषा के अनुसार, सम्मुख भुजाएँ समांतर होनी चाहिए, जो आयत में होती हैं। इसलिए, एक आयत हमेशा एक समांतर चतुर्भुज होता है। यह कथन सही है।\nकथन II: एक समचतुर्भुज की सभी भुजाएँ बराबर होती हैं, लेकिन इसके कोण 90 डिग्री होना आवश्यक नहीं है। एक वर्ग की सभी भुजाएँ बराबर होती हैं और सभी कोण 90 डिग्री होते हैं। इसलिए, एक समचतुर्भुज हमेशा एक वर्ग नहीं होता है। यह कथन गलत है।\nकथन III: एक वर्ग की सभी भुजाएँ बराबर होती हैं और सभी कोण 90 डिग्री होते हैं। आयत की परिभाषा के अनुसार, सभी कोण 90 डिग्री होने चाहिए और सम्मुख भुजाएँ बराबर होनी चाहिए। समचतुर्भुज की परिभाषा के अनुसार, सभी भुजाएँ बराबर होनी चाहिए। वर्ग इन दोनों शर्तों को पूरा करता है। इसलिए, एक वर्ग हमेशा एक आयत और एक समचतुर्भुज दोनों होता है। यह कथन सही है।\nकथन IV: समलंब चतुर्भुज की परिभाषा ही यह है कि इसमें सम्मुख भुजाओं का कम से कम एक युग्म समांतर होता है। यह कथन सही है।\nअतः, कथन I, III और IV सही हैं।"}, {"id": 14, "section": "Maths", "question": "क्षेत्रमिति (Mensuration) के संदर्भ में निम्नलिखित कथनों में से कौन सा/से सही है/हैं?\nI. यदि एक वृत्त (circle) की त्रिज्या (radius) दोगुनी कर दी जाए, तो उसका क्षेत्रफल (area) चार गुना हो जाता है।\nII. यदि एक आयत (rectangle) का परिमाप (perimeter) स्थिर (constant) रखा जाए, तो उसका क्षेत्रफल अधिकतम तब होता है जब वह एक वर्ग (square) होता है।\nIII. एक अनियमित बहुभुज (irregular polygon) का क्षेत्रफल हमेशा उसके परिमाप के वर्ग (square of its perimeter) के समानुपाती (proportional) होता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल I", "केवल I और III", "केवल I और II", "केवल II और III"], "answer": "केवल I और II", "explanation": "कथन I: वृत्त का क्षेत्रफल πr² होता है। यदि त्रिज्या 'r' को '2r' कर दिया जाए, तो नया क्षेत्रफल π(2r)² = 4πr² हो जाएगा, जो मूल क्षेत्रफल का चार गुना है। यह कथन सही है।\nकथन II: दिए गए परिमाप के लिए, आयत का क्षेत्रफल अधिकतम तब होता है जब उसकी लंबाई और चौड़ाई बराबर होती है, यानी जब वह एक वर्ग होता है। यह एक प्रसिद्ध ज्यामितीय गुणधर्म है। यह कथन सही है।\nकथन III: एक अनियमित बहुभुज का क्षेत्रफल उसके परिमाप के वर्ग के समानुपाती नहीं होता है। क्षेत्रफल और परिमाप के बीच ऐसा सीधा और सार्वभौमिक (universal) संबंध नहीं होता है, खासकर अनियमित आकृतियों के लिए। उदाहरण के लिए, एक ही परिमाप वाले दो अलग-अलग अनियमित बहुभुजों का क्षेत्रफल बहुत भिन्न हो सकता है। यह कथन गलत है।\nअतः, केवल कथन I और II सही हैं।"}, {"id": 15, "section": "Maths", "question": "अभिकथन (A): एक बार ग्राफ (bar graph) का उपयोग विभिन्न श्रेणियों (categories) के बीच तुलना (comparison) दिखाने के लिए सबसे उपयुक्त होता है।\nकारण (R): बार ग्राफ में, बार (bars) की ऊँचाई (height) या लंबाई (length) डेटा के मान (value) को दर्शाती है, जिससे दृश्य तुलना (visual comparison) आसान हो जाती है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं है।", "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "A असत्य है, लेकिन R सत्य है।", "A सत्य है, लेकिन R असत्य है।"], "answer": "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "explanation": "अभिकथन (A) सत्य है। बार ग्राफ विभिन्न श्रेणियों के बीच मात्रात्मक (quantitative) तुलना के लिए एक प्रभावी उपकरण है, जैसे विभिन्न महीनों में बिक्री, विभिन्न देशों की जनसंख्या आदि। कारण (R) भी सत्य है। बार ग्राफ में प्रत्येक श्रेणी के लिए एक आयताकार बार होता है जिसकी ऊँचाई या लंबाई उस श्रेणी के मान के समानुपाती होती है। यह दृश्य प्रतिनिधित्व (visual representation) सीधे तौर पर विभिन्न श्रेणियों के मानों की तुलना करने में मदद करता है। चूंकि कारण (R) बताता है कि बार की ऊँचाई या लंबाई मान को दर्शाती है, जिससे तुलना आसान होती है, यह सीधे तौर पर अभिकथन (A) की व्याख्या करता है कि बार ग्राफ तुलना के लिए सबसे उपयुक्त क्यों है।"}, {"id": 16, "section": "Maths", "question": "एक संख्या 72 से विभाज्य (divisible) है। निम्नलिखित में से कौन से कथन इस संख्या के लिए निश्चित रूप से सत्य होंगे?\nJ: संख्या 8 से विभाज्य है।\nK: संख्या 9 से विभाज्य है।\nL: संख्या 6 से विभाज्य है।\nM: संख्या 12 से विभाज्य है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल K और L", "केवल J, K, L और M", "केवल J और K", "केवल J, K और L"], "answer": "केवल J, K, L और M", "explanation": "यदि कोई संख्या 72 से विभाज्य है, तो वह 72 के सभी गुणनखंडों (factors) से भी विभाज्य होगी। 72 के गुणनखंड हैं: 1, 2, 3, 4, 6, 8, 9, 12, 18, 24, 36, 72।\nJ. संख्या 8 से विभाज्य है: हाँ, क्योंकि 8, 72 का एक गुणनखंड है।\nK. संख्या 9 से विभाज्य है: हाँ, क्योंकि 9, 72 का एक गुणनखंड है।\nL. संख्या 6 से विभाज्य है: हाँ, क्योंकि 6, 72 का एक गुणनखंड है।\nM. संख्या 12 से विभाज्य है: हाँ, क्योंकि 12, 72 का एक गुणनखंड है।\nअतः, सभी कथन J, K, L और M सत्य हैं।"}, {"id": 17, "section": "Maths", "question": "सूची-I में दी गई ज्यामितीय आकृतियों (geometric figures) को सूची-II में दिए गए उनके विशिष्ट गुणधर्मों (specific properties) या सूत्रों (formulas) से सुमेलित (match) करें:\nसूची-I (आकृति) ×\nJ: समचतुर्भुज (Rhombus)\nK: समलंब (Trapezium)\nL: बेलन (Cylinder)\nM: शंकु (Cone)\n*सूची-II (गुणधर्म/सूत्र) ×\n1. इसका आयतन (volume) (1/3)πr²h होता है।\n2. इसके विकर्ण (diagonals) एक दूसरे को समकोण पर समद्विभाजित (bisect at right angles) करते हैं।\n3. इसका वक्र पृष्ठीय क्षेत्रफल (curved surface area) 2πrh होता है।\n4. इसका क्षेत्रफल (area) (1/2) × (समांतर भुजाओं का योग)ऊंचाई होता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-2, K-4, L-3, M-1", "J-1, K-4, L-3, M-2", "J-2, K-3, L-4, M-1", "J-4, K-2, L-1, M-3"], "answer": "J-2, K-4, L-3, M-1", "explanation": "सही मिलान इस प्रकार है:\n\nJ. समचतुर्भुज (Rhombus) − 2. इसके विकर्ण (diagonals) एक दूसरे को समकोण पर समद्विभाजित (bisect at right angles) करते हैं। (समचतुर्भुज एक समांतर चतुर्भुज (parallelogram) होता है जिसकी सभी भुजाएँ समान होती हैं, और इसके विकर्ण एक दूसरे को समकोण पर काटते हैं।) × K. समलंब (Trapezium) − 4. इसका क्षेत्रफल (area) (1/2) × (समांतर भुजाओं का योग)ऊंचाई होता है। (समलंब एक चतुर्भुज (quadrilateral) होता है जिसमें भुजाओं का एक युग्म (pair) समांतर होता है।) × L. बेलन (Cylinder) − 3. इसका वक्र पृष्ठीय क्षेत्रफल (curved surface area) 2πrh होता है। (बेलन एक त्रि-आयामी (three-dimensional) आकृति है जिसके दो वृत्ताकार आधार (circular bases) होते हैं।) × M. शंकु (Cone) − 1. इसका आयतन (volume) (1/3)πr²h होता है। (शंकु एक त्रि-आयामी आकृति है जिसका एक वृत्ताकार आधार और एक शीर्ष (apex) होता है।)\n\nयह मिलान विभिन्न ज्यामितीय आकृतियों के विशिष्ट गुणधर्मों और सूत्रों पर आधारित है।"}, {"id": 18, "section": "Maths", "question": "एक शब्द समस्या (word problem) को बीजगणितीय समीकरणों (algebraic equations) का उपयोग करके हल करने के लिए निम्नलिखित चरणों को सही क्रम में व्यवस्थित करें:\nJ: प्राप्त हल (solution) की जाँच करें और सुनिश्चित करें कि यह समस्या की शर्तों को पूरा करता है।\nK: समस्या में अज्ञात राशियों (unknown quantities) को चर (variables) के रूप में परिभाषित करें।\nL: चरों के बीच संबंधों के आधार पर बीजगणितीय समीकरण (algebraic equation) स्थापित करें।\nM: स्थापित समीकरणों को हल करके चरों के मान ज्ञात करें।", "brand": "bilaspurtestseries.com 9669946966", "options": ["L, K, M, J", "K, L, M, J", "L, M, K, J", "K, M, L, J"], "answer": "K, L, M, J", "explanation": "एक शब्द समस्या को बीजगणितीय समीकरणों का उपयोग करके हल करने के लिए सही चरणों का क्रम इस प्रकार है:\n\n1. K. समस्या में अज्ञात राशियों (unknown quantities) को चर (variables) के रूप में परिभाषित करें। (सबसे पहले, हमें यह पहचानना होगा कि समस्या में क्या खोजना है और उन्हें प्रतीकों (symbols) या चरों (variables) जैसे x, y आदि के रूप में दर्शाना होगा।)\n2. L. चरों के बीच संबंधों के आधार पर बीजगणितीय समीकरण (algebraic equation) स्थापित करें। (एक बार चर परिभाषित हो जाने के बाद, समस्या में दी गई जानकारी का उपयोग करके उन चरों के बीच गणितीय संबंध (mathematical relationships) स्थापित किए जाते हैं, जिससे एक या अधिक समीकरण बनते हैं।)\n3. M. स्थापित समीकरणों को हल करके चरों के मान ज्ञात करें। (समीकरणों को हल करने के लिए विभिन्न बीजगणितीय तकनीकों (algebraic techniques) का उपयोग किया जाता है ताकि अज्ञात चरों के संख्यात्मक मान (numerical values) प्राप्त किए जा सकें।)\n4. J. प्राप्त हल (solution) की जाँच करें और सुनिश्चित करें कि यह समस्या की शर्तों को पूरा करता है। (अंत में, प्राप्त मानों को मूल समस्या में प्रतिस्थापित (substitute) करके यह सत्यापित किया जाता है कि वे सभी शर्तों को संतुष्ट करते हैं और समस्या के संदर्भ में यथार्थवादी (realistic) हैं।)\n\nइसलिए, सही क्रम K, L, M, J है।"}, {"id": 19, "section": "Maths", "question": "एक बेलनाकार (cylindrical) टैंक की त्रिज्या (radius) 7 मीटर और ऊँचाई (height) 10 मीटर है। इस टैंक का आयतन (volume) कितना होगा? (π = 22/7 का प्रयोग करें)", "brand": "bilaspurtestseries.com 9669946966", "options": ["220 घन मीटर", "770 घन मीटर", "440 घन मीटर", "1540 घन मीटर"], "answer": "1540 घन मीटर", "explanation": "बेलन (cylinder) के आयतन का सूत्र V = πr²h होता है, जहाँ 'r' त्रिज्या है और 'h' ऊँचाई है।\nदी गई त्रिज्या (r) = 7 मीटर\nदी गई ऊँचाई (h) = 10 मीटर\nπ = 22/7\nआयतन (V) = (22/7) × (7)²10\nV = (22/7) × 49 × 10\nV = 22 × 7 × 10\nV = 154 × 10\nV = 1540 घन मीटर\nअतः, टैंक का आयतन 1540 घन मीटर होगा।"}, {"id": 20, "section": "Maths", "question": "एक बक्से में 6 लाल (red), 4 नीली (blue) और 5 हरी (green) गेंदें हैं। यदि बक्से से यादृच्छिक रूप से (randomly) तीन गेंदें निकाली जाती हैं, तो क्या प्रायिकता (probability) है कि सभी तीनों गेंदें एक ही रंग की होंगी?", "brand": "bilaspurtestseries.com 9669946966", "options": ["34/15", "17/455", "34/455", "30/455"], "answer": "34/455", "explanation": "कुल गेंदों की संख्या = 6 (लाल) + 4 (नीली) + 5 (हरी) = 15 गेंदें।\n\nबक्से से तीन गेंदें निकालने के कुल संभावित तरीके (total possible ways) = C(15, 3)\nC(15, 3) = (15 × 14 × 13) / (3 × 2 × 1) = 5 × 7 × 13 = 455 तरीके।\n\nसभी तीनों गेंदें एक ही रंग की होने के अनुकूल तरीके (favorable ways) निम्नलिखित हो सकते हैं:\n1. तीनों गेंदें लाल हों: C(6, 3) = (6 × 5 × 4) / (3 × 2 × 1) = 20 तरीके।\n2. तीनों गेंदें नीली हों: C(4, 3) = (4 × 3 × 2) / (3 × 2 × 1) = 4 तरीके।\n3. तीनों गेंदें हरी हों: C(5, 3) = (5 × 4 × 3) / (3 × 2 × 1) = 10 तरीके।\n\nएक ही रंग की तीन गेंदें निकालने के कुल अनुकूल तरीके = 20 + 4 + 10 = 34 तरीके।\n\nप्रायिकता (Probability) = (अनुकूल तरीके) / (कुल संभावित तरीके) = 34 / 455।\n\nइसलिए, सही प्रायिकता 34/455 है।"}, {"id": 21, "section": "Physics", "question": "सर्दियों में गहरे रंग के कपड़े पहनना क्यों पसंद किया जाता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["गहरे रंग ऊष्मा को कम उत्सर्जित (emit) करते हैं।", "गहरे रंग प्रकाश को अधिक परावर्तित (reflect) करते हैं।", "गहरे रंग शरीर से ऊष्मा के संवहन (convection) को रोकते हैं।", "गहरे रंग ऊष्मा को अधिक अवशोषित (absorb) करते हैं।"], "answer": "गहरे रंग ऊष्मा को अधिक अवशोषित (absorb) करते हैं।", "explanation": "गहरे रंग की वस्तुएँ प्रकाश और ऊष्मा ऊर्जा (heat energy) को अधिक कुशलता से अवशोषित करती हैं। सर्दियों में, यह गुण शरीर को गर्म रखने में मदद करता है क्योंकि कपड़े सूर्य के प्रकाश और परिवेश से ऊष्मा को अवशोषित करके शरीर तक पहुँचाते हैं। हल्के रंग की वस्तुएँ ऊष्मा को अधिक परावर्तित करती हैं, इसलिए वे गर्मियों के लिए बेहतर होती हैं।"}, {"id": 22, "section": "Physics", "question": "जब एक व्यक्ति दीवार को धकेलता है लेकिन दीवार हिलती नहीं है, तो व्यक्ति द्वारा लगाया गया बल (force) किस प्रकार का बल है और दीवार पर इसका क्या प्रभाव होता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह एक संपर्क बल (contact force) है और दीवार पर कोई कार्य (work) नहीं होता।", "यह एक पेशीय बल (muscular force) है और दीवार पर कोई कार्य नहीं होता।", "यह एक घर्षण बल (frictional force) है और दीवार पर कार्य होता है।", "यह एक असंपर्क बल (non-contact force) है और दीवार पर कार्य होता है।"], "answer": "यह एक पेशीय बल (muscular force) है और दीवार पर कोई कार्य नहीं होता।", "explanation": "जब कोई व्यक्ति दीवार को धकेलता है, तो वह अपनी मांसपेशियों (muscles) का उपयोग करता है, इसलिए यह एक पेशीय बल (muscular force) का उदाहरण है, जो कि एक प्रकार का संपर्क बल (contact force) है। भौतिकी (physics) में, कार्य (work) तभी होता है जब बल लगाने से वस्तु में विस्थापन (displacement) हो। चूंकि दीवार हिलती नहीं है, इसलिए कोई विस्थापन नहीं होता और व्यक्ति द्वारा दीवार पर कोई कार्य नहीं किया जाता है। विकल्प (A) आंशिक रूप से सही है कि यह संपर्क बल है, लेकिन विकल्प (D) अधिक सटीक है क्योंकि यह बल के प्रकार (पेशीय बल) को भी पहचानता है और कार्य न होने की सही व्याख्या करता है। विकल्प (B) और (C) गलत हैं क्योंकि यह असंपर्क बल या घर्षण बल नहीं है, और दीवार पर कोई कार्य नहीं होता।"}, {"id": 23, "section": "Physics", "question": "विद्युत धारा के विभिन्न प्रभावों के संबंध में निम्नलिखित कथनों पर विचार करें:\nकथन I: जब विद्युत धारा किसी चालक (conductor) से गुजरती है, तो वह उसे गर्म कर सकती है, जिसे तापीय प्रभाव (heating effect) कहते हैं।\nकथन II: विद्युत धारा का रासायनिक प्रभाव (chemical effect) तब देखा जाता है जब यह किसी इलेक्ट्रोलाइट (electrolyte) से गुजरती है, जिससे रासायनिक परिवर्तन होते हैं।\nकथन III: विद्युत धारा का चुंबकीय प्रभाव (magnetic effect) केवल तभी उत्पन्न होता है जब धारा एक स्थायी चुंबक के पास से गुजरती है।\nउपरोक्त कथनों में से कौन सा/से सही है/हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल II और III", "I, II और III", "केवल I और III", "केवल I और II"], "answer": "केवल I और II", "explanation": "कथन I और II सही हैं। विद्युत धारा का तापीय प्रभाव (जैसे विद्युत हीटर, बल्ब) और रासायनिक प्रभाव (जैसे इलेक्ट्रोप्लेटिंग, बैटरी चार्जिंग) विद्युत धारा के महत्वपूर्ण प्रभाव हैं। कथन III गलत है क्योंकि विद्युत धारा स्वयं एक चुंबकीय क्षेत्र उत्पन्न करती है (जैसे इलेक्ट्रोमैग्नेट में), भले ही कोई स्थायी चुंबक मौजूद न हो। यह विद्युत धारा का चुंबकीय प्रभाव है।"}, {"id": 24, "section": "Physics", "question": "न्यूटन के गति के तीसरे नियम (Newton's Third Law of Motion) के संबंध में निम्नलिखित कथनों पर विचार करें:\nI. क्रिया (action) और प्रतिक्रिया (reaction) बल हमेशा अलग-अलग वस्तुओं पर कार्य करते हैं।\nII. क्रिया और प्रतिक्रिया बल हमेशा परिमाण (magnitude) में बराबर और दिशा (direction) में विपरीत होते हैं।\nIII. क्रिया और प्रतिक्रिया बल एक-दूसरे को रद्द (cancel) कर देते हैं क्योंकि वे विपरीत दिशाओं में होते हैं।\nउपरोक्त कथनों में से कौन सा/से सही है/हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल I और III", "केवल I और II", "केवल II और III", "I, II और III"], "answer": "केवल I और II", "explanation": "न्यूटन के गति के तीसरे नियम के अनुसार, प्रत्येक क्रिया की हमेशा एक समान और विपरीत प्रतिक्रिया होती है। कथन I और II इस नियम के सही पहलू हैं: बल हमेशा जोड़े में होते हैं और अलग-अलग वस्तुओं पर कार्य करते हैं, और वे परिमाण में बराबर व दिशा में विपरीत होते हैं। कथन III गलत है क्योंकि क्रिया और प्रतिक्रिया बल अलग-अलग वस्तुओं पर कार्य करते हैं, इसलिए वे एक-दूसरे को रद्द नहीं कर सकते। यदि वे एक ही वस्तु पर कार्य करते, तो वे रद्द हो जाते।"}, {"id": 25, "section": "Physics", "question": "अभिकथन (A): जब प्रकाश एक माध्यम (medium) से दूसरे माध्यम में प्रवेश करता है, तो उसकी चाल (speed) और तरंगदैर्ध्य (wavelength) बदल जाती है, लेकिन आवृत्ति (frequency) अपरिवर्तित रहती है।\nकारण (R): प्रकाश की आवृत्ति प्रकाश स्रोत (light source) पर निर्भर करती है, न कि उस माध्यम पर जिससे वह गुजर रहा है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A) और (R) दोनों सही हैं, और (R), (A) की सही व्याख्या है।", "(A) और (R) दोनों सही हैं, लेकिन (R), (A) की सही व्याख्या नहीं है।", "(A) सही है, लेकिन (R) गलत है।", "(A) गलत है, लेकिन (R) सही है।"], "answer": "(A) और (R) दोनों सही हैं, और (R), (A) की सही व्याख्या है।", "explanation": "जब प्रकाश एक माध्यम से दूसरे माध्यम में जाता है, तो उसकी चाल (speed) और तरंगदैर्ध्य (wavelength) बदल जाती है, जिसके परिणामस्वरूप अपवर्तन (refraction) होता है। हालांकि, प्रकाश की आवृत्ति (frequency) अपरिवर्तित रहती है क्योंकि यह प्रकाश स्रोत (light source) की विशेषता है और माध्यम पर निर्भर नहीं करती। कारण (R) अभिकथन (A) की सही व्याख्या करता है कि आवृत्ति क्यों नहीं बदलती।"}, {"id": 26, "section": "Physics", "question": "विज्ञान शिक्षण में 'अन्वेषण विधि' (Inquiry Method) के संबंध में निम्नलिखित कथनों पर विचार करें:\nJ: यह छात्रों को स्वयं प्रश्न पूछने और उनके उत्तर खोजने के लिए प्रोत्साहित करती है।\nK: यह विधि मुख्य रूप से शिक्षक-केंद्रित (teacher-centered) होती है।\nL: यह छात्रों में वैज्ञानिक सोच (scientific thinking) और समस्या-समाधान कौशल (problem-solving skills) विकसित करती है।\nM: इसमें छात्रों को केवल तथ्यों (facts) को याद करने पर जोर दिया जाता है।\nउपरोक्त कथनों में से कौन सा/से सही है/हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और K", "केवल K और M", "केवल J और L", "केवल L और M"], "answer": "केवल J और L", "explanation": "अन्वेषण विधि (Inquiry Method) एक छात्र-केंद्रित (student-centered) दृष्टिकोण है जहाँ छात्र सक्रिय रूप से अपनी समझ का निर्माण करते हैं। कथन J और L सही हैं क्योंकि यह छात्रों को प्रश्न पूछने, जांच करने और वैज्ञानिक सोच व समस्या-समाधान कौशल विकसित करने के लिए प्रोत्साहित करती है। कथन K गलत है क्योंकि यह विधि शिक्षक-केंद्रित नहीं बल्कि छात्र-केंद्रित है। कथन M भी गलत है क्योंकि यह विधि तथ्यों को याद करने के बजाय अवधारणाओं (concepts) की गहरी समझ पर जोर देती है।"}, {"id": 27, "section": "Physics", "question": "निम्नलिखित विद्युत परिपथ घटकों (electric circuit components) को उनके कार्य (function) के साथ सुमेलित (match) करें:\n**घटक (Component)**\nJ: प्रतिरोधक (Resistor)\nK: संधारित्र (Capacitor)\nL: डायोड (Diode)\nM: प्रेरक (Inductor)\n*कार्य/विशेषता (Function/Characteristic) × 1. विद्युत ऊर्जा को चुंबकीय क्षेत्र (magnetic field) में संग्रहित करता है।\n2. धारा के प्रवाह (flow of current) का विरोध करता है।\n3. विद्युत ऊर्जा को विद्युत क्षेत्र (electric field) में संग्रहित करता है।\n4. धारा को केवल एक दिशा (one direction) में प्रवाहित होने देता है।\nसही मिलान का चयन करें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-2, K-3, L-4, M-1", "J-2, K-4, L-1, M-3", "J-3, K-1, L-2, M-4", "J-1, K-2, L-3, M-4"], "answer": "J-2, K-3, L-4, M-1", "explanation": "J. प्रतिरोधक (Resistor) − 2. धारा के प्रवाह का विरोध करता है (resists the flow of current)।\nK. संधारित्र (Capacitor) − 3. विद्युत ऊर्जा को विद्युत क्षेत्र में संग्रहित करता है (stores electrical energy in an electric field)।\nL. डायोड (Diode) − 4. धारा को केवल एक दिशा में प्रवाहित होने देता है (allows current to flow in only one direction)।\nM. प्रेरक (Inductor) − 1. विद्युत ऊर्जा को चुंबकीय क्षेत्र में संग्रहित करता है (stores electrical energy in a magnetic field)।\nयह मिलान विद्युत परिपथ के घटकों के मूल कार्यों और विशेषताओं को सही ढंग से दर्शाता है।"}, {"id": 28, "section": "Physics", "question": "एक धातु की छड़ (metal rod) के एक सिरे को गर्म करने पर दूसरे सिरे तक ऊष्मा संचरण (heat transfer) की प्रक्रिया के सही कालानुक्रमिक क्रम (chronological order) को व्यवस्थित करें:\nJ: छड़ के गर्म सिरे पर परमाणुओं (atoms) की गतिज ऊर्जा (kinetic energy) बढ़ जाती है।\nK: उच्च गतिज ऊर्जा वाले परमाणु अपने पड़ोसी परमाणुओं से टकराते हैं और ऊर्जा स्थानांतरित (transfer) करते हैं।\nL: छड़ के ठंडे सिरे तक ऊर्जा का क्रमिक स्थानांतरण होता है।\nM: परमाणुओं के कंपन (vibration) का आयाम (amplitude) बढ़ जाता है।\nसही क्रम चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, M, L", "M, J, K, L", "J, M, K, L", "J, L, K, M"], "answer": "J, M, K, L", "explanation": "यह ऊष्मा चालन (heat conduction) की प्रक्रिया का वर्णन करता है।\n1. J. छड़ के गर्म सिरे पर परमाणुओं की गतिज ऊर्जा बढ़ जाती है। (सबसे पहले, ऊष्मा ऊर्जा प्राप्त होने पर परमाणुओं की ऊर्जा बढ़ती है।)\n2. M. परमाणुओं के कंपन का आयाम बढ़ जाता है। (गतिज ऊर्जा बढ़ने से परमाणु अधिक तीव्रता से कंपन करने लगते हैं, यानी उनके कंपन का आयाम बढ़ता है।)\n3. K. उच्च गतिज ऊर्जा वाले परमाणु अपने पड़ोसी परमाणुओं से टकराते हैं और ऊर्जा स्थानांतरित करते हैं। (बढ़े हुए कंपन के साथ, ये परमाणु अपने आस-पास के परमाणुओं से टकराते हैं और अपनी ऊर्जा उन्हें स्थानांतरित करते हैं।)\n4. L. छड़ के ठंडे सिरे तक ऊर्जा का क्रमिक स्थानांतरण होता है। (यह प्रक्रिया छड़ के एक सिरे से दूसरे सिरे तक क्रमिक रूप से जारी रहती है, जिससे ऊष्मा का संचरण होता है।)\nयह क्रम ऊष्मा चालन की आणविक (molecular) प्रक्रिया को सही ढंग से दर्शाता है।"}, {"id": 29, "section": "Physics", "question": "एक 50 kg द्रव्यमान (mass) का व्यक्ति 0.01 m² क्षेत्रफल (area) वाले जूते पहनकर फर्श पर खड़ा है। व्यक्ति द्वारा फर्श पर लगाया गया दाब (pressure) कितना होगा? (g = 10 m/s² लें)", "brand": "bilaspurtestseries.com 9669946966", "options": ["500000 Pa", "50000 Pa", "500 Pa", "5000 Pa"], "answer": "50000 Pa", "explanation": "दाब (pressure) का सूत्र है P = F/A, जहाँ F बल (force) है और A क्षेत्रफल (area) है।\nयहाँ, बल (F) व्यक्ति के भार (weight) के बराबर होगा, जो F = mg होता है।\nm = 50 kg, g = 10 m/s²।\nतो, F = 50 kg × 10 m/s² = 500 N।\nक्षेत्रफल (A) = 0.01 m²।\nदाब (P) = 500 N / 0.01 m² = 500 / (1/100) Pa = 500 × 100 Pa = 50000 Pa।\nइसलिए, व्यक्ति द्वारा फर्श पर लगाया गया दाब 50000 Pa होगा।"}, {"id": 30, "section": "Physics", "question": "एक घर में प्रतिदिन 100 W के 5 बल्ब 4 घंटे के लिए और 3500 W का एक एयर कंडीशनर (air conditioner) 2 घंटे के लिए उपयोग किया जाता है। यदि विद्युत ऊर्जा (electrical energy) की दर ₹5 प्रति यूनिट (unit) है, तो 30 दिनों के लिए कुल विद्युत बिल (electricity bill) कितना होगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["₹ 1200", "₹ 1350", "₹ 1500", "₹ 1050"], "answer": "₹ 1350", "explanation": "पहले प्रतिदिन उपयोग की गई कुल ऊर्जा (energy) की गणना करें:\nबल्बों द्वारा खपत ऊर्जा: 5 बल्ब100 W/बल्ब4 घंटे/दिन = 500 W × 4 घंटे = 2000 Wh/दिन।\nएयर कंडीशनर द्वारा खपत ऊर्जा: 1 AC × 3500 W/AC × 2 घंटे/दिन = 7000 Wh/दिन।\nप्रतिदिन कुल ऊर्जा खपत = 2000 Wh + 7000 Wh = 9000 Wh/दिन।\nइसे यूनिट (किलोवाट-घंटा, kWh) में बदलें: 9000 Wh = 9 kWh/दिन।\n30 दिनों के लिए कुल ऊर्जा खपत = 9 kWh/दिन30 दिन = 270 kWh।\nकुल विद्युत बिल = कुल ऊर्जा खपतप्रति यूनिट दर = 270 kWh₹5/kWh = ₹1350।\nअन्य विकल्प गलत हैं क्योंकि वे सही गणना परिणाम नहीं देते हैं।"}, {"id": 31, "section": "Chemistry", "question": "पदार्थ की किस अवस्था में कणों (particles) के बीच आकर्षण बल (attractive force) सबसे कम होता है और वे स्वतंत्र रूप से गति कर सकते हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["द्रव (Liquid)", "प्लाज्मा (Plasma)", "गैस (Gas)", "ठोस (Solid)"], "answer": "गैस (Gas)", "explanation": "गैस अवस्था में, कणों के बीच आकर्षण बल सबसे कम होता है, जिसके कारण वे एक-दूसरे से बहुत दूर होते हैं और स्वतंत्र रूप से सभी दिशाओं में गति कर सकते हैं। ठोस में आकर्षण बल सबसे अधिक होता है, जबकि द्रव में यह ठोस से कम लेकिन गैस से अधिक होता है। प्लाज्मा एक आयनित गैस (ionized gas) है, जिसमें कणों की गति गैस के समान ही होती है, लेकिन यह पदार्थ की चौथी अवस्था है और सामान्यतः उच्च तापमान पर पाई जाती है।"}, {"id": 32, "section": "Chemistry", "question": "यदि किसी व्यक्ति को अपच (indigestion) की समस्या है, तो उसे कौन सा पदार्थ लेना चाहिए जिससे पेट में बनने वाले अतिरिक्त अम्ल (acid) को उदासीन (neutralize) किया जा सके?", "brand": "bilaspurtestseries.com 9669946966", "options": ["बेकिंग सोडा (Baking soda) का घोल", "नींबू का रस (Lemon juice)", "सिरका (Vinegar)", "नमक का घोल (Salt solution)"], "answer": "बेकिंग सोडा (Baking soda) का घोल", "explanation": "अपच की समस्या में पेट में अतिरिक्त अम्ल बनता है। इसे उदासीन करने के लिए एक क्षारीय (basic) पदार्थ की आवश्यकता होती है। बेकिंग सोडा (सोडियम बाइकार्बोनेट, NaHCO₃) एक हल्का क्षार है जो पेट के अम्ल को उदासीन कर देता है और राहत प्रदान करता है। नींबू का रस और सिरका अम्लीय होते हैं, जबकि नमक का घोल उदासीन होता है और अम्ल को उदासीन करने में प्रभावी नहीं होता।"}, {"id": 33, "section": "Chemistry", "question": "निम्नलिखित में से कौन सा कथन धातुओं (metals) के भौतिक गुणों (physical properties) के संबंध में सही नहीं है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["धातुएँ सामान्यतः चमकदार (lustrous) होती हैं।", "धातुएँ सामान्यतः कम गलनांक (low melting point) और क्वथनांक (boiling point) वाली होती हैं।", "धातुएँ सामान्यतः आघातवर्धनीय (malleable) और तन्य (ductile) होती हैं।", "धातुएँ ऊष्मा (heat) और विद्युत (electricity) की सुचालक (good conductors) होती हैं।"], "answer": "धातुएँ सामान्यतः कम गलनांक (low melting point) और क्वथनांक (boiling point) वाली होती हैं।", "explanation": "धातुएँ सामान्यतः उच्च गलनांक और क्वथनांक वाली होती हैं, जैसे लोहा, तांबा आदि। केवल कुछ अपवाद जैसे गैलियम (Gallium) और सीज़ियम (Caesium) का गलनांक कम होता है। अन्य सभी कथन धातुओं के सही भौतिक गुणों का वर्णन करते हैं: वे आघातवर्धनीय (पतली चादरों में ढाली जा सकती हैं) और तन्य (तारों में खींची जा सकती हैं) होती हैं, ऊष्मा और विद्युत की सुचालक होती हैं, और चमकदार होती हैं।"}, {"id": 34, "section": "Chemistry", "question": "सोना (Gold) और प्लेटिनम (Platinum) जैसी धातुएँ सामान्यतः अम्लों (acids) के साथ अभिक्रिया (react) क्यों नहीं करती हैं, जबकि अन्य धातुएँ जैसे जिंक (Zinc) और मैग्नीशियम (Magnesium) आसानी से अभिक्रिया करती हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["क्योंकि सोना और प्लेटिनम विद्युत के कुचालक (poor conductors) हैं।", "क्योंकि सोना और प्लेटिनम बहुत कम अभिक्रियाशील (less reactive) धातुएँ हैं।", "क्योंकि सोना और प्लेटिनम बहुत भारी धातुएँ हैं।", "क्योंकि सोना और प्लेटिनम में धात्विक चमक (metallic luster) अधिक होती है।"], "answer": "क्योंकि सोना और प्लेटिनम बहुत कम अभिक्रियाशील (less reactive) धातुएँ हैं।", "explanation": "सोना और प्लेटिनम अभिक्रियाशीलता श्रृंखला (reactivity series) में हाइड्रोजन (Hydrogen) से नीचे स्थित हैं, जिसका अर्थ है कि वे बहुत कम अभिक्रियाशील धातुएँ हैं। वे अम्लों से हाइड्रोजन को विस्थापित (displace) नहीं कर पातीं, इसलिए वे सामान्य अम्लों के साथ अभिक्रिया नहीं करतीं। जिंक और मैग्नीशियम हाइड्रोजन से ऊपर स्थित हैं और अधिक अभिक्रियाशील हैं, इसलिए वे अम्लों से हाइड्रोजन को विस्थापित करके अभिक्रिया करती हैं।"}, {"id": 35, "section": "Chemistry", "question": "निम्नलिखित में से कौन सा कथन यौगिकों (compounds) के संबंध में सही है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यौगिकों में घटक तत्व अपनी पहचान बनाए रखते हैं।", "यौगिक दो या दो से अधिक तत्वों (elements) को किसी भी अनुपात में मिलाने से बनते हैं।", "यौगिकों को भौतिक विधियों (physical methods) द्वारा उनके घटक तत्वों में अलग किया जा सकता है।", "यौगिकों के गुण उनके घटक तत्वों के गुणों से भिन्न होते हैं।"], "answer": "यौगिकों के गुण उनके घटक तत्वों के गुणों से भिन्न होते हैं।", "explanation": "यौगिक दो या दो से अधिक तत्वों के रासायनिक संयोजन (chemical combination) से एक निश्चित अनुपात में बनते हैं, और उनके गुण उनके घटक तत्वों के गुणों से पूरी तरह भिन्न होते हैं। उदाहरण के लिए, हाइड्रोजन और ऑक्सीजन गैसें मिलकर पानी बनाती हैं, जिसके गुण दोनों गैसों से अलग होते हैं। यौगिकों को केवल रासायनिक विधियों द्वारा ही उनके घटक तत्वों में अलग किया जा सकता है, और घटक तत्व अपनी पहचान खो देते हैं।"}, {"id": 36, "section": "Chemistry", "question": "फिनोलफथेलिन (Phenolphthalein) एक अम्ल-क्षार सूचक (acid-base indicator) है। यह अम्लीय विलयन (acidic solution) में रंगहीन रहता है, जबकि क्षारीय विलयन (basic solution) में गुलाबी हो जाता है। इस रंग परिवर्तन के पीछे का मुख्य कारण क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["फिनोलफथेलिन केवल क्षारीय माध्यम में प्रकाश को अवशोषित (absorb) करता है।", "क्षारीय विलयन में फिनोलफथेलिन का अपचयन (reduction) हो जाता है।", "फिनोलफथेलिन की रासायनिक संरचना (chemical structure) pH के साथ बदलती है, जिससे प्रकाश अवशोषण का तरीका बदल जाता है।", "अम्लीय विलयन में फिनोलफथेलिन का ऑक्सीकरण (oxidation) हो जाता है।"], "answer": "फिनोलफथेलिन की रासायनिक संरचना (chemical structure) pH के साथ बदलती है, जिससे प्रकाश अवशोषण का तरीका बदल जाता है।", "explanation": "फिनोलफथेलिन जैसे अम्ल-क्षार सूचक दुर्बल कार्बनिक अम्ल या क्षार होते हैं जिनकी रासायनिक संरचना pH मान के आधार पर बदल जाती है। अम्लीय माध्यम में, फिनोलफथेलिन एक संरचना में होता है जो रंगहीन होता है। क्षारीय माध्यम में, यह अपनी संरचना बदल लेता है (आयनित हो जाता है) जो प्रकाश के एक विशिष्ट तरंगदैर्ध्य (wavelength) को अवशोषित करता है और गुलाबी रंग के रूप में दिखाई देता है। यह ऑक्सीकरण या अपचयन की प्रक्रिया नहीं है, बल्कि एक संरचनात्मक परिवर्तन है।"}, {"id": 37, "section": "Chemistry", "question": "अभिकथन (A): पानी में नमक का घुलना एक भौतिक परिवर्तन (physical change) है।\nकारण (R): इस प्रक्रिया में नमक और पानी के रासायनिक गुणों में कोई बदलाव नहीं होता है और उन्हें वाष्पीकरण (evaporation) द्वारा अलग किया जा सकता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "A सत्य है, लेकिन R असत्य है।", "A और R दोनों सत्य हैं, लेकिन R, A की सही व्याख्या नहीं है।", "A असत्य है, लेकिन R सत्य है।"], "answer": "A और R दोनों सत्य हैं, और R, A की सही व्याख्या है।", "explanation": "पानी में नमक का घुलना एक भौतिक परिवर्तन है क्योंकि इसमें कोई नया पदार्थ नहीं बनता है। नमक और पानी के रासायनिक गुण अपरिवर्तित रहते हैं। कारण (R) इस बात की पुष्टि करता है कि भौतिक परिवर्तन में पदार्थ की रासायनिक पहचान नहीं बदलती और घटक पदार्थों को भौतिक विधियों (जैसे वाष्पीकरण) द्वारा पुनः प्राप्त किया जा सकता है। अतः, कारण (R) अभिकथन (A) की सही व्याख्या है।"}, {"id": 38, "section": "Chemistry", "question": "निम्नलिखित में से कौन से पदार्थ दैनिक जीवन में क्षारों (bases) के उपयोग के उदाहरण हैं?\nJ: एंटासिड (Antacids)\nK: साबुन (Soap)\nL: टूथपेस्ट (Toothpaste)\nM: सिरका (Vinegar)", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, L और M सभी", "केवल J, K और L", "केवल K और L", "केवल J और K"], "answer": "केवल J, K और L", "explanation": "एंटासिड (J) पेट की अम्लता को कम करने के लिए उपयोग किए जाते हैं, और वे क्षारीय होते हैं। साबुन (K) क्षारीय प्रकृति के होते हैं और सफाई के लिए उपयोग किए जाते हैं। टूथपेस्ट (L) भी क्षारीय होते हैं जो मुंह में बनने वाले अम्ल को उदासीन करते हैं। सिरका (M) एक अम्ल (एसिटिक अम्ल) है, इसलिए यह क्षार का उदाहरण नहीं है। अतः, J, K और L क्षारों के उपयोग के उदाहरण हैं।"}, {"id": 39, "section": "Chemistry", "question": "विद्युत अपघटनी परिष्करण (Electrolytic Refining) द्वारा अशुद्ध तांबे के शुद्धिकरण की प्रक्रिया के चरणों को सही कालानुक्रमिक क्रम (chronological order) में व्यवस्थित करें:\nJ: अशुद्ध तांबे की मोटी छड़ को एनोड (धनात्मक इलेक्ट्रोड) के रूप में विद्युत अपघटनी सेल में स्थापित करना।\nK: शुद्ध तांबे की पतली पट्टी को कैथोड (ऋणात्मक इलेक्ट्रोड) के रूप में विद्युत अपघटनी सेल में स्थापित करना।\nL: कॉपर सल्फेट (CuSO₄) और तनु सल्फ्यूरिक अम्ल (dilute H₂SO₄) के अम्लीय विलयन को विद्युत अपघट्य (electrolyte) के रूप में सेल में भरना।\nM: विद्युत धारा प्रवाहित करने पर एनोड पर अशुद्ध तांबे का ऑक्सीकरण (oxidation) होकर Cu²⁺ आयनों का विलयन में आना और कैथोड पर Cu²⁺ आयनों का अपचयन (reduction) होकर शुद्ध तांबे के रूप में जमा होना।", "brand": "bilaspurtestseries.com 9669946966", "options": ["J → K → L → M", "K → J → L → M", "J → L → K → M", "L → J → K → M"], "answer": "J → K → L → M", "explanation": "विद्युत अपघटनी परिष्करण (electrolytic refining) एक व्यवस्थित प्रक्रिया है जिसमें अशुद्ध धातु को शुद्ध किया जाता है। इसके चरणों का सही कालानुक्रमिक क्रम इस प्रकार है:\n\n1. J. अशुद्ध तांबे की मोटी छड़ को एनोड (धनात्मक इलेक्ट्रोड) के रूप में विद्युत अपघटनी सेल में स्थापित करना। सबसे पहले, अशुद्ध धातु को एनोड के रूप में तैयार और स्थापित किया जाता है, क्योंकि यहीं से धातु आयन विलयन में प्रवेश करते हैं।\n2. K. शुद्ध तांबे की पतली पट्टी को कैथोड (ऋणात्मक इलेक्ट्रोड) के रूप में विद्युत अपघटनी सेल में स्थापित करना। इसके बाद, शुद्ध धातु की पतली पट्टी को कैथोड के रूप में स्थापित किया जाता है, जिस पर शुद्ध धातु जमा होगी।\n3. L. कॉपर सल्फेट (CuSO₄) और तनु सल्फ्यूरिक अम्ल (dilute H₂SO₄) के अम्लीय विलयन को विद्युत अपघट्य (electrolyte) के रूप में सेल में भरना। इलेक्ट्रोड स्थापित करने के बाद, विद्युत अपघट्य विलयन को सेल में भरा जाता है ताकि आयनों का संचलन हो सके और विद्युत रासायनिक अभिक्रियाएँ संभव हो सकें।\n4. M. विद्युत धारा प्रवाहित करने पर एनोड पर अशुद्ध तांबे का ऑक्सीकरण (oxidation) होकर Cu²⁺ आयनों का विलयन में आना और कैथोड पर Cu²⁺ आयनों का अपचयन (reduction) होकर शुद्ध तांबे के रूप में जमा होना। अंत में, विद्युत धारा प्रवाहित की जाती है जिससे विद्युत रासायनिक अभिक्रियाएँ होती हैं और शुद्धिकरण की प्रक्रिया संपन्न होती है।\n\nयह क्रम एक तार्किक और आवश्यक अनुक्रम का प्रतिनिधित्व करता है, जहाँ सेल के घटकों को पहले स्थापित किया जाता है, फिर विद्युत अपघट्य भरा जाता है, और अंत में विद्युत प्रवाह द्वारा अभिक्रिया शुरू की जाती है।"}, {"id": 40, "section": "Chemistry", "question": "निम्नलिखित धातुओं को उनकी अभिक्रियाशीलता (reactivity) के घटते क्रम (decreasing order) में व्यवस्थित करें:\nJ: सोडियम (Na)\nK: लोहा (Fe)\nL: तांबा (Cu)\nM: पोटेशियम (K)", "brand": "bilaspurtestseries.com 9669946966", "options": ["L > K > J > M", "J > K > L > M", "K > M > J > L", "M > J > K > L"], "answer": "M > J > K > L", "explanation": "धातुओं की अभिक्रियाशीलता श्रृंखला (reactivity series) के अनुसार, पोटेशियम (K) सबसे अधिक अभिक्रियाशील है, उसके बाद सोडियम (Na) आता है। लोहा (Fe) इन दोनों से कम अभिक्रियाशील है, और तांबा (Cu) सबसे कम अभिक्रियाशील है। इसलिए, सही घटता क्रम है: पोटेशियम (M) > सोडियम (J) > लोहा (K) > तांबा (L)।"}, {"id": 41, "section": "Biology", "question": "सजीवों का एक मूलभूत लक्षण (fundamental characteristic) जो निर्जीवों से उनकी स्पष्ट पहचान कराता है, वह क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["वृद्धि (Growth)", "उपापचय (Metabolism)", "प्रजनन (Reproduction)", "गति (Movement)"], "answer": "उपापचय (Metabolism)", "explanation": "उपापचय (Metabolism) सजीवों का एक मूलभूत लक्षण है जिसमें उनके शरीर में होने वाली सभी रासायनिक अभिक्रियाएँ (chemical reactions) शामिल होती हैं, जो ऊर्जा उत्पादन और उपयोग के लिए आवश्यक हैं। निर्जीव वस्तुएँ इस प्रकार की स्व-नियामक (self-regulating) उपापचयी गतिविधियों को प्रदर्शित नहीं करती हैं। जबकि गति निर्जीवों में भी हो सकती है (जैसे हवा से उड़ना), वृद्धि निर्जीवों में भी हो सकती है (जैसे क्रिस्टल का बढ़ना, लेकिन यह अभिवृद्धि (accretion) द्वारा होती है, आंतरिक नहीं), और प्रजनन सभी सजीवों के लिए अनिवार्य नहीं है (जैसे बाँझ जीव)।"}, {"id": 42, "section": "Biology", "question": "एक पौधा जो अपना भोजन स्वयं संश्लेषित (synthesize) करता है, उसे किस प्रकार का पोषण (nutrition) प्रदर्शित करने वाला माना जाता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["मृतोपजीवी (Saprotrophic)", "परजीवी (Parasitic)", "परपोषी (Heterotrophic)", "स्वपोषी (Autotrophic)"], "answer": "स्वपोषी (Autotrophic)", "explanation": "स्वपोषी (Autotrophic) वे जीव होते हैं जो अपना भोजन स्वयं संश्लेषित करते हैं, आमतौर पर प्रकाश संश्लेषण (photosynthesis) की प्रक्रिया द्वारा, जैसे कि हरे पौधे। परपोषी (Heterotrophic) जीव दूसरों पर भोजन के लिए निर्भर करते हैं, मृतोपजीवी (Saprotrophic) मृत और सड़ने वाले कार्बनिक पदार्थों (organic matter) से पोषण प्राप्त करते हैं, और परजीवी (Parasitic) अन्य जीवित जीवों से पोषण प्राप्त करते हैं।"}, {"id": 43, "section": "Biology", "question": "मानव शरीर में ऊर्जा का प्राथमिक और त्वरित स्रोत (primary and immediate source) कौन सा पोषक तत्व है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["विटामिन (Vitamins)", "कार्बोहाइड्रेट (Carbohydrates)", "प्रोटीन (Proteins)", "वसा (Fats)"], "answer": "कार्बोहाइड्रेट (Carbohydrates)", "explanation": "कार्बोहाइड्रेट (Carbohydrates) मानव शरीर के लिए ऊर्जा का प्राथमिक और त्वरित स्रोत हैं क्योंकि वे आसानी से ग्लूकोज में टूट जाते हैं, जिसका उपयोग कोशिकाओं द्वारा ऊर्जा के लिए किया जाता है। प्रोटीन मुख्य रूप से शरीर के निर्माण और मरम्मत के लिए होते हैं, वसा ऊर्जा का एक संग्रहीत रूप है जो कार्बोहाइड्रेट के बाद उपयोग होता है, और विटामिन विभिन्न शारीरिक कार्यों को विनियमित करने में मदद करते हैं लेकिन सीधे ऊर्जा प्रदान नहीं करते हैं।"}, {"id": 44, "section": "Biology", "question": "आमतौर पर लैंगिक प्रजनन (sexual reproduction) करने वाले पौधों में भी, कुछ विशेष परिस्थितियों में, अलैंगिक प्रजनन (asexual reproduction) की कौन सी विधि का उपयोग तेजी से संख्या बढ़ाने और आनुवंशिक रूप से समान (genetically identical) संतति (offspring) प्राप्त करने के लिए किया जा सकता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["कायिक प्रवर्धन (Vegetative propagation)", "परागण (Pollination)", "विखंडन (Fragmentation)", "बीजाणु निर्माण (Spore formation)"], "answer": "कायिक प्रवर्धन (Vegetative propagation)", "explanation": "कायिक प्रवर्धन (Vegetative propagation) अलैंगिक प्रजनन की एक विधि है जिसमें पौधे के कायिक भागों (जैसे तना, पत्ती, जड़) से नए पौधे विकसित होते हैं। यह लैंगिक प्रजनन करने वाले पौधों में भी तेजी से संख्या बढ़ाने और आनुवंशिक रूप से समान संतति प्राप्त करने के लिए उपयोग किया जाता है। परागण लैंगिक प्रजनन का हिस्सा है, बीजाणु निर्माण कुछ पौधों (जैसे फर्न) और कवक (fungi) में अलैंगिक प्रजनन की विधि है, और विखंडन (fragmentation) कुछ सरल जीवों जैसे स्पाइरोगाइरा (Spirogyra) में होता है।"}, {"id": 45, "section": "Biology", "question": "निम्नलिखित कथनों पर विचार करें:\nI. संक्रामक रोग (Infectious diseases) एक व्यक्ति से दूसरे व्यक्ति में सीधे या परोक्ष रूप से फैल सकते हैं।\nII. गैर-संक्रामक रोग (Non-infectious diseases) आमतौर पर जीवनशैली, आनुवंशिकी (genetics) या पर्यावरणीय कारकों के कारण होते हैं।\nIII. मधुमेह (Diabetes) एक संक्रामक रोग का उदाहरण है, जबकि सामान्य सर्दी (common cold) एक गैर-संक्रामक रोग है।\nउपरोक्त कथनों में से कौन सा/से सही है/हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल I और III", "केवल II और III", "केवल I और II", "I, II और III"], "answer": "केवल I और II", "explanation": "कथन I और II दोनों संक्रामक और गैर-संक्रामक रोगों की सही परिभाषाएँ और विशेषताएँ बताते हैं। संक्रामक रोग सूक्ष्मजीवों (microorganisms) के कारण फैलते हैं, जबकि गैर-संक्रामक रोग जीवनशैली, आनुवंशिकी या पर्यावरण से संबंधित होते हैं। कथन III गलत है क्योंकि मधुमेह (Diabetes) एक गैर-संक्रामक रोग है जो जीवनशैली या आनुवंशिकी से संबंधित है, जबकि सामान्य सर्दी (common cold) एक संक्रामक रोग है जो वायरस (virus) के कारण फैलता है।"}, {"id": 46, "section": "Biology", "question": "टीकाकरण (vaccination) बच्चों को संक्रामक बीमारियों से बचाने में कैसे मदद करता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["यह शरीर में सीधे एंटीबायोटिक्स (antibiotics) डालता है जिससे संक्रमण तुरंत ठीक हो जाता है।", "यह पाचन तंत्र (digestive system) को मजबूत करके पोषक तत्वों के अवशोषण (nutrient absorption) को बढ़ाता है, जिससे रोग प्रतिरोधक क्षमता बढ़ती है।", "यह शरीर को रोगजनकों (pathogens) को पहचानने और उनसे लड़ने के लिए विशिष्ट एंटीबॉडी (antibodies) बनाने के लिए उत्तेजित करता है।", "यह शरीर के सभी हानिकारक बैक्टीरिया (bacteria) और वायरस (viruses) को मार देता है, जिससे कोई बीमारी नहीं हो सकती।"], "answer": "यह शरीर को रोगजनकों (pathogens) को पहचानने और उनसे लड़ने के लिए विशिष्ट एंटीबॉडी (antibodies) बनाने के लिए उत्तेजित करता है।", "explanation": "टीकाकरण का सिद्धांत शरीर की प्रतिरक्षा प्रणाली (immune system) को किसी विशेष रोगजनक (जैसे वायरस या बैक्टीरिया) के प्रति प्रतिक्रिया करने के लिए प्रशिक्षित करना है। टीके में रोगजनक का कमजोर या निष्क्रिय रूप होता है, जो बीमारी पैदा किए बिना प्रतिरक्षा प्रतिक्रिया को उत्तेजित करता है। इससे शरीर विशिष्ट एंटीबॉडी और मेमोरी कोशिकाएं (memory cells) बनाता है, जो भविष्य में वास्तविक संक्रमण होने पर तेजी से और प्रभावी ढंग से प्रतिक्रिया करने में मदद करती हैं। यह सीधे एंटीबायोटिक्स नहीं डालता, न ही सभी हानिकारक सूक्ष्मजीवों को मारता है, और न ही पाचन तंत्र को मजबूत करता है।"}, {"id": 47, "section": "Biology", "question": "अभिकथन (A): मानव में निषेचन (fertilization) आंतरिक होता है।\nकारण (R): शुक्राणु (sperm) और अंडाणु (ovum) का संलयन (fusion) मादा के शरीर के अंदर होता है।\nसही विकल्प चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A) सत्य है लेकिन (R) असत्य है।", "(A) असत्य है लेकिन (R) सत्य है।", "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "(A) और (R) दोनों सत्य हैं लेकिन (R), (A) की सही व्याख्या नहीं है।"], "answer": "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "explanation": "मानव में निषेचन (fertilization) आंतरिक होता है, जिसका अर्थ है कि शुक्राणु (sperm) और अंडाणु (ovum) का संलयन (fusion) मादा के शरीर के अंदर, आमतौर पर डिंबवाहिनी (fallopian tube) में होता है। कारण (R) सीधे अभिकथन (A) की व्याख्या करता है कि निषेचन आंतरिक क्यों होता है, क्योंकि यह मादा शरीर के भीतर होता है।"}, {"id": 48, "section": "Biology", "question": "निम्नलिखित सूची-I में दिए गए पोषक तत्वों (nutrients) का सूची-II में दिए गए उनके प्रमुख कार्यों या कमी से होने वाले रोगों से सही मिलान करें:\nसूची-I (पोषक तत्व)\nP. विटामिन C\nQ. कैल्शियम (Calcium)\nR. आयरन (Iron)\nS. प्रोटीन (Protein)\nसूची-II (प्रमुख कार्य/कमी का रोग):\n1. रक्त का थक्का जमना (Blood clotting) और हड्डियों का स्वास्थ्य (Bone health)\n2. ऊतक मरम्मत (Tissue repair) और वृद्धि (Growth)\n3. स्कर्वी (Scurvy) और प्रतिरक्षा (Immunity)\n4. एनीमिया (Anemia) और ऑक्सीजन परिवहन (Oxygen transport)\nसही कूट (code) का चयन करें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["P-3, Q-1, R-4, S-2", "P-4, Q-2, R-1, S-3", "P-2, Q-4, R-3, S-1", "P-1, Q-3, R-2, S-4"], "answer": "P-3, Q-1, R-4, S-2", "explanation": "सही मिलान इस प्रकार है:\n- P. विटामिन C: इसकी कमी से स्कर्वी रोग होता है और यह प्रतिरक्षा प्रणाली (immune system) के लिए महत्वपूर्ण है। (P-3) − Q. कैल्शियम (Calcium): यह हड्डियों और दांतों के निर्माण के साथ-साथ रक्त के थक्के जमने (blood clotting) में भी महत्वपूर्ण भूमिका निभाता है। (Q-1) − R. आयरन (Iron): यह हीमोग्लोबिन (hemoglobin) का एक घटक है, जो शरीर में ऑक्सीजन के परिवहन (oxygen transport) के लिए आवश्यक है। इसकी कमी से एनीमिया (anemia) होता है। (R-4) − S. प्रोटीन (Protein): यह शरीर में ऊतकों की मरम्मत (tissue repair), वृद्धि (growth) और नए ऊतकों के निर्माण के लिए आवश्यक है। (S-2)"}, {"id": 49, "section": "Biology", "question": "सूची-I में दिए गए प्रजनन की विधियों (Methods of Reproduction) का सूची-II में दिए गए उदाहरण जीव/संरचना (Example Organism/Structure) से सही मिलान करें:\nसूची-I (प्रजनन की विधि)\nP. मुकुलन (Budding)\nQ. बीजाणु निर्माण (Spore Formation)\nR. खंडन (Fragmentation)\nS. कायिक प्रवर्धन (Vegetative Propagation)\nसूची-II (उदाहरण जीव/संरचना):\n1. ब्रायोफिलम की पत्ती (Bryophyllum leaf)\n2. यीस्ट (Yeast)\n3. राइजोपस (Rhizopus)\n4. स्पाइरोगाइरा (Spirogyra)\nसही कूट (code) का चयन करें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["P-1, Q-4, R-2, S-3", "P-2, Q-3, R-4, S-1", "P-4, Q-1, R-3, S-2", "P-3, Q-2, R-1, S-4"], "answer": "P-2, Q-3, R-4, S-1", "explanation": "सही मिलान इस प्रकार है:\n- P. मुकुलन (Budding): यह यीस्ट (Yeast) जैसे जीवों में होता है, जहाँ एक छोटा उभार (bud) मूल जीव से अलग होकर नया जीव बनाता है। (P-2) − Q. बीजाणु निर्माण (Spore Formation): राइजोपस (Rhizopus) जैसे कवक (fungi) बीजाणुओं (spores) के माध्यम से प्रजनन करते हैं, जो अनुकूल परिस्थितियों में नए जीव में विकसित होते हैं। (Q-3) − R. खंडन (Fragmentation): स्पाइरोगाइरा (Spirogyra) जैसे शैवाल (algae) में, शरीर छोटे-छोटे टुकड़ों में टूट जाता है और प्रत्येक टुकड़ा एक नए जीव में विकसित होता है। (R-4) − S. कायिक प्रवर्धन (Vegetative Propagation): ब्रायोफिलम (Bryophyllum) की पत्ती पर कलिकाएँ (buds) विकसित होती हैं, जो नए पौधों को जन्म देती हैं, यह कायिक प्रवर्धन का एक उदाहरण है। (S-1)"}, {"id": 50, "section": "Biology", "question": "मानव पाचन तंत्र (human digestive system) में भोजन के मार्ग और पाचन प्रक्रिया के चरणों का सही कालानुक्रमिक क्रम (chronological order) क्या है?\nJ: आमाशय (Stomach) में प्रोटीन का आंशिक पाचन (partial digestion)।\nK: छोटी आंत (Small intestine) में कार्बोहाइड्रेट, प्रोटीन और वसा का पूर्ण पाचन (complete digestion)।\nL: मुख गुहा (Buccal cavity) में कार्बोहाइड्रेट का पाचन शुरू होना।\nM: बड़ी आंत (Large intestine) में जल का अवशोषण (water absorption)।\nसही क्रम चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["K, L, J, M", "L, J, K, M", "L, K, J, M", "J, L, K, M"], "answer": "L, J, K, M", "explanation": "मानव पाचन प्रक्रिया का सही क्रम इस प्रकार है:\n1. L. मुख गुहा (Buccal cavity) में कार्बोहाइड्रेट का पाचन शुरू होना (लार में मौजूद एमाइलेज (amylase) एंजाइम द्वारा)।\n2. J. आमाशय (Stomach) में प्रोटीन का आंशिक पाचन (पेप्सिन (pepsin) एंजाइम द्वारा)।\n3. K. छोटी आंत (Small intestine) में कार्बोहाइड्रेट, प्रोटीन और वसा का पूर्ण पाचन (अग्नाशयी (pancreatic) और आंतों के एंजाइमों द्वारा)।\n4. M. बड़ी आंत (Large intestine) में जल का अवशोषण (undigested food से)।\nयह क्रम भोजन के शरीर से गुजरने और पचने के चरणों को दर्शाता है।"}];const SUBMIT_URL="https://mqorslvouzmrvciubpoq.supabase.co/functions/v1/result-collector";const TEST_CODE="DEMO_CTET_PAPER_II_MATHS_SCI_BIOLOGY_CTET_PAPER_II_CDP_36EEE784";const TEST_TITLE="DEMO_CTET_Paper_II_Maths_Science_Day_01_13_CDP_CTET_PAPER_II_CDP_ADOL";const CONTACT_WHATSAPP="9669946966";const PRINT_QR_TEXT="";const PRINT_QR_MESSAGE="";const LOGO_SRC="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEASABIAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDABsSFBcUERsXFhceHBsgKEIrKCUlKFE6PTBCYFVlZF9VXVtqeJmBanGQc1tdhbWGkJ6jq62rZ4C8ybqmx5moq6T/2wBDARweHigjKE4rK06kbl1upKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKSkpKT/wAARCANtA20DASIAAhEBAxEB/8QAGwABAQADAQEBAAAAAAAAAAAAAAEDBAUCBgf/xABLEAACAQIDBwEEBwUGBQMDBAMAAQIDEQQhMQUSQVFhcYGREyKh8BQyQlKxwdEVI2Jy4QYzU4KS8SQ0Q1STRFWDZH
