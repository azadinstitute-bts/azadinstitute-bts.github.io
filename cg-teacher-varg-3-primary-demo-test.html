</style></head><body><div class="wrap"><div class="top"><div class="brandbar"><div class="brand-logo" id="brandLogo">AZAD</div><div><h1 style="margin:0;color:#0f172a;font-size:38px;letter-spacing:.8px;font-weight:900;line-height:1.05">BILASPUR TEST SERIES</h1><h2 style="margin:8px 0 0;font-size:16px;font-weight:800;color:#1d4ed8">By Azad Institute</h2><div style="margin-top:8px;font-size:14px;color:#334155;font-weight:600">🎓 CG Teacher Varg 3 Primary Demo Test</div></div></div></div><div id="app"></div></div><script>const Q=[{"id": 1, "section": "Maths", "question": "एक स्कूल में 450 छात्र हैं। यदि प्रत्येक छात्र को 3 किताबें दी जाती हैं और प्रत्येक किताब की कीमत ₹25 है, तो स्कूल को कुल कितनी राशि खर्च करनी होगी?", "brand": "bilaspurtestseries.com 9669946966", "options": ["₹33,750", "₹34,250", "₹32,500", "₹35,000"], "answer": "₹33,750", "explanation": "सही उत्तर की गणना करने के लिए, हमें पहले कुल किताबों की संख्या ज्ञात करनी होगी।\nकुल किताबें = छात्रों की संख्याप्रत्येक छात्र को दी गई किताबें = 450 × 3 = 1350 किताबें।\nअब, कुल खर्च की गई राशि ज्ञात करने के लिए, हम कुल किताबों की संख्या को प्रति किताब की कीमत से गुणा करेंगे।\nकुल खर्च = कुल किताबेंप्रति किताब की कीमत = 1350₹25 = ₹33,750।\nइसलिए, स्कूल को कुल ₹33,750 खर्च करने होंगे। अन्य विकल्प गलत हैं क्योंकि वे या तो गलत गणना के परिणामस्वरूप हैं या प्रश्न में दिए गए डेटा का सही ढंग से उपयोग नहीं करते हैं।"}, {"id": 2, "section": "Maths", "question": "एक दुकानदार ने 150 पेन ₹10 प्रति पेन की दर (rate) से खरीदे। उसने उनमें से 100 पेन ₹12 प्रति पेन की दर से बेच दिए। बचे हुए पेन उसने ₹8 प्रति पेन की दर से बेचे। दुकानदार का कुल (total) लाभ (profit) कितना है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["₹100", "₹150", "₹200", "₹50"], "answer": "₹100", "explanation": "दुकानदार द्वारा खरीदे गए कुल पेन = 150\nकुल खरीद मूल्य (Total Cost Price) = 150 पेन₹10/पेन = ₹1500\n\nपहले 100 पेन का बिक्री मूल्य (Sale Price of first 100 pens) = 100 पेन₹12/पेन = ₹1200\nबचे हुए पेन = 150 − 100 = 50 पेन\nबचे हुए 50 पेन का बिक्री मूल्य (Sale Price of remaining 50 pens) = 50 पेन₹8/पेन = ₹400\n\nकुल बिक्री मूल्य (Total Sale Price) = ₹1200 + ₹400 = ₹1600\n\nकुल लाभ (Total Profit) = कुल बिक्री मूल्य - कुल खरीद मूल्य = ₹1600 - ₹1500 = ₹100\n\nविकल्प A (₹50) गलत है क्योंकि यह कुल लाभ की सही गणना नहीं है, संभवतः किसी गणना त्रुटि के कारण। विकल्प C (₹150) और D (₹200) भी गलत हैं क्योंकि वे या तो बचे हुए पेनों की बिक्री को गलत तरीके से जोड़ते हैं या केवल पहले भाग के लाभ पर विचार करते हैं, जिससे कुल लाभ की गलत गणना होती है।"}, {"id": 3, "section": "Maths", "question": "जोड़ (Addition) और घटाव (Subtraction) के गुणधर्मों (properties) के संबंध में निम्नलिखित कथनों में से कौन सा सही है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["जोड़ और घटाव दोनों क्रमविनिमेय (commutative) नहीं होते हैं। (Neither addition nor subtraction is commutative.)", "घटाव क्रमविनिमेय (commutative) होता है, लेकिन जोड़ नहीं। (Subtraction is commutative, but addition is not.)", "जोड़ और घटाव दोनों क्रमविनिमेय (commutative) होते हैं। (Both addition and subtraction are commutative.)", "जोड़ क्रमविनिमेय (commutative) होता है, लेकिन घटाव नहीं। (Addition is commutative, but subtraction is not.)"], "answer": "जोड़ क्रमविनिमेय (commutative) होता है, लेकिन घटाव नहीं। (Addition is commutative, but subtraction is not.)", "explanation": "क्रमविनिमेय गुणधर्म (commutative property) का अर्थ है कि संख्याओं के क्रम को बदलने पर भी परिणाम समान रहता है। जोड़ के लिए, जैसे 2 + 3 = 5 और 3 + 2 = 5, यह गुणधर्म लागू होता है। हालांकि, घटाव के लिए, जैसे 5 − 2 = 3 लेकिन 2 − 5 = -3, परिणाम समान नहीं होता है, इसलिए घटाव क्रमविनिमेय नहीं है। अन्य विकल्प गलत हैं क्योंकि वे इन गुणधर्मों को गलत तरीके से प्रस्तुत करते हैं।"}, {"id": 4, "section": "Maths", "question": "निम्नलिखित कथनों पर विचार करें और सही कथन/कथनों का चयन करें:\nJ: संख्या 87654 में, अंक 7 का स्थानीय मान (place value) अंक 6 के स्थानीय मान का 10 गुना है।\nK: दो संख्याओं का गुणनफल (product) 12345 है। यदि एक संख्या 5 है, तो दूसरी संख्या 2469 होगी।\nL: यदि 99999 में 1 जोड़ा जाए, तो प्राप्त संख्या 1 लाख (one lakh) होती है, जिसमें 6 अंक होते हैं।\nM: 100000 को 100 से भाग देने पर प्राप्त भागफल (quotient) 1000 होता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J और M सही हैं।", "केवल L और M सही हैं।", "केवल K, L और M सही हैं।", "केवल J, K और L सही हैं।"], "answer": "केवल K, L और M सही हैं।", "explanation": "कथन J गलत है। संख्या 87654 में, अंक 7 का स्थानीय मान 7000 है और अंक 6 का स्थानीय मान 600 है। 7000, 600 का 10 गुना नहीं है (7000/600 ≈ 11.67)। कथन K सही है क्योंकि दो संख्याओं का गुणनफल 12345 है और एक संख्या 5 है, तो दूसरी संख्या 12345 ÷ 5 = 2469 होगी। कथन L सही है क्योंकि 99999 में 1 जोड़ने पर 100000 प्राप्त होता है, जो एक लाख है और इसमें 6 अंक होते हैं। कथन M भी सही है क्योंकि 100000 को 100 से भाग देने पर 1000 प्राप्त होता है। इस प्रकार, K, L और M सही कथन हैं।"}, {"id": 5, "section": "Maths", "question": "अभिकथन (A): दो विषम संख्याओं (odd numbers) का योग (sum) हमेशा एक सम संख्या (even number) होता है।\nकारण (R): विषम संख्याएँ वे संख्याएँ होती हैं जो 2 से पूर्णतः विभाजित नहीं होती हैं, और दो विषम संख्याओं को जोड़ने पर उनके शेषफल (remainders) का योग 2 होता है, जिससे वह 2 से विभाजित हो जाती है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A) सत्य है, लेकिन (R) असत्य है।", "(A) और (R) दोनों सत्य हैं, लेकिन (R), (A) की सही व्याख्या नहीं है।", "(A) असत्य है, लेकिन (R) सत्य है।", "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।"], "answer": "(A) और (R) दोनों सत्य हैं और (R), (A) की सही व्याख्या है।", "explanation": "अभिकथन (A) सत्य है। उदाहरण के लिए, 3 (विषम) + 5 (विषम) = 8 (सम)। कारण (R) भी सत्य है और अभिकथन की सही व्याख्या करता है। एक विषम संख्या को 2n+1 के रूप में लिखा जा सकता है। दो विषम संख्याओं का योग (2n+1) + (2m+1) = 2n + 2m + 2 = 2(n+m+1) होता है, जो हमेशा 2 से विभाज्य (divisible) होता है, इसलिए यह एक सम संख्या है। कारण में दिया गया शेषफल का तर्क भी इस बात को पुष्ट करता है कि दो विषम संख्याओं के योग में 2 का एक अतिरिक्त गुणज (multiple) होता है, जिससे वह सम बन जाती है।"}, {"id": 6, "section": "Maths", "question": "यदि एक पेन की कीमत ₹12 है और एक कॉपी की कीमत ₹25 है, तो 5 पेन और 3 कॉपी खरीदने के लिए आपको लगभग कितने रुपये की आवश्यकता होगी?", "brand": "bilaspurtestseries.com 9669946966", "options": ["₹135", "₹100", "₹150", "₹120"], "answer": "₹135", "explanation": "5 पेन की कुल कीमत = 5₹12 = ₹60।\n3 कॉपी की कुल कीमत = 3₹25 = ₹75।\nकुल आवश्यक रुपये = ₹60 + ₹75 = ₹135।\nयह प्रश्न सटीक गणना पर आधारित है, और ₹135 विकल्पों में मौजूद सही मान है। अन्य विकल्प गलत गणना या गलत अनुमान पर आधारित हैं।"}, {"id": 7, "section": "Maths", "question": "एक बस में 45 यात्री थे। पहले स्टॉप पर 15 यात्री उतरे और 8 यात्री चढ़े। दूसरे स्टॉप पर 10 यात्री उतरे और 12 यात्री चढ़े। अब बस में कुल कितने यात्री हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["40", "44", "42", "46"], "answer": "40", "explanation": "प्रारंभ में बस में यात्रियों की संख्या = 45\nपहले स्टॉप पर:\nयात्री उतरे = 15\nयात्री चढ़े = 8\nपहले स्टॉप के बाद यात्रियों की संख्या = 45 − 15 + 8 = 30 + 8 = 38\n\nदूसरे स्टॉप पर:\nयात्री उतरे = 10\nयात्री चढ़े = 12\nदूसरे स्टॉप के बाद यात्रियों की संख्या = 38 − 10 + 12 = 28 + 12 = 40\nइसलिए, अब बस में कुल 40 यात्री हैं। अन्य विकल्प गलत गणना के परिणामस्वरूप प्राप्त होते हैं।"}, {"id": 8, "section": "Maths", "question": "एक आयताकार खेत (rectangular field) की लंबाई 25.5 मीटर (meter) और चौड़ाई 12.5 मीटर है। यदि खेत के चारों ओर 3 बार तार लगाना हो, तो कुल कितने मीटर तार की आवश्यकता होगी?", "brand": "bilaspurtestseries.com 9669946966", "options": ["152 मीटर", "228 मीटर", "76 मीटर", "114 मीटर"], "answer": "228 मीटर", "explanation": "आयताकार खेत का परिमाप (perimeter) = 2 × (लंबाई + चौड़ाई)।\nलंबाई = 25.5 मीटर, चौड़ाई = 12.5 मीटर।\nपरिमाप = 2 × (25.5 + 12.5) = 2 × 38 = 76 मीटर।\nचूंकि खेत के चारों ओर 3 बार तार लगाना है, तो कुल तार की लंबाई = 3परिमाप = 3 × 76 = 228 मीटर होगी।\nविकल्प A (114 मीटर) और D (152 मीटर) गलत हैं क्योंकि वे क्रमशः 1.5 गुना और 2 गुना परिमाप के बराबर नहीं हैं। विकल्प C (76 मीटर) केवल एक बार तार लगाने की लंबाई है, न कि तीन बार की।"}, {"id": 9, "section": "Maths", "question": "एक दुकानदार ने 120 किलोग्राम (kilogram) चावल खरीदा। उसने कुल चावल का 1/3 भाग 20 रुपये (rupees) प्रति किलोग्राम की दर से बेचा और शेष चावल का 1/2 भाग 25 रुपये प्रति किलोग्राम की दर से बेचा। यदि बचा हुआ चावल खराब हो गया, तो दुकानदार को कुल कितने रुपये प्राप्त हुए?", "brand": "bilaspurtestseries.com 9669946966", "options": ["1800 रुपये", "2000 रुपये", "1600 रुपये", "2200 रुपये"], "answer": "1800 रुपये", "explanation": "दुकानदार ने कुल 120 किलोग्राम चावल खरीदा।\nपहले भाग में बेचा गया चावल = 1/3 × 120 किलोग्राम = 40 किलोग्राम।\nइस भाग से प्राप्त राशि = 40 किलोग्राम20 रुपये/किलोग्राम = 800 रुपये।\nशेष चावल = 120 किलोग्राम - 40 किलोग्राम = 80 किलोग्राम।\nदूसरे भाग में बेचा गया चावल (शेष का 1/2) = 1/2 × 80 किलोग्राम = 40 किलोग्राम।\nइस भाग से प्राप्त राशि = 40 किलोग्राम25 रुपये/किलोग्राम = 1000 रुपये।\nकुल प्राप्त राशि = 800 रुपये + 1000 रुपये = 1800 रुपये।\nविकल्प A (1600 रुपये), C (2000 रुपये) और D (2200 रुपये) गलत हैं क्योंकि वे सही गणना के अनुरूप नहीं हैं।"}, {"id": 10, "section": "Maths", "question": "मापन (measurement) की इकाइयों के संबंध में निम्नलिखित कथनों पर विचार करें और सही कथन/कथनों का चयन करें:\n1. 1 किलोग्राम (kilogram) = 1000 ग्राम (gram)\n2. 1 मीटर (meter) = 100 सेंटीमीटर (centimeter)\n3. 1 लीटर (liter) = 1000 मिलीलीटर (milliliter)", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल 1 और 2 सही हैं।", "1, 2 और 3 सभी सही हैं।", "केवल 1 और 3 सही हैं।", "केवल 2 और 3 सही हैं।"], "answer": "1, 2 और 3 सभी सही हैं।", "explanation": "ये सभी कथन मापन की मानक इकाइयों (standard units of measurement) के सही रूपांतरण (conversion) हैं। 1 किलोग्राम में 1000 ग्राम होते हैं, 1 मीटर में 100 सेंटीमीटर होते हैं, और 1 लीटर में 1000 मिलीलीटर होते हैं। इसलिए, दिए गए सभी कथन सही हैं।"}, {"id": 11, "section": "Maths", "question": "डेटा हैंडलिंग (data handling) के संदर्भ में, निम्नलिखित कथनों में से कौन सा/से सही है/हैं?\n1. बार ग्राफ (bar graph) का उपयोग विभिन्न श्रेणियों (categories) के बीच तुलना (comparison) दिखाने के लिए किया जाता है।\n2. पाई चार्ट (pie chart) कुल के हिस्सों (parts of a whole) को दर्शाने के लिए सबसे उपयुक्त है।\n3. टेली मार्क्स (tally marks) का उपयोग डेटा को गिनने और व्यवस्थित करने के लिए किया जाता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["1, 2 और 3 सभी सही हैं।", "केवल 2 और 3 सही हैं।", "केवल 1 सही है।", "केवल 1 और 2 सही हैं।"], "answer": "1, 2 और 3 सभी सही हैं।", "explanation": "बार ग्राफ विभिन्न श्रेणियों के डेटा की तुलना करने के लिए प्रभावी होते हैं। पाई चार्ट एक पूरे के विभिन्न भागों को प्रतिशत या अनुपात में दर्शाने के लिए आदर्श होते हैं। टेली मार्क्स डेटा को जल्दी से गिनने और उसकी आवृत्ति (frequency) को रिकॉर्ड करने का एक सरल तरीका है। ये सभी कथन डेटा हैंडलिंग के बुनियादी सिद्धांतों को सही ढंग से बताते हैं।"}, {"id": 12, "section": "Maths", "question": "निम्नलिखित कथनों पर विचार करें:\nJ: हर भिन्न (fraction) को दशमलव (decimal) के रूप में व्यक्त किया जा सकता है।\nK: हर दशमलव संख्या को भिन्न के रूप में व्यक्त किया जा सकता है।\nL: 0.5 का मान 1/2 के बराबर है।\nM: 1/4 का मान 0.25 के बराबर है।\nऊपर दिए गए कथनों में से कौन से कथन सही हैं?", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, L और M सभी", "केवल J और K", "केवल J, K और L", "केवल K, L और M"], "answer": "J, K, L और M सभी", "explanation": "सभी कथन सही हैं। हर भिन्न को दशमलव में बदला जा सकता है (जैसे 1/2 = 0.5), और हर दशमलव संख्या को भिन्न में बदला जा सकता है (जैसे 0.25 = 1/4)। कथन L और M इन रूपांतरणों के विशिष्ट उदाहरण हैं। भिन्न और दशमलव संख्याएँ एक ही संख्या के दो अलग-अलग प्रतिनिधित्व (representations) हैं।"}, {"id": 13, "section": "Maths", "question": "मापन (measurement) की निम्नलिखित इकाइयों को उनके मान के अनुसार आरोही क्रम (ascending order) में व्यवस्थित करें (सबसे छोटे से सबसे बड़े तक):\nJ: सेंटीमीटर (Centimeter)\nK: किलोमीटर (Kilometer)\nL: मिलीमीटर (Millimeter)\nM: मीटर (Meter)", "brand": "bilaspurtestseries.com 9669946966", "options": ["L, J, M, K", "J, L, M, K", "L, M, J, K", "K, M, J, L"], "answer": "L, J, M, K", "explanation": "मापन की इकाइयों का आरोही क्रम (सबसे छोटे से सबसे बड़े तक) इस प्रकार है:\n1. मिलीमीटर (Millimeter) - सबसे छोटी इकाई (10 mm = 1 cm)\n2. सेंटीमीटर (Centimeter) − (100 cm = 1 m)\n3. मीटर (Meter) − (1000 m = 1 km)\n4. किलोमीटर (Kilometer) - सबसे बड़ी इकाई\nइसलिए, सही क्रम L (मिलीमीटर), J (सेंटीमीटर), M (मीटर), K (किलोमीटर) है। यह इकाइयों के मानक रूपांतरण और उनके सापेक्ष मानों की समझ पर आधारित है।"}, {"id": 14, "section": "EVS", "question": "एक परिवार (family) में 5 सदस्य (members) हैं। यदि प्रत्येक सदस्य प्रतिदिन (per day) औसतन (average) 20 लीटर (liter) पानी नहाने के लिए उपयोग (use) करता है, तो एक सप्ताह (week) में परिवार द्वारा नहाने के लिए कुल (total) कितने लीटर पानी का उपयोग किया जाएगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["700 लीटर", "100 लीटर", "350 लीटर", "140 लीटर"], "answer": "700 लीटर", "explanation": "सबसे पहले, हम एक दिन में परिवार द्वारा उपयोग किए गए कुल पानी की गणना करेंगे। प्रत्येक सदस्य 20 लीटर पानी का उपयोग करता है और परिवार में 5 सदस्य हैं, इसलिए एक दिन में कुल पानी = 5 सदस्य20 लीटर/सदस्य = 100 लीटर।\nचूंकि एक सप्ताह में 7 दिन होते हैं, तो एक सप्ताह में परिवार द्वारा उपयोग किया गया कुल पानी = 100 लीटर/दिन7 दिन = 700 लीटर। अन्य विकल्प गलत हैं क्योंकि वे या तो केवल एक दिन का उपयोग (100 लीटर) या एक सदस्य का साप्ताहिक उपयोग (140 लीटर) दर्शाते हैं, या गलत गणना पर आधारित हैं।"}, {"id": 15, "section": "EVS", "question": "एक परिवार अपनी कार से 450 किलोमीटर (kilometers) की यात्रा पर निकलता है। यदि उनकी कार 15 किलोमीटर प्रति लीटर (km/liter) का औसत माइलेज (average mileage) देती है और पेट्रोल की कीमत ₹95 प्रति लीटर है, तो इस यात्रा में पेट्रोल पर कुल कितना खर्च आएगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["₹2550", "₹2850", "₹3150", "₹3000"], "answer": "₹2850", "explanation": "सबसे पहले, हमें यह गणना करनी होगी कि 450 किलोमीटर की यात्रा के लिए कितने लीटर पेट्रोल की आवश्यकता होगी। कार का माइलेज 15 किलोमीटर प्रति लीटर है, इसलिए आवश्यक पेट्रोल = कुल दूरी / माइलेज = 450 किमी / 15 किमी/लीटर = 30 लीटर।\nअब, पेट्रोल की कुल लागत की गणना करें: कुल लागत = आवश्यक पेट्रोलपेट्रोल की कीमत प्रति लीटर = 30 लीटर₹95/लीटर = ₹2850। अन्य विकल्प गलत गणना पर आधारित हैं।"}, {"id": 16, "section": "EVS", "question": "एक बस 45 किलोमीटर प्रति घंटा (km/h) की औसत गति (average speed) से यात्रा कर रही है। यदि बस को 180 किलोमीटर की दूरी तय करनी है, तो उसे कितना समय लगेगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["4 घंटे", "6 घंटे", "3 घंटे", "5 घंटे"], "answer": "4 घंटे", "explanation": "समय (Time) = दूरी (Distance) / गति (Speed) के सूत्र का उपयोग करके, हम समय की गणना कर सकते हैं।\nदी गई दूरी = 180 किलोमीटर और गति = 45 किलोमीटर प्रति घंटा।\nसमय = 180 किमी / 45 किमी/घंटा = 4 घंटे।\nइसलिए, बस को 180 किलोमीटर की दूरी तय करने में 4 घंटे लगेंगे। अन्य विकल्प गलत गणना के कारण सही नहीं हैं।"}, {"id": 17, "section": "EVS", "question": "एक स्थानीय समुदाय (local community) प्रतिदिन औसतन 800 किलोग्राम (kilograms) ठोस कचरा (solid waste) उत्पन्न करता है। यदि समुदाय ने कचरा प्रबंधन (waste management) के तहत इस कचरे का 40% खाद (compost) बनाने के लिए उपयोग करने का लक्ष्य रखा है, तो एक सप्ताह (7 दिन) में खाद बनाने के लिए कुल कितना कचरा उपयोग किया जाएगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["2240 किलोग्राम", "2560 किलोग्राम", "1600 किलोग्राम", "1920 किलोग्राम"], "answer": "2240 किलोग्राम", "explanation": "सबसे पहले, प्रतिदिन खाद बनाने के लिए उपयोग किए जाने वाले कचरे की मात्रा ज्ञात करें। कुल दैनिक कचरा 800 किलोग्राम है और इसका 40% खाद के लिए उपयोग किया जाता है: 800 किलोग्राम40% = 800 × 0.40 = 320 किलोग्राम।\nअब, एक सप्ताह (7 दिन) में खाद के लिए उपयोग किए जाने वाले कुल कचरे की गणना करें: 320 किलोग्राम/दिन7 दिन = 2240 किलोग्राम। अन्य विकल्प गलत गणना पर आधारित हैं।"}, {"id": 18, "section": "EVS", "question": "शहरी क्षेत्रों में वायु प्रदूषण (air pollution) को कम करने के लिए निम्नलिखित में से कौन सा उपाय सबसे प्रभावी होगा, जिसमें दीर्घकालिक (long-term) और बहुआयामी (multi-faceted) दृष्टिकोण शामिल हो?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल वृक्षारोपण अभियान चलाना (Only conducting tree plantation drives)", "अधिक एयर प्यूरीफायर (air purifiers) स्थापित करना (Installing more air purifiers)", "औद्योगिक इकाइयों को शहर से बाहर स्थानांतरित करना और सार्वजनिक परिवहन को बढ़ावा देना (Relocating industrial units outside the city and promoting public transport)", "केवल निजी वाहनों पर प्रतिबंध लगाना (Only banning private vehicles)"], "answer": "औद्योगिक इकाइयों को शहर से बाहर स्थानांतरित करना और सार्वजनिक परिवहन को बढ़ावा देना (Relocating industrial units outside the city and promoting public transport)", "explanation": "वायु प्रदूषण (air pollution) को कम करने के लिए एक बहुआयामी दृष्टिकोण की आवश्यकता होती है। औद्योगिक इकाइयों को शहर से बाहर स्थानांतरित करने से औद्योगिक उत्सर्जन (industrial emissions) कम होगा, जबकि सार्वजनिक परिवहन (public transport) को बढ़ावा देने से निजी वाहनों का उपयोग घटेगा, जिससे वाहनों से होने वाला प्रदूषण कम होगा। केवल निजी वाहनों पर प्रतिबंध लगाना अव्यावहारिक हो सकता है, एयर प्यूरीफायर केवल तात्कालिक राहत देते हैं, और वृक्षारोपण अभियान महत्वपूर्ण हैं लेकिन अकेले पर्याप्त नहीं हैं।"}, {"id": 19, "section": "EVS", "question": "अभिकथन (A): संयुक्त परिवार (Joint family) में बच्चों को अधिक सामाजिक सुरक्षा (social security) और सांस्कृतिक मूल्यों (cultural values) का ज्ञान मिलता है।\nकारण (R): संयुक्त परिवार में कई पीढ़ियों के सदस्य एक साथ रहते हैं, जिससे बच्चों को विभिन्न अनुभवों और परंपराओं से सीखने का अवसर मिलता है।", "brand": "bilaspurtestseries.com 9669946966", "options": ["(A) और (R) दोनों सही हैं, लेकिन (R), (A) की सही व्याख्या नहीं है।", "(A) गलत है, लेकिन (R) सही है।", "(A) सही है, लेकिन (R) गलत है।", "(A) और (R) दोनों सही हैं, और (R), (A) की सही व्याख्या है।"], "answer": "(A) और (R) दोनों सही हैं, और (R), (A) की सही व्याख्या है।", "explanation": "अभिकथन (A) सही है क्योंकि संयुक्त परिवार में दादा-दादी, चाचा-चाची जैसे कई सदस्य होते हैं जो बच्चों को भावनात्मक समर्थन, मार्गदर्शन और सांस्कृतिक शिक्षा प्रदान करते हैं। कारण (R) भी सही है और अभिकथन की सही व्याख्या करता है, क्योंकि विभिन्न पीढ़ियों के एक साथ रहने से बच्चों को विविध अनुभव और परंपराएँ सीखने को मिलती हैं, जिससे उनकी सामाजिक सुरक्षा और सांस्कृतिक समझ बढ़ती है।"}, {"id": 20, "section": "EVS", "question": "सूची-I में जल के स्रोत दिए गए हैं और सूची-II में उनके प्राथमिक उपयोग दिए गए हैं। सही जोड़ी का मिलान करें:\nसूची-I\nJ: भूजल (Groundwater)\nK: वर्षा जल (Rainwater)\nL: सतही जल (Surface water - नदियाँ, झीलें)\nM: खारा जल (Saline water - समुद्र)\nसूची-II\n1. कृषि और औद्योगिक उपयोग\n2. पीने और घरेलू उपयोग (शुद्धिकरण के बाद)\n3. विलवणीकरण (desalination) के बाद पीने योग्य\n4. भूजल पुनर्भरण और प्रत्यक्ष उपयोग (कम मात्रा में)\nसही मिलान का चयन करें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-2, K-4, L-1, M-3", "J-3, K-1, L-4, M-2", "J-1, K-2, L-3, M-4", "J-4, K-3, L-2, M-1"], "answer": "J-2, K-4, L-1, M-3", "explanation": "भूजल (Groundwater) अक्सर पीने और घरेलू उपयोग के लिए सबसे शुद्ध स्रोतों में से एक होता है (J-2)। वर्षा जल (Rainwater) का उपयोग भूजल पुनर्भरण (groundwater recharge) और सीधे कम मात्रा में उपयोग के लिए किया जाता है (K-4)। सतही जल (Surface water) जैसे नदियाँ और झीलें बड़े पैमाने पर कृषि और औद्योगिक उपयोग के लिए महत्वपूर्ण हैं (L-1)। खारा जल (Saline water) जैसे समुद्र का पानी, विलवणीकरण (desalination) प्रक्रिया के बाद पीने योग्य बनाया जा सकता है (M-3)।"}, {"id": 21, "section": "EVS", "question": "एक विद्यालय (school) हर महीने 15 पौधे (plants) लगाने का लक्ष्य (target) रखता है। यदि वे इस लक्ष्य को 2 साल तक बनाए रखते हैं, तो कुल कितने पौधे लगाए जाएंगे?", "brand": "bilaspurtestseries.com 9669946966", "options": ["360 पौधे", "180 पौधे", "450 पौधे", "300 पौधे"], "answer": "360 पौधे", "explanation": "सही उत्तर 360 पौधे है। विद्यालय हर महीने 15 पौधे लगाने का लक्ष्य रखता है। 2 साल में कुल 24 महीने होते हैं (क्योंकि 1 साल = 12 महीने, तो 2 साल = 2 × 12 = 24 महीने)। इसलिए, कुल लगाए गए पौधों की संख्या की गणना (calculation) 15 पौधे/महीना * 24 महीने = 360 पौधे होगी। विकल्प (A) 180 पौधे गलत है क्योंकि यह केवल 1 साल के पौधों की संख्या है (15 × 12 = 180)। विकल्प (B) 300 पौधे भी गलत है क्योंकि यह 20 महीने के पौधों की संख्या है (15 × 20 = 300)।"}, {"id": 22, "section": "EVS", "question": "एक गाँव में प्रतिदिन 500 किलोग्राम (kg) कचरा (waste) उत्पन्न होता है। यदि इस कचरे का 60% जैविक (biodegradable) है और उसे खाद (compost) बनाने के लिए उपयोग किया जा सकता है, तो एक सप्ताह में कितना जैविक कचरा खाद बनाने के लिए उपलब्ध होगा?", "brand": "bilaspurtestseries.com 9669946966", "options": ["2100 किलोग्राम (kg)", "3500 किलोग्राम (kg)", "300 किलोग्राम (kg)", "1500 किलोग्राम (kg)"], "answer": "2100 किलोग्राम (kg)", "explanation": "सबसे पहले, हमें प्रतिदिन उत्पन्न होने वाले जैविक कचरे की मात्रा ज्ञात करनी होगी। कुल कचरा 500 किलोग्राम है और इसका 60% जैविक है, इसलिए 500 × 0.60 = 300 किलोग्राम जैविक कचरा प्रतिदिन उत्पन्न होता है।\nएक सप्ताह में 7 दिन होते हैं, इसलिए एक सप्ताह में कुल जैविक कचरा 300 किलोग्राम/दिन7 दिन = 2100 किलोग्राम होगा। विकल्प B (300 kg) केवल एक दिन का जैविक कचरा है, जबकि विकल्प C (3500 kg) एक सप्ताह में कुल उत्पन्न होने वाला कचरा है (500 kg/दिन7 दिन), न कि केवल जैविक कचरा। विकल्प D (1500 kg) गलत गणना का परिणाम है।"}, {"id": 23, "section": "EVS", "question": "सामान्य स्वास्थ्य और स्वच्छता के संदर्भ में, निम्नलिखित में से कौन सा कथन सही है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["दांतों को दिन में केवल एक बार ब्रश करना पर्याप्त है।", "नियमित स्नान (regular bathing) से शरीर की दुर्गंध नहीं जाती।", "खाना खाने से पहले हाथ धोना केवल बड़ों के लिए आवश्यक है।", "संक्रामक रोगों (infectious diseases) से बचने के लिए व्यक्तिगत स्वच्छता महत्वपूर्ण है।"], "answer": "संक्रामक रोगों (infectious diseases) से बचने के लिए व्यक्तिगत स्वच्छता महत्वपूर्ण है।", "explanation": "व्यक्तिगत स्वच्छता, जैसे हाथ धोना, नियमित स्नान करना और दांतों को ब्रश करना, कीटाणुओं (germs) के प्रसार को रोककर संक्रामक रोगों से बचाव में महत्वपूर्ण भूमिका निभाती है। खाना खाने से पहले हाथ धोना सभी के लिए आवश्यक है, दांतों को दिन में कम से कम दो बार ब्रश करना चाहिए, और नियमित स्नान से शरीर की दुर्गंध दूर होती है।"}, {"id": 24, "section": "EVS", "question": "आप एक भीड़भाड़ वाले सार्वजनिक स्थान पर हैं और अचानक आग लगने की घोषणा होती है। ऐसे में आपकी पहली और सबसे महत्वपूर्ण सुरक्षा प्रतिक्रिया क्या होनी चाहिए, खासकर यदि आप बच्चों के साथ हों?", "brand": "bilaspurtestseries.com 9669946966", "options": ["अपने सामान को बचाने की कोशिश करें और फिर बाहर निकलें।", "तुरंत अपने मोबाइल फोन (mobile phone) से आपातकालीन सेवाओं (emergency services) को कॉल करें।", "भीड़ के साथ मुख्य निकास (main exit) की ओर दौड़ें, भले ही धक्का-मुक्की करनी पड़े।", "शांत रहें, बच्चों को अपने पास रखें, और निकटतम आपातकालीन निकास (emergency exit) या सुरक्षित मार्ग की तलाश करें।"], "answer": "शांत रहें, बच्चों को अपने पास रखें, और निकटतम आपातकालीन निकास (emergency exit) या सुरक्षित मार्ग की तलाश करें।", "explanation": "आपातकालीन स्थिति में, शांत रहना और घबराहट से बचना सबसे महत्वपूर्ण है, खासकर जब बच्चों के साथ हों। भीड़ में दौड़ने से भगदड़ मच सकती है और चोट लगने का खतरा बढ़ सकता है। आपातकालीन सेवाओं को कॉल करना महत्वपूर्ण है, लेकिन यह आपकी पहली प्रतिक्रिया नहीं होनी चाहिए जब आपकी जान खतरे में हो; पहले खुद को और बच्चों को सुरक्षित स्थान पर ले जाना प्राथमिकता है। अपने सामान को बचाने की कोशिश करना भी गलत है क्योंकि जान बचाना सर्वोपरि है।"}, {"id": 25, "section": "EVS", "question": "पौधों के विभिन्न प्रकारों और उनके उपयोगों के संबंध में निम्नलिखित कथनों पर विचार करें:\n1. औषधीय पौधे (Medicinal plants) जैसे नीम और तुलसी का उपयोग विभिन्न बीमारियों के इलाज में होता है।\n2. रेशेदार पौधे (Fibrous plants) जैसे कपास और जूट का उपयोग कपड़े और बोरे बनाने में होता है।\n3. अनाज (Cereals) जैसे गेहूं और चावल मुख्य रूप से पशुओं के चारे के लिए उगाए जाते हैं", "brand": "bilaspurtestseries.com 9669946966", "options": ["1, 2 और 3", "केवल 1", "1 और 2 दोनों", "केवल 2"], "answer": "1 और 2 दोनों", "explanation": "कथन 1 और 2 दोनों सही हैं। नीम और तुलसी जैसे औषधीय पौधे पारंपरिक चिकित्सा (traditional medicine) में व्यापक रूप से उपयोग किए जाते हैं। कपास और जूट जैसे रेशेदार पौधे वस्त्र उद्योग (textile industry) और अन्य उत्पादों के लिए महत्वपूर्ण हैं। हालांकि, कथन 3 गलत है क्योंकि गेहूं और चावल जैसे अनाज मुख्य रूप से मानव उपभोग (human consumption) के लिए उगाए जाते हैं, न कि केवल पशुओं के चारे के लिए।"}, {"id": 26, "section": "EVS", "question": "पर्यावरणीय प्रदूषण और उसके प्रभावों के संबंध में निम्नलिखित कथनों पर विचार करें:\n1. ओजोन परत (Ozone layer) का क्षरण (depletion) मुख्य रूप से क्लोरोफ्लोरोकार्बन (CFCs) जैसे रसायनों के कारण होता है, जिससे पृथ्वी पर पराबैंगनी (ultraviolet) विकिरण बढ़ता है।\n2. जल प्रदूषण (Water pollution) से जलीय जीवन (aquatic life) को नुकसान होता है और मानव में जल-जनित बीमारियाँ (water-borne diseases) फैलती हैं।\n3. ध्वनि प्रदूषण (Noise pollution) केवल सुनने की क्षमता को प्रभावित करता है और इसका मानव के मानसिक स्वास्थ्य (mental health) पर कोई प्रभाव नहीं पड़ता", "brand": "bilaspurtestseries.com 9669946966", "options": ["1 और 2 दोनों", "केवल 1", "1, 2 और 3", "केवल 2"], "answer": "1 और 2 दोनों", "explanation": "कथन 1 और 2 सही हैं। क्लोरोफ्लोरोकार्बन (CFCs) ओजोन परत के क्षरण के प्रमुख कारण हैं, जिससे हानिकारक पराबैंगनी विकिरण पृथ्वी तक पहुँचता है। जल प्रदूषण से जलीय पारिस्थितिकी तंत्र (aquatic ecosystem) को गंभीर नुकसान होता है और हैजा (cholera), टाइफाइड (typhoid) जैसी जल-जनित बीमारियाँ फैलती हैं। हालांकि, कथन 3 गलत है क्योंकि ध्वनि प्रदूषण न केवल सुनने की क्षमता को प्रभावित करता है, बल्कि तनाव (stress), नींद की कमी (sleep deprivation) और उच्च रक्तचाप (high blood pressure) जैसी समस्याओं का कारण बनकर मानसिक स्वास्थ्य पर भी नकारात्मक प्रभाव डालता है।"}, {"id": 27, "section": "EVS", "question": "पर्यावरण संरक्षण (environmental conservation) में '3R' सिद्धांत का क्या महत्व है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["कम करें (Reduce), पुनः उपयोग करें (Reuse), पुनर्चक्रण करें (Recycle)", "सम्मान करें (Respect), बहाल करें (Restore), पुनर्निर्माण करें (Rebuild)", "अनुसंधान करें (Research), रिपोर्ट करें (Report), प्रतिक्रिया करें (React)", "मरम्मत करें (Repair), पुनः उपयोग करें (Reuse), हटाएँ (Remove)"], "answer": "कम करें (Reduce), पुनः उपयोग करें (Reuse), पुनर्चक्रण करें (Recycle)", "explanation": "'3R' सिद्धांत पर्यावरण संरक्षण के लिए एक महत्वपूर्ण अवधारणा (concept) है। इसमें 'कम करें' (Reduce) का अर्थ है कचरे को कम उत्पन्न करना, 'पुनः उपयोग करें' (Reuse) का अर्थ है वस्तुओं को बार-बार इस्तेमाल करना, और 'पुनर्चक्रण करें' (Recycle) का अर्थ है पुरानी वस्तुओं से नई वस्तुएँ बनाना। यह सिद्धांत अपशिष्ट प्रबंधन (waste management) और प्राकृतिक संसाधनों (natural resources) के संरक्षण में मदद करता है, जबकि अन्य विकल्प इस सिद्धांत के सही घटक नहीं हैं और पर्यावरण संरक्षण के संदर्भ में अलग अर्थ रखते हैं।"}, {"id": 28, "section": "EVS", "question": "जैव विविधता (biodiversity) के संरक्षण (conservation) का प्राथमिक उद्देश्य (primary objective) क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल पर्यटन (tourism) को बढ़ावा देना।", "पारिस्थितिक तंत्र (ecosystems) के संतुलन (balance) और स्थिरता (stability) को बनाए रखना।", "केवल दुर्लभ प्रजातियों (rare species) को बचाना।", "मानव उपयोग के लिए अधिक संसाधनों का उत्पादन करना।"], "answer": "पारिस्थितिक तंत्र (ecosystems) के संतुलन (balance) और स्थिरता (stability) को बनाए रखना।", "explanation": "जैव विविधता का संरक्षण केवल दुर्लभ प्रजातियों को बचाने या पर्यटन को बढ़ावा देने तक सीमित नहीं है। इसका मुख्य उद्देश्य विभिन्न प्रजातियों, उनके आनुवंशिक विविधता और उनके आवासों को बनाए रखकर पारिस्थितिक तंत्र के संतुलन और स्थिरता को सुनिश्चित करना है, जो अंततः मानव जीवन के लिए भी आवश्यक है। मानव उपयोग के लिए अधिक संसाधन उत्पादन करना अक्सर जैव विविधता के लिए हानिकारक हो सकता है, इसलिए यह प्राथमिक उद्देश्य नहीं है।"}, {"id": 29, "section": "EVS", "question": "निम्नलिखित में से कौन सा रोग (disease) दूषित पानी (contaminated water) पीने से नहीं फैलता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["खसरा (Measles)", "हैजा (Cholera)", "पीलिया (Jaundice)", "टाइफाइड (Typhoid)"], "answer": "खसरा (Measles)", "explanation": "हैजा, टाइफाइड और पीलिया जैसे रोग दूषित पानी पीने से फैलते हैं, जो स्वच्छता (hygiene) की कमी से संबंधित हैं। खसरा (Measles) एक वायरल संक्रमण (viral infection) है जो मुख्य रूप से हवा के माध्यम से फैलता है, जैसे खांसने और छींकने से, न कि दूषित पानी से। इसलिए, खसरा दूषित पानी से फैलने वाला रोग नहीं है।"}, {"id": 30, "section": "EVS", "question": "पौधों (plants) में प्रकाश संश्लेषण (photosynthesis) की प्रक्रिया मुख्य रूप से किस भाग में होती है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["जड़ (Root)", "फूल (Flower)", "पत्ती (Leaf)", "तना (Stem)"], "answer": "पत्ती (Leaf)", "explanation": "प्रकाश संश्लेषण (photosynthesis) वह प्रक्रिया है जिसके द्वारा पौधे सूर्य के प्रकाश का उपयोग करके अपना भोजन बनाते हैं। यह प्रक्रिया मुख्य रूप से पत्तियों (leaves) में होती है, क्योंकि पत्तियों में क्लोरोफिल (chlorophyll) नामक हरा वर्णक (pigment) होता है जो सूर्य के प्रकाश को अवशोषित करता है। जड़ें पानी और पोषक तत्वों को अवशोषित करती हैं, तना पौधों को सहारा देता है और पानी व पोषक तत्वों का परिवहन करता है, जबकि फूल प्रजनन (reproduction) में मदद करते हैं।"}, {"id": 31, "section": "EVS", "question": "यदि आप किसी सार्वजनिक स्थान (public place) पर आग (fire) देखते हैं, तो आपकी पहली प्रतिक्रिया (first response) क्या होनी चाहिए?", "brand": "bilaspurtestseries.com 9669946966", "options": ["तुरंत 101 (फायर ब्रिगेड) पर कॉल करना", "आग बुझाने की कोशिश करना", "अपने दोस्तों को सूचित करना", "भीड़ इकट्ठा करना और देखना"], "answer": "तुरंत 101 (फायर ब्रिगेड) पर कॉल करना", "explanation": "किसी भी सार्वजनिक स्थान पर आग लगने की स्थिति में, सबसे पहली और महत्वपूर्ण प्रतिक्रिया तुरंत आपातकालीन सेवाओं, जैसे कि फायर ब्रिगेड (101) को सूचित करना है। जब तक आप प्रशिक्षित न हों और आग छोटी न हो, आग बुझाने की कोशिश करना खतरनाक हो सकता है। भीड़ इकट्ठा करना या दोस्तों को सूचित करना समय बर्बाद करेगा और स्थिति को और खराब कर सकता है।"}, {"id": 32, "section": "EVS", "question": "निम्नलिखित में से कौन सा जानवर (animal) सर्वाहारी (omnivorous) की श्रेणी में आता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["गाय (Cow)", "शेर (Lion)", "हिरण (Deer)", "भालू (Bear)"], "answer": "भालू (Bear)", "explanation": "सर्वाहारी (omnivorous) वे जानवर होते हैं जो पौधों और जानवरों दोनों को खाते हैं। शेर (Lion) मांसाहारी (carnivorous) है क्योंकि यह केवल मांस खाता है। हिरण (Deer) और गाय (Cow) शाकाहारी (herbivorous) हैं क्योंकि वे केवल पौधे खाते हैं। भालू (Bear) सर्वाहारी होता है, क्योंकि यह जामुन, जड़ें, मछली और छोटे जानवरों सहित विभिन्न प्रकार के भोजन खाता है।"}, {"id": 33, "section": "EVS", "question": "निम्नलिखित में से कौन सा पौधा मांसाहारी (carnivorous) होता है और कीटों (insects) को पकड़कर अपना पोषण प्राप्त करता है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["गुलाब (Rose)", "सूरजमुखी (Sunflower)", "घटपर्णी (Pitcher Plant)", "नीम (Neem)"], "answer": "घटपर्णी (Pitcher Plant)", "explanation": "घटपर्णी (Pitcher Plant) एक मांसाहारी (carnivorous) पौधा है जो नाइट्रोजन जैसे पोषक तत्वों की कमी वाली मिट्टी में उगता है। यह कीटों (insects) को अपने घड़े जैसे पत्तों में फंसाकर और पचाकर अपनी पोषण संबंधी आवश्यकताओं को पूरा करता है। गुलाब, सूरजमुखी और नीम सामान्य पौधे हैं जो प्रकाश संश्लेषण (photosynthesis) के माध्यम से अपना भोजन स्वयं बनाते हैं और कीटों का भक्षण नहीं करते।"}, {"id": 34, "section": "EVS", "question": "रेगिस्तानी इलाकों (desert areas) में रहने वाले जानवरों में पानी की कमी को सहन करने के लिए कौन सी विशेष अनुकूलन (special adaptation) पाई जाती है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["शरीर में पानी जमा करने की क्षमता (ability to store water in body)", "तेज दौड़ने की क्षमता (ability to run fast)", "मोटी फर (thick fur)", "रात में शिकार करना (hunting at night)"], "answer": "शरीर में पानी जमा करने की क्षमता (ability to store water in body)", "explanation": "रेगिस्तानी जानवर, जैसे ऊँट, अपने शरीर में पानी जमा करने की विशेष क्षमता रखते हैं, जिससे वे लंबे समय तक पानी के बिना रह सकते हैं। यह उन्हें पानी की कमी वाले वातावरण में जीवित रहने में मदद करता है। मोटी फर ठंडे इलाकों के जानवरों में पाई जाती है, तेज दौड़ने की क्षमता शिकारियों से बचने या शिकार करने के लिए होती है, और रात में शिकार करना कुछ रेगिस्तानी जानवरों की आदत हो सकती है, लेकिन यह सीधे पानी की कमी को सहन करने का अनुकूलन नहीं है।"}, {"id": 35, "section": "EVS", "question": "व्यक्तिगत स्वच्छता (personal hygiene) के लिए निम्नलिखित में से कौन सी आदत सबसे महत्वपूर्ण है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["नियमित रूप से हाथ धोना (Washing hands regularly)", "प्रतिदिन व्यायाम करना (Exercising daily)", "पर्याप्त नींद लेना (Getting enough sleep)", "संतुलित आहार लेना (Eating a balanced diet)"], "answer": "नियमित रूप से हाथ धोना (Washing hands regularly)", "explanation": "नियमित रूप से हाथ धोना (Washing hands regularly) व्यक्तिगत स्वच्छता (personal hygiene) का एक महत्वपूर्ण हिस्सा है क्योंकि यह कीटाणुओं (germs) और बीमारियों के प्रसार को रोकने में मदद करता है। व्यायाम, संतुलित आहार और पर्याप्त नींद समग्र स्वास्थ्य के लिए महत्वपूर्ण हैं, लेकिन सीधे तौर पर व्यक्तिगत स्वच्छता से संबंधित नहीं हैं जो संक्रमण (infection) के प्रसार को रोकती है।"}, {"id": 36, "section": "EVS", "question": "यदि किसी व्यक्ति को अचानक बिजली का झटका (electric shock) लगे, तो प्राथमिक उपचार (first aid) के रूप में सबसे पहले क्या करना चाहिए?", "brand": "bilaspurtestseries.com 9669946966", "options": ["बिजली का मुख्य स्रोत बंद करना (Switch off the main power source)", "व्यक्ति को छूने की कोशिश करना (Try to touch the person)", "डॉक्टर का इंतजार करना (Wait for the doctor)", "तुरंत पानी डालना (Immediately pour water)"], "answer": "बिजली का मुख्य स्रोत बंद करना (Switch off the main power source)", "explanation": "बिजली के झटके (electric shock) की स्थिति में, सबसे पहले बिजली के मुख्य स्रोत (main power source) को बंद करना महत्वपूर्ण है ताकि व्यक्ति को बिजली के संपर्क से हटाया जा सके और आगे के झटके से बचा जा सके। व्यक्ति को सीधे छूने से झटका देने वाले को भी खतरा हो सकता है। पानी डालने से स्थिति और खराब हो सकती है क्योंकि पानी बिजली का सुचालक (conductor) है। डॉक्टर का इंतजार करने से पहले प्राथमिक उपचार आवश्यक है।"}, {"id": 37, "section": "EVS", "question": "'3R' सिद्धांत (principle) - कम करें (Reduce), पुनः उपयोग करें (Reuse), और पुनर्चक्रण करें (Recycle) - का मुख्य उद्देश्य क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["शहरीकरण को बढ़ावा देना (To promote urbanization)", "ऊर्जा उत्पादन बढ़ाना (To increase energy production)", "कृषि उत्पादकता बढ़ाना (To increase agricultural productivity)", "अपशिष्ट (waste) को कम करना और संसाधनों का संरक्षण करना (To reduce waste and conserve resources)"], "answer": "अपशिष्ट (waste) को कम करना और संसाधनों का संरक्षण करना (To reduce waste and conserve resources)", "explanation": "'3R' सिद्धांत (principle) - कम करें (Reduce), पुनः उपयोग करें (Reuse), और पुनर्चक्रण करें (Recycle) - का मुख्य उद्देश्य अपशिष्ट (waste) उत्पादन को कम करना और प्राकृतिक संसाधनों (natural resources) का संरक्षण करना है। यह पर्यावरण संरक्षण (environmental conservation) और स्थिरता (sustainability) को बढ़ावा देने के लिए एक महत्वपूर्ण रणनीति है। ऊर्जा उत्पादन बढ़ाना, कृषि उत्पादकता बढ़ाना या शहरीकरण को बढ़ावा देना इसके प्रत्यक्ष उद्देश्य नहीं हैं।"}, {"id": 38, "section": "EVS", "question": "निम्नलिखित में से कौन से व्यक्तिगत स्वच्छता (personal hygiene) के अभ्यास हैं?\nJ: नियमित रूप से हाथ धोना\nK: प्रतिदिन स्नान करना\nL: संतुलित आहार (balanced diet) लेना\nM: अपने नाखूनों को साफ और छोटा रखना", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल J, K और M", "J, K, L और M सभी", "केवल K, L और M", "केवल J और K"], "answer": "केवल J, K और M", "explanation": "नियमित रूप से हाथ धोना (J), प्रतिदिन स्नान करना (K), और अपने नाखूनों को साफ और छोटा रखना (M) व्यक्तिगत स्वच्छता के प्रत्यक्ष अभ्यास हैं जो शरीर की सफाई और कीटाणुओं के प्रसार को रोकने से संबंधित हैं। संतुलित आहार लेना (L) एक स्वस्थ जीवन शैली का हिस्सा है और अच्छे स्वास्थ्य के लिए महत्वपूर्ण है, लेकिन यह सीधे तौर पर व्यक्तिगत स्वच्छता का अभ्यास नहीं है, बल्कि पोषण (nutrition) से संबंधित है।"}, {"id": 39, "section": "EVS", "question": "निम्नलिखित पर्यावरण संरक्षण आंदोलनों/नीतियों को उनके संबंधित विवरणों से सुमेलित (match) करें और सही विकल्प चुनें:\nसूची-I\nJ: चिपको आंदोलन (Chipko Movement)\nK: नर्मदा बचाओ आंदोलन (Narmada Bachao Andolan)\nL: वन्यजीव संरक्षण अधिनियम (Wildlife Protection Act), 1972\nM: मॉन्ट्रियल प्रोटोकॉल (Montreal Protocol)\nसूची-II\n1. वनों की कटाई रोकने के लिए पेड़ों से चिपकना।\n2. ओजोन परत को नुकसान पहुँचाने वाले पदार्थों को चरणबद्ध तरीके से समाप्त करना।\n3. बड़े बांधों के निर्माण के खिलाफ स्थानीय समुदायों का विरोध।\n4. भारत में वन्यजीवों और उनके आवासों की सुरक्षा के लिए कानून।", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-2, K-1, L-3, M-4", "J-1, K-3, L-4, M-2", "J-3, K-2, L-1, M-4", "J-1, K-4, L-2, M-3"], "answer": "J-1, K-3, L-4, M-2", "explanation": "सही सुमेलन इस प्रकार है: चिपको आंदोलन (J) वनों की कटाई रोकने के लिए पेड़ों से चिपकने के लिए जाना जाता है (1)। नर्मदा बचाओ आंदोलन (K) बड़े बांधों के निर्माण के खिलाफ स्थानीय समुदायों का विरोध था (3)। वन्यजीव संरक्षण अधिनियम, 1972 (L) भारत में वन्यजीवों और उनके आवासों की सुरक्षा के लिए एक महत्वपूर्ण कानून है (4)। मॉन्ट्रियल प्रोटोकॉल (M) एक अंतर्राष्ट्रीय संधि है जिसका उद्देश्य ओजोन परत को नुकसान पहुँचाने वाले पदार्थों को चरणबद्ध तरीके से समाप्त करना है (2)। यह मिलान पर्यावरण संरक्षण के प्रमुख आंदोलनों और नीतियों की गहरी समझ को दर्शाता है।"}, {"id": 40, "section": "EVS", "question": "एक मेंढक (frog) के जीवन चक्र (life cycle) की निम्नलिखित अवस्थाओं को सही कालानुक्रमिक क्रम (chronological order) में व्यवस्थित करें:\nJ: टैडपोल (tadpole) में गलफड़े (gills) और पूंछ (tail) का विकास\nK: वयस्क मेंढक (adult frog) का अंडे देना\nL: टैडपोल का फेफड़ों (lungs) और पैरों (legs) का विकास\nM: अंडे से टैडपोल का निकलना", "brand": "bilaspurtestseries.com 9669946966", "options": ["M, J, K, L", "K, J, M, L", "K, M, J, L", "J, M, K, L"], "answer": "K, M, J, L", "explanation": "मेंढक के जीवन चक्र का सही कालानुक्रमिक क्रम इस प्रकार है: सबसे पहले, वयस्क मेंढक अंडे देते हैं (K)। फिर, अंडे से टैडपोल निकलते हैं (M)। इसके बाद, टैडपोल में गलफड़े और पूंछ का विकास होता है, जिससे वे पानी में सांस ले पाते हैं और तैर पाते हैं (J)। अंत में, टैडपोल का कायापलट (metamorphosis) होता है, जिसमें गलफड़े फेफड़ों में बदल जाते हैं और पैरों का विकास होता है, जिससे वे वयस्क मेंढक बन जाते हैं (L)। यह क्रम मेंढक के जलीय से स्थलीय जीवन में संक्रमण को दर्शाता है।"}, {"id": 41, "section": "Primary Pedagogy", "question": "गतिविधि आधारित शिक्षण (Activity Based Learning − ABL) की सबसे महत्वपूर्ण विशेषता क्या है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["केवल पाठ्यपुस्तक पर आधारित गतिविधियाँ।", "सीखने की प्रक्रिया में छात्रों की सक्रिय भागीदारी।", "छात्रों को निष्क्रिय श्रोता बनाए रखना।", "शिक्षक द्वारा सभी गतिविधियों को नियंत्रित करना।"], "answer": "सीखने की प्रक्रिया में छात्रों की सक्रिय भागीदारी।", "explanation": "गतिविधि आधारित शिक्षण (ABL) का मुख्य उद्देश्य छात्रों को सीखने की प्रक्रिया में सक्रिय रूप से शामिल करना है, जिससे वे अनुभव के माध्यम से सीख सकें। यह छात्रों को स्वयं करके सीखने का अवसर प्रदान करता है। अन्य विकल्प ABL की मूल अवधारणा के विपरीत हैं, जहाँ शिक्षक केवल एक सुविधाप्रदाता (facilitator) होता है और छात्र निष्क्रिय नहीं होते।"}, {"id": 42, "section": "Primary Pedagogy", "question": "प्राथमिक स्तर पर शिक्षण अधिगम सामग्री (Teaching Learning Material − TLM) का उपयोग किस उद्देश्य के लिए सबसे प्रभावी है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["कक्षा को सजाने और आकर्षक बनाने के लिए।", "अमूर्त अवधारणाओं (abstract concepts) को मूर्त (concrete) और समझने योग्य बनाने के लिए।", "छात्रों को परीक्षा में उच्च अंक प्राप्त करने में मदद करने के लिए।", "केवल शिक्षकों का कार्यभार कम करने के लिए।"], "answer": "अमूर्त अवधारणाओं (abstract concepts) को मूर्त (concrete) और समझने योग्य बनाने के लिए।", "explanation": "प्राथमिक स्तर पर बच्चे अमूर्त विचारों को समझने में कठिनाई महसूस करते हैं। शिक्षण अधिगम सामग्री (TLM) उन्हें वास्तविक वस्तुओं या उनके प्रतिरूपों के माध्यम से अवधारणाओं को समझने में मदद करता है, जिससे सीखना अधिक प्रभावी और स्थायी होता है। अन्य विकल्प TLM के गौण या गलत उपयोग हैं, जो इसके प्राथमिक शैक्षिक उद्देश्य को पूरा नहीं करते।"}, {"id": 43, "section": "Primary Pedagogy", "question": "सतत एवं व्यापक मूल्यांकन (Continuous and Comprehensive Evaluation − CCE) के संबंध में निम्नलिखित में से कौन सा कथन सही है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["CCE केवल वर्ष के अंत में आयोजित किया जाता है।", "CCE का मुख्य उद्देश्य छात्रों को ग्रेड देना है।", "CCE सीखने की प्रक्रिया के दौरान और उसके बाद दोनों तरह से मूल्यांकन करता है।", "CCE केवल शैक्षिक पहलुओं (scholastic aspects) का मूल्यांकन करता है।"], "answer": "CCE सीखने की प्रक्रिया के दौरान और उसके बाद दोनों तरह से मूल्यांकन करता है।", "explanation": "सतत एवं व्यापक मूल्यांकन (CCE) का अर्थ 'सतत' (continuous) और 'व्यापक' (comprehensive) है। 'सतत' का अर्थ है सीखने की प्रक्रिया के दौरान नियमित मूल्यांकन, और 'व्यापक' का अर्थ है शैक्षिक और सह-शैक्षिक (co-scholastic) दोनों पहलुओं का मूल्यांकन। यह केवल ग्रेड देने या वर्ष के अंत में मूल्यांकन तक सीमित नहीं है, बल्कि सीखने में सुधार पर केंद्रित है।"}, {"id": 44, "section": "Primary Pedagogy", "question": "प्राथमिक स्तर पर शिक्षण-अधिगम (teaching-learning) प्रक्रियाओं और मूल्यांकन (assessment) के संबंध में निम्नलिखित कथनों पर विचार करें:\nJ: गतिविधि-आधारित अधिगम (Activity-Based Learning − ABL) मुख्य रूप से छात्रों में रटने की प्रवृत्ति (rote memorization) को बढ़ावा देता है।\nK: शिक्षण-अधिगम सामग्री (Teaching-Learning Material − TLM) का उपयोग केवल उन छात्रों के लिए प्रभावी होता है जिनकी सीखने की शैली (learning style) दृश्य (visual) होती है।\nL: रचनात्मक मूल्यांकन (Formative Assessment) का प्राथमिक उद्देश्य किसी इकाई के अंत में छात्रों को ग्रेड देना है।\nM: उपचारात्मक शिक्षण (Remedial Teaching) की शुरुआत तभी करनी चाहिए जब कोई छात्र कई बार असफल हो चुका हो और उसकी सीखने की अक्षमता (learning disability) की पुष्टि हो जाए", "brand": "bilaspurtestseries.com 9669946966", "options": ["J, K, L और M सभी", "केवल J और K", "केवल J, K और L", "केवल L और M"], "answer": "J, K, L और M सभी", "explanation": "कथन J गलत है क्योंकि गतिविधि-आधारित अधिगम (ABL) का उद्देश्य छात्रों में समझ, सक्रिय भागीदारी और अनुभवजन्य ज्ञान (experiential knowledge) को बढ़ावा देना है, न कि रटने की प्रवृत्ति को। कथन K भी गलत है क्योंकि शिक्षण-अधिगम सामग्री (TLM) विभिन्न सीखने की शैलियों (जैसे दृश्य, श्रवण, स्पर्श) वाले छात्रों के लिए प्रभावी होती है और सीखने को अधिक समावेशी बनाती है। कथन L गलत है क्योंकि रचनात्मक मूल्यांकन का प्राथमिक उद्देश्य सीखने की प्रक्रिया के दौरान छात्रों को प्रतिक्रिया (feedback) प्रदान करना और सीखने की कठिनाइयों को द 6966", "options": ["केवल J और K", "केवल J, K और L", "केवल K और M", "केवल J, L और M"], "answer": "केवल J और K", "explanation": "गतिविधि आधारित शिक्षण (ABL) छात्रों को सक्रिय रूप से शामिल करके उनमें समस्या-समाधान कौशल विकसित करता है और सीखने को अधिक रोचक बनाता है। यह छात्रों को निष्क्रिय श्रोता नहीं बनाता और न ही रटने को बढ़ावा देता है, बल्कि समझ आधारित सीखने पर जोर देता है। इसलिए, कथन L और M ABL के लाभ नहीं हैं, बल्कि उसकी विशेषताओं के विपरीत हैं।"}, {"id": 47, "section": "Primary Pedagogy", "question": "निम्नलिखित शिक्षण अधिगम सामग्री (TLM) के प्रकारों को उनके उपयुक्त उदाहरणों/उपयोगों से सुमेलित करें:\nसूची-I\nJ: दृश्य सामग्री (Visual Aids)\nK: श्रव्य सामग्री (Audio Aids)\nL: दृश्य-श्रव्य सामग्री (Audio-Visual Aids)\nM: त्रि-आयामी सामग्री (Three-Dimensional Aids)\nसूची-II\n1. रेडियो, टेप रिकॉर्डर\n2. मॉडल, वास्तविक वस्तुएँ (real objects)\n3. चार्ट, फ्लैशकार्ड\n4. टेलीविजन, कंप्यूटर", "brand": "bilaspurtestseries.com 9669946966", "options": ["J-1, K-3, L-2, M-4", "J-2, K-4, L-3, M-1", "J-4, K-2, L-1, M-3", "J-3, K-1, L-4, M-2"], "answer": "J-3, K-1, L-4, M-2", "explanation": "दृश्य सामग्री (Visual Aids) में वे चीजें आती हैं जिन्हें केवल देखा जा सकता है, जैसे चार्ट और फ्लैशकार्ड (III)। श्रव्य सामग्री (Audio Aids) वे हैं जिन्हें केवल सुना जा सकता है, जैसे रेडियो और टेप रिकॉर्डर (I)। दृश्य-श्रव्य सामग्री (Audio-Visual Aids) वे हैं जिन्हें देखा और सुना दोनों जा सकता है, जैसे टेलीविजन और कंप्यूटर (IV)। त्रि-आयामी सामग्री (Three-Dimensional Aids) में वे वस्तुएं शामिल हैं जिनकी गहराई और आयतन होता है, जैसे मॉडल और वास्तविक वस्तुएँ (II)। यह मिलान TLM के विभिन्न प्रकारों और उनके संवेदी अनुभवों के आधार पर किया गया है।"}, {"id": 48, "section": "Primary Pedagogy", "question": "उपचारात्मक शिक्षण (Remedial Teaching) की प्रक्रिया के सही चरणों को क्रमबद्ध करें:\nJ: सीखने की कठिनाइयों का निदान (diagnosis) करना।\nK: उपचारात्मक शिक्षण योजना (remedial teaching plan) तैयार करना।\nL: उपचारात्मक शिक्षण प्रदान करना।\nM: प्रगति का मूल्यांकन (evaluation of progress) करना।\nसही क्रम चुनें:", "brand": "bilaspurtestseries.com 9669946966", "options": ["L, J, M, K", "K, J, L, M", "J, K, L, M", "J, L, K, M"], "answer": "J, K, L, M", "explanation": "उपचारात्मक शिक्षण की प्रक्रिया में पहला कदम छात्रों की सीखने की कठिनाइयों या कमियों का पता लगाना (निदान - J) है। निदान के बाद, इन कमियों को दूर करने के लिए एक विशिष्ट योजना बनाई जाती है (योजना तैयार करना - K)। फिर, इस योजना के अनुसार शिक्षण प्रदान किया जाता है (शिक्षण प्रदान करना - L)। अंत में, यह जांचने के लिए कि उपचारात्मक शिक्षण कितना प्रभावी रहा, छात्रों की प्रगति का मूल्यांकन किया जाता है (प्रगति का मूल्यांकन - M)। यह एक तार्किक और चक्रीय प्रक्रिया है जो छात्रों की सीखने की आवश्यकताओं को पूरा करने के लिए डिज़ाइन की गई है।"}, {"id": 49, "section": "Primary Pedagogy", "question": "प्राथमिक स्तर पर छात्रों के आकलन (assessment) के लिए निम्नलिखित में से कौन सा तरीका सबसे उपयुक्त है?", "brand": "bilaspurtestseries.com 9669946966", "options": ["अवलोकन (observation), पोर्टफोलियो (portfolio) और दैनिक गतिविधियों में भागीदारी।", "मानकीकृत परीक्षणों (standardized tests) का उपयोग करना।", "केवल लिखित परीक्षाएँ (written examinations) आयोजित करना।", "वर्ष के अंत में एक बड़ी परीक्षा लेना।"], "answer": "अवलोकन (observation), पोर्टफोलियो (portfolio) और दैनिक गतिविधियों में भागीदारी।", "explanation": "प्राथमिक स्तर पर बच्चों का आकलन उनकी समग्र प्रगति और सीखने की शैली को समझने के लिए बहुआयामी (multidimensional) होना चाहिए। अवलोकन, पोर्टफोलियो और दैनिक गतिविधियों में भागीदारी जैसे तरीके बच्चों के वास्तविक सीखने और विकास को दर्शाते हैं, क्योंकि वे उनके स्वाभाविक व्यवहार और क्षमताओं को प्रकट करते हैं। केवल लिखित परीक्षाएँ या मानकीकृत परीक्षण छोटे बच्चों की क्षमताओं का पूरी तरह से आकलन नहीं कर पाते और उनके सीखने के अनुभव को सीमित कर सकते हैं।"}, {"id": 50, "section": "Primary Pedagogy", "question": "प्राथमिक शिक्षा में प्रभावी शिक्षण-अधिगम और मूल्यांकन (effective teaching-learning and assessment) के संदर्भ में निम्नलिखित कथनों पर विचार करें:\nJ: गतिविधि-आधारित अधिगम (Activity-Based Learning − ABL) को लागू करने के लिए हमेशा महँगी और विश
